<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MRZYBtv Comic - Vertical Scroll</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        
        /* Grid Katalog */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 20px; }
        .poster { cursor: pointer; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #111; }
        .poster:focus { transform: scale(1.1); border-color: #4a90e2; outline: none; }
        .poster img { width: 100%; height: 200px; object-fit: cover; }
        
        /* Popup */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #4a90e2; position: relative; }
        .eps-btn { display:block; width:100%; padding:14px; margin:5px 0; background:#333; border:none; color:white; text-align: left; border-radius: 6px; cursor: pointer; }
        .eps-btn:focus { background:#4a90e2; outline: none; }

        /* Reader Vertikal STB Friendly */
        #reader-view { display: none; width: 100%; height: 100vh; position: fixed; inset: 0; background: #000; z-index: 500; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
        .swiper { width: 100%; height: auto; } /* Tinggi auto untuk scroll */
        .swiper-slide { height: auto !important; display: block !important; }
        .spread-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .spread-container img { width: 100%; max-width: 800px; display: block; margin: 0; border: none; }
        
        .tv-trigger-zone { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        .menu-btn-tv { background: #333; color: white; border: 2px solid #555; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        .menu-btn-tv:focus { background: red; border-color: white; }
    </style>
</head>
<body>

    <div id="home-view"><div class="grid" id="grid"></div></div>

    <div id="popup" onclick="this.style.display='none'">
        <div class="popup-content" onclick="event.stopPropagation()">
            <h2 id="modal-title"></h2>
            <div id="eps-list"></div>
        </div>
    </div>

    <div id="reader-view">
        <div class="tv-trigger-zone"><button class="menu-btn-tv" id="exitReaderBtn">X KEMBALI</button></div>
        <div class="swiper"><div class="swiper-wrapper" id="swiperWrapperContainer"></div></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const jsonUrl = "data/komik.json";
    let swiperInstance = null;

    // Load Grid
    fetch(jsonUrl).then(r => r.json()).then(data => {
        (data.komik_list || data).forEach(item => {
            const ed = encodeURIComponent(JSON.stringify(item.edisi));
            $("#grid").append(`<div class="poster" tabindex="0" onclick='openModal("${item.title}", "${ed}")'><img src="${item.poster}"><div style="padding:10px">${item.title}</div></div>`);
        });
    });

    function openModal(title, ed) {
        $("#modal-title").text(title);
        $("#eps-list").empty();
        JSON.parse(decodeURIComponent(ed)).forEach((e, i) => {
            $("#eps-list").append(`<button class="eps-btn" onclick="openComicPlayer(${i})">${e.nama}</button>`);
        });
        $("#popup").css("display", "flex");
    }

    function openComicPlayer(index) {
        const edisi = JSON.parse(decodeURIComponent(localStorage.getItem("eps_data")))[index];
        $("#home-view, #popup").hide();
        $("#reader-view").show();
        
        const wrapper = $("#swiperWrapperContainer").empty();
        const slide = $('<div class="swiper-slide"></div>');
        const container = $('<div class="spread-container"></div>');

        // Gabungkan SEMUA halaman jadi 1 container
        edisi.slides.forEach(s => s.pages.forEach(p => container.append(`<img src="${p.image_url}">`)));

        slide.append(container);
        wrapper.append(slide);

        // Inisialisasi Swiper dengan mode Free Mode & Vertikal
        if(swiperInstance) swiperInstance.destroy(true, true);
        swiperInstance = new Swiper('.swiper', {
            direction: 'vertical',
            slidesPerView: 'auto',
            freeMode: { enabled: true, sticky: false },
            mousewheel: true,
            keyboard: true
        });
        $("#exitReaderBtn").focus();
    }

    $("#exitReaderBtn").on('click', function() {
        $("#reader-view").hide();
        $("#home-view").show();
        if(swiperInstance) swiperInstance.destroy(true, true);
    });
</script>
</body>
</html>
