<style>

  }

    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    box-sizing: border-box;
    padding: 15px;
  }
  .spread-container {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: 20px;
  }
  .swiper-zoom-container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
  }
  .spread-container img {
    max-width: 47%;
    max-height: 94vh;
    object-fit: contain;
    border: 3px solid rgba(255, 255, 255, 0.8);
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
  }
  .spread-container.single img {
    max-width: 75%;
    max-height: 94vh;
    border: 5px solid rgba(255, 255, 255, 0.9);
    border-radius: 12px;
  }
  
  .watermark {
    position: fixed;
    top: 20px;
    right: 25px;
    font-size: 18px;
    color: rgba(255,255,255,0.25);
    font-weight: 600;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 9998;
    text-transform: uppercase;
  }

  .tv-page-indicator {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: rgba(0, 0, 0, 0.75);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.15);
    z-index: 999;
    backdrop-filter: blur(5px);
  }

  /* Pemicu Menu Utama - Sangat Ramah Remote TV */
  .tv-trigger-zone {
    position: fixed;
    bottom: 25px;
    left: 25px;
    z-index: 9999;
  }
  .menu-btn-tv {
    background: #4a90e2;
    color: white;
    border: 2px solid white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
    outline: none;
  }
  .menu-btn-tv:focus {
    background: #e24a4a;
    transform: scale(1.1);
    box-shadow: 0 0 20px #e24a4a;
  }

  /* MENU POP-UP LONCAT HALAMAN */
  .tv-menu-popup {
    position: fixed;
    bottom: -250px;
    left: 0;
    width: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.98) 85%, rgba(0,0,0,0.0));
    padding: 40px 20px 30px 20px;
    box-sizing: border-box;
    transition: bottom 0.25s ease-out;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    align-items: center;
    backdrop-filter: blur(10px);
  }
  .tv-menu-popup.active {
    bottom: 0;
  }
  .menu-title {
    font-size: 18px;
    margin-bottom: 15px;
    color: #4a90e2;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .grid-container {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    width: 90%;
    padding: 10px;
    justify-content: center;
  }
  .grid-container::-webkit-scrollbar {
    display: none;
  }
  
  /* Elemen Tombol Asli HTML agar Remote TV dipaksa mengenali fokusnya */
  .page-item-btn {
    background: #222;
    color: #aaa;
    border: 2px solid transparent;
    padding: 12px 24px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    transition: all 0.2s ease;
    min-width: 70px;
    text-align: center;
    cursor: pointer;
    outline: none;
  }
  /* Efek Fokus Tombol Angka saat disorot Remote */
  .page-item-btn:focus {
    background: #4a90e2 !important;
    color: white !important;
    border-color: white !important;
    transform: scale(1.15);
    box-shadow: 0 0 15px #4a90e2;
  }
  .page-item-btn.current-page {
    border-color: #4a90e2;
    color: #4a90e2;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  let menuOpen = false;

  const swiper = new Swiper('.swiper', {
    effect: 'slide',
    grabCursor: true,
    keyboard: {
      enabled: true,
    },
    on: {
      init: function () {
        updatePageText(this.activeIndex + 1, this.slides.length);
        buildTvMenu(this.slides.length);
      },
      slideChange: function() {
        updatePageText(this.activeIndex + 1, this.slides.length);
        highlightCurrentMenuPage(this.activeIndex);
      }
    }
  });

  function updatePageText(current, total) {
    document.getElementById('tvPageTxt').innerText = `Slide ${current} / ${total}`;
  }

  // Membuat tombol angka loncat halaman menggunakan elemen asli HTML <button>
  function buildTvMenu(totalSlides) {
    const container = document.getElementById('gridContainer');
    container.innerHTML = '';
    for(let i = 0; i < totalSlides; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-item-btn';
      btn.innerText = i + 1;
      btn.id = 'slide-btn-' + i;
      
      // Mengatasi klik remote OK
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        swiper.slideTo(i);
        closeMenu();
      });

      // Kontrol navigasi antar tombol angka (Kiri/Kanan/Bawah di dalam menu)
      btn.addEventListener('keydown', (e) => {
        const code = e.keyCode || e.which;
        if (code === 39) { // Kanan
          e.preventDefault();
          const nextBtn = document.getElementById('slide-btn-' + (i + 1));
          if (nextBtn) nextBtn.focus();
        } else if (code === 37) { // Kiri
          e.preventDefault();
          const prevBtn = document.getElementById('slide-btn-' + (i - 1));
          if (prevBtn) prevBtn.focus();
        } else if (code === 40 || code === 27) { // Bawah atau Back untuk tutup
          e.preventDefault();
          closeMenu();
        }
      });

      container.appendChild(btn);
    }
    highlightCurrentMenuPage(swiper.activeIndex);
  }

  function highlightCurrentMenuPage(activeIndex) {
    const items = document.querySelectorAll('.page-item-btn');
    items.forEach((item, idx) => {
      if(idx === activeIndex) item.classList.add('current-page');
      else item.classList.remove('current-page');
    });
  }

  // Event klik tombol pemicu "PILIH HALAMAN" di pojok kiri bawah
  document.getElementById('openMenuBtn').addEventListener('click', (e) => {
    e.preventDefault();
    openMenu();
  });

  function openMenu() {
    menuOpen = true;
    swiper.keyboard.disable(); // Nonaktifkan keyboard swiper sementara
    document.getElementById('tvMenu').classList.add('active');
    
    // Otomatis arahkan fokus remote TV ke tombol halaman aktif saat ini
    setTimeout(() => {
      const activeBtn = document.getElementById('slide-btn-' + swiper.activeIndex);
      if (activeBtn) {
        activeBtn.focus();
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }, 100);
  }

  function closeMenu() {
    menuOpen = false;
    document.getElementById('tvMenu').classList.remove('active');
    swiper.keyboard.enable(); // Aktifkan kembali keyboard swiper untuk kiri kanan
    document.getElementById('openMenuBtn').focus(); // Kembalikan fokus ke pemicu utama
  }

  // Sistem Global penangkap tombol alternatif (Atas / Bawah / OK) untuk memicu menu
  document.addEventListener('keydown', (e) => {
    const code = e.keyCode || e.which;
    if (!menuOpen) {
      // Jika menekan tombol ATAS (38) atau BAWAH (40) saat membaca komik, fokus langsung dilempar ke tombol PILIH HALAMAN
      if (code === 38 || code === 40) {
        e.preventDefault();
        document.getElementById('openMenuBtn').focus();
      }
    }
  });

  // Kunci fokus awal saat dimuat
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('openMenuBtn').focus();
  });
</script>
