<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MRZYBtv Series - Comic Edition</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        
        /* Katalog */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 20px; }
        .poster { cursor: pointer; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #111; height: 260px; }
        .poster img { width: 100%; height: 200px; object-fit: cover; }
        .poster-title { padding: 8px; text-align: center; font-weight: bold; }
        
        /* Popup */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:20px; border-radius:10px; width:80%; max-width:400px; border:2px solid #4a90e2; }
        
        /* Reader Vertikal */
        #reader-view { display: none; width: 100%; height: 100vh; position: fixed; inset: 0; background: #000; z-index: 500; overflow-y: auto; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { height: auto; display: flex; flex-direction: column; align-items: center; }
        .spread-container { display: flex; flex-direction: column; width: 100%; align-items: center; }
        .spread-container img { width: 100%; max-width: 800px; display: block; margin-bottom: 5px; }
        
        #exitReaderBtn { position: fixed; top: 20px; left: 20px; z-index: 9999; padding: 10px 20px; background: red; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-view">
        <div class="grid" id="grid"></div>
    </div>

    <div id="popup">
        <div class="popup-content">
            <h2 id="modal-title"></h2>
            <div id="eps-list"></div>
            <button onclick="$('#popup').hide()">KEMBALI</button>
        </div>
    </div>

    <div id="reader-view">
        <button id="exitReaderBtn">X KELUAR</button>
        <div class="swiper">
            <div class="swiper-wrapper" id="swiperWrapperContainer"></div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const jsonUrl = "data/komik.json";
    let swiperInstance = null;

    // 1. Fetch Data Utama
    $(document).ready(function() {
        $.getJSON(jsonUrl, function(data) {
            const list = data.komik_list || data;
            list.forEach(item => {
                const ed = encodeURIComponent(JSON.stringify(item.edisi));
                $("#grid").append(`
                    <div class="poster" onclick='openModal("${item.title}", "${ed}")'>
                        <img src="${item.poster}">
                        <div class="poster-title">${item.title}</div>
                    </div>
                `);
            });
        }).fail(function() { alert("Gagal memuat JSON. Cek path file!"); });
    });

    // 2. Buka Popup
    function openModal(title, ed) {
        localStorage.setItem("judul_film", title);
        localStorage.setItem("eps_data", ed);
        $("#modal-title").text(title);
        $("#eps-list").empty();
        JSON.parse(decodeURIComponent(ed)).forEach((e, i) => {
            $("#eps-list").append(`<button onclick="openComicPlayer(${i})" style="width:100%; margin:5px 0; padding:10px;">${e.nama}</button>`);
        });
        $("#popup").css("display", "flex");
    }

    // 3. Reader Vertikal (Mode Webtoon)
    function openComicPlayer(index) {
        const edisi = JSON.parse(decodeURIComponent(localStorage.getItem("eps_data")))[index];
        $("#home-view, #popup").hide();
        $("#reader-view").show();
        
        const wrapper = $("#swiperWrapperContainer").empty();
        const slide = $('<div class="swiper-slide"></div>');
        const container = $('<div class="spread-container"></div>');

        edisi.slides.forEach(s => {
            s.pages.forEach(p => {
                container.append(`<img src="${p.image_url}">`);
            });
        });

        slide.append(container);
        wrapper.append(slide);

        if(swiperInstance) swiperInstance.destroy(true, true);
        swiperInstance = new Swiper('.swiper', {
            direction: 'vertical',
            slidesPerView: 'auto',
            freeMode: true,
            mousewheel: true,
            keyboard: true
        });
    }

    $("#exitReaderBtn").click(function() {
        $("#reader-view").hide();
        $("#home-view").show();
        if(swiperInstance) swiperInstance.destroy(true, true);
    });
</script>
</body>
</html>
