<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook Premium TV - Fixed Remote Navigation</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
<style>
  body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  .swiper {
    width: 100%;
    height: 100vh;
  }
  .swiper-slide {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    box-sizing: border-box;
    padding: 15px;
  }
  /* Layout 2 halaman berdampingan (spread) */
  .spread-container {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: 20px;
  }
  .swiper-zoom-container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
  }
  .spread-container img {
    max-width: 47%;
    max-height: 94vh;
    object-fit: contain;
    border: 3px solid rgba(255, 255, 255, 0.8);
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
  }
  /* Halaman cover sendirian */
  .spread-container.single img {
    max-width: 75%;
    max-height: 94vh;
    border: 5px solid rgba(255, 255, 255, 0.9);
    border-radius: 12px;
  }
  
  /* Watermark Modern */
  .watermark {
    position: fixed;
    top: 20px;
    right: 25px;
    font-size: 18px;
    color: rgba(255,255,255,0.25);
    font-weight: 600;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 9998;
    text-transform: uppercase;
  }

  /* Indikator Halaman di Pojok Bawah */
  .tv-page-indicator {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: rgba(0, 0, 0, 0.65);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 999;
    backdrop-filter: blur(5px);
  }

  /* Petunjuk Tombol untuk Pengguna TV */
  .tv-hint {
    position: fixed;
    bottom: 25px;
    left: 25px;
    background: rgba(0, 0, 0, 0.65);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    color: #ccc;
    z-index: 999;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .tv-hint span {
    background: #4a90e2;
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: bold;
    margin: 0 4px;
  }

  /* MENU POP-UP LONCAT HALAMAN */
  .tv-menu-popup {
    position: fixed;
    bottom: -250px; /* Sembunyi di bawah */
    left: 0;
    width: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 80%, rgba(0,0,0,0.0));
    padding: 40px 20px 30px 20px;
    box-sizing: border-box;
    transition: bottom 0.3s ease-out;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    align-items: center;
    backdrop-filter: blur(10px);
  }
  .tv-menu-popup.active {
    bottom: 0; /* Muncul ke atas */
  }
  .menu-title {
    font-size: 18px;
    margin-bottom: 15px;
    color: #4a90e2;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .grid-container {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    width: 90%;
    padding: 10px;
    justify-content: center;
    scrollbar-width: none;
  }
  .grid-container::-webkit-scrollbar {
    display: none;
  }
  .page-item {
    background: #222;
    color: #aaa;
    border: 2px solid transparent;
    padding: 12px 24px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    transition: all 0.2s ease;
    min-width: 40px;
    text-align: center;
  }
  /* Style saat disorot remote TV */
  .page-item.tv-focused {
    background: #4a90e2 !important;
    color: white !important;
    border-color: white !important;
    transform: scale(1.15);
    box-shadow: 0 0 15px #4a90e2;
  }
  .page-item.current-page {
    border-color: #4a90e2;
    color: #4a90e2;
  }
</style>

<div class="tv-menu-popup" id="tvMenu">

  <div class="grid-container" id="gridContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  let menuOpen = false;
  let focusedMenuIndex = 0;

  const swiper = new Swiper('.swiper', {
    effect: 'slide',
    grabCursor: true,
    keyboard: {
      enabled: true,
      onlyInViewport: true,
    },
    on: {
      init: function () {
        updatePageText(this.activeIndex + 1, this.slides.length);
        buildTvMenu(this.slides.length);
      },
      slideChange: function() {
        updatePageText(this.activeIndex + 1, this.slides.length);
        highlightCurrentMenuPage(this.activeIndex);
      }
    }
  });

  function updatePageText(current, total) {
    document.getElementById('tvPageTxt').innerText = `Slide ${current} / ${total}`;
  }

  function buildTvMenu(totalSlides) {
    const container = document.getElementById('gridContainer');
    container.innerHTML = '';
    for(let i = 0; i < totalSlides; i++) {
      const btn = document.createElement('div');
      btn.className = 'page-item';
      btn.innerText = i + 1;
      container.appendChild(btn);
    }
    highlightCurrentMenuPage(swiper.activeIndex);
  }

  function highlightCurrentMenuPage(activeIndex) {
    const items = document.querySelectorAll('.page-item');
    items.forEach((item, idx) => {
      if(idx === activeIndex) item.classList.add('current-page');
      else item.classList.remove('current-page');
    });
  }

  function openMenu() {
    menuOpen = true;
    focusedMenuIndex = swiper.activeIndex;
    
    // Matikan keyboard bawaan swiper agar tidak bentrok
    swiper.keyboard.disable();
    
    document.getElementById('tvMenu').classList.add('active');
    updateMenuFocus();
  }

  function closeMenu() {
    menuOpen = false;
    document.getElementById('tvMenu').classList.remove('active');
    
    // Aktifkan kembali keyboard swiper
    swiper.keyboard.enable();
    document.getElementById('mySwiper').focus();
  }

  function updateMenuFocus() {
    const items = document.querySelectorAll('.page-item');
    items.forEach((item, idx) => {
      if(idx === focusedMenuIndex) {
        item.classList.add('tv-focused');
        item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      } else {
        item.classList.remove('tv-focused');
      }
    });
  }

  // Fokus utama saat startup
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('mySwiper').focus();
  });

  // NAVIGASI REMOTE TV GLOBAL
  document.addEventListener('keydown', (e) => {
    const key = e.key;
    const keyCode = e.keyCode;

    if (!menuOpen) {
      // Buka Menu dengan tombol OK (Enter) atau ATAS
      if (key === 'Enter' || keyCode === 13 || key === 'ArrowUp' || keyCode === 38) {
        e.preventDefault();
        openMenu();
      }
    } else {
      // Saat menu pop-up terbuka
      const items = document.querySelectorAll('.page-item');
      
      if (key === 'ArrowRight' || keyCode === 39) {
        e.preventDefault();
        if (focusedMenuIndex < items.length - 1) {
          focusedMenuIndex++;
          updateMenuFocus();
        }
      } 
      else if (key === 'ArrowLeft' || keyCode === 37) {
        e.preventDefault();
        if (focusedMenuIndex > 0) {
          focusedMenuIndex--;
          updateMenuFocus();
        }
      } 
      else if (key === 'ArrowDown' || keyCode === 40 || key === 'Escape' || keyCode === 27) {
        e.preventDefault();
        closeMenu();
      } 
      else if (key === 'Enter' || keyCode === 13) {
        e.preventDefault();
        swiper.slideTo(focusedMenuIndex);
        closeMenu();
      }
    }
  });
</script>
