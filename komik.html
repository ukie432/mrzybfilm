<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <link rel="preconnect" href="https://posterfilm.pages.dev">
    <link rel="preconnect" href="https://iptv-posterku.pages.dev">
    <meta charset="UTF-8">
    <title>MRZYBtv Series - Comic Edition</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow-x: hidden; }
        
        /* ================= KATALOG & HOME UTAMA (TETAP) ================= */
        #home-view { display: block; width: 100%; min-height: 100vh; }
        .navbar { padding: 20px; text-align: center; background: #111; position: sticky; top: 0; z-index: 10; }
        .search-container { position: relative; display: inline-block; width: 80%; max-width: 400px; }
        .search-bar-wrapper { width: 100%; background: #fff; border-radius: 20px; border: 3px solid transparent; display: flex; align-items: center; cursor: pointer; }
        .search-bar-wrapper:focus { border-color: #4a90e2; outline: none; }
        #search { width: 100%; padding: 12px 40px 12px 15px; border: none; outline: none; background: transparent; font-size: 16px; color: #000; }
        .clear-search { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #444; color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; font-weight: bold; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 12; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 20px; }
        .poster { cursor: pointer; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #111; }
        .poster:focus { transform: scale(1.1); border-color: #4a90e2; outline: none; }
        .poster img { width: 100%; height: 200px; object-fit: cover; pointer-events: none; }
        .poster-title { padding: 8px; font-size: 14px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        
        /* ================= POPUP MODAL (TETAP) ================= */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #4a90e2; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 101; }
        #eps-list { max-height: 300px; overflow-y: auto; margin-top: 15px; padding-right: 10px; }
        .eps-btn { display:block; width:100%; padding:14px 10px; margin:5px 0; background:#333; border:none; color:white; text-align: left; font-size: 16px; font-weight: bold; border-radius: 6px; }
        .eps-btn:focus { background:#4a90e2; color:white; outline: none; }

        /* ================= READER VERTIKAL (DIUBAH) ================= */
        #reader-view { display: none; width: 100%; height: 100vh; position: fixed; inset: 0; background: #000; z-index: 500; overflow-y: auto; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { height: auto; display: flex; flex-direction: column; align-items: center; }
        .spread-container { display: flex; flex-direction: column; width: 100%; align-items: center; }
        .spread-container img { width: 100%; max-width: 800px; display: block; margin: 0; border: none; }
        
        .tv-trigger-zone { position: fixed; bottom: 25px; left: 25px; z-index: 9999; }
        .menu-btn-tv { background: #333; color: white; border: 2px solid #555; padding: 10px 20px; border-radius: 20px; font-size: 16px; font-weight: bold; cursor: pointer; outline: none; }
        .menu-btn-tv:focus { background: red; border-color: white; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="home-view">
        <div class="navbar">
            <div class="search-container">
                <div class="search-bar-wrapper" id="search-box" tabindex="0">
                    <input type="text" id="search" disabled placeholder="Cari...">
                </div>
                <button id="clear-btn" class="clear-search" tabindex="-1">X</button>
            </div>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="popup" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <button class="close-x" onclick="closePopup()" tabindex="0">X</button>
            <h2 id="modal-title" style="margin-top:0;"></h2>
            <div id="eps-list"></div>
        </div>
    </div>

    <div id="reader-view">
        <div class="tv-trigger-zone">
            <button class="menu-btn-tv" id="exitReaderBtn">X KEMBALI</button>
        </div>
        <div class="swiper" id="mySwiper">
            <div class="swiper-wrapper" id="swiperWrapperContainer"></div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const jsonUrl = "data/komik.json";
    let swiperInstance = null;

    // --- LOGIKA UTAMA READER VERTIKAL ---
    function openComicPlayer(index) {
        const title = localStorage.getItem("judul_film");
        const edisiEncoded = localStorage.getItem("eps_data");
        const edisiList = JSON.parse(decodeURIComponent(edisiEncoded));
        const activeEdisi = edisiList[index];

        $("#home-view").hide();
        $("#popup").hide();
        $("#reader-view").show();
        
        const wrapper = $("#swiperWrapperContainer");
        wrapper.empty(); 

        const slideDiv = $('<div class="swiper-slide"></div>');
        const spreadContainer = $('<div class="spread-container"></div>');

        activeEdisi.slides.forEach(slide => {
            slide.pages.forEach(page => {
                spreadContainer.append(`<img src="${page.image_url}" alt="${page.alt || 'page'}">`);
            });
        });

        slideDiv.append(spreadContainer);
        wrapper.append(slideDiv);

        if(swiperInstance) swiperInstance.destroy(true, true);
        swiperInstance = new Swiper('.swiper', {
            direction: 'vertical',
            slidesPerView: 'auto',
            freeMode: true,
            mousewheel: true,
            keyboard: { enabled: true }
        });
        $("#exitReaderBtn").focus();
    }

    // --- LOGIKA ANDROID & NAVIGASI (ASLI ANDA) ---
    // ... [Masukkan sisa kode navigasi D-PAD dan fungsi lainnya di sini] ...

    $("#exitReaderBtn").on('click', function() {
        $("#reader-view").hide();
        $("#home-view").show();
        if(swiperInstance) swiperInstance.destroy(true, true);
        const title = localStorage.getItem("judul_film");
        const eps = localStorage.getItem("eps_data");
        if(title && eps) openModal(title, eps);
    });

    // --- FUNGSI LAINNYA ---
    window.closePopup = function() { $("#popup").hide(); localStorage.setItem("status_popup", "closed"); }
    // ... [Sisa fungsi fetch, search, dan event listener asli Anda] ...
</script>
</body>
</html>
