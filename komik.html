<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MRZYBtv Series - Vertical Reader</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        
        /* === STRUKTUR READER === */
        #reader-view { 
            display: none; width: 100%; height: 100vh; position: fixed; 
            inset: 0; background: #000; z-index: 1000; overflow-y: auto;
        }
        
        .swiper { width: 100%; height: 100%; }
        
        .swiper-slide { 
            height: auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .spread-container { 
            display: flex; 
            flex-direction: column; 
            width: 100%; 
            align-items: center;
        }
        
        .spread-container img { 
            width: 100%; 
            max-width: 800px; 
            display: block;
            margin: 0;
            padding: 0;
        }

        /* Tombol Kembali */
        .tv-trigger-zone { position: fixed; top: 20px; left: 20px; z-index: 9999; }
        .menu-btn-tv { background: #333; color: white; border: 2px solid #555; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .menu-btn-tv:focus { background: red; outline: none; }
    </style>
</head>
<body>

    <div id="home-view">...</div> 
    <div id="popup">...</div>

    <div id="reader-view">
        <div class="tv-trigger-zone">
            <button class="menu-btn-tv" id="exitReaderBtn">X KEMBALI</button>
        </div>
        <div class="swiper" id="mySwiper">
            <div class="swiper-wrapper" id="swiperWrapperContainer"></div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    let swiperInstance = null;

    function openComicPlayer(index) {
        const title = localStorage.getItem("judul_film");
        const edisiEncoded = localStorage.getItem("eps_data");
        const edisiList = JSON.parse(decodeURIComponent(edisiEncoded));
        const activeEdisi = edisiList[index];

        $("#home-view").hide();
        $("#popup").hide();
        $("#reader-view").show();
        
        const wrapper = $("#swiperWrapperContainer");
        wrapper.empty(); 

        // Membuat Slide Tunggal yang berisi semua gambar agar bisa di-scroll vertikal
        const slideDiv = $('<div class="swiper-slide"></div>');
        const spreadContainer = $('<div class="spread-container"></div>');

        activeEdisi.slides.forEach(slide => {
            slide.pages.forEach(page => {
                const img = $('<img>').attr('src', page.image_url).attr('alt', page.alt);
                spreadContainer.append(img);
            });
        });

        slideDiv.append(spreadContainer);
        wrapper.append(slideDiv);

        initComicSwiper();
    }

    function initComicSwiper() {
        if(swiperInstance) swiperInstance.destroy(true, true);

        swiperInstance = new Swiper('.swiper', {
            direction: 'vertical',
            slidesPerView: 'auto',
            freeMode: true,
            mousewheel: true,
            scrollbar: { el: '.swiper-scrollbar' },
            keyboard: { enabled: true }
        });
        
        // Fokus ke tombol kembali saat reader dibuka
        $("#exitReaderBtn").focus();
    }

    $("#exitReaderBtn").on('click', function() {
        $("#reader-view").hide();
        $("#home-view").show();
        if(swiperInstance) swiperInstance.destroy(true, true);
    });
</script>
</body>
</html>
