    <script>
        $(document).ready(function(){
            $(".siderbar_menu li").click(function(){
              $(".siderbar_menu li").removeClass("active");
              $(this).addClass("active");
            });

            $(".hamburger").click(function(){
              $(".wrapper").addClass("active");
            });

            $(".close, .bg_shadow").click(function(){
              $(".wrapper").removeClass("active");
            });
        });
    </script>

    <style>
        /* ===== FINAL LANDSCAPE 16:9 (ANTI LONCAT) ===== */

        /* GRID 5 KOLOM */
        .force-5 {
          display: grid !important;
          grid-template-columns: repeat(5, minmax(0,1fr)) !important;
          gap: 12px;
          padding: 12px 24px;
          box-sizing: border-box;
          /* KUNCI BARIS */
          grid-auto-rows: 1fr;
          align-items: stretch;
        }

        /* ITEM GRID */
        .force-5 a {
          display: block !important;
          width: 100% !important;
          /* LANDSCAPE FIX */
          aspect-ratio: 16 / 9;
          overflow: hidden;
        }

        /* HAPUS WARISAN LAMA TOTAL */
        .force-5 a,
        .force-5 img {
          margin: 0 !important;
          padding: 0 !important;
          float: none !important;
          max-width: 100% !important;
        }

        /* GAMBAR KUNCI */
        .force-5 img {
          width: 100% !important;
          height: 100% !important;
          object-fit: cover;
          display: block !important;
        }

        /* CEGAH ITEM KELUAR GRID */
        .force-5 * {
          box-sizing: border-box;
        }

        /* === TV REMOTE FOCUS EFFECT === */
        .force-5 a {
          border-radius: 10px;
          transition:
            transform 0.18s ease,
            box-shadow 0.18s ease;
          will-change: transform;
          outline:none;
        }

        .force-5 a:focus {
          outline: none;
          transform: scale(1.12);
          z-index: 10;
          box-shadow:
            0 0 0 3px #00e5ff,
            0 12px 30px rgba(0,0,0,0.6);
        }

        /* supaya zoom tidak mendorong grid */
        .force-5 {
          overflow: visible;
        }
    </style>

    <style>
        /* STYLE NAVIGASI DAN LAYOUT UTAMA */
        @import url('https://fonts.googleapis.com/css?family=Montserrat:400,600,700|Trade+Winds&display=swap');
        *{
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          list-style: none;
          text-decoration: none;
        }

        body{
          background: #e7f1ff;
          font-size: 14px;
          letter-spacing: 1px;
          background-image: linear-gradient(to top, #191a1f, #191a1f);
          color: #fff;
          padding-bottom: 20px;
          overflow-wrap: break-word;
          word-break: break-word;
          word-wrap: break-word;
          font-family: 'Montserrat', sans-serif; /* Diubah ke Montserrat agar sesuai dengan import */
        }

        .wrapper{
          display: flex;
          width: 100%;
        }

        .sidebar_inner .siderbar_menu a{
            outline:none;
            border-radius:8px;
        }

        .sidebar_inner .siderbar_menu a:focus{
            background:#3d3d79;
            color:#fff;
            transform:scale(1.05);
            box-shadow:0 0 0 3px #00e5ff;
        }

        .sidebar_inner .siderbar_menu a{
            display:flex;
            align-items:center;
            nav-index:auto;
        }

        .sidebar{
          position: relative;
        }

        .sidebar .bg_shadow{
          width: 100%;
          height: 100%;
          position: fixed;
          top: 0;
          left: 0;
          background: #000;
          z-index: 998;
          opacity: 0;
          visibility: hidden;
          transition: all 0.3s ease;
        }

        .sidebar_inner {
          width: 250px;
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          background: #5558c9;
          z-index: 999;
          transition: all 0.3s ease;
        }

        .main_container {
          margin-left: 250px;
          width: calc(100% - 250px);
          transition: all 0.3s ease;
        }

        .sidebar_inner .profile_info {
          padding: 20px;
          text-align: center;
        }

        .sidebar_inner .profile_info .profile_img {
          width: 100px;
          margin: 0 auto 5px;
        }

        .sidebar_inner .profile_info .profile_img img {
          width: 100%;
          display: block;
        }

        .sidebar_inner .profile_info .profile_data .name {
          font-size: 18px;
          color: #fff;
          margin-bottom: 5px;
          font-family: 'Trade Winds';
        }

        .sidebar_inner .profile_info .profile_data span {
          color: #c4dcff;
        }

        .sidebar_inner .siderbar_menu{
            overflow: auto;
            height: 490px;
            margin: 10px;
        }

        .sidebar_inner .siderbar_menu > li > a {
          padding: 12px 20px;
          display: flex;
          align-items: center;
          position: relative;
          margin-bottom: 1px;
          color: #c4dcff;
        }

        .sidebar_inner .siderbar_menu > li > a .icon {
          font-size: 25px;
          margin-right: 15px;
        }

        .sidebar_inner .siderbar_menu > li.active > a,
        .sidebar_inner .siderbar_menu > li > a:hover{
          background: #3d3d79;
          color: #fff;
        }

        .sidebar_inner .siderbar_menu > li > a .arrow{
          position: absolute;
          top: 20px;
          right: 20px;
          transition: all 0.3s ease;
        }

        .sidebar .logout_btn a{
          position: absolute;
          bottom: 20px;
          left: 20px;
          width: 210px;
          border: 1px solid #fff;
          color: #fff;
          border-radius: 3px;
          font-weight: 600;
          padding: 10px;
          text-align: center;
          transition: all 0.3s ease;
        }

        .sidebar .logout_btn a:hover{
          background: #fff;
          color: #3d3d79;
        }

        .sidebar_inner .close{
          position: absolute;
          top: 5px;
          right: 15px;
          font-size: 25px;
          color: #fff;
          cursor: pointer;
          display: block;
          z-index: 9999;
        }

        .navbar{
          position: fixed;
          height: 60px;
          display: flex;
          align-items: center;
          padding: 0 22px;
          z-index: 1;
          top: 30px;
          bottom: 30px;
          background-color: #5558c9;
          border: 0px solid #000;
          margin: -20px 5px 5px 10px;
          width: 60px;
          border-radius: 30px;
        }

        .close:focus{
          box-shadow:0 0 0 3px #00e5ff;
          border-radius:10px;
        }

        .navbar .hamburger{
          font-size: 25px;
          cursor: pointer;
          color: #fff;
          display: block;
        }

        .content{
          display: flex;
          flex-wrap: wrap;
        }

        @media (max-width: 1024px) {
          .sidebar_inner{
            left: -115%;
            transition: all 0.5s ease;
          }
          .main_container{
            width: 100%;
            margin-left: 0;
          }
          .navbar .hamburger,
          .sidebar_inner .close{
            display: block;
          }
          .wrapper.active .sidebar_inner{
            left: 0;
            transition: all 0.5s ease;
          }
          .wrapper.active .sidebar .bg_shadow{
            visibility: visible;
            opacity: 0.7;
          }
        }

        /* SLIDESHOW CONTAINER STYLE */
        .slideshow-container {
          max-width: 1000px;
          position: relative;
          margin: auto;
        }
        .mySlides {display: none;}
        img {vertical-align: middle;
        border: 0;}
        .dot {
          height: 15px;
          width: 15px;
          margin: 0 2px;
          background-color: #ffcc00;
          border-radius: 50%;
          display: inline-block;
          transition: background-color 0.6s ease;
        }
        .active { background-color: red;
        }
        .fade {
          animation-name: fade;
          animation-duration: 1.5s;
        }
        @keyframes fade {
          from {opacity: .4}
          to {opacity: 1}
        }
    </style>

        .trailerBtn{background:#ffca28;color:#000}
        .closeBtn{background:#ff5252;color:#000}
    </style>

    <div id="popupBox">

            <h2 id="popupTitle">Judul Film</h2>

            <div id="popupButtons">
                <button class="playBtn" onclick="popupPlay()">▶ Play</button>
                <button class="trailerBtn" onclick="popupTrailer()">🎬 Trailer</button>
                <button class="closeBtn" onclick="popupClose()">✖ Close</button>
            </div>

<script>
    var slideIndex = 0;
    showSlides();

    function showSlides() {
      var i;
      var slides = document.getElementsByClassName("mySlides");
      var dots = document.getElementsByClassName("dot");
      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      slideIndex++;
      if (slideIndex > slides.length) {slideIndex = 1}
      for (i = 0; i < dots.length; i++) {
        dots[i].classList.remove("active"); // Perbaikan manipulasi class yang aman
      }
      if(slides[slideIndex-1]) slides[slideIndex-1].style.display = "block";
      if(dots[slideIndex-1]) dots[slideIndex-1].classList.add("active"); // Perbaikan manipulasi class yang aman
      setTimeout(showSlides, 3000);
    }
</script>

<script>
(function(){
  const overlay = document.getElementById("popupOverlay");
  const img = document.getElementById("popupImg");
  const title = document.getElementById("popupTitle");
  const text = document.getElementById("popupText");

  let playLink = "", trailerLink = "", lastFocus = null;

  // === PERBAIKAN UTAMA: LOGIKA MEMBUKA POPUP SAAT POSTER DIKLIK ===
  const posters = document.querySelectorAll('a[data-popup="true"]');
  
  posters.forEach((poster, index) => {
    poster.addEventListener("click", function(e) {
      e.preventDefault(); // Mencegah film langsung berputar otomatis
      
      lastFocus = this;
      // Simpan index poster terakhir untuk fitur remote TV Anda
      localStorage.setItem("lastHomePoster", index);

      // Ambil data dari atribut HTML poster
      playLink = this.getAttribute("href");
      trailerLink = this.getAttribute("data-trailer");
      
      // Masukkan data ke dalam elemen popup
      title.innerText = this.getAttribute("data-title") || "Judul Film";
      text.innerText = this.getAttribute("data-sinopsis") || "";
      img.src = this.querySelector("img").src;

      // Tampilkan popup
      overlay.classList.add("show");

      // Otomatis fokus ke tombol Play (sangat berguna untuk Remote TV)
      setTimeout(() => {
        const playBtn = overlay.querySelector(".playBtn");
        if(playBtn) playBtn.focus();
      }, 50);
    });
  });

  // === FUNGSI TOMBOL DI DALAM POPUP ===
  window.popupPlay = function() {
    if(playLink) {
      window.location.href = playLink; // Menjalankan film saat tombol Play diklik
    }
  };

  window.popupTrailer = function() {
    if(trailerLink) {
      // Membuka trailer di tab baru atau bisa disesuaikan dengan iframe penonton
      window.open(trailerLink, "_blank"); 
    }
  };

  window.popupClose = function() {
    overlay.classList.remove("show");
    if(lastFocus) lastFocus.focus(); // Mengembalikan fokus ke poster semula
  };

  // Navigasi Remote TV: Menutup popup dengan tombol Back / ESC
  window.addEventListener("keydown", function(e) {
    if (overlay.classList.contains("show") && (e.key === "Escape" || e.keyCode === 8)) {
      e.preventDefault();
      popupClose();
    }
  });

  // === LOGIKA STATE KEMBALI / LOAD HALAMAN ===
  window.addEventListener("load", function(){
    if (!sessionStorage.getItem("is_session_active")) {
      localStorage.removeItem("lastHomePoster");
      localStorage.removeItem("lastMenu");
      sessionStorage.setItem("is_session_active", "true");
    }

    const lastMenu = localStorage.getItem("lastMenu");

    if(lastMenu){
      setTimeout(() => {
        const menu = document.querySelector('[data-menu="' + lastMenu + '"]');
        if(menu){
          menu.scrollIntoView({ block:"center", inline:"center" });
          menu.focus();
        } else {
          const firstPoster = document.querySelector('a[tabindex="0"][data-popup="true"]');
          if(firstPoster) firstPoster.focus();
        }
      }, 250);
      localStorage.removeItem("lastMenu");
      return; 
    }

    const lastPoster = localStorage.getItem("lastHomePoster");
    if(lastPoster !== null){
      setTimeout(() => {
        if(posters[lastPoster]){
          posters[lastPoster].scrollIntoView({ block:"center" });
          posters[lastPoster].focus();
          lastFocus = posters[lastPoster];
        }
      }, 300);
    } else {
      setTimeout(() => {
        const firstMenu = document.querySelector(".siderbar_menu a") || document.querySelector('a[tabindex="0"]');
        if(firstMenu) firstMenu.focus();
      }, 400);
    }
  });
})();
</script>
