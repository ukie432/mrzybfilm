        /* ===== FINAL LANDSCAPE 16:9 (ANTI LONCAT) ===== */

        /* GRID 5 KOLOM */
        .force-5 {
          display: grid !important;
          grid-template-columns: repeat(5, minmax(0,1fr)) !important;
          gap: 12px;
          padding: 12px 24px;
          box-sizing: border-box;

          /* KUNCI BARIS */
          grid-auto-rows: 1fr;
          align-items: stretch;
        }

        /* ITEM GRID */
        .force-5 a {
          display: block !important;
          width: 100% !important;
          /* LANDSCAPE FIX */
          aspect-ratio: 16 / 9;
          overflow: hidden;
        }

        /* HAPUS WARISAN LAMA TOTAL */
        .force-5 a,
        .force-5 img {
          margin: 0 !important;
          padding: 0 !important;
          float: none !important;
          max-width: 100% !important;
        }

        /* GAMBAR KUNCI */
        .force-5 img {
          width: 100% !important;
          height: 100% !important;
          object-fit: cover;
          display: block !important;
        }

        /* CEGAH ITEM KELUAR GRID */
        .force-5 * {
          box-sizing: border-box;
        }

        /* === TV REMOTE FOCUS EFFECT === */
        .force-5 a {
          border-radius: 10px;
          transition:
            transform 0.18s ease,
            box-shadow 0.18s ease;
          will-change: transform;
          outline:none;
        }

        .force-5 a:focus {
          outline: none;
          transform: scale(1.12);
          z-index: 10;
          box-shadow:
            0 0 0 3px #00e5ff,
            0 12px 30px rgba(0,0,0,0.6);
        }

        /* supaya zoom tidak mendorong grid */
        .force-5 {
          overflow: visible;
        }

        .sidebar{
          position: relative;
        }

        .sidebar .bg_shadow{
          width: 100%;
          height: 100%;
          position: fixed;
          top: 0;
          left: 0;
          background: #000;
          z-index: 998;
          opacity: 0;
          visibility: hidden;
          transition: all 0.3s ease;
        }

        .sidebar_inner {
          width: 250px;
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          background: #5558c9;
          z-index: 999;
          transition: all 0.3s ease;
        }

        .main_container {
          margin-left: 250px;
          width: calc(100% - 250px);
          transition: all 0.3s ease;
        }

        .sidebar_inner .profile_info {
          padding: 20px;
          text-align: center;
        }

        .sidebar_inner .profile_info .profile_img {
          width: 100px;
          margin: 0 auto 5px;
        }

        .sidebar_inner .profile_info .profile_img img {
          width: 100%;
          display: block;
        }

        .sidebar_inner .profile_info .profile_data .name {
          font-size: 18px;
          color: #fff;
          margin-bottom: 5px;
          font-family: 'Trade Winds';
        }

        .sidebar_inner .profile_info .profile_data span {
          color: #c4dcff;
        }

        .sidebar_inner .siderbar_menu{
            overflow: auto;
            height: 490px;
            margin: 10px;
        }

        .sidebar_inner .siderbar_menu > li > a {
          padding: 12px 20px;
          display: flex;
          align-items: center;
          position: relative;
          margin-bottom: 1px;
          color: #c4dcff;
        }

        .sidebar_inner .siderbar_menu > li > a .icon {
          font-size: 25px;
          margin-right: 15px;
        }

        .sidebar_inner .siderbar_menu > li.active > a,
        .sidebar_inner .siderbar_menu > li > a:hover{
          background: #3d3d79;
          color: #fff;
        }

        .sidebar_inner .siderbar_menu > li > a .arrow{
          position: absolute;
          top: 20px;
          right: 20px;
          transition: all 0.3s ease;
        }

        .sidebar .logout_btn a{
          position: absolute;
          bottom: 20px;
          left: 20px;
          width: 210px;
          border: 1px solid #fff;
          color: #fff;
          border-radius: 3px;
          font-weight: 600;
          padding: 10px;
          text-align: center;
          transition: all 0.3s ease;
        }

        .sidebar .logout_btn a:hover{
          background: #fff;
          color: #3d3d79;
        }

        .sidebar_inner .close{
          position: absolute;
          top: 5px;
          right: 15px;
          font-size: 25px;
          color: #fff;
          cursor: pointer;
          display: block;
          z-index: 9999;
        }

        .navbar{
          position: fixed;
          height: 60px;
          display: flex;
          align-items: center;
          padding: 0 22px;
          z-index: 1;
          top: 30px;
          bottom: 30px;
          background-color: #5558c9;
          border: 0px solid #000;
          margin: -20px 5px 5px 10px;
          width: 60px;
          border-radius: 30px;
        }


         .close:focus{
          box-shadow:0 0 0 3px #00e5ff;
          border-radius:10px;
        }

        .navbar .hamburger{
  font-size: 25px;
  cursor: pointer;
  color: #fff;
  display: block;
}

        .content{

          flex-wrap: wrap;

        @media (max-width: 1024px) {

<script>
    var slideIndex = 0;
    showSlides();

    function showSlides() {
      var i;
      var slides = document.getElementsByClassName("mySlides");
      var dots = document.getElementsByClassName("dot");
      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      slideIndex++;
      if (slideIndex > slides.length) {slideIndex = 1}
      for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
      }
      if(slides[slideIndex-1]) slides[slideIndex-1].style.display = "block";
      if(dots[slideIndex-1]) dots[slideIndex-1].className += " active";
      setTimeout(showSlides, 3000);
    }
</script>

<script>
(function(){
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

    const overlay = document.getElementById("popupOverlay");
    const img = document.getElementById("popupImg");
    const title = document.getElementById("popupTitle");
    const text = document.getElementById("popupText");
    const content = document.getElementById("popupContent");
    const trailerBtn = document.querySelector(".trailerBtn");
    let playLink = "", trailerLink = "", lastFocus = null;

    // FUNGSI UTAMA PLAY FILM
    window.popupPlay = function(){
        if(typeof Android !== "undefined" && Android.playVideo) Android.playVideo(playLink);
        else window.open(playLink, "_blank");
    };
    
    // FUNGSI TRAILER (MENGGUNAKAN VIDEO HTML5)
    window.popupTrailer = function(){
    if (trailerLink) {
        // Langsung panggil fungsi native Android untuk memutar trailer
        // Ini akan membuka pemutar video asli (ExoPlayer) milik aplikasi Anda
        if(typeof Android !== "undefined" && Android.playVideo) {
            Android.playVideo(trailerLink);
        } else {
            // Jika Anda sedang tes di browser/CodePen, akan terbuka di tab baru
            window.open(trailerLink, "_blank");
        }
    } else {
        alert("Trailer tidak tersedia.");
    }
};

    // FUNGSI CLOSE
    window.popupClose = function(){
        overlay.classList.remove("show");
        
        // Hapus video atau iframe
        const media = overlay.querySelector('iframe, video');
        if(media) media.remove();
        
        img.style.display = ""; 
        if(trailerBtn) trailerBtn.style.display = "inline-block";
        
        if(lastFocus) { setTimeout(() => lastFocus.focus(), 150); }
        
        if (typeof Android !== "undefined") {
            Android.setPopUpStatus(false);
        }
    };

    window.tutupPopUpPoster = function(){
        window.popupClose();
    };

    // EVENT KEYDOWN
    window.addEventListener('keydown', function(event) {
        if (event.keyCode === 27 || event.keyCode === 10009) {
            const overlay = document.getElementById("popupOverlay");
            if (overlay && overlay.classList.contains("show")) {
                // Jika video sedang main, tutup popup
                event.preventDefault();
                window.tutupPopUpPoster();
                return;
            }

            const wrapper = document.querySelector(".wrapper");
            if (wrapper && wrapper.classList.contains("active")) {
                event.preventDefault();
                wrapper.classList.remove("active");
                const hamburger = document.querySelector(".hamburger");
                if (hamburger) hamburger.focus();
                return;
            }
        }
    }, true);

    // EVENT KLIK POSTER
    document.addEventListener("click", function(e){
        const a = e.target.closest('.force-5 a');
        if(!a) return;
        localStorage.setItem("lastHomePoster", Array.from(document.querySelectorAll('.force-5 a')).indexOf(a));

        if(a.dataset.popup === "true") {
            e.preventDefault();
            lastFocus = a;
            img.src = a.querySelector("img").src;
            title.textContent = a.dataset.title;
            text.textContent = a.dataset.sinopsis;
            playLink = a.href;
            trailerLink = a.dataset.trailer; // Pastikan data-trailer di HTML Anda berisi link .mp4
            overlay.classList.add("show");
            if (typeof Android !== "undefined" && Android.setPopUpStatus) Android.setPopUpStatus(true);
        }
    });

    // LOAD UTAMA
    window.addEventListener("load", function(){
        const soundClick = new Audio('https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav');
        document.querySelectorAll('.force-5 a').forEach(item => {
            item.addEventListener('focus', () => { soundClick.currentTime = 0; soundClick.play().catch(()=>{}); });
        });

        const lastPosterIndex = localStorage.getItem("lastHomePoster");
        setTimeout(() => {
            if(lastPosterIndex !== null) {
                const all = document.querySelectorAll('.force-5 a');
                if(all[parseInt(lastPosterIndex)]) {
                    all[parseInt(lastPosterIndex)].focus();
                    localStorage.removeItem("lastHomePoster");
                }
            }
        }, 300);
    });
})();
</script>
<script>
window.addEventListener("load", function(){
    const sidebarOpen = localStorage.getItem("sidebarOpen");
    const lastMenu = localStorage.getItem("lastMenu");

    // Bersihkan semua class active bawaan terlebih dahulu
    $(".siderbar_menu li").removeClass("active");

    if (sidebarOpen === "true") {
        // 1. Buka kembali sidebar otomatis
        $(".wrapper").addClass("active");
        localStorage.removeItem("sidebarOpen"); // Hapus tanda agar tidak terbuka terus-terusan

        // 2. Cari menu terakhir yang diklik
        if (lastMenu) {
            const activeMenu = document.querySelector('[data-menu="' + lastMenu + '"]');
            if (activeMenu) {
                // Berikan class active ke LI induknya
                activeMenu.closest('li').classList.add("active");
                
                // Fokuskan ke item menu tersebut
                setTimeout(() => {
                    activeMenu.focus();
                }, 300);
                
                localStorage.removeItem("lastMenu");
                return;
            }
        }
    }

    // Jika tidak ada riwayat kembali dari menu, fokus ke menu pertama secara default
    const firstMenu = document.querySelector(".siderbar_menu a");
    if(firstMenu){
        firstMenu.closest('li').classList.add("active");
        firstMenu.focus();
    }
});
</script>
