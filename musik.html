<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Premium Audio Player - JSON Powered</title>
    
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">
    
    <style>
        /* --- RESET & LAYOUT UTAMA --- */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100%;
            overflow: hidden;
        }

        /* CONTAINER UTAMA */
        .music-app-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #141414;
            box-shadow: 0px 0px 40px rgba(0, 0, 0, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* AREA ATAS: PENCARIAN & KATEGORI */
        .search-zone {
            padding: 15px 20px 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .search-box-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box-wrapper i {
            position: absolute;
            left: 15px;
            color: #666;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: #ff0055;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
            background: #161616;
        }

        /* NAVIGASI KATEGORI / GENRE TAB */
        .category-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .category-container::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            background: #151515;
            border: 1px solid #252525;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            outline: none;
            transition: all 0.2s ease;
        }

        .category-btn:focus, .category-btn:hover {
            border-color: #ff0055;
            color: #fff;
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.3);
        }

        .category-btn.active-cat {
            background: #ff0055;
            color: #fff;
            border-color: #ff0055;
            box-shadow: 0 0 10px #ff0055;
            font-weight: bold;
        }

        /* --- HEAD PLAYER (NEON DESIGN) --- */
        .neon-player {
            display: flex;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex: 0 0 auto;
        }

        .now-playing-cover {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #ff0055;
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.4);
            margin-right: 15px;
        }

        .track-info {
            flex-grow: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .time-display {
            font-size: 12px;
            color: #aaa;
            font-family: monospace;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-control {
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-control:focus, .btn-control:hover {
            color: #ff0055;
            text-shadow: 0 0 12px #ff0055;
            transform: scale(1.1);
        }

        .btn-control.active-mode {
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
        }

        .btn-play-pause {
            font-size: 32px;
            color: #fff;
        }

        /* BAR PROGRES INTERAKTIF */
        .progress-container {
            width: 100%;
            height: 8px;
            background: #222;
            cursor: pointer;
            flex: 0 0 auto;
            outline: none;
            position: relative;
            transition: all 0.2s ease;
        }

        .progress-container:focus {
            background: #333;
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.6);
            height: 12px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #ff5500);
            box-shadow: 0 0 8px #ff0055;
            transition: width 0.1s linear;
        }

        /* --- PLAYLIST DAFTAR LAGU --- */
        .modern-playlist {
            flex: 1 1 auto;
            overflow-y: auto;
            background: transparent;
            padding-bottom: 20px;
        }

        .modern-playlist::-webkit-scrollbar {
            width: 6px;
        }
        .modern-playlist::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .playlist-item:focus {
            background: rgba(255, 0, 85, 0.15) !important;
            box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.3);
            border-left: 4px solid #ff0055;
        }

        .playlist-item.active {
            background: rgba(255, 0, 85, 0.08);
            border-left: 4px solid #ff0055;
        }

        .item-cover {
            width: 45px;
            height: 45px;
            border-radius: 5px;
            object-fit: cover;
            margin-right: 15px;
        }

        .item-title {
            font-size: 15px;
            color: #dddddd;
        }

        .playlist-item.active .item-title, .playlist-item:focus .item-title {
            color: #ff0055;
            font-weight: bold;
        }

        .no-result {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <audio id="main-audio" src=""></audio>

    <div class="music-app-container">
        
        <div class="search-zone">
            <div class="search-box-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Cari musik atau nama band..." oninput="filterMusic()">
            </div>
            
            <div class="category-container" id="category-bar">
                <button class="category-btn active-cat" onclick="selectCategory('all')">Semua</button>
                <button class="category-btn" onclick="selectCategory('barat')">Barat</button>
                <button class="category-btn" onclick="selectCategory('indonesia')">Indonesia</button>
                <button class="category-btn" onclick="selectCategory('dangdut')">Dangdut</button>
                <button class="category-btn" onclick="selectCategory('malaysia')">Malaysia</button>
            </div>
        </div>
        
        <div class="neon-player">
            <img id="player-cover" class="now-playing-cover" src="" alt="Cover">
            
            <div class="track-info">
                <div id="player-title" class="track-title">Memuat data JSON...</div>
                <div id="player-time" class="time-display">00:00 / 00:00</div>
            </div>

            <div class="player-controls">
                <button class="btn-control" id="shuffle-btn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
                <button class="btn-control" onclick="playPrev()"><i class="fas fa-backward"></i></button>
                <button class="btn-control btn-play-pause" id="play-btn" tabindex="0" onclick="togglePlay()"><i class="fas fa-play-circle"></i></button>
                <button class="btn-control" onclick="playNext()"><i class="fas fa-forward"></i></button>
                <button class="btn-control" id="repeat-btn" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
            </div>
        </div>

        <div class="progress-container" id="progress-container" tabindex="0" onclick="setProgress(event)">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="modern-playlist" id="playlist-container"></div>

    </div>

    <script>
        let tracks = []; // Database akan diisi dari file JSON otomatis
        let currentTrackIndex = 0;
        let isShuffle = false;
        let isRepeat = false;
        let selectedCategory = "all"; 

        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const playerCover = document.getElementById('player-cover');
        const playerTitle = document.getElementById('player-title');
        const playerTime = document.getElementById('player-time');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const playlistContainer = document.getElementById('playlist-container');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const searchInput = document.getElementById('search-input');

        // FITUR BARU: Mengambil data lagu dari file playlist.json secara internal
        async function fetchPlaylistData() {
            try {
                const response = await fetch('data/playlistmusik.json');
                if (!response.ok) {
                    throw new Error("Gagal memuat file JSON. Pastikan file playlist.json berada di folder yang sama.");
                }
                tracks = await response.json();
                
                // Jika data berhasil dimuat, inisialisasi player
                filterMusic();
                if(tracks.length > 0) {
                    loadTrack(0);
                }
            } catch (error) {
                console.error("Error:", error);
                playerTitle.innerText = "Gagal memuat JSON";
                playlistContainer.innerHTML = `<div class="no-result" style="color: #ff0055;">${error.message}</div>`;
            }
        }

        // Render Playlist Berdasarkan Filter Teks & Kategori Aktif
        function filterMusic() {
            const query = searchInput.value.toLowerCase().trim();
            
            const filtered = tracks.filter(track => {
                const matchQuery = track.title.toLowerCase().includes(query);
                const matchCategory = (selectedCategory === "all" || track.category === selectedCategory);
                return matchQuery && matchCategory;
            });

            loadPlaylistView(filtered);
        }

        // Ganti Kategori & Update Visual Tab Aktif
        function selectCategory(catName) {
            selectedCategory = catName;
            
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if(btn.getAttribute('onclick').includes(`'${catName}'`)) {
                    btn.classList.add('active-cat');
                } else {
                    btn.classList.remove('active-cat');
                }
            });

            filterMusic();
        }

        // Tampilkan Komponen Lagu ke Layar TV
        function loadPlaylistView(targetTracks) {
            playlistContainer.innerHTML = "";
            
            if (targetTracks.length === 0) {
                playlistContainer.innerHTML = `<div class="no-result">Lagu tidak ditemukan di kategori ini...</div>`;
                return;
            }

            targetTracks.forEach((track) => {
                const originalIndex = tracks.findIndex(t => t.url === track.url);
                
                const item = document.createElement('div');
                item.className = `playlist-item ${originalIndex === currentTrackIndex ? 'active' : ''}`;
                item.setAttribute('tabindex', '0'); 
                item.setAttribute('onclick', `selectTrack(${originalIndex})`);
                
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') selectTrack(originalIndex);
                });
                
                item.innerHTML = `
                    <img class="item-cover" src="${track.cover}">
                    <div class="item-title">${track.title}</div>
                `;
                playlistContainer.appendChild(item);
            });
        }

        function loadTrack(index) {
            if(tracks.length === 0) return;
            currentTrackIndex = index;
            audio.src = tracks[index].url;
            playerTitle.innerText = tracks[index].title;
            playerCover.src = tracks[index].cover;
            
            progressBar.style.width = "0%";
            playerTime.innerText = "00:00 / 00:00";
            
            filterMusic();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
                playBtn.style.color = '#ff0055';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
                playBtn.style.color = '#fff';
            }
        }

        function selectTrack(index) {
            loadTrack(index);
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
            playBtn.style.color = '#ff0055';
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active-mode', isShuffle);
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('active-mode', isRepeat);
        }

        function playNext() {
            if (tracks.length === 0) return;
            if (isShuffle) {
                let randomIndex = Math.floor(Math.random() * tracks.length);
                selectTrack(randomIndex);
            } else {
                let nextIndex = currentTrackIndex + 1;
                if (nextIndex >= tracks.length) nextIndex = 0;
                selectTrack(nextIndex);
            }
        }

        function playPrev() {
            if (tracks.length === 0) return;
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = tracks.length - 1;
            selectTrack(prevIndex);
        }

        function formatTime(secs) {
            if (isNaN(secs) || secs === Infinity) return "00:00";
            let min = Math.floor(secs / 60);
            let sec = Math.floor(secs % 60);
            if (min < 10) min = "0" + min;
            if (sec < 10) sec = "0" + sec;
            return min + ":" + sec;
        }

        audio.addEventListener('loadedmetadata', () => {
            playerTime.innerText = `00:00 / ${formatTime(audio.duration)}`;
        });

        audio.addEventListener('timeupdate', () => {
            const { duration, currentTime } = audio;
            if (duration && !isNaN(duration)) {
                const progressPercent = (currentTime / duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                playerTime.innerText = `${formatTime(currentTime)} / ${formatTime(duration)}`;
            }
        });

        function setProgress(e) {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if(duration) audio.currentTime = (clickX / width) * duration;
        }

        // SISTEM NAVIGASI REMOTE TV ANTI MACET
        progressContainer.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (!audio.duration || isNaN(audio.duration)) return;
                let newTime = audio.currentTime + 10;
                if (newTime > audio.duration) newTime = audio.duration;
                audio.currentTime = newTime;
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (!audio.duration || isNaN(audio.duration)) return;
                let newTime = audio.currentTime - 10;
                if (newTime < 0) newTime = 0;
                audio.currentTime = newTime;
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                const firstPlaylistItem = playlistContainer.querySelector('.playlist-item');
                if (firstPlaylistItem) {
                    firstPlaylistItem.focus();
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                document.getElementById('play-btn').focus();
            }
        });

        audio.addEventListener('ended', () => {
            if (isRepeat) {
                audio.currentTime = 0;
                audio.play();
            } else {
                playNext();
            }
        });

        // Jalankan fetch JSON saat window selesai dimuat
        window.onload = () => {
            fetchPlaylistData();
        };
    </script>
</body>
</html>
