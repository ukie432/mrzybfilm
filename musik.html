<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>MRZYBmusik - Premium Audio Player TV</title>
    
    <!-- FontAwesome untuk Icon Navigasi -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">
    
    <style>
        /* --- RESET & LAYOUT UTAMA --- */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0a0c10;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100%;
            overflow: hidden;
        }

        /* CONTAINER UTAMA: LEBAR PENUH */
        .music-app-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(10, 12, 16, 0.95);
        }

        /* AREA ATAS: PENCARIAN & KATEGORI */
        .search-zone {
            padding: 20px 40px 15px 40px;
            background: #06080b;
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-bottom: 1px solid #141923;
        }

        .search-box-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .search-box-wrapper .fa-search {
            position: absolute;
            left: 20px;
            color: #555;
            font-size: 16px;
            pointer-events: none;
        }

        .clear-search-btn {
            position: absolute;
            right: 15px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            outline: none;
            padding: 8px;
            display: none;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .clear-search-btn:focus, .clear-search-btn:hover {
            color: #cc0044;
            background: rgba(255, 255, 255, 0.05);
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 55px;
            background: #10141d;
            border: 1px solid #1a2230;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: #cc0044;
            background: #141a26;
            box-shadow: 0 0 8px rgba(204, 0, 68, 0.3);
        }

        /* NAVIGASI KATEGORI / GENRE TAB */
        .category-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .category-container::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            background: #10141d;
            border: 1px solid #1a2230;
            color: #888;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
            outline: none;
            transition: all 0.2s ease;
        }

        .category-btn:focus, .category-btn:hover {
            border-color: #cc0044;
            color: #fff;
            background: #141a26;
        }

        .category-btn.active-cat {
            background: #cc0044;
            color: #fff;
            border-color: #cc0044;
            font-weight: bold;
            box-shadow: 0 0 8px rgba(204, 0, 68, 0.4);
        }

        /* --- HEAD PLAYER (STEALTH DESIGN WITH CANVAS) --- */
        .neon-player {
            position: relative;
            display: flex;
            align-items: center;
            padding: 25px 40px;
            background: #080a0f;
            border-bottom: 1px solid #141923;
            flex: 0 0 auto;
            overflow: hidden;
        }

        #spectrum-canvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.35;
        }

        .now-playing-cover, .track-info, .player-right-wrapper {
            position: relative;
            z-index: 2;
        }

        .now-playing-cover {
            width: 160px;
            height: 90px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #cc0044;
            margin-right: 25px;
        }

        .track-info {
            flex-grow: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .time-display {
            font-size: 14px;
            color: #777;
            font-family: monospace;
        }

        /* WRAPPER KANAN UNTUK MENYUSUN LOGO DI ATAS TOMBOL */
        .player-right-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Memojokkan konten ke kanan */
            gap: 12px; /* Jarak antara tulisan logo dan tombol */
        }

        /* GAYA DESAIN WATERMARK / LOGO MRZYBmusik */
        .app-brand-logo {
            font-size: 14px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.25); /* Putih elegan transparan ala watermark */
            letter-spacing: 3px;
            text-transform: uppercase;
            user-select: none;
            border-right: 3px solid #cc0044; /* Garis aksen merah tipis di kanan logo */
            padding-right: 8px;
            line-height: 1;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-control {
            background: none;
            border: none;
            color: #666;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-control:focus, .btn-control:hover {
            color: #cc0044;
            transform: scale(1.1);
        }

        .btn-control.active-mode {
            color: #cc0044;
        }

        .btn-play-pause {
            font-size: 42px;
            color: #e0e0e0;
        }
        .btn-play-pause:focus, .btn-play-pause:hover {
            color: #cc0044;
        }

        /* BAR PROGRES INTERAKTIF */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #141923;
            cursor: pointer;
            flex: 0 0 auto;
            outline: none;
            position: relative;
            transition: all 0.2s ease;
            z-index: 3;
        }

        .progress-container:focus {
            background: #1a2230;
            height: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #cc0044;
            transition: width 0.1s linear;
        }

        /* --- PLAYLIST DAFTAR LAGU --- */
        .modern-playlist {
            flex: 1 1 auto;
            overflow-y: auto;
            background: #0a0c10;
            padding: 10px 20px 30px 20px;
        }

        .modern-playlist::-webkit-scrollbar {
            width: 6px;
        }
        .modern-playlist::-webkit-scrollbar-thumb {
            background: #141923;
            border-radius: 3px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 4px;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            transition: all 0.15s ease;
            outline: none;
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: #10141d;
        }

        .playlist-item:focus {
            background: #141a26 !important; 
            border-color: #cc0044 !important;
            box-shadow: none;
        }

        .playlist-item.active {
            background: rgba(204, 0, 68, 0.06);
            border-left: 4px solid #cc0044;
        }

        .item-cover {
            width: 88px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            margin-right: 20px;
        }

        .item-title {
            font-size: 16px;
            color: #b0b5c0;
        }

        .playlist-item.active .item-title, .playlist-item:focus .item-title {
            color: #fff;
            font-weight: bold;
        }

        .no-result {
            text-align: center;
            padding: 50px 20px;
            color: #444;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- CORE AUDIO ELEMENT -->
    <audio id="main-audio" src=""></audio>

    <div class="music-app-container">
        
        <!-- ELEMENT AREA ATAS (PENCARIAN & KATEGORI) -->
        <div class="search-zone">
            <div class="search-box-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Cari musik atau nama band..." oninput="filterMusic()">
                <button id="clear-search-btn" class="clear-search-btn" tabindex="0" onclick="clearSearch()"><i class="fas fa-times-circle"></i></button>
            </div>
            
            <!-- LIST TAB KATEGORI -->
            <div class="category-container" id="category-bar">
                <button id="default-category" class="category-btn active-cat" onclick="selectCategory('all')">Semua</button>
                <button class="category-btn" onclick="selectCategory('barat')">Barat</button>
                <button class="category-btn" onclick="selectCategory('indonesia')">Indonesia</button>
                <button class="category-btn" onclick="selectCategory('dangdut')">Dangdut</button>
                <button class="category-btn" onclick="selectCategory('malaysia')">Malaysia</button>
            </div>
        </div>
        
        <!-- ELEMENT BOX PLAYER -->
        <div class="neon-player">
            <canvas id="spectrum-canvas"></canvas>

            <img id="player-cover" class="now-playing-cover" src="" alt="Cover">
            
            <div class="track-info">
                <div id="player-title" class="track-title">Memuat data JSON...</div>
                <div id="player-time" class="time-display">00:00 / 00:00</div>
            </div>

            <!-- TAMPILAN SISI KANAN: WATERMARK LOGO DI ATAS PANEL TOMBOL -->
            <div class="player-right-wrapper">
                <div class="app-brand-logo">MRZYB.musik</div>
                
                <div class="player-controls">
                    <button class="btn-control" id="shuffle-btn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
                    <button class="btn-control" onclick="playPrev()"><i class="fas fa-backward"></i></button>
                    <button class="btn-control btn-play-pause" id="play-btn" tabindex="0" onclick="togglePlay()"><i class="fas fa-play-circle"></i></button>
                    <button class="btn-control" onclick="playNext()"><i class="fas fa-forward"></i></button>
                    <button class="btn-control" id="repeat-btn" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
                </div>
            </div>
        </div>

        <!-- PROGRESS BAR -->
        <div class="progress-container" id="progress-container" tabindex="0" onclick="setProgress(event)">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- ELEMENT PLAYLIST DAFTAR LAGU -->
        <div class="modern-playlist" id="playlist-container"></div>

    </div>

    <!-- --- JAVASCRIPT ENGINE --- -->
    <script>
        let tracks = []; 
        let currentTrackIndex = 0;
        let isShuffle = false;
        let isRepeat = false;
        let selectedCategory = "all"; 

        let canvas, ctx;
        let totalBars = 45; 
        let barHeights = Array(totalBars).fill(0); 
        let targetHeights = Array(totalBars).fill(0);

        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const playerCover = document.getElementById('player-cover');
        const playerTitle = document.getElementById('player-title');
        const playerTime = document.getElementById('player-time');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const playlistContainer = document.getElementById('playlist-container');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const searchInput = document.getElementById('search-input');
        const clearSearchBtn = document.getElementById('clear-search-btn');

        // Fungsi Load Data JSON dari URL GitHub
        async function fetchPlaylistData() {
            try {
                // MASUKKAN LINK RAW GITHUB ANDA DI SINI
                const response = await fetch('data/playlistmusik.json');
                if (!response.ok) {
                    throw new Error("Gagal mengambil data dari GitHub. Periksa kembali URL Raw Anda.");
                }
                tracks = await response.json();
                
                filterMusic();
                if(tracks.length > 0) {
                    loadTrack(0);
                }
            } catch (error) {
                console.error("Error:", error);
                playerTitle.innerText = "Gagal memuat JSON";
                playlistContainer.innerHTML = `<div class="no-result" style="color: #cc0044;">${error.message}</div>`;
            }
        }

        // SPECTRUM OTOMATIS ENGINE
        function initVirtualSpectrum() {
            canvas = document.getElementById('spectrum-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            animateSpectrum();
        }

        function animateSpectrum() {
            requestAnimationFrame(animateSpectrum);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let barWidth = canvas.width / totalBars;
            for (let i = 0; i < totalBars; i++) {
                if (!audio.paused) {
                    if (Math.random() > 0.88) {
                        targetHeights[i] = Math.random() * (canvas.height - 10) + 3;
                    }
                } else {
                    targetHeights[i] = 0;
                }
                barHeights[i] += (targetHeights[i] - barHeights[i]) * 0.15;
                ctx.fillStyle = `rgba(204, 0, 68, ${barHeights[i] / (canvas.height * 1.5) + 0.15})`;
                ctx.fillRect(i * barWidth, canvas.height - barHeights[i], barWidth - 4, barHeights[i]);
            }
        }

        function filterMusic() {
            const query = searchInput.value.toLowerCase().trim();
            
            if (query.length > 0) {
                clearSearchBtn.style.display = "block";
            } else {
                clearSearchBtn.style.display = "none";
            }

            const filtered = tracks.filter(track => {
                const matchQuery = track.title.toLowerCase().includes(query);
                const matchCategory = (selectedCategory === "all" || track.category === selectedCategory);
                return matchQuery && matchCategory;
            });
            loadPlaylistView(filtered);
        }

        function clearSearch() {
            searchInput.value = "";
            filterMusic();
            searchInput.focus();
        }

        clearSearchBtn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                clearSearch();
            }
        });

        function selectCategory(catName) {
            selectedCategory = catName;
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if(btn.getAttribute('onclick').includes(`'${catName}'`)) {
                    btn.classList.add('active-cat');
                } else {
                    btn.classList.remove('active-cat');
                }
            });
            filterMusic();
        }

        function loadPlaylistView(targetTracks) {
            playlistContainer.innerHTML = "";
            if (targetTracks.length === 0) {
                playlistContainer.innerHTML = `<div class="no-result">Lagu tidak ditemukan di kategori ini...</div>`;
                return;
            }
            targetTracks.forEach((track) => {
                const originalIndex = tracks.findIndex(t => t.url === track.url);
                const item = document.createElement('div');
                item.className = `playlist-item ${originalIndex === currentTrackIndex ? 'active' : ''}`;
                item.setAttribute('tabindex', '0'); 
                item.setAttribute('onclick', `selectTrack(${originalIndex})`);
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') selectTrack(originalIndex);
                });
                item.innerHTML = `
                    <img class="item-cover" src="${track.cover}">
                    <div class="item-title">${track.title}</div>
                `;
                playlistContainer.appendChild(item);
            });
        }

        function loadTrack(index) {
            if(tracks.length === 0) return;
            currentTrackIndex = index;
            audio.src = tracks[index].url;
            playerTitle.innerText = tracks[index].title;
            playerCover.src = tracks[index].cover;
            progressBar.style.width = "0%";
            playerTime.innerText = "00:00 / 00:00";
            filterMusic();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
                playBtn.style.color = '#cc0044';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
                playBtn.style.color = '#e0e0e0';
            }
        }

        function selectTrack(index) {
            loadTrack(index);
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
            playBtn.style.color = '#cc0044';
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active-mode', isShuffle);
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('active-mode', isRepeat);
        }

        function playNext() {
            if (tracks.length === 0) return;
            if (isShuffle) {
                let randomIndex = Math.floor(Math.random() * tracks.length);
                selectTrack(randomIndex);
            } else {
                let nextIndex = currentTrackIndex + 1;
                if (nextIndex >= tracks.length) nextIndex = 0;
                selectTrack(nextIndex);
            }
        }

        function playPrev() {
            if (tracks.length === 0) return;
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = tracks.length - 1;
            selectTrack(prevIndex);
        }

        function formatTime(secs) {
            if (isNaN(secs) || secs === Infinity) return "00:00";
            let min = Math.floor(secs / 60);
            let sec = Math.floor(secs % 60);
            if (min < 10) min = "0" + min;
            if (sec < 10) sec = "0" + sec;
            return min + ":" + sec;
        }

        audio.addEventListener('loadedmetadata', () => {
            playerTime.innerText = `00:00 / ${formatTime(audio.duration)}`;
        });

        audio.addEventListener('timeupdate', () => {
            const { duration, currentTime } = audio;
            if (duration && !isNaN(duration)) {
                const progressPercent = (currentTime / duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                playerTime.innerText = `${formatTime(currentTime)} / ${formatTime(duration)}`;
            }
        });

        function setProgress(e) {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if(duration) audio.currentTime = (clickX / width) * duration;
        }

        progressContainer.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (!audio.duration || isNaN(audio.duration)) return;
                let newTime = audio.currentTime + 10;
                if (newTime > audio.duration) newTime = audio.duration;
                audio.currentTime = newTime;
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (!audio.duration || isNaN(audio.duration)) return;
                let newTime = audio.currentTime - 10;
                if (newTime < 0) newTime = 0;
                audio.currentTime = newTime;
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                const firstPlaylistItem = playlistContainer.querySelector('.playlist-item');
                if (firstPlaylistItem) firstPlaylistItem.focus();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                document.getElementById('play-btn').focus();
            }
        });

        audio.addEventListener('ended', () => {
            if (isRepeat) {
                audio.currentTime = 0;
                audio.play();
            } else {
                playNext();
            }
        });

        window.addEventListener('resize', () => {
            if (canvas) {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
            }
        });

        window.onload = async () => {
            await fetchPlaylistData();
            initVirtualSpectrum(); 
            
            const defaultCatBtn = document.getElementById('default-category');
            if (defaultCatBtn) defaultCatBtn.focus();
        };
    </script>
</body>
</html>
