<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Premium Audio Player - Multi Category & Smart Navigation</title>
    
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">
    
    <style>
        /* --- RESET & LAYOUT UTAMA --- */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100%;
            overflow: hidden;
        }

        /* EFEK AMBIENT BACKGROUND DYNAMIC */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.25);
            transform: scale(1.2);
            transition: background-image 0.8s ease-in-out;
        }

        /* CONTAINER UTAMA */
        .music-app-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            box-shadow: 0px 0px 40px rgba(0, 0, 0, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* AREA ATAS: PENCARIAN & KATEGORI */
        .search-zone {
            padding: 15px 20px 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .search-box-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box-wrapper i {
            position: absolute;
            left: 15px;
            color: #666;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: #ff0055;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
            background: #161616;
        }

        /* FITUR BARU: NAVIGASI KATEGORI / GENRE TAB */
        .category-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .category-container::-webkit-scrollbar {
            display: none; /* Sembunyikan scrollbar kategori agar rapi */
        }

        .category-btn {
            background: #151515;
            border: 1px solid #252525;
            color: #aaa;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            outline: none;
            transition: all 0.2s ease;
        }

        .category-btn:focus, .category-btn:hover {
            border-color: #ff0055;
            color: #fff;
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.3);
        }

        .category-btn.active-cat {
            background: #ff0055;
            color: #fff;
            border-color: #ff0055;
            box-shadow: 0 0 10px #ff0055;
            font-weight: bold;
        }

        /* --- HEAD PLAYER (NEON DESIGN) --- */
        .neon-player {
            display: flex;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex: 0 0 auto;
        }

        .now-playing-cover {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #ff0055;
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.4);
            margin-right: 15px;
        }

        .track-info {
            flex-grow: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .time-display {
            font-size: 12px;
            color: #aaa;
            font-family: monospace;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-control {
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-control:focus, .btn-control:hover {
            color: #ff0055;
            text-shadow: 0 0 12px #ff0055;
            transform: scale(1.1);
        }

        .btn-control.active-mode {
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
        }

        .btn-play-pause {
            font-size: 32px;
            color: #fff;
        }

        /* BAR PROGRES INTERAKTIF */
        .progress-container {
            width: 100%;
            height: 8px;
            background: #222;
            cursor: pointer;
            flex: 0 0 auto;
            outline: none;
            position: relative;
            transition: all 0.2s ease;
        }

        .progress-container:focus {
            background: #333;
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.6);
            height: 12px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #ff5500);
            box-shadow: 0 0 8px #ff0055;
            transition: width 0.1s linear;
        }

        /* --- PLAYLIST DAFTAR LAGU --- */
        .modern-playlist {
            flex: 1 1 auto;
            overflow-y: auto;
            background: transparent;
            padding-bottom: 20px;
        }

        .modern-playlist::-webkit-scrollbar {
            width: 6px;
        }
        .modern-playlist::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .playlist-item:focus {
            background: rgba(255, 0, 85, 0.15) !important;
            box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.3);
            border-left: 4px solid #ff0055;
        }

        .playlist-item.active {
            background: rgba(255, 0, 85, 0.08);
            border-left: 4px solid #ff0055;
        }

        .item-cover {
            width: 45px;
            height: 45px;
            border-radius: 5px;
            object-fit: cover;
            margin-right: 15px;
        }

        .item-title {
            font-size: 15px;
            color: #dddddd;
        }

        .playlist-item.active .item-title, .playlist-item:focus .item-title {
            color: #ff0055;
            font-weight: bold;
        }

        .no-result {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="ambient-layer" class="ambient-bg"></div>

    <audio id="main-audio" src=""></audio>

    <div class="music-app-container">
        
        <div class="search-zone">
            <div class="search-box-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Cari musik atau nama band..." oninput="filterMusic()">
            </div>
            
            <div class="category-container" id="category-bar">
                <button class="category-btn active-cat" onclick="selectCategory('all')">Semua</button>
                <button class="category-btn" onclick="selectCategory('barat')">Barat</button>
                <button class="category-btn" onclick="selectCategory('indonesia')">Indonesia</button>
                <button class="category-btn" onclick="selectCategory('dangdut')">Dangdut</button>
                <button class="category-btn" onclick="selectCategory('malaysia')">Malaysia</button>
            </div>
        </div>
        
        <div class="neon-player">
            <img id="player-cover" class="now-playing-cover" src="" alt="Cover">
            
            <div class="track-info">
                <div id="player-title" class="track-title">Memuat...</div>
                <div id="player-time" class="time-display">00:00 / 00:00</div>
            </div>

            <div class="player-controls">
                <button class="btn-control" id="shuffle-btn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
                <button class="btn-control" onclick="playPrev()"><i class="fas fa-backward"></i></button>
                <button class="btn-control btn-play-pause" id="play-btn" id="main-play-focus" tabindex="0" onclick="togglePlay()"><i class="fas fa-play-circle"></i></button>
                <button class="btn-control" onclick="playNext()"><i class="fas fa-forward"></i></button>
                <button class="btn-control" id="repeat-btn" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
            </div>
        </div>

        <div class="progress-container" id="progress-container" tabindex="0" onclick="setProgress(event)">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="modern-playlist" id="playlist-container"></div>

    </div>

    <script>
        // Database Lagu Internal yang sudah dikelompokkan berdasarkan kategori
        const tracks = [
            {
                title: "Linkin park",
                category: "barat",
                cover: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjtgmN_rU4ewc56qSnb3FeKYqFdbuwc3M8cMHKELuOA0rj6sChH3LEg-PpoP2Vm0vAb6epf7k3fhfrVcB9nXBSqinPMv418UXdVFy1cTKlydZTOY06FynZldplcJXilxn8iNH8_X8TM2V5zros_o2J6oglux_UK8yEQOt8z9BEl6uMIofx4ruCHiutCZzip/s1478/PicRetouch_20250321_213315706.png",
                url: "https://mutia1503.ukielaki88.workers.dev/0:/Album%20musik%20barat/(TANPA%20IKLAN)%20Lagu%20Linkin%20Park%20Terbaik%20&%20Terpopuler%202023%20(%20360%20X%20640%20).mp4"
            },
            {
                title: "Adele",
                category: "barat",
                cover: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjmJPmL-x6EzToCsF0TKVX1IivqJha45s0Vmfu5kX7wwzwDYue0BR7TGHAdhXqZr-O_ShP8Nv8MD1z3Pc58b0yJuZvIK5r0WE_yudRFDHp_2-FMpUZZhlqCgYnXtPdOscIycToceSqAhQ1XdCqqb9mWvrNy0mVW-NZPhjxHL0Ukz0oPL56KkK1b9DM_uMSa/s1478/PicRetouch_20250321_213329828.png",
                url: "https://mutia1503.ukielaki88.workers.dev/0:/Album%20musik%20barat/adele%20songs%202021%20-%20Best%20Of%20Adele%20Greatest%20Hits%20Full%20Album%202021%20(%20720%20X%201280%20).mp4"
            },
            {
                title: "Blink 182",
                category: "barat",
                cover: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjJth5-0-ihIKQGFpxEHDuxErOeaXlhAmkFIa0jyQowE1OsYHNveN7YHa8BpWHKGM5KAdgCO-JcmrQoEoSS1DjGF_AbqBZtYYjBD3IBOb-3xjfzm0bxcMG6eErihCb260_tLWvgkXivHm1-kp0edxAc4fRaNvrbvqzXiGY6qy033Iw0z1ZFoiAtK-csHqJC/s1478/PicRetouch_20250321_212858772.png",
                url: "https://mutia1503.ukielaki88.workers.dev/0:/Album%20musik%20barat/b.l.i.n.k.-.1.8.2%20Greatest%20Hits,%20Full%20Album%20-%20Rock%20Music%20Playlist%202022%20(%20720%20X%201280%20).mp4"
            },
            {
                title: "Greenday",
                category: "barat",
                cover: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg4TBXraMnrTiZS53uVr-c_DIns35hRnPtUK9s_uDMJvi5sFeeE675MWUi5uuaMkXGoFwx8YsSvxq5uN7RtIrMOxFB66dXUz1fu3jXVYjrLW79h2Z33lisltjfx1Jf_ODQ0-9ge9VY7v1M7uQxnyr95n-kg8VxFXHaWtYPESaO_rk-FCRm0n94Y_n-KmM_F/s1478/PicRetouch_20250321_212913427.png",
                url: "https://mutia1503.ukielaki88.workers.dev/0:/Album%20musik%20barat/Beest%20Songs%20Of%20G%20R%20E%20E%20N%20D%20A%20Y%F0%9F%8D%80%20G%20R%20E%20E%20N%20D%20A%20Y%20Greatest%20Hits%20Full%20Album%20(%20720%20X%201280%20).mp4"
            },
            /* CONTOH PENEMPATAN KATEGORI BARU (Silakan ganti URL Cover & MP4 sesuai koleksi Anda) */
            {
                title: "Peterpan / Noah Best Hits",
                category: "indonesia",
                cover: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg4TBXraMnrTiZS53uVr-c_DIns35hRnPtUK9s_uDMJvi5sFeeE675MWUi5uuaMkXGoFwx8YsSvxq5uN7RtIrMOxFB66dXUz1fu3jXVYjrLW79h2Z33lisltjfx1Jf_ODQ0-9ge9VY7v1M7uQxnyr95n-kg8VxFXHaWtYPESaO_rk-FCRm0n94Y_n-KmM_F/s1478/PicRetouch_20250321_212913427.png",
                url: "https://mutia1503.ukielaki88.workers.dev/0:/Album%20musik%20barat/Best%20of%20-%20Offspring%20~%20-%20The%20Offspring%20Greatest%20Hits%20Full%20Album%20(%20720%20X%201280%20).mp4"
            },
            {
                title: "Dangdut Koplo Terbaru",
                category: "dangdut",
                cover: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhB0-kzwdaF-EuYDWEWKRQwhzK3ou9G6q_ByUHbEDU0TxRAyBjzC-efpqMsmX8u3-MctykTfb7LAtcQITQXV-5QYoMIIdhpoXDq3GtVRuAxs6OT15xKIWI1tfJFVTY6JeWVobNFVQqZwUy0m6RJpB55F6J3nFK4OGQH-piTzn14lpv0A48EZSeELiHmcgZX/s1478/PicRetouch_20250321_213028370.png",
                url: "https://mutia1503.ukielaki88.workers.dev/0:/Album%20musik%20barat/full%20album%20lagu%20scorpions%20enak%20di%20dengar%20buat%20pengantar%20tidur%20(%20240%20X%20426%20).mp4"
            },
            {
                title: "Exist & Slam Slow Rock",
                category: "malaysia",
                cover: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjYdyzvFUNQ7ILbSTSurGA9dU7T4bgERPv6j92bnzy8VFzH_lw-xvZ8gkVtYhUN2mlwmRZwiGIE4g_hdEaDNVziP_xjjX7fP5EgsrXGSPRzYDT52XUAu_onO3eBXW1eXLS9Bu8k-YAwkKzOTQEguslrtNg73qxGFzejhmXA-lj_4I8ny3ZAoaXVObZQryHp/s1478/PicRetouch_20250321_213010457.png",
                url: "https://mutia1503.ukielaki88.workers.dev/0:/Album%20musik%20barat/Best%20Songs%20of%20Oasis%20-%20Oasis%20Greatest%20Hits%20Full%20Album%20-%20Oasis%20Collection%20New%20(%20720%20X%201280%20).mp4"
            }
        ];

        let currentTrackIndex = 0;
        let isShuffle = false;
        let isRepeat = false;
        let selectedCategory = "all"; // Status Kategori Aktif

        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const playerCover = document.getElementById('player-cover');
        const playerTitle = document.getElementById('player-title');
        const playerTime = document.getElementById('player-time');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const playlistContainer = document.getElementById('playlist-container');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const ambientLayer = document.getElementById('ambient-layer');
        const searchInput = document.getElementById('search-input');

        // Render Playlist Berdasarkan Filter Teks & Kategori Aktif
        function filterMusic() {
            const query = searchInput.value.toLowerCase().trim();
            
            const filtered = tracks.filter(track => {
                const matchQuery = track.title.toLowerCase().includes(query);
                const matchCategory = (selectedCategory === "all" || track.category === selectedCategory);
                return matchQuery && matchCategory;
            });

            loadPlaylistView(filtered);
        }

        // Ganti Kategori & Update Visual Tab Aktif
        function selectCategory(catName) {
            selectedCategory = catName;
            
            // Atur gaya tombol aktif
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if(btn.getAttribute('onclick').includes(`'${catName}'`)) {
                    btn.classList.add('active-cat');
                } else {
                    btn.classList.remove('active-cat');
                }
            });

            filterMusic();
        }

        // Tampilkan Komponen Lagu ke Layar TV
        function loadPlaylistView(targetTracks) {
            playlistContainer.innerHTML = "";
            
            if (targetTracks.length === 0) {
                playlistContainer.innerHTML = `<div class="no-result">Lagu tidak ditemukan di kategori ini...</div>`;
                return;
            }

            targetTracks.forEach((track) => {
                const originalIndex = tracks.findIndex(t => t.url === track.url);
                
                const item = document.createElement('div');
                item.className = `playlist-item ${originalIndex === currentTrackIndex ? 'active' : ''}`;
                item.setAttribute('tabindex', '0'); 
                item.setAttribute('onclick', `selectTrack(${originalIndex})`);
                
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') selectTrack(originalIndex);
                });
                
                item.innerHTML = `
                    <img class="item-cover" src="${track.cover}">
                    <div class="item-title">${track.title}</div>
                `;
                playlistContainer.appendChild(item);
            });
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            audio.src = tracks[index].url;
            playerTitle.innerText = tracks[index].title;
            playerCover.src = tracks[index].cover;
            
            ambientLayer.style.backgroundImage = `url('${tracks[index].cover}')`;
            progressBar.style.width = "0%";
            playerTime.innerText = "00:00 / 00:00";
            
            filterMusic();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
                playBtn.style.color = '#ff0055';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
                playBtn.style.color = '#fff';
            }
        }

        function selectTrack(index) {
            loadTrack(index);
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
            playBtn.style.color = '#ff0055';
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active-mode', isShuffle);
        }

        function toggleRepeat() {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('active-mode', isRepeat);
        }

        function playNext() {
            if (isShuffle) {
                let randomIndex = Math.floor(Math.random() * tracks.length);
                selectTrack(randomIndex);
            } else {
                let nextIndex = currentTrackIndex + 1;
                if (nextIndex >= tracks.length) nextIndex = 0;
                selectTrack(nextIndex);
            }
        }

        function playPrev() {
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = tracks.length - 1;
            selectTrack(prevIndex);
        }

        function formatTime(secs) {
            if (isNaN(secs) || secs === Infinity) return "00:00";
            let min = Math.floor(secs / 60);
            let sec = Math.floor(secs % 60);
            if (min < 10) min = "0" + min;
            if (sec < 10) sec = "0" + sec;
            return min + ":" + sec;
        }

        audio.addEventListener('loadedmetadata', () => {
            playerTime.innerText = `00:00 / ${formatTime(audio.duration)}`;
        });

        audio.addEventListener('timeupdate', () => {
            const { duration, currentTime } = audio;
            if (duration && !isNaN(duration)) {
                const progressPercent = (currentTime / duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                playerTime.innerText = `${formatTime(currentTime)} / ${formatTime(duration)}`;
            }
        });

        function setProgress(e) {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if(duration) audio.currentTime = (clickX / width) * duration;
        }

        // --- SISTEM NAVIGASI TOMBOL REMOTE TV ANTI JURANG ---
        progressContainer.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (!audio.duration || isNaN(audio.duration)) return;
                let newTime = audio.currentTime + 10;
                if (newTime > audio.duration) newTime = audio.duration;
                audio.currentTime = newTime;
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (!audio.duration || isNaN(audio.duration)) return;
                let newTime = audio.currentTime - 10;
                if (newTime < 0) newTime = 0;
                audio.currentTime = newTime;
            } else if (e.key === 'ArrowDown') {
                // SANGAT PENTING: Jika pengguna menekan BAWAH di bar musik, loloskan langsung ke item lagu teratas
                e.preventDefault();
                const firstPlaylistItem = playlistContainer.querySelector('.playlist-item');
                if (firstPlaylistItem) {
                    firstPlaylistItem.focus();
                }
            } else if (e.key === 'ArrowUp') {
                // Navigasi ke atas kembali ke tombol Play utama
                e.preventDefault();
                document.getElementById('play-btn').focus();
            }
        });

        audio.addEventListener('ended', () => {
            if (isRepeat) {
                audio.currentTime = 0;
                audio.play();
            } else {
                playNext();
            }
        });

        window.onload = () => {
            filterMusic();
            loadTrack(0);
        };
    </script>
</body>
</html>
