<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Premium Audio Player - Clean Version</title>
    
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">
    
    <style>
        /* --- RESET & KUNCI LAYOUT UTAMA --- */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100%;
            overflow: hidden; /* Mengunci layar utama agar tidak ada scroll browser */
        }

        /* CONTAINER UTAMA (FIXED) */
        .music-app-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px; /* Lebar maksimal agar terlihat rapi di HP maupun PC */
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #141414;
            box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.8);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        /* --- TAMPILAN HEAD PLAYER (HITAM NEON) --- */
        .neon-player {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #000000;
            border-bottom: 1px solid #222;
            flex: 0 0 auto;
        }

        .now-playing-cover {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #ff0055;
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.4);
            margin-right: 15px;
        }

        .track-info {
            flex-grow: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .btn-control {
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-control:hover {
            color: #ff0055;
            text-shadow: 0 0 8px #ff0055;
        }

        .btn-play-pause {
            font-size: 32px;
            color: #fff;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: #222;
            cursor: pointer;
            flex: 0 0 auto;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #ff5500);
            box-shadow: 0 0 8px #ff0055;
        }

        /* --- TAMPILAN DAFTAR LAGU (PLAYLIST) --- */
        .modern-playlist {
            flex: 1 1 auto;
            overflow-y: auto; /* Scroll hanya terjadi di dalam daftar lagu ini saja */
            background: #141414;
            padding-bottom: 20px;
        }

        /* Desain Scrollbar */
        .modern-playlist::-webkit-scrollbar {
            width: 6px;
        }
        .modern-playlist::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }
        .modern-playlist::-webkit-scrollbar-thumb:hover {
            background: #ff0055;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
            transition: background 0.2s;
        }

        .playlist-item:hover {
            background: #1a1a1a;
        }

        .playlist-item.active {
            background: #221217;
            border-left: 4px solid #ff0055;
        }

        .item-cover {
            width: 45px;
            height: 45px;
            border-radius: 5px;
            object-fit: cover;
            margin-right: 15px;
        }

        .item-title {
            font-size: 15px;
            color: #cccccc;
        }

        .playlist-item.active .item-title {
            color: #ff0055;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <audio id="main-audio" src=""></audio>

    <div class="music-app-container">
        
        <div class="neon-player">
            <img id="player-cover" class="now-playing-cover" src="" alt="Cover">
            
            <div class="track-info">
                <div id="player-title" class="track-title">Memuat...</div>
            </div>

            <div class="player-controls">
                <button class="btn-control" onclick="playPrev()"><i class="fas fa-backward"></i></button>
                <button class="btn-control btn-play-pause" id="play-btn" onclick="togglePlay()"><i class="fas fa-play-circle"></i></button>
                <button class="btn-control" onclick="playNext()"><i class="fas fa-forward"></i></button>
            </div>
        </div>

        <div class="progress-container" id="progress-container" onclick="setProgress(event)">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="modern-playlist" id="playlist-container">
            </div>

    </div>

            },
            {
                title: "Scorpions",
                cover: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhB0-kzwdaF-EuYDWEWKRQwhzK3ou9G6q_ByUHbEDU0TxRAyBjzC-efpqMsmX8u3-MctykTfb7LAtcQITQXV-5QYoMIIdhpoXDq3GtVRuAxs6OT15xKIWI1tfJFVTY6JeWVobNFVQqZwUy0m6RJpB55F6J3nFK4OGQH-piTzn14lpv0A48EZSeELiHmcgZX/s1478/PicRetouch_20250321_213028370.png",
                url: "https://mutia1503.ukielaki88.workers.dev/0:/Album%20musik%20barat/full%20album%20lagu%20scorpions%20enak%20di%20dengar%20buat%20pengantar%20tidur%20(%20240%20X%20426%20).mp4"
            }

        let currentTrackIndex = 0;
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const playerCover = document.getElementById('player-cover');
        const playerTitle = document.getElementById('player-title');
        const progressBar = document.getElementById('progress-bar');
        const playlistContainer = document.getElementById('playlist-container');

        // Render otomatis list ke dalam HTML
        function loadPlaylist() {
            playlistContainer.innerHTML = "";
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                item.setAttribute('onclick', `selectTrack(${index})`);
                item.innerHTML = `
                    <img class="item-cover" src="${track.cover}">
                    <div class="item-title">${track.title}</div>
                `;
                playlistContainer.appendChild(item);
            });
        }

        // Set Trek Aktif
        function loadTrack(index) {
            currentTrackIndex = index;
            audio.src = tracks[index].url;
            playerTitle.innerText = tracks[index].title;
            playerCover.src = tracks[index].cover;
            
            const items = document.querySelectorAll('.playlist-item');
            items.forEach((item, idx) => {
                if(idx === index) item.classList.add('active');
                else item.classList.remove('active');
            });
        }

        // Play dan Pause toggle
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
                playBtn.style.color = '#ff0055';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
                playBtn.style.color = '#fff';
            }
        }

        function selectTrack(index) {
            loadTrack(index);
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
            playBtn.style.color = '#ff0055';
        }

        function playNext() {
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= tracks.length) nextIndex = 0;
            selectTrack(nextIndex);
        }

        function playPrev() {
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = tracks.length - 1;
            selectTrack(prevIndex);
        }

        // Animasi Progress Bar Durasi Musik
        audio.addEventListener('timeupdate', () => {
            const { duration, currentTime } = audio;
            if (duration) {
                const progressPercent = (currentTime / duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
            }
        });

        // Set manual durasi ketika progress bar diklik
        function setProgress(e) {
            const width = document.getElementById('progress-container').clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if(duration) {
                audio.currentTime = (clickX / width) * duration;
            }
        }

        // Autoplay lagu berikutnya jika trek habis
        audio.addEventListener('ended', playNext);

        // Inisialisasi awal aplikasi
        window.onload = () => {
            loadPlaylist();
            loadTrack(0);
        };
    </script>
