<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <link rel="preconnect" href="https://posterfilm.pages.dev">
    <link rel="preconnect" href="https://iptv-posterku.pages.dev">
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content='width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0'/>
    <title>MRZYB TV - Koleksi Film</title>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'PT Sans', sans-serif; background-color: #000; color: #fff; padding-bottom: 50px; }
        .header-banner { text-align: center; padding: 20px 0 10px 0; }
        .header-banner h1 { color: #E50914; font-size: 38px; letter-spacing: 3px; font-weight: 700; }
        .search-wrapper { display: flex; align-items: center; justify-content: center; max-width: 500px; margin: 0 auto 20px auto; padding: 0 10px; position: relative; }
        .search-box { width: 100%; padding: 12px 45px 12px 15px; font-size: 16px; border: 2px solid #333; border-radius: 8px; background-color: #141414; color: #fff; outline: none; }
        .section-title { font-size: 22px; font-weight: 700; margin: 15px 20px 10px 20px; border-left: 4px solid #E50914; padding-left: 10px; display: none; }
        .container-film { display: flex; flex-wrap: wrap; padding: 0 10px; justify-content: flex-start; }
        .card-film { width: calc(12.5% - 14px); margin: 7px; background-color: #181818; border-radius: 6px; overflow: hidden; position: relative; }
        .card-film:focus-within { transform: scale(1.05); box-shadow: 0 0 12px #E50914; outline: none; z-index: 10; }
        .poster-wrapper { width: 100%; aspect-ratio: 2/3; background-color: #2a2a2a; position: relative; }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .film-title { padding: 8px; font-size: 13px; font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-fav { width: 100%; padding: 6px 0; background-color: #222; color: #bbb; border: none; font-size: 11px; font-weight: 700; cursor: pointer; border-top: 1px solid #333; }
        .btn-fav.active { color: #ffcc00; }
        @media (max-width: 768px) { .card-film { width: calc(25% - 14px); } }
        @media (max-width: 480px) { .card-film { width: calc(33.33% - 10px); } }
    </style>
</head>
<body>

<div class="header-banner"><h1>MRZYB TV</h1></div>
<div class="search-wrapper">
    <input type="text" id="searchBox" class="search-box" placeholder="Cari alur cerita...">
</div>
<div class="section-title" id="favSectionTitle">FAVORIT SAYA</div>
<div class="container-film" id="containerFav"></div>
<div class="section-title" id="utamaSectionTitle" style="display: block;">SEMUA ALUR CERITA FILM</div>
<div class="container-film" id="containerUtama"></div>

<script>
let semuaData = [];
let indexTampil = 15; // Jumlah awal film yang dimuat
const containerUtama = document.getElementById('containerUtama');

function renderFilm(list, container) {
    const html = list.map(film => `
        <div class="card-film" data-id="${film.id}">
            <a class="play-link" href="${film.url}" data-title="${film.title.toLowerCase()}">
                <div class="poster-wrapper">
                    <img src="${film.img}" 
                         loading="lazy" 
                         decoding="async" 
                         onerror="this.style.display='none'" 
                         alt="${film.title}">
                </div>
            </a>
            <button class="btn-fav" data-target="${film.id}"><span>☆</span> Favorit</button>
            <div class="film-title">${film.title}</div>
        </div>
    `).join('');
    container.insertAdjacentHTML('beforeend', html);
}

fetch('data/alurcerita.json')
    .then(r => r.json())
    .then(data => {
        semuaData = data;
        renderFilm(semuaData.slice(0, indexTampil), containerUtama);
    });

// Deteksi Scroll untuk Load More
window.addEventListener('scroll', () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        if (indexTampil < semuaData.length) {
            renderFilm(semuaData.slice(indexTampil, indexTampil + 15), containerUtama);
            indexTampil += 15;
        }
    }
});
</script>
</body>
</html>
