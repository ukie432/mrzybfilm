<center><h1 style="color:#00BFFF;font-size:50px;">M R Z Y B</h1></center>

<script>
// DETEKSI NAVIGASI BARU: Jika masuk dari Home/Link baru, hapus semua sisa memori lama
if (window.performance && window.performance.navigation) {
    if (window.performance.navigation.type === 0 || window.performance.navigation.type === 1) {
        // type 0 = navigasi klik link dari home, type 1 = reload halaman baru
        sessionStorage.removeItem("activeAlurFilmIndex");
        localStorage.removeItem("activeAlurFilmIndex");
    }
}

document.addEventListener("DOMContentLoaded", function() {
    const cards = document.querySelectorAll('.card-film');
    
    // 1. KEMBALIKAN FOKUS KETIKA KEMBALI DARI EXOPLAYER
    const lastIndex = sessionStorage.getItem("activeAlurFilmIndex");
    if (lastIndex !== null && cards[lastIndex]) {
        setTimeout(() => {
            cards[lastIndex].focus();
            cards[lastIndex].scrollIntoView({ behavior: "smooth", block: "center" });
        }, 300);
    } else if (cards[0]) {
        cards[0].focus(); // Default fokus ke poster teratas jika baru dibuka dari home
    }

    // 2. DETEKSI KLIK & LOCK POSISI DI SESSION STORAGE
    cards.forEach((card, index) => {
        const handler = function(e) {
            sessionStorage.setItem("activeAlurFilmIndex", index);

            if (typeof Android !== "undefined" && Android.playVideo) {
                e.preventDefault();
                const videoUrl = card.getAttribute("href");
                Android.playVideo(videoUrl); // Panggil ExoPlayer internal STB
            }
        };

        card.addEventListener("click", handler);

        // Dukungan penuh klik via Remote D-Pad Enter
        card.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                handler(e);
            }
        });
    });
});
</script>
