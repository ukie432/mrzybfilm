<style>
/* --- RESET & BASE STYLE --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: 'PT Sans', sans-serif;
    background-color: #000000; 
    color: #ffffff;
    overflow-x: hidden;
    padding-bottom: 40px; 
}

/* --- LOGO / HEADER --- */
.header-banner {
    text-align: center;
    padding: 20px 0 10px 0;
}
.header-banner h1 {
    color: #E50914; 
    font-size: 38px;
    letter-spacing: 3px;
    font-weight: 700;
}

/* --- FITUR PENCARIAN DENGAN TOMBOL X --- */
.search-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 500px;
    margin: 0 auto 25px auto;
    padding: 0 10px;
    position: relative;
}
.search-input {
    width: 100%;
    padding: 12px 50px 12px 20px; 
    font-size: 16px;
    background-color: #141414;
    border: 2px solid #262626;
    border-radius: 8px;
    color: #ffffff;
    outline: none;
    transition: border-color 0.15s ease-out;
}
.search-input:focus {
    border-color: #E50914;
    background-color: #1f1f1f;
}

.btn-clear {
    position: absolute;
    right: 20px;
    background: none;
    border: 2px solid transparent;
    color: #808080;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: none; 
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    outline: none;
    transition: color 0.15s, border-color 0.15s;
}
.btn-clear:focus {
    color: #E50914;
    border-color: #E50914;
    background-color: rgba(229, 9, 20, 0.1);
}

.section-title {
    color: #ffffff;
    font-size: 18px;
    font-weight: bold;
    text-align: left;
    margin: 20px 0 15px 40px;
}

#favSectionTitle, #containerFav {
    display: none;
}

/* --- GRID POSTER FILM --- */
.container-film {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    gap: 20px;
    padding: 0 40px;
    max-width: 1300px;
    margin: 0 auto;
}

.card-film {
    display: block;
    width: 140px;
    text-decoration: none;
    cursor: pointer;
    outline: none; 
    will-change: transform;
    transition: transform 0.1s ease-out;
    position: relative;
}

.poster-wrapper {
    width: 140px;
    height: 210px;
    background-color: #141414;
    border-radius: 6px;
    overflow: hidden;
    border: 3px solid transparent; 
    transition: border-color 0.1s ease-out;
    position: relative;
}

.poster-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.btn-fav {
    width: 100%;
    background-color: #1f1f1f;
    border: 1px solid #333;
    color: #aaa;
    font-size: 11px;
    padding: 4px 0;
    margin-top: 5px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    outline: none;
}
.btn-fav:focus {
    border-color: #FFD700;
    color: #FFD700;
    background-color: rgba(255, 215, 0, 0.1);
}
.btn-fav.active {
    color: #FFD700;
}

.film-title {
    color: #e0e0e0;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    margin-top: 6px;
    padding: 0 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-film:focus {
    transform: scale(1.06);
    z-index: 10;
}
.card-film:focus .poster-wrapper {
    border-color: #E50914; 
}

.no-results {
    display: none;
    width: 100%;
    text-align: center;
    color: #808080;
    font-size: 16px;
    margin-top: 30px;
}
</style>
</head>
<body>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const searchBox = document.getElementById('searchBox');
    const btnClear = document.getElementById('btnClear');
    const noResultsText = document.getElementById('noResultsText');
    const containerUtama = document.getElementById('containerUtama');
    const containerFav = document.getElementById('containerFav');
    const favSectionTitle = document.getElementById('favSectionTitle');



    let listFavorit = JSON.parse(localStorage.getItem('cerita_favorit')) || [];

    function updateTampilanFavorit() {
        containerFav.innerHTML = "";
        
        if (listFavorit.length === 0) {
            favSectionTitle.style.display = "none";
            containerFav.style.display = "none";
        } else {
            favSectionTitle.style.display = "block";
            containerFav.style.display = "flex";

            listFavorit.forEach(idFilm => {
                const itemAsli = containerUtama.querySelector(`.card-film[data-id="${idFilm}"]`);
                if (itemAsli) {
                    const klon = itemAsli.cloneNode(true);
                    klon.setAttribute('id', 'fav-' + idFilm);
                    containerFav.appendChild(klon);
                } else {
                    // Jika film favorit lama tidak ditemukan di daftar utama baru, bersihkan datanya
                    listFavorit = listFavorit.filter(id => id !== idFilm);
                    localStorage.setItem('cerita_favorit', JSON.stringify(listFavorit));
                }
            });
        }
        pasangEventAksi();
        perbaruiStatusTombolBintang();
    }

    function perbaruiStatusTombolBintang() {
        document.querySelectorAll('.btn-fav').forEach(btn => {
            const idTarget = btn.getAttribute('data-target');
            if (listFavorit.includes(idTarget)) {
                btn.classList.add('active');
                btn.innerHTML = "<span>★</span> Favorit";
            } else {
                btn.classList.remove('active');
                btn.innerHTML = "<span>☆</span> Favorit";
            }
        });
    }

    function pasangEventAksi() {
        document.querySelectorAll('.card-film').forEach(card => {
            const link = card.querySelector('.play-link');
            if (!link) return;

            link.replaceWith(link.cloneNode(true));
            const newLink = card.querySelector('.play-link');

            const handleWatch = function(e) {
                localStorage.setItem("idPosterTerakhir", card.getAttribute("id"));
                localStorage.setItem("sedangNontonVideoSTB", "ya");

                if (typeof Android !== "undefined" && Android.playVideo) {
                    e.preventDefault();
                    Android.playVideo(newLink.getAttribute("href"));
                }
            };
            newLink.addEventListener("click", handleWatch);
            newLink.addEventListener("keydown", function(e) {
                if (e.key === "Enter") handleWatch(e);
            });
        });

        document.querySelectorAll('.btn-fav').forEach(btn => {
            btn.replaceWith(btn.cloneNode(true));
        });

        document.querySelectorAll('.btn-fav').forEach(btn => {
            const handleFavClick = function(e) {
                e.preventDefault();
                const idTarget = btn.getAttribute('data-target');
                
                if (listFavorit.includes(idTarget)) {
                    listFavorit = listFavorit.filter(id => id !== idTarget);
                } else {
                    listFavorit.push(idTarget);
                }

                localStorage.setItem('cerita_favorit', JSON.stringify(listFavorit));
                updateTampilanFavorit();
            };

            btn.addEventListener('click', handleFavClick);
            btn.addEventListener('keydown', function(e) {
                if (e.key === "Enter") handleFavClick(e);
            });
        });
    }

    function saringFilm(keyword) {
        let adaFilmCocok = false;
        const semuaKartu = containerUtama.querySelectorAll('.card-film');

        semuaKartu.forEach(card => {
            const link = card.querySelector('.play-link');
            const namaFilm = link.getAttribute('data-title');
            const btnFav = card.querySelector('.btn-fav');
            
            if (namaFilm.includes(keyword)) {
                card.style.display = "block";
                link.setAttribute("tabindex", "0");
                btnFav.setAttribute("tabindex", "0");
                adaFilmCocok = true;
            } else {
                card.style.display = "none";
                link.setAttribute("tabindex", "-1");
                btnFav.setAttribute("tabindex", "-1");
            }
        });

        noResultsText.style.display = adaFilmCocok ? "none" : "block";
    }

    searchBox.addEventListener('input', function() {
        const filterText = searchBox.value.toLowerCase().trim();
        btnClear.style.display = searchBox.value.length > 0 ? "flex" : "none";
        saringFilm(filterText);
    });

    function eksekusiHapusPencarian() {
        searchBox.value = "";
        btnClear.style.display = "none";
        saringFilm("");
        searchBox.focus();
    }

    btnClear.addEventListener('click', eksekusiHapusPencarian);
    btnClear.addEventListener('keydown', function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            eksekusiHapusPencarian();
        }
    });

    updateTampilanFavorit();

    setTimeout(() => {
        const statusNontonSTB = localStorage.getItem("sedangNontonVideoSTB");
        const idPosterTerakhir = localStorage.getItem("idPosterTerakhir");
        
        if (statusNontonSTB === "ya" && idPosterTerakhir) {
            const targetPoster = document.getElementById(idPosterTerakhir);
            if (targetPoster) {
                const tombolPlay = targetPoster.querySelector('.play-link');
                if (tombolPlay) {
                    tombolPlay.focus();
                    targetPoster.scrollIntoView({ behavior: "auto", block: "center" });
                    localStorage.removeItem("sedangNontonVideoSTB");
                    localStorage.removeItem("idPosterTerakhir");
                    return;
                }
            }
        }
        if (searchBox) searchBox.focus();
    }, 180); 
});
</script>
