<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta content='width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' name='viewport'/>
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>MRZYB TV</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
/* --- RESET & BASE STYLE --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: 'PT Sans', sans-serif;
    background-color: #000000; /* Hitam pekat ala Netflix */
    color: #ffffff;
    overflow-x: hidden;
    padding-bottom: 90px; 
}

/* --- LOGO / HEADER --- */
.header-banner {
    text-align: center;
    padding: 20px 0 5px 0;
}
.header-banner h1 {
    color: #E50914; /* Merah Khas Netflix */
    font-size: 38px;
    letter-spacing: 3px;
    font-weight: 700;
}
.section-title {
    color: #ffffff;
    font-size: 18px;
    font-weight: bold;
    text-align: left;
    margin: 15px 0 15px 40px;
}

/* --- GRID POSTER FILM (ALA NETFLIX) --- */
.container-film {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    gap: 20px;
    padding: 0 40px;
    max-width: 1300px;
    margin: 0 auto;
}

/* Item Kartu Film (Dibuat Tegak Lurus Rasio 2:3) */
.card-film {
    display: block;
    width: 140px;
    height: 210px; /* Diubah agar tegak seperti poster bioskop asli */
    background-color: #141414;
    border-radius: 6px;
    overflow: hidden;
    text-decoration: none;
    position: relative;
    cursor: pointer;
    /* Gunakan outline tipis default agar rendering awal ringan */
    outline: 2px solid transparent; 
    will-change: transform; /* Optimasi hardware akselerasi STB */
}

/* Gambar di dalam Kartu */
.card-film img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* EFFECT FOKUS REMOTE STB (SUPER RINGAN & ANTI-LAG) */
.card-film:focus, .nav-item:focus {
    outline: 3px solid #E50914; /* Sorot merah tajam tanpa blur shadow */
    transform: scale(1.06); /* Membesar sedikit dengan sangat enteng */
    z-index: 10;
}

/* Durasi transisi dipercepat agar pergeseran remote terasa instan */
.card-film, .nav-item {
    transition: transform 0.1s ease-out;
}

/* --- MENU NAVIGASI BAWAH (FIXED) --- */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 65px;
    background: #141414;
    border-top: 1px solid #262626;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 100;
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #808080;
    text-decoration: none;
    width: 30%;
    height: 100%;
    font-size: 13px;
}

.nav-item svg {
    width: 24px;
    height: 24px;
    margin-bottom: 4px;
    fill: currentColor;
}

.nav-item.active {
    color: #E50914; /* Menu aktif berwarna merah */
    font-weight: bold;
}
</style>
</head>
<body>

    <div class="header-banner">
        <h1>MRZYB TV</h1>
    </div>

    <div class="section-title">Alur Cerita Populer</div>

    <div class="container-film">
        
        <a class="card-film" tabindex="0" href="https://movieku.ukielaki8387.workers.dev/0:/Alur%20cerita/Venom%20the%20last%20dance%20(2024).mp4">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ7xBjRNWow_V75KpLFRamvtRYR4qqwO-VilXp4hRv1ZekSylslgTV9DKE&s=10" alt="Venom">
        </a>

        <a class="card-film" tabindex="0" href="https://movieku.ukielaki8387.workers.dev/0:/Alur%20cerita/Alien%20Romulus%20(2024).mp4">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSxRV0NJmoY3Cb3fQptJqfOFvq_t4Jzdzeh4qqpR8xLDYx0-Fe2_oSsqN8&s=10" alt="Alien">
        </a>

        <a class="card-film" tabindex="0" href="https://movieku.ukielaki8387.workers.dev/0:/Alur%20cerita/The%2013th%20warrior%20(1999).mp4">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOwLZ0FFAaQfapForuaQJYIrxGGVlmw_bwwR3qxTSZIZNeT2ozr0MatNU&s=10" alt="The 13th Warrior">
        </a>

        <a class="card-film" tabindex="0" href="https://movieku.ukielaki8387.workers.dev/0:/Alur%20cerita/Abselutely%20anything%20(2015).mp4">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ93fFGXm_QOJkbNYLlBtxyrls-T6ojRL-2wA&usqp=CAU" alt="Absolutely Anything">
        </a>

        <a class="card-film" tabindex="0" href="https://movieku.ukielaki8387.workers.dev/0:/Alur%20cerita/Atm%20er%20rak%20error%20(2012).mp4">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvVilzDKJsvLrqpbINTVzo0iuWkQ14XH42wg&usqp=CAU" alt="ATM Error">
        </a>

    </div>




<script>
document.addEventListener("DOMContentLoaded", function() {
    const cards = document.querySelectorAll('.card-film');
    
    const baruSelesaiNonton = sessionStorage.getItem("sedangNontonVideo");
    const indexTerakhir = localStorage.getItem("alurFilmTerakhirIndex");

    requestAnimationFrame(() => {
        if (baruSelesaiNonton === "ya" && indexTerakhir !== null && cards[indexTerakhir]) {
            setTimeout(() => {
                cards[indexTerakhir].focus();
                cards[indexTerakhir].scrollIntoView({ behavior: "auto", block: "center" });
            }, 50); // Dipercepat dari 150ms ke 50ms biar terasa instan
        } else {
            if (cards[0]) cards[0].focus();
            localStorage.removeItem("alurFilmTerakhirIndex");
        }
        sessionStorage.removeItem("sedangNontonVideo");
    });

    cards.forEach((card, index) => {
        const handleWatch = function(e) {
            localStorage.setItem("alurFilmTerakhirIndex", index);
            sessionStorage.setItem("sedangNontonVideo", "ya");

            if (typeof Android !== "undefined" && Android.playVideo) {
                e.preventDefault();
                Android.playVideo(card.getAttribute("href"));
            }
        };

        card.addEventListener("click", handleWatch);
        card.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                handleWatch(e);
            }
        });
    });
});
</script>

</body>
</html>
