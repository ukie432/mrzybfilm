<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <link rel="preconnect" href="https://posterfilm.pages.dev">
    <link rel="preconnect" href="https://iptv-posterku.pages.dev">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>MRZYBceramah - Audio Player TV</title>
    
    <!-- FontAwesome untuk Icon Navigasi -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">
    
    <style>
        /* --- RESET & LAYOUT UTAMA --- */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0a0c10;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100%;
            overflow: hidden;
        }

        /* CONTAINER UTAMA: LEBAR PENUH */
        .music-app-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(10, 12, 16, 0.95);
        }

        /* --- HEAD PLAYER (STEALTH DESIGN WITH CANVAS) --- */
        .neon-player {
            position: relative;
            display: flex;
            align-items: center;
            padding: 30px 40px;
            background: #06080b;
            border-bottom: 1px solid #141923;
            flex: 0 0 auto;
            overflow: hidden;
        }

        /* CANVAS UNTUK EFEK SPECTRUM HIJAU */
        #spectrum-canvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.35;
        }

        .now-playing-cover, .track-info, .player-right-wrapper {
            position: relative;
            z-index: 2;
        }

        .now-playing-cover {
            width: 90px;
            height: 90px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #00cc66; /* WARNA HIJAU */
            margin-right: 25px;
        }

        .track-info {
            flex-grow: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .time-display {
            font-size: 14px;
            color: #777;
            font-family: monospace;
        }

        /* WRAPPER KANAN UNTUK MENYUSUN LOGO DI ATAS TOMBOL */
        .player-right-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        /* LOGO WATERMARK MRZYBceramah */
        .app-brand-logo {
            font-size: 14px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 3px;
            text-transform: uppercase;
            user-select: none;
            border-right: 3px solid #00cc66; /* AKSEN JALUR HIJAU */
            padding-right: 8px;
            line-height: 1;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-control {
            background: none;
            border: none;
            color: #666;
            font-size: 20px;
            cursor: pointer;
            outline: none;
        }

        .btn-control:focus, .btn-control:hover {
            color: #00cc66; /* WARNA HIJAU */
            transform: scale(1.1);
        }

        .btn-control.active-mode {
            color: #00cc66; /* WARNA HIJAU */
        }

        .btn-play-pause {
            font-size: 46px;
            color: #e0e0e0;
        }
        .btn-play-pause:focus, .btn-play-pause:hover {
            color: #00cc66; /* WARNA HIJAU */
        }

        /* BAR PROGRES INTERAKTIF */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #141923;
            cursor: pointer;
            flex: 0 0 auto;
            outline: none;
            position: relative;
            z-index: 3;
        }

        .progress-container:focus {
            background: #1a2230;
            height: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #00cc66; /* WARNA HIJAU */
        }

        /* --- PLAYLIST DAFTAR LAGU MUROTTAL --- */
        .modern-playlist {
            flex: 1 1 auto;
            overflow-y: auto;
            background: #0a0c10;
            padding: 20px 40px 40px 40px;
        }

        .modern-playlist::-webkit-scrollbar {
            width: 6px;
        }
        .modern-playlist::-webkit-scrollbar-thumb {
            background: #141923;
            border-radius: 3px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            margin-bottom: 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.01);
            cursor: pointer;
            outline: none;
            border: 1px solid transparent;
        }

        .playlist-item:hover {
            background: #10141d;
        }

        .playlist-item:focus {
            background: #141a26 !important; 
            border-color: #00cc66 !important; /* BORDER SELEKSI HIJAU */
        }

        .playlist-item.active {
            background: rgba(0, 204, 102, 0.06);
            border-left: 4px solid #00cc66; /* SELEKSI AKTIF HIJAU */
        }

        .item-cover {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            margin-right: 20px;
        }

        .item-title {
            font-size: 18px;
            color: #b0b5c0;
        }

        .playlist-item.active .item-title, .playlist-item:focus .item-title {
            color: #fff;
            font-weight: bold;
        }

        .no-result {
            text-align: center;
            padding: 50px 20px;
            color: #444;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- CORE AUDIO ELEMENT -->
    <audio id="main-audio" src=""></audio>

    <!-- VIDEO HANTU MENGGUNAKAN DATA URI -->
    <video id="ghost-video" playsinline autoplay loop muted style="position:fixed; bottom:0; right:0; width:1px; height:1px; opacity:0.01; pointer-events:none;">
        <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28zdmpkAAACAAAAAZZtb29hAABtZG12aGQAAAAA" type="video/mp4">
    </video>

    <div class="music-app-container">
        
        <!-- ELEMENT BOX PLAYER (ZONA ATAS) -->
        <div class="neon-player">
            <canvas id="spectrum-canvas"></canvas>

            <img id="player-cover" class="now-playing-cover" src="" alt="Cover">
            
            <div class="track-info">
                <div id="player-title" class="track-title">Memuat data audio...</div>
                <div id="player-time" class="time-display">00:00 / 00:00</div>
            </div>

            <div class="player-right-wrapper">
                <div class="app-brand-logo">MRZYB.ceramah</div>
                
                <div class="player-controls">
                    <button class="btn-control" id="shuffle-btn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
                    <button class="btn-control" onclick="playPrev()"><i class="fas fa-backward"></i></button>
                    <button class="btn-control btn-play-pause" id="play-btn" tabindex="0" onclick="togglePlay()"><i class="fas fa-play-circle"></i></button>
                    <button class="btn-control" onclick="playNext()"><i class="fas fa-forward"></i></button>
                    <button class="btn-control" id="repeat-btn" onclick="toggleRepeat()"><i class="fas fa-redo"></i></button>
                </div>
            </div>
        </div>

        <!-- PROGRESS BAR -->
        <div class="progress-container" id="progress-container" tabindex="0" onclick="setProgress(event)">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <!-- ELEMENT PLAYLIST DAFTAR AUDIO MUROTTAL -->
        <div class="modern-playlist" id="playlist-container"></div>

    </div>

    <!-- --- JAVASCRIPT ENGINE --- -->
    <script>
        let tracks = []; 
        let currentTrackIndex = 0;
        let isShuffle = false;
        let isRepeat = false;

        let canvas, ctx;
        let totalBars = 45; 
        let barHeights = Array(totalBars).fill(0); 
        let targetHeights = Array(totalBars).fill(0);
        let audioCtx = null;

        const audio = document.getElementById('main-audio');
        const ghostVideo = document.getElementById('ghost-video');
        const playBtn = document.getElementById('play-btn');
        const playerCover = document.getElementById('player-cover');
        const playerTitle = document.getElementById('player-title');
        const playerTime = document.getElementById('player-time');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const playlistContainer = document.getElementById('playlist-container');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');

        function initKeepAliveAudio() {
            if (!audioCtx) {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.0001;
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start();
                } catch(e) {
                    console.log("AudioContext tidak didukung:", e);
                }
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        async function fetchPlaylistData() {
            try {
                const response = await fetch('https://mrzybtv-api.ukielaki88.workers.dev/app/ceramah');
                if (!response.ok) {
                    throw new Error("Gagal mengambil data. Periksa file JSON Anda.");
                }
                tracks = await response.json();
                
                loadPlaylistView();
                if(tracks.length > 0) {
                    loadTrack(0);
                }
            } catch (error) {
                console.error("Error:", error);
                playerTitle.innerText = "Gagal memuat data audio";
                playlistContainer.innerHTML = `<div class="no-result" style="color: #00cc66;">${error.message}</div>`;
            }
        }

        function initVirtualSpectrum() {
            canvas = document.getElementById('spectrum-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            animateSpectrum();
        }

        function animateSpectrum() {
            requestAnimationFrame(animateSpectrum);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let barWidth = canvas.width / totalBars;
            for (let i = 0; i < totalBars; i++) {
                if (!audio.paused) {
                    if (Math.random() > 0.88) {
                        targetHeights[i] = Math.random() * (canvas.height - 10) + 3;
                    }
