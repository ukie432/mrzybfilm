<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MRZYBtv</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            margin-bottom: 20px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        .qr-image {
            width: 450px;
            height: auto;
            border: 8px solid white;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .info-text {
            font-size: 2rem;
            line-height: 1.6;
        }
        .highlight {
            color: #00d4ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>MRZYB TV</h1>
    
    <img class="qr-image" src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Telegramku.webp" alt="QR Code">
    
    <div class="info-text">
        Join ke telegram untuk kendala & request film:<br>
        <span class="highlight">t.me/mrzybstream</span>
    </div>

    <audio id="audioNotifikasi" loop autoplay>
        <source src="https://ia802902.us.archive.org/23/items/skilletmonster/skillet%20-%20monster.mp3" type="audio/mp3">
    </audio>

    <script type="text/javascript">
        // Memastikan audio berputar saat ada interaksi pertama di halaman
        document.addEventListener('click', function() {
            var audio = document.getElementById("audioNotifikasi");
            audio.play();
        }, { once: true });
    </script>
</body>
</html>
