<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <link rel="preconnect" href="https://posterfilm.pages.dev">
<link rel="preconnect" href="https://iptv-posterku.pages.dev">

    <meta charset="UTF-8">
    <title>Radio TV - mrzyb</title>
    <style>
        body { 
            background: #000; color: #fff; font-family: sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; gap: 50px;
        }
        #poster { width: 450px; height: 450px; border: 4px solid #fff; background-size: cover; background-position: center; }
        #controls-area { display: flex; flex-direction: column; gap: 10px; }
        
        #radioname { font-size: 3.5rem; margin: 0; }
        #branding { font-size: 1.5rem; color: #dc143c; font-weight: bold; margin-bottom: 20px; }
        
        .btn-round {
            width: 90px; height: 90px; border-radius: 50%; border: none; 
            background: #dc143c; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-round:focus { outline: 6px solid #fff; transform: scale(1.1); }
        svg { fill: white; }
    </style>
</head>
<body>

    <div id="poster"></div>
    
    <div id="controls-area">
        <h1 id="radioname">Loading...</h1>
        <div id="branding">Streaming mrzyb</div>
        
        <div style="display: flex; gap: 30px; align-items: center; margin-top: 10px;">
            <button class="btn-round" id="btnPrev" onclick="changeStation(-1)"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5z"/></svg></button>
            
            <button class="btn-round" style="width: 110px; height: 110px;" id="btnPlay" onclick="togglePlay()">
                <div id="iconContainer">
                    <svg id="playIcon" width="50" height="50" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" width="50" height="50" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
            </button>
            
            <button class="btn-round" id="btnNext" onclick="changeStation(1)"><svg width="30" height="30" viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zM17 4h2v16h-2z"/></svg></button>
        </div>
    </div>
    
    <audio id="audioPlayer"></audio>

    <script>
        const stations = [
            { name: "Iswara", src: "https://n0a.radiojar.com/4ywdgup3bnzuv?1673348637=&rj-tok=AAABhZtjYesAbqf2VnMskbfVxQ&rj-ttl=5", img: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/iswara.webp" },
                        { name: "Delta Fm", src: "https://s1.cloudmu.id/listen/delta_fm/radio.mp3", img: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/delta.webp" },
                                    { name: "101 Jak Fm", src: "https://wz.mari.co.id:1936/web_jakfm/jakfm/playlist.m3u8", img: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/jak.webp" },
                                                { name: "Ardan Fm", src: "https://stream.rcs.revma.com/ugpyzu9n5k3vv", img: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/ardan.webp" },
                                                            { name: "HardRock", src: "https://n08.radiojar.com/7csmg90fuqruv.mp3?1673348819=&rj-tok=AAABhZtmUCUAwkYyBBgriH-X9g&rj-ttl=5", img: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/hardrock.webp" },
                                                            
            { name: "Radio Rodja", src: "https://radioislamindonesia.com/rodja.mp3?_=2", img: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/rodja.webp" },
            { name: "Dmi", src: "https://stream.denger.in/", img: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/dmi.webp" }
        ];

        let index = 0;
        let isPausedByUser = false; 
        const player = document.getElementById("audioPlayer");
        const playIcon = document.getElementById("playIcon");
        const pauseIcon = document.getElementById("pauseIcon");

        function updateUI() {
            document.getElementById("radioname").innerText = stations[index].name;
            document.getElementById("poster").style.backgroundImage = `url('${stations[index].img}')`;
            player.src = stations[index].src;
            
            if (!isPausedByUser) {
                player.play().then(() => {
                    playIcon.style.display = "none";
                    pauseIcon.style.display = "block";
                });
            }
        }

        function changeStation(direction) {
            index = (index + direction + stations.length) % stations.length;
            updateUI();
        }

        function togglePlay() {
            if (player.paused) {
                player.play();
                isPausedByUser = false;
                playIcon.style.display = "none";
                pauseIcon.style.display = "block";
            } else {
                player.pause();
                isPausedByUser = true;
                playIcon.style.display = "block";
                pauseIcon.style.display = "none";
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changeStation(-1);
            else if (e.key === "ArrowRight") changeStation(1);
            else if (e.key === "Enter") document.activeElement.click();
        });

        window.onload = () => {
            document.getElementById("btnPlay").focus();
            updateUI();
        };
    </script>
</body>
</html>
