<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta content='width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' name='viewport'/>
<title>MRZYB TV - Koleksi Film Animasi</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background-color: #000; color: #fff; padding-bottom: 50px; }
    .header-banner { text-align: center; padding: 20px 0; }
    .container-film { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 0 40px; }
    .card-film { width: 140px; cursor: pointer; position: relative; content-visibility: auto; }
    .poster-wrapper { width: 140px; height: 210px; background: #141414; border-radius: 6px; overflow: hidden; border: 3px solid transparent; }
    .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .film-title { font-size: 13px; text-align: center; margin-top: 6px; }
    .card-film:focus .poster-wrapper { border-color: #E50914; transform: scale(1.05); }
    .no-results { text-align: center; margin-top: 30px; display: none; }
</style>
</head>
<body>

    <div class="header-banner"><h1>MRZYB TV</h1></div>
    <div class="container-film" id="containerUtama">
        </div>
    <div id="noResultsText" class="no-results">Film tidak ditemukan...</div>

<script>
    // FUNGSI UTAMA PEMUTAR VIDEO
    function handleWatch(e, element) {
        e.preventDefault(); // MENCEGAH BROWSER TERBUKA
        const url = element.getAttribute("href");
        localStorage.setItem("idPosterTerakhir", element.parentElement.getAttribute("id"));
        localStorage.setItem("sedangNontonVideoSTB", "ya");
        
        if (typeof Android !== "undefined" && Android.playVideo) {
            Android.playVideo(url);
        } else {
            window.location.href = url; // Cadangan jika bukan di STB
        }
    }

    // LOAD DATA JSON
    fetch('data/animasi.json')
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById('containerUtama');
        container.innerHTML = data.map(film => `
            <div class="card-film" data-id="${film.id}" id="utama-${film.id}">
                <a class="play-link" href="${film.url}" onclick="handleWatch(event, this)">
                    <div class="poster-wrapper"><img src="${film.img}" loading="lazy"></div>
                </a>
                <div class="film-title">${film.title}</div>
            </div>
        `).join('');
    });
</script>
</body>
</html>
