<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player Internal Fix</title>
    <!-- Memuat Library Shaka Player -->
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            gap: 15px;
        }
        /* Wadah Video Player */
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        video { width: 100%; height: 100%; }
        
        /* Grid Menu Utama - Dipastikan Selalu Muncul */
        .tv-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 10px;
        }
        .channel-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
        }
        .channel-card:active, .channel-card.active {
            background-color: #262626;
            border-color: #00ffcc;
        }
        .channel-logo {
            width: 100%;
            height: 60px;
            object-fit: contain;
            margin-bottom: 8px;
            background: #000;
            border-radius: 6px;
            padding: 4px;
            box-sizing: border-box;
        }
        .channel-name {
            font-weight: 600;
            font-size: 13px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #error-overlay {
            color: #ff4d4d;
            background: #2b1313;
            padding: 10px;
            border-radius: 6px;
            display: none;
            width: 100%;
            font-size: 12px;
            border: 1px solid #ff4d4d;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Notifikasi Error -->
        <div id="error-overlay"></div>

        <!-- Tampilan Player -->
        <div class="player-wrapper">
            <div data-shaka-player-container style="width:100%; height:100%;">
                <video autoplay id="video" data-shaka-player></video>
            </div>
        </div>

        <!-- Daftar Menu Saluran TV -->
        <div class="tv-grid" id="tv-grid-container">Memuat Menu Saluran...</div>
    </div>

    <script>
        // DATA PLAYLIST ASLI ANDA
        const channels = [
            {
                name: "Celestial Movies",
                logo: "https://githubusercontent.com",
                url: "https://cloudfront.net",
                referrer: "https://visionplus.id",
                userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:145.0) Gecko/20100101 Firefox/145.0",
                clearkey: { "de4a383599bb4ec4a24f8c61f2b9a3ba": "5166677d7f6797bcf459cf7c8b66dcb9" }
            },
            {
                name: "Celestial Classic Movies",
                logo: "https://githubusercontent.com",
                url: "https://cloudfront.net",
                referrer: "https://visionplus.id",
                userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:145.0) Gecko/20100101 Firefox/145.0",
                clearkey: { "974d4fb195224f66a2271de806e62018": "0e92ec1a28d59da80161c3541c6eb8eb" }
            },
            {
                name: "Zee Bioskop (FirstMedia)",
                logo: "https://githubusercontent.com",
                url: "https://sysln.id",
                referrer: "https://firstmedia.com",
                userAgent: "ExoPlayerDemo/2.15.1 (Linux; Android 13) ExoPlayerLib/2.15.1",
                clearkey: { "70d0197a8aca42589cf5df6daa576d86": "ebd47832fd7251a09e3cc8eb36790ad5" }
            },
            {
                name: "Zee Bioskop (Vision+)",
                logo: "https://githubusercontent.com",
                url: "https://cloudfront.net",
                referrer: "https://visionplus.id",
                userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:145.0) Gecko/20100101 Firefox/145.0",
                clearkey: { "398ef14ec7014ad8ae75414a7efd2a0f": "99a6225691aa669f0f22677b4536705e" }
            },
            {
                name: "Zee Bioskop (IndiHome)",
                logo: "https://githubusercontent.com",
                url: "https://indihometv.com",
                referrer: "",
                userAgent: "",
                clearkey: null
            },
            {
                name: "TVN",
                logo: "https://githubusercontent.com",
                url: "https://cloudfront.net",
                referrer: "https://visionplus.id",
                userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:145.0) Gecko/20100101 Firefox/145.0",
                clearkey: { "2e8cbd6f664b4ace966d3edfad94c18e": "cff33777777f7e61078ae2ae41ed0636" }
            }
        ];

        let playerInstance = null;
        let activeChannel = null;

        // FUNGSI INI SEKARANG DIPAKSA BERJALAN DULUAN
        function buildHomeUI() {
            const gridContainer = document.getElementById('tv-grid-container');
            gridContainer.innerHTML = ''; // Bersihkan tulisan loading

            channels.forEach((ch, idx) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.id = 'ch-' + idx;
                card.onclick = () => loadChannelStream(ch, card);

                card.innerHTML = `
                    <img class="channel-logo" src="${ch.logo}" onerror="this.src='https://placehold.co'">
                    <div class="channel-name">${ch.name}</div>
                `;
                gridContainer.appendChild(card);
            });
        }

        async function initShakaEngine() {
            const video = document.getElementById('video');
            
            if (!video || !video['ui']) {
                showErrorLog("Peringatan: Pustaka pemutar gagal terhubung sempurna. Pastikan WebView mengizinkan DOM Storage.");
                return;
            }

            const ui = video['ui'];
            playerInstance = ui.getControls().getPlayer();
            playerInstance.addEventListener('error', (e) => showErrorLog("Kendala Player. Kode Error: " + e.detail.code));

            // Modifikasi request filter internet untuk User Agent & Referer
            playerInstance.getNetworkingEngine().registerRequestFilter(function(type, request) {
                if (activeChannel) {
                    if (activeChannel.referrer) {
                        request.headers['Referer'] = activeChannel.referrer;
                    }
                    if (activeChannel.userAgent) {
                        request.headers['User-Agent'] = activeChannel.userAgent;
                    }
                }
            });

            // Otomatis putar saluran pertama
            if (channels.length > 0) {
                const firstCard = document.getElementById('ch-0');
                loadChannelStream(channels[0], firstCard);
            }
        }

        async function loadChannelStream(channel, cardElement) {
            if (!playerInstance) {
                showErrorLog("Pemutar video internal belum siap dimobilisasi.");
                return;
            }

            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            if (cardElement) cardElement.classList.add('active');

            activeChannel = channel;
            document.getElementById('error-overlay').style.display = 'none';

            try {
                playerInstance.configure({ drm: { clearKeys: {} } });

                if (channel.clearkey) {
                    playerInstance.configure({
                        drm: { clearKeys: channel.clearkey }
                    });
                }

                await playerInstance.load(channel.url);
            } catch (error) {
                showErrorLog(`Gagal memutar ${channel.name}. (Code: ${error.code})`);
            }
        }

        function showErrorLog(message) {
            const errorBox = document.getElementById('error-overlay');
            errorBox.innerText = message;
            errorBox.style.display = 'block';
        }
