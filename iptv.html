<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player Ringan & Stabil</title>
    <!-- Memuat Library Ringan DASH Pemutar file .mpd -->
    <script src="https://dashjs.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            gap: 15px;
        }
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        video { width: 100%; height: 100%; }
        
        /* Grid Menu Utama - Dipaksa tampil instan tanpa menunggu library video */
        .tv-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 10px;
        }
        .channel-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
        }
        .channel-card:active, .channel-card.active {
            background-color: #262626;
            border-color: #00ffcc;
        }
        .channel-logo {
            width: 100%;
            height: 60px;
            object-fit: contain;
            margin-bottom: 8px;
            background: #000;
            border-radius: 6px;
            padding: 4px;
            box-sizing: border-box;
        }
        .channel-name {
            font-weight: 600;
            font-size: 13px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #error-overlay {
            color: #ff4d4d;
            background: #2b1313;
            padding: 10px;
            border-radius: 6px;
            display: none;
            width: 100%;
            font-size: 12px;
            border: 1px solid #ff4d4d;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Notifikasi Log Status -->
        <div id="error-overlay"></div>

        <!-- Tampilan Video Player Standar HTML5 -->
        <div class="player-wrapper">
            <video id="videoPlayer" controls autoplay preload="auto"></video>
        </div>

        <!-- Daftar Menu Saluran TV (Wajib Kosong untuk Diisi Otomatis) -->
        <div class="tv-grid" id="tv-grid-container"></div>
    </div>

    <script>
        // DATA PLAYLIST REKANAN ASLI ANDA
        var channels = [
            {
                name: "Celestial Movies",
                logo: "https://githubusercontent.com",
                url: "https://cloudfront.net",
                clearkey: { "de4a383599bb4ec4a24f8c61f2b9a3ba": "5166677d7f6797bcf459cf7c8b66dcb9" }
            },
            {
                name: "Celestial Classic Movies",
                logo: "https://githubusercontent.com",
                url: "https://cloudfront.net",
                clearkey: { "974d4fb195224f66a2271de806e62018": "0e92ec1a28d59da80161c3541c6eb8eb" }
            },
            {
                name: "Zee Bioskop (FirstMedia)",
                logo: "https://githubusercontent.com",
                url: "https://sysln.id",
                clearkey: { "70d0197a8aca42589cf5df6daa576d86": "ebd47832fd7251a09e3cc8eb36790ad5" }
            },
            {
                name: "Zee Bioskop (Vision+)",
                logo: "https://githubusercontent.com",
                url: "https://cloudfront.net",
                clearkey: { "398ef14ec7014ad8ae75414a7efd2a0f": "99a6225691aa669f0f22677b4536705e" }
            },
            {
                name: "Zee Bioskop (IndiHome)",
                logo: "https://githubusercontent.com",
                url: "https://indihometv.com",
                clearkey: null
            },
            {
                name: "TVN",
                logo: "https://githubusercontent.com",
                url: "https://cloudfront.net",
                clearkey: { "2e8cbd6f664b4ace966d3edfad94c18e": "cff33777777f7e61078ae2ae41ed0636" }
            }
        ];

        var dashPlayer = null;

        // FUNGSI INI DIJAMIN BERJALAN INSTAN TANPA BLOKIRAN
        function buildHomeUI() {
            var gridContainer = document.getElementById('tv-grid-container');
            if (!gridContainer) return;
            
            gridContainer.innerHTML = ''; // Reset kontainer

            channels.forEach(function(ch, idx) {
                var card = document.createElement('div');
                card.className = 'channel-card';
                card.id = 'ch-' + idx;
                card.onclick = function() { loadChannelStream(ch, card); };

                card.innerHTML = `
                    <img class="channel-logo" src="${ch.logo}" onerror="this.src='https://placehold.co'">
                    <div class="channel-name">${ch.name}</div>
                `;
                gridContainer.appendChild(card);
            });
            
            // Inisialisasi awal dash player bawaan
            var videoElement = document.querySelector("#videoPlayer");
            dashPlayer = dashjs.MediaPlayer().create();
            
            // Putar otomatis saluran indeks ke-0 saat awal terbuka
            if (channels.length > 0) {
                var firstCard = document.getElementById('ch-0');
                loadChannelStream(channels[0], firstCard);
            }
        }

        function loadChannelStream(channel, cardElement) {
            var videoElement = document.querySelector("#videoPlayer");
            if (!dashPlayer || !videoElement) return;

            // Atur tanda warna aktif pada menu grid
            document.querySelectorAll('.channel-card').forEach(function(c) { 
                c.classList.remove('active'); 
            });
            if (cardElement) cardElement.classList.add('active');

            try {
                // Konfigurasi proteksi ClearKey DRM bawaan playlist Anda secara langsung
                if (channel.clearkey) {
                    dashPlayer.setProtectionData({
                        "org.w3.clearkey": {
                            "clearkeys": channel.clearkey
                        }
                    });
                } else {
                    dashPlayer.resetProtectionData();
                }

                // Masukkan tautan .mpd ke engine player dan eksekusi
                dashPlayer.initialize(videoElement, channel.url, true);
                
            } catch (error) {
                console.error("Gagal memutar saluran ini: ", error);
            }
        }

        // Paksa rendering menu kotak-kotak segera setelah script selesai dibaca browser
        buildHomeUI();
    </script>
</body>
</html>
