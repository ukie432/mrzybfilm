<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightmare Side - Radio Mencekam</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>
/* ===== TEMA HOROR ===== */
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: radial-gradient(circle, #2a0000 0%, #000000 90%);
    width: 100vw; height: 100vh;
    overflow: hidden; display: flex; justify-content: center; align-items: center;
}

@keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 24%, 55% { opacity: 0.85; }
}

.music-player-container {
    width: 800px; height: 450px;
    background: rgba(10, 0, 0, 0.85);
    border: 2px solid #550000;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(150, 0, 0, 0.5);
    padding: 30px;
    display: flex; gap: 40px;
    animation: flicker 6s infinite;
}

.left { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.right { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }

.playlist-par { 
    font-family: 'Creepster', cursive;
    font-size: 2.5em; color: #ff0000; text-shadow: 0 0 10px #ff0000;
}
#title { color: #880000; margin-top: 10px; }
#artist { color: #444; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

/* ===== VISUALIZER LOGIC ===== */
.wave-container { display: flex; align-items: flex-end; gap: 4px; height: 30px; margin-top: 20px; }
.sound-wave { width: 4px; background: #8b0000; height: 4px; transition: height 0.2s; }

.wave-container.playing .sound-wave { animation: load .9s infinite; }

@keyframes load { 
    0%{height:4px} 50%{height:25px} 100%{height:4px} 
}

/* Kontrol Horor */
.controls button {
    width: 50px; height: 50px;
    border: 1px solid #400; background: #1a0000;
    color: #ff3333; cursor: pointer; border-radius: 50%;
}
.controls button:hover { background: #400; }

.seeks { flex: 1; height: 4px; background: #220000; cursor: pointer; }
.fill { height: 4px; background: #ff0000; width: 0%; box-shadow: 0 0 8px #ff0000; }
</style>
</head>

<body>

<div class="music-player-container">
    <div class="left">
        <p class="playlist-par">Nightmare</p>
        <h2 id="title">Pilih Cerita...</h2>
        <p id="artist">Menunggu...</p>
        
        <div class="wave-container" id="wave">
            <div class="sound-wave" style="animation-delay:.1s"></div>
            <div class="sound-wave" style="animation-delay:.2s"></div>
            <div class="sound-wave" style="animation-delay:.3s"></div>
            <div class="sound-wave" style="animation-delay:.4s"></div>
            <div class="sound-wave" style="animation-delay:.5s"></div>
        </div>
    </div>

    <div class="right">
        <div class="progress-bar-container" style="display:flex; align-items:center; gap:10px;">
            <span class="current_time" style="color:#555">00:00</span>
            <div class="seeks" id="seeks"><div class="fill"></div></div>
            <span class="duration_time" style="color:#555">00:00</span>
        </div>
        <div class="controls">
            <button id="previous"><i class="fas fa-backward"></i></button>
            <button id="play"><i class="fas fa-play"></i></button>
            <button id="forword"><i class="fas fa-forward"></i></button>
        </div>
    </div>
</div>

<audio></audio>

<script>
const songs = [
    {title:"Nightmare Side Story",artist:"Perpustakaan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595569-48000-2-5d7ee2dba6488.mp3"},
{title:"Nightmare Side Story",artist:"Jahil Membawa Petaka",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595576-48000-2-8cb455c7669c6.mp3"},
{title:"Nightmare Side Story",artist:"Pengalaman Driver Ojol",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595547-48000-2-8d25f5709d238.mp3"},
{title:"Nightmare Side Story",artist:"Hantu Penunggu Jembatan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595579-48000-2-676cb884cbd94.mp3"},
{title:"Nightmare Side Story",artist:"Boneka Suster",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595657-48000-2-2565e44ea74a7.mp3"},
{title:"Nightmare Side Story",artist:"Penari Misterius",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595703-48000-2-b3db7dea57a5.mp3"},
{title:"Nightmare Side Story",artist:"Ayahku Di Santet",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595711-48000-2-7dc2a87532cbc.mp3"},
{title:"Nightmare Side Story",artist:"Hantu Jaman Penjajahan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595733-48000-2-534166e529dc2.mp3"}
];


let index = 0, isPlay = false;
const music = document.querySelector("audio"),
      titleEl = document.getElementById("title"),
      artistEl = document.getElementById("artist"),
      playBtn = document.getElementById("play"),
      wave = document.getElementById("wave"),
      seeks = document.getElementById("seeks");

function loadSong(i){
    titleEl.textContent = songs[i].title;
    artistEl.textContent = songs[i].artist;
    music.src = songs[i].song;
}

playBtn.onclick = () => {
    if(!isPlay){
        music.play();
        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        wave.classList.add("playing");
    } else {
        music.pause();
        playBtn.innerHTML = '<i class="fas fa-play"></i>';
        wave.classList.remove("playing");
    }
    isPlay = !isPlay;
};

// Fitur Navigasi Maju/Mundur dengan Klik
seeks.onclick = (e) => {
    const width = seeks.clientWidth;
    const clickX = e.offsetX;
    music.currentTime = (clickX / width) * music.duration;
};

document.getElementById("previous").onclick = () => { index = (index-1+songs.length)%songs.length; loadSong(index); music.play(); wave.classList.add("playing"); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; isPlay=true; };
document.getElementById("forword").onclick = () => { index = (index+1)%songs.length; loadSong(index); music.play(); wave.classList.add("playing"); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; isPlay=true; };

music.addEventListener("timeupdate", () => {
    document.querySelector(".fill").style.width = (music.currentTime / music.duration) * 100 + "%";
});

loadSong(index);
</script>

</body>
</html>
