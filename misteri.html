<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightmare Side - TV Remote Ready</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>
/* Reset & Base */
*{margin:0;padding:0;box-sizing:border-box;}
body {
    background: #050505;
    background-image: radial-gradient(circle at center, #2a0000 0%, #000000 90%);
    width: 100vw; height: 100vh;
    overflow: hidden; position: relative;
    display: flex; justify-content: center; align-items: center;
}
body::after {
    content:""; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 20%, rgba(255, 255, 200, 0.05) 0%, transparent 60%);
    animation: flicker 4s infinite; pointer-events: none;
}
@keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.main-container-music { width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; }
.music-player-container {
    width: 260px; height: 500px;
    background: rgba(10, 0, 0, 0.9);
    border: 1px solid #550000;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
    padding: 15px;
    display: flex; flex-direction: column; justify-content: space-between;
}

.playlist-par { font-family: 'Creepster', cursive; font-size: 1.8em; color: #ff0000; text-shadow: 0 0 10px #ff0000; }
#title { color: #cc0000; margin-top: 10px; font-size: 1.1em; }
#artist { color: #666; font-size: 12px; text-transform: uppercase; }

.circle-container { width:100px; height:100px; margin:20px auto; border-radius:50%; border: 2px solid #500; display:flex; justify-content:center; align-items:center; }
.circle-volume { width:93px; height:93px; background:#000; border-radius:50%; display:flex; justify-content:center; align-items:center; }

.sound-wave-container{ display:flex; align-items:flex-end; gap:4px; height:30px; pointer-events:none; }
.sound-wave { width:3px; animation:load .9s infinite; background: #8b0000; }
.when-music-paused .sound-wave { animation-play-state:paused; }
@keyframes load { 0%{height:4px} 50%{height:25px} 100%{height:4px} }

.volume-up { position:absolute; right:20px; top:50%; cursor:pointer; color: #ff0000; }
.progress-bar-container { display:flex; align-items:center; gap:6px; margin-top:10px; color: #fff; font-size: 12px; }
.seeks { flex:1; height:4px; background:#300; border-radius:10px; cursor:pointer; }
.fill { height:4px; width:0%; background:#ff0000; box-shadow: 0 0 5px #ff0000; }
.controls button { width:44px; height:44px; border:1px solid #500; border-radius:50%; background:rgba(50,0,0,0.5); cursor:pointer; color:#ff0000; }
.controls button:focus { outline: 2px solid #ff0000; }

@media (orientation:landscape){
    .music-player-container { width:85vw; max-width:700px; height:70vh; flex-direction:row; }
}
</style>
</head>

<body>
<div class="main-container-music">
    <div class="music-player-container">
        <div class="left">
            <p class="playlist-par">Nightmare</p>
            <h2 id="title"></h2>
            <p id="artist"></p>
            <div class="circle-container">
                <div class="circle-volume">
                    <div class="sound-wave-container when-music-paused">
                        <div class="sound-wave" style="animation-delay:.1s"></div>
                        <div class="sound-wave" style="animation-delay:.2s"></div>
                        <div class="sound-wave" style="animation-delay:.3s"></div>
                        <div class="sound-wave" style="animation-delay:.4s"></div>
                        <div class="sound-wave" style="animation-delay:.5s"></div>
                        <div class="sound-wave" style="animation-delay:.6s"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right">
            <a class="volume-up"><i class="fa fa-volume-up"></i></a>
            <div class="progress-bar-container">
                <span class="current_time">00:00</span>
                <div class="seeks"><div class="fill"></div></div>
                <span class="duration_time">00:00</span>
            </div>
            <div class="controls">
                <button id="previous"><i class="fas fa-backward"></i></button>
                <button id="play"><i class="fas fa-play"></i></button>
                <button id="forword"><i class="fas fa-forward"></i></button>
            </div>
        </div>
        <audio></audio>
    </div>
</div>

<script>
const songs=[
{title:"Nightmare Side Story",artist:"Perpustakaan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595569-48000-2-5d7ee2dba6488.mp3"},
{title:"Nightmare Side Story",artist:"Jahil Membawa Petaka",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595576-48000-2-8cb455c7669c6.mp3"},
{title:"Nightmare Side Story",artist:"Pengalaman Driver Ojol",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595547-48000-2-8d25f5709d238.mp3"},
{title:"Nightmare Side Story",artist:"Hantu Penunggu Jembatan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595579-48000-2-676cb884cbd94.mp3"},
{title:"Nightmare Side Story",artist:"Boneka Suster",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595657-48000-2-2565e44ea74a7.mp3"},
{title:"Nightmare Side Story",artist:"Penari Misterius",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595703-48000-2-b3db7dea57a5.mp3"},
{title:"Nightmare Side Story",artist:"Ayahku Di Santet",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595711-48000-2-7dc2a87532cbc.mp3"},
{title:"Nightmare Side Story",artist:"Hantu Jaman Penjajahan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595733-48000-2-534166e529dc2.mp3"}
];

let index=0,isPlay=false;
const music=document.querySelector("audio");
const titleEl=document.getElementById("title");
const artistEl=document.getElementById("artist");
const playBtn=document.getElementById("play");
const playIcon=playBtn.querySelector("i");
const prev=document.getElementById("previous");
const next=document.getElementById("forword");
const fill=document.querySelector(".fill");
const wave=document.querySelector(".sound-wave-container");

// Fungsi Remote TV
window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") music.currentTime = Math.min(music.currentTime + 10, music.duration);
    if (e.key === "ArrowLeft") music.currentTime = Math.max(music.currentTime - 10, 0);
});

function loadSong(i){
 titleEl.textContent=songs[i].title;
 artistEl.textContent=songs[i].artist;
 music.src=songs[i].song;
}
loadSong(index);

playBtn.onclick=()=>{
 if(!isPlay){ music.play(); playIcon.className="fas fa-pause"; wave.classList.remove("when-music-paused"); }
 else{ music.pause(); playIcon.className="fas fa-play"; wave.classList.add("when-music-paused"); }
 isPlay=!isPlay;
};

prev.onclick=()=>{index=(index-1+songs.length)%songs.length;loadSong(index);music.play();playIcon.className="fas fa-pause";};
next.onclick=()=>{index=(index+1)%songs.length;loadSong(index);music.play();playIcon.className="fas fa-pause";};

music.addEventListener("timeupdate",()=>{
 fill.style.width=(music.currentTime/music.duration)*100+"%";
 let m=Math.floor(music.currentTime/60),s=Math.floor(music.currentTime%60);
 document.querySelector(".current_time").textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
 if(!isNaN(music.duration)){
  let dm=Math.floor(music.duration/60),ds=Math.floor(music.duration%60);
  document.querySelector(".duration_time").textContent=(dm<10?"0":"")+dm+":"+(ds<10?"0":"")+ds;
 }
});

document.querySelector(".seeks").onclick=(e)=>{
 const r=e.currentTarget.getBoundingClientRect();
 music.currentTime=((e.clientX-r.left)/r.width)*music.duration;
};
</script>
</body>
</html>
