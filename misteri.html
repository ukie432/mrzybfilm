<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player FINAL FIX LANDSCAPE TOUCH</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;animation:ani 30s linear infinite}
@keyframes ani{100%{filter:hue-rotate(360deg)}}

body{
 background:#222;
 width:100vw;
 height:100vh;
 overflow:hidden;
 position:relative;
}

body::before{
 content:"";
 position:absolute;
 inset:0;
 background:linear-gradient(315deg,#ff0,#f0f);
 clip-path:circle(35% at right 10%);
 z-index:-1;
}
body::after{
 content:"";
 position:absolute;
 inset:0;
 background:linear-gradient(315deg,#ff0,#f0f);
 clip-path:circle(35% at left 20%);
 z-index:-1;
}

.main-container-music{
 width:100vw;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
}

.music-player-container{
 width:260px;
 height:500px;
 background:linear-gradient(315deg,rgba(0,255,255,.5),rgba(255,0,255,.5));
 border-radius:15px;
 box-shadow:10px 10px 10px rgba(0,0,0,.4),-10px -10px 10px rgba(255,255,255,.3);
 padding:15px;
 position:relative;
 display:flex;
 flex-direction:column;
 justify-content:space-between;
 pointer-events:auto;
}

/* ===== TEXT ===== */
.playlist-par{
 font-size:1.5em;
 background:linear-gradient(120deg,red,blue,cyan,lime);
 -webkit-background-clip:text;
 color:transparent;
}
#title{color:yellow;margin-top:10px}
#artist{color:lime;font-size:14px}

/* ===== CIRCLE ===== */
.circle-container{
 width:100px;height:100px;
 margin:20px auto;
 border-radius:50%;
 background:linear-gradient(to left,cyan,#cfa,magenta);
 display:flex;
 justify-content:center;
 align-items:center;
}
.circle-volume{
 width:93px;height:93px;
 background:#111;
 border-radius:50%;
 display:flex;
 justify-content:center;
 align-items:center;
}

/* ===== VISUALIZER ===== */
.sound-wave-container{
 display:flex;
 align-items:flex-end;
 gap:4px;
 height:30px;
 pointer-events:none; /* PENTING */
}
.sound-wave{width:3px;animation:load .9s infinite}
.sound-wave-1{background:deepskyblue;animation-delay:.1s}
.sound-wave-2{background:dodgerblue;animation-delay:.2s}
.sound-wave-3{background:violet;animation-delay:.3s}
.sound-wave-4{background:pink;animation-delay:.4s}
.sound-wave-5{background:orange;animation-delay:.5s}
.sound-wave-6{background:rgb(78,193,238);animation-delay:.6s}
.when-music-paused .sound-wave{animation-play-state:paused}

@keyframes load{
 0%{height:4px}
 50%{height:22px}
 100%{height:4px}
}

/* ===== VOLUME ===== */
.volume-up{
 position:absolute;
 right:20px;
 top:50%;
 cursor:pointer;
 z-index:50;
 pointer-events:auto;
}
.volume-up i{color:#fff;font-size:18px}

/* ===== PROGRESS ===== */
.progress-bar-container{
 display:flex;
 align-items:center;
 gap:6px;
 margin-top:10px;
 pointer-events:auto;
}
.seeks{
 flex:1;
 height:4px;
 background:#000;
 border-radius:10px;
 cursor:pointer;
}
.fill{height:4px;width:0%;background:cyan}

/* ===== CONTROLS ===== */
.controls{
 display:flex;
 justify-content:center;
 align-items:center;
 gap:20px;
 margin:15px 0;
 z-index:50;
 pointer-events:auto;
}
.controls button{
 width:44px;
 height:44px;
 border:none;
 border-radius:50%;
 background:rgba(255,255,255,.5);
 cursor:pointer;
 font-size:18px;
}

/* ===== LANDSCAPE TOUCH FIX ===== */
@media (orientation:landscape){
 .music-player-container{
  width:85vw;
  max-width:900px;
  height:70vh;
  flex-direction:row;
 }
 .left,.right{
  width:50%;
  pointer-events:none; /* BLOK OVERLAY */
 }
 .right{
  pointer-events:auto; /* AKTIFKAN KONTROL */
 }
}
</style>
</head>

<body>
<div class="main-container-music">
<div class="music-player-container">

<div class="left">
<p class="playlist-par">MRZYBtv</p>
<h2 id="title"></h2>
<p id="artist"></p>

<div class="circle-container">
<div class="circle-volume">
<div class="sound-wave-container when-music-paused">
 <div class="sound-wave sound-wave-1"></div>
 <div class="sound-wave sound-wave-2"></div>
 <div class="sound-wave sound-wave-3"></div>
 <div class="sound-wave sound-wave-4"></div>
 <div class="sound-wave sound-wave-5"></div>
 <div class="sound-wave sound-wave-6"></div>
</div>
</div>
</div>
</div>

<div class="right">
<a class="volume-up"><i class="fa fa-volume-up"></i></a>

<div class="progress-bar-container">
 <span class="current_time">00:00</span>
 <div class="seeks"><div class="fill"></div></div>
 <span class="duration_time">00:00</span>
</div>

<div class="controls">
 <button id="previous"><i class="fas fa-backward"></i></button>
 <button id="play"><i class="fas fa-play"></i></button>
 <button id="forword"><i class="fas fa-forward"></i></button>
</div>
</div>

<audio></audio>

</div>
</div>

<script>
const songs=[
{title:"Nightmare Side Story",artist:"Perpustakaan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595569-48000-2-5d7ee2dba6488.mp3"},
{title:"Nightmare Side Story",artist:"Jahil Membawa Petaka",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595576-48000-2-8cb455c7669c6.mp3"},
{title:"Nightmare Side Story",artist:"Pengalaman Driver Ojol",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595547-48000-2-8d25f5709d238.mp3"},
{title:"Nightmare Side Story",artist:"Hantu Penunggu Jembatan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595579-48000-2-676cb884cbd94.mp3"},
{title:"Nightmare Side Story",artist:"Boneka Suster",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595657-48000-2-2565e44ea74a7.mp3"},
{title:"Nightmare Side Story",artist:"Penari Misterius",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595703-48000-2-b3db7dea57a5.mp3"},
{title:"Nightmare Side Story",artist:"Ayahku Di Santet",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595711-48000-2-7dc2a87532cbc.mp3"},
{title:"Nightmare Side Story",artist:"Hantu Jaman Penjajahan",song:"https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595733-48000-2-534166e529dc2.mp3"}
];

let index=0,isPlay=false;
const music=document.querySelector("audio");
const titleEl=document.getElementById("title");
const artistEl=document.getElementById("artist");
const playBtn=document.getElementById("play");
const playIcon=playBtn.querySelector("i");
const prev=document.getElementById("previous");
const next=document.getElementById("forword");
const fill=document.querySelector(".fill");
const wave=document.querySelector(".sound-wave-container");
const cr=document.querySelector(".current_time");
const dr=document.querySelector(".duration_time");
const volumeBtn=document.querySelector(".volume-up");
const volumeIcon=volumeBtn.querySelector("i");

function loadSong(i){
 titleEl.textContent=songs[i].title;
 artistEl.textContent=songs[i].artist;
 music.src=songs[i].song;
}
loadSong(index);

playBtn.onclick=()=>{
 if(!isPlay){
  music.play();
  playIcon.className="fas fa-pause";
  wave.classList.remove("when-music-paused");
 }else{
  music.pause();
  playIcon.className="fas fa-play";
  wave.classList.add("when-music-paused");
 }
 isPlay=!isPlay;
};

prev.onclick=()=>{index=(index-1+songs.length)%songs.length;loadSong(index);music.play();playIcon.className="fas fa-pause";};
next.onclick=()=>{index=(index+1)%songs.length;loadSong(index);music.play();playIcon.className="fas fa-pause";};

volumeBtn.onclick=()=>{
 if(music.volume===1){
  music.volume=0;
  volumeIcon.className="fa fa-volume-off";
 }else{
  music.volume=1;
  volumeIcon.className="fa fa-volume-up";
 }
};

music.addEventListener("timeupdate",()=>{
 fill.style.width=(music.currentTime/music.duration)*100+"%";
 let m=Math.floor(music.currentTime/60),s=Math.floor(music.currentTime%60);
 cr.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
 if(!isNaN(music.duration)){
  let dm=Math.floor(music.duration/60),ds=Math.floor(music.duration%60);
  dr.textContent=(dm<10?"0":"")+dm+":"+(ds<10?"0":"")+ds;
 }
});

music.addEventListener("ended",()=>next.click());

document.querySelector(".seeks").onclick=(e)=>{
 const r=e.currentTarget.getBoundingClientRect();
 music.currentTime=((e.clientX-r.left)/r.width)*music.duration;
};
</script>

</body>
</html>
