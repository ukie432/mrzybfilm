<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <link rel="preconnect" href="https://posterfilm.pages.dev">
<link rel="preconnect" href="https://iptv-posterku.pages.dev">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRZYB - Nightmare Side</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body { 
    background: radial-gradient(circle, #2a0000 0%, #000000 90%); 
    width:100vw; height:100vh; display:flex; justify-content:center; align-items:center;
    overflow:hidden; animation: flicker 4s infinite; color: white;
}
@keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

.music-player-container {
    width: 800px; height: 400px; 
    background: rgba(10, 0, 0, 0.9);
    border: 2px solid #550000; border-radius:20px;
    padding: 30px; display: flex; gap: 40px;
}

.left-side { width: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.brand-name { font-family: 'Creepster', cursive; font-size: 2.5em; color: #ff0000; }
.sub-brand { font-family: 'Creepster', cursive; font-size: 1.2em; color: #880000; margin-bottom: 20px; letter-spacing: 2px; }
.circle-container { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #500; overflow: hidden; }
#cover { width: 100%; height: 100%; object-fit: cover; }

.right-side { flex: 1; display: flex; flex-direction: column; justify-content: center; }
#title { color: #cc0000; font-size: 1.5em; margin-bottom: 20px; height: 40px; }

.progress-bar-container { display:flex; align-items:center; gap:15px; font-size: 14px; margin-bottom: 30px; }
.seeks { flex:1; height:8px; background:#220000; border-radius:10px; cursor:pointer; }
.fill { height:8px; width:0%; background:#ff0000; }

.controls-area { display: flex; align-items: center; justify-content: space-between; }
.controls { display:flex; gap:20px; }
.controls button { width:60px; height:60px; border:1px solid #400; border-radius:50%; background:#1a0000; color:#ff3333; cursor:pointer; font-size: 20px; }
.volume-up { color: #ff0000; font-size: 20px; cursor:pointer; padding: 10px; }
.volume-up:focus { outline: 2px solid #ff0000; border-radius: 5px; }
</style>
</head>

<body>

<div class="music-player-container">
    <div class="left-side">
        <div class="brand-name">MRZYB</div>
        <div class="sub-brand">Nightmare Story</div>
        <div class="circle-container"><img id="cover" src="" alt="Cover"></div>
    </div>
    
    <div class="right-side">
        <h2 id="title">Loading...</h2>
        
        <div class="progress-bar-container">
            <span class="current_time">00:00</span>
            <div class="seeks"><div class="fill"></div></div>
            <span class="duration_time">00:00</span>
        </div>
        
        <div class="controls-area">
            <div class="controls">
                <button id="previous"><i class="fas fa-backward"></i></button>
                <button id="play"><i class="fas fa-play"></i></button>
                <button id="forword"><i class="fas fa-forward"></i></button>
            </div>
            <a class="volume-up" tabindex="0"><i class="fa fa-volume-up"></i></a>
        </div>
    </div>
</div>
<audio></audio>

<script>
const songs = [
    {title: "Perpustakaan", song: "https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595569-48000-2-5d7ee2dba6488.mp3", cover: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/perpustakaan.webp"},
    {title: "Jahil Membawa Petaka", song: "https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595576-48000-2-8cb455c7669c6.mp3", cover: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/petaka (1).webp"},
    {title: "Pengalaman Driver Ojol", song: "https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595547-48000-2-8d25f5709d238.mp3", cover: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/gojek.webp"},
    {title: "Hantu Penunggu Jembatan", song: "https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595579-48000-2-676cb884cbd94.mp3", cover: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/jembatan (1).webp"},
    {title: "Boneka Suster", song: "https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595657-48000-2-2565e44ea74a7.mp3", cover: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/boneka (1).webp"},
    {title: "Penari Misterius", song: "https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595703-48000-2-b3db7dea57a5.mp3", cover: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/penari (1).webp"},
    {title: "Ayahku Di Santet", song: "https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595711-48000-2-7dc2a87532cbc.mp3", cover: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/santet (1).webp"},
    {title: "Hantu Jaman Penjajahan", song: "https://d3ctxlq1ktw2nl.cloudfront.net/production/2020-1-26/52595733-48000-2-534166e529dc2.mp3", cover: "https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/penjajahan.webp"}
];

let index = 0, isPlay = false;
const music = document.querySelector("audio"), 
      titleEl = document.getElementById("title"),
      coverEl = document.getElementById("cover"), 
      playBtn = document.getElementById("play"),
      fill = document.querySelector(".fill"),
      volumeBtn = document.querySelector(".volume-up"),
      volumeIcon = volumeBtn.querySelector("i");

window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") music.currentTime = Math.min(music.currentTime + 10, music.duration);
    if (e.key === "ArrowLeft") music.currentTime = Math.max(music.currentTime - 10, 0);
    if (e.key === "Enter") {
        if(document.activeElement === volumeBtn) volumeBtn.click();
        else playBtn.click();
    }
});

function loadSong(i){
    titleEl.textContent = songs[i].title;
    music.src = songs[i].song;
    coverEl.src = songs[i].cover;
}
loadSong(0);

playBtn.onclick = () => {
    if(!isPlay) { music.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; }
    else { music.pause(); playBtn.innerHTML='<i class="fas fa-play"></i>'; }
    isPlay = !isPlay;
};

document.getElementById("previous").onclick = () => { index=(index-1+songs.length)%songs.length; loadSong(index); music.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; isPlay=true; };
document.getElementById("forword").onclick = () => { index=(index+1)%songs.length; loadSong(index); music.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; isPlay=true; };

volumeBtn.onclick = () => {
    if(music.volume > 0) { music.volume = 0; volumeIcon.className = "fa fa-volume-mute"; }
    else { music.volume = 1; volumeIcon.className = "fa fa-volume-up"; }
};

music.addEventListener("timeupdate",()=>{
    fill.style.width=(music.currentTime/music.duration)*100+"%";
    let m=Math.floor(music.currentTime/60), s=Math.floor(music.currentTime%60);
    document.querySelector(".current_time").textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
    if(!isNaN(music.duration)){
        let dm=Math.floor(music.duration/60), ds=Math.floor(music.duration%60);
        document.querySelector(".duration_time").textContent=(dm<10?"0":"")+dm+":"+(ds<10?"0":"")+ds;
    }
});

document.querySelector(".seeks").onclick=(e)=>{
    const r=e.currentTarget.getBoundingClientRect();
    music.currentTime=((e.clientX-r.left)/r.width)*music.duration;
};
</script>
</body>
</html>
