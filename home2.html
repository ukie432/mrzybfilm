        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5); /* Fondo oscuro con transparencia para mejorar la visibilidad */

        .header {

        }

        .time, .date {

            margin-left: 10px; /* Espacio entre reloj y fecha */
        }

        .main {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .main-item {
            background-color: rgba(28, 28, 28, 0.8);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .main-item video, .main-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .main-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .main-item:hover img, .main-item:hover video {
            opacity: 0.8;
        }

        .item1 {
            grid-column: span 2;
            grid-row: span 2;
        }

        .item2 {
            grid-column: span 2;
            grid-row: span 2;
        }

        .footer {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background-color: rgba(28, 28, 28, 0.8);
        }

        .footer-button {
            border: none;
            padding: 15px 30px;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
            font-size: 14px;
        }

        .footer-button1 {

        }

        .footer-button2 {

        }

        .footer-button3 {

        }

        .footer-button4 {

        }

        .footer-button:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        /* Estilo del anuncio */
        .announcement {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            z-index: 1000;
            flex-direction: column;
            padding: 20px;
        }

        .announcement input {
            padding: 10px;
            margin-top: 20px;
            font-size: 16px;
        }

        .announcement button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #008000;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        .announcement button:hover {

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var video = document.getElementById('videoPlayer');
            var videoSrc = 'https://i.pinimg.com/originals/bd/c0/bd/bdc0bd0d5d9c733cec0ff590de044de5.gif'; // URL del video .m3u8 o .mp4

            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            } else {
                video.src = 'your-video-url.mp4'; // URL alternativa del video .mp4
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }

            // Función para actualizar la hora y la fecha
            function updateTimeAndDate() {
                var now = new Date();
                var timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
                var dateOptions = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' };

                var formattedTime = now.toLocaleTimeString('es-ES', timeOptions);
                var formattedDate = now.toLocaleDateString('es-ES', dateOptions);

                document.getElementById('currentTime').textContent = formattedTime;
                document.getElementById('currentDate').textContent = formattedDate;
            }

            // Actualizar la hora y la fecha cada segundo
            setInterval(updateTimeAndDate, 1000);
            updateTimeAndDate(); // Llamar una vez para inicializar

            var key = 'Bloostv'; 
            var xorKey = 123; // Clave para el cifrado

            // Cifrar la clave usando XOR
            var encryptedKey = xorEncryptDecrypt(key, xorKey);
            console.log("7848bf0574d72c009b34ed:", encryptedKey); // Para verificar el valor cifrado

            // Función para cifrar y descifrar una cadena usando XOR
            function xorEncryptDecrypt(input, key) {
                var output = '';
                for (var i = 0; i < input.length; i++) {
                    output += String.fromCharCode(input.charCodeAt(i) ^ key);
                }
                return output;
            }

            // Función para desencriptar la clave
            function decryptKey(encryptedKey) {
                return xorEncryptDecrypt(encryptedKey, xorKey);
            }

            // Función para comprobar la clave
            function checkKey() {
                var keyInput = document.getElementById('keyInput').value;
                var correctKey = decryptKey(encryptedKey);
                if (keyInput === correctKey) {
                    document.getElementById('creditsAnnouncement').style.display = 'none';
                } else {
                    alert('Clave incorrecta. Debe comprar la clave para tener acceso completo al contenido.');
                }
            }

            window.checkKey = checkKey; // Hacer que la función sea accesible globalmente
        });
    </script>
