<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">

    <link rel="preconnect" href="https://posterfilm.pages.dev">
<link rel="preconnect" href="https://raw.githubusercontent.com/balqisnur/posterfilm/main/poster/film_animasi/AIRetouch_20260723_130141234.jpg
">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYBtv hiburan & religi</title>
    <style>
        body{
    margin:0;
    font-family:Arial,sans-serif;
    color:#fff;
    background:#000;
}


       .container{
    display: flex;
    flex-direction: column;
    height: 100vh;
    
}
       .header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#1c1c1c;
}
        .logo { display: flex; align-items: center; }
        .logo img { height: 40px; width: auto; display: block; } /* Tinggi logo diatur di sini */
        
        .time-container{
    display:flex;
    align-items:center;
}

.time{
    color:#fff;
    font-size:14px;
    font-weight:bold;
    min-width:80px;
    text-align:right;
}

        .main { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; }

        .main-item { background-color: rgba(28, 28, 28, 0.8); border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid transparent; }
        .main-item video, .main-item img { width: 100%; height: 100%; object-fit: cover;  }

        /* Efek saat fokus */
        .main-item:focus,
.footer-button:focus{
    border:3px solid red;
    outline:none;
}

        .item1 { grid-column: span 2; grid-row: span 2; }
        .item2 { grid-column: span 2; grid-row: span 2; }

        .footer { display: flex; justify-content: space-around; padding: 10px; background:#1c1c1c; }
        .footer-button { border: none; padding: 15px 30px; color: #fff; cursor: pointer; border-radius: 5px; font-size: 14px; }
        .footer-button1 { background-color: #8B0000; }
        .footer-button2 { background-color: #008000; }
        .footer-button3 { background-color: #0000FF; }
        .footer-button4 { background-color: #800080; }
    </style>
</head>
<body>




    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="https://iptv-posterku.pages.dev/poster/film_indonesia/Logo%20_mrzybtv_%20dengan%20ikon%20Wi-Fi.png" fetchpriority="high"
loading="eager"alt="MRZYBtv">
            </div>
            <div class="time-container"><div id="currentTime" class="time"></div></div>
        </header>

        <main class="main">
<div class="main-item item1" id="p1" tabindex="0" onclick="go('p1', 'tvonline.html')">
    <img src="https://raw.githubusercontent.com/balqisnur/posterfilm/main/poster/film_animasi/AIRetouch_20260723_130141234.jpg
"
    width="640"
    height="360"
    loading="lazy"
    decoding="async"
    alt="Yaiba">
</div>
            <div class="main-item item2" id="p2" tabindex="0" onclick="go('p2', 'youtube.html')">
                <img src="https://posterfilm.pages.dev/poster/film_lawas/Blackyoutube.webp" width="640"
height="360"
loading="lazy"
decoding="async"alt="Youtube">
            </div>
            <div class="main-item" id="p3" tabindex="0" onclick="go('p3', 'murottal.html')">
                <img src="https://iptv-posterku.pages.dev/poster/film_lawas/Juzama.webp"width="640"
height="360"
loading="lazy"
decoding="async" alt="Murottal">
            </div>
            <div class="main-item" id="p4" tabindex="0" onclick="go('p4', 'ceramah.html')">
                <img src="https://iptv-posterku.pages.dev/poster/film_lawas/Zainuddin (1).webp" alt="Ceramah">
            </div>
            <div class="main-item" id="p5" tabindex="0" onclick="go('p5', 'musik.html')">
                <img src="https://iptv-posterku.pages.dev/poster/film_lawas/Musik.webp"width="640"
height="360"
loading="lazy"
decoding="async" alt="Musik">
            </div>
            <div class="main-item" id="p6" tabindex="0" onclick="go('p6', 'lenong.html')">
                <img src="https://iptv-posterku.pages.dev/poster/film_lawas/Lenong.webp"width="640"
height="360"
loading="lazy"
decoding="async" alt="Lenong">
            </div>
        </main>

        <footer class="footer">
            
            <button class="footer-button footer-button1" id="b1" tabindex="0" onclick="go('b1', 'radio.html')">RADIO ONLINE</button>
            <button class="footer-button footer-button2" id="b2" tabindex="0" onclick="go('b2', 'misteri.html')">HORROR STORY</button>
            <button class="footer-button footer-button3" id="b3" tabindex="0" onclick="go('b3', 'komik.html')">KOMIK</button>
            <button class="footer-button footer-button4" id="b4" tabindex="0" onclick="go('b4', 'Tester.html')">SUPPORT</button>
        </footer>
    </div>
    
    <script>
        function go(id, url) {
            localStorage.setItem('lastFocus', id);
            window.location.href = url;
        }

        window.addEventListener('load', () => {
            const lastFocus = localStorage.getItem('lastFocus');
            if (lastFocus) {
                const el = document.getElementById(lastFocus);
                if (el) { el.focus(); el.focus(); }
            }
        });

        function updateTime() {
            var now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('es-ES', { hour12: false });
        }
        setInterval(updateTime,30000);
        updateTime();
    </script>
</body>
</html>
