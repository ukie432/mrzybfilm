<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYBtv hiburan & religi</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; color: #fff; background: url('https://media.tenor.com/Yg9cr-N09a4AAAAM/music.gif') no-repeat center center fixed; background-size: cover; }
        .container { display: flex; flex-direction: column; height: 100vh; background: rgba(0, 0, 0, 0.5); }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background-color: rgba(28, 28, 28, 0.8); }
        .logo { display: flex; align-items: center; }
        .logo img { height: 40px; width: auto; display: block; } /* Tinggi logo diatur di sini */
        
        .time-container { display: flex; align-items: center; }
        .time { font-size: 14px; margin-left: 10px; }

        .main { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; }

        .main-item { background-color: rgba(28, 28, 28, 0.8); border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; border: 3px solid transparent; }
        .main-item video, .main-item img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }

        /* Efek saat fokus */
        .main-item:focus, .footer-button:focus { outline: none; border: 3px solid #FF0000 !important; transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 0, 0, 0.8); }

        .item1 { grid-column: span 2; grid-row: span 2; }
        .item2 { grid-column: span 2; grid-row: span 2; }

        .footer { display: flex; justify-content: space-around; padding: 10px; background-color: rgba(28, 28, 28, 0.8); }
        .footer-button { border: none; padding: 15px 30px; color: #fff; cursor: pointer; border-radius: 5px; transition: 0.3s; font-size: 14px; }
        .footer-button1 { background-color: #8B0000; }
        .footer-button2 { background-color: #008000; }
        .footer-button3 { background-color: #0000FF; }
        .footer-button4 { background-color: #800080; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/Logo%20_mrzybtv_%20dengan%20ikon%20Wi-Fi.png" alt="MRZYBtv">
            </div>
            <div class="time-container"><div id="currentTime" class="time"></div></div>
        </header>

        <main class="main">
            <div class="main-item item1" id="p1" tabindex="0" onclick="go('p1', 'https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_animasi/20260626_092511.gif')">
                 <img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_animasi/20260626_092511.gif" alt="P1">
            </div>
            <div class="main-item item2" id="p2" tabindex="0" onclick="go('p2', 'go:Telegram')">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjqy6k16WC0GocGRyp90gW37XhtU60BLU1rffnse4_Lr-dWgabI9DazzuYq-RiPNIKYqf6CNKuy9_bnHJcEUQkgwplCHFEpIv661RCbBMIy_jwNWagys6-0SeOHVmwIiAqG5ggQ0Ljc5onroztIDYYEVV9PfWyNHj67zQXxGkHMp1T6cBOe2CodPBE2SmEa/s4080/telegramm.png" alt="Telegram">
            </div>
            <div class="main-item" id="p3" tabindex="0" onclick="go('p3', 'murottal.html')">
                <img src="https://i.pinimg.com/736x/5f/56/c6/5f56c672884e1b7dd2fec7c185f7c8e8.jpg" alt="Murottal">
            </div>
            <div class="main-item" id="p4" tabindex="0" onclick="go('p4', 'ceramah.html')">
                <img src="https://i.pinimg.com/736x/06/82/00/068200ada680e5cdb41bb1b00137dbb8.jpg" alt="Ceramah">
            </div>
            <div class="main-item" id="p5" tabindex="0" onclick="go('p5', 'musik.html')">
                <img src="https://i.pinimg.com/736x/e7/59/50/e75950a4e7b12100e121d7895e7ea7e8.jpg" alt="Musik">
            </div>
            <div class="main-item" id="p6" tabindex="0" onclick="go('p6', 'lenong.html')">
                <img src="https://i.pinimg.com/736x/b7/b4/8d/b7b48df629416d45e6e9083706f8c679.jpg" alt="Lenong">
            </div>
        </main>

        <footer class="footer">
            
            <button class="footer-button footer-button1" id="b1" tabindex="0" onclick="go('b1', 'radio.html')">RADIO ONLINE</button>
            <button class="footer-button footer-button2" id="b2" tabindex="0" onclick="go('b2', 'misteri.html')">HORROR STORY</button>
            <button class="footer-button footer-button3" id="b3" tabindex="0" onclick="go('b3', 'support.html')">SUPPORT</button>
        </footer>
    </div>
    
    <script>
        function go(id, url) {
            localStorage.setItem('lastFocus', id);
            window.location.href = url;
        }

        window.addEventListener('load', () => {
            const lastFocus = localStorage.getItem('lastFocus');
            if (lastFocus) {
                const el = document.getElementById(lastFocus);
                if (el) { el.focus(); el.scrollIntoView({ block: 'center' }); }
            }
        });

        function updateTime() {
            var now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('es-ES', { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
