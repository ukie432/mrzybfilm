<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Iwan Fals Musik Player</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/2.0.13/plyr.css">
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
    .search-bar { position: static; background: #111; padding: 10px; text-align: center; }
    .search-bar input { width: 90%; padding: 10px; border-radius: 5px; border: none; font-size: 14px; }
    
    #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
    
    .custom-controls { position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 10000; transition: opacity 0.5s ease; }
    .btn-ctrl { background: #dc2626; color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; margin: 5px; cursor: pointer; font-weight: bold; font-size: 11px; }
    .btn-ctrl:focus { background: #fff; color: #dc2626; outline: none; border: 2px solid #fff; opacity: 1; }
    
    /* Playlist Grid */
    .plyr-playlist { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; list-style: none; margin: 0; }
    .plyr-playlist li { background: #222; border: 1px solid #fff; border-radius: 6px; text-align: center; cursor: pointer; outline: none; overflow: hidden; transition: all 0.2s ease; box-sizing: border-box; }
    .plyr-playlist li:focus { border: 2px solid #dc2626; transform: scale(1.05); }
    
    .poster-container { width: 100%; position: relative; padding-bottom: 140%; overflow: hidden; border-radius: 5px 5px 0 0; }
    .plyr-miniposter { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .playlist-title { display: block; padding: 4px 2px; font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
    /* KHUSUS LANDSCAPE */
    @media (orientation: landscape) {
      .plyr-playlist { grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 12px; }
      .poster-container { padding-bottom: 140%; }
      .playlist-title { font-size: 10px; padding: 5px 3px; }
    }

    .search-box{position:relative;width:90%;margin:auto;}
    .search-box input{width:100%;padding:10px 40px 10px 10px;box-sizing:border-box;}
    #clearSearch{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:none;cursor:pointer;color:#888;font-size:18px;}
  </style>
</head>
<body>

<div class="search-bar">
  <div class="search-box">
  <input type="text" id="searchInput" placeholder="Cari lagu...">
  <span id="clearSearch">✖</span>
  </div>
</div>

<ul class="plyr-playlist" id="playlist"></ul>

<div id="player-overlay">
  <div class="custom-controls" id="controls">
    <button class="btn-ctrl" onclick="seek(-10); resetHideTimer()">-10</button>
    <button class="btn-ctrl" id="btnPlayPause" onclick="togglePlay(); resetHideTimer()">||</button>
    <button class="btn-ctrl" onclick="seek(10); resetHideTimer()">+10</button>
    <button class="btn-ctrl" onclick="closePlayer()">X</button>
  </div>
  <div id="player-container" class="js-player" data-type="youtube" data-video-id=""></div>
</div>

<script src="https://cdn.plyr.io/2.0.13/plyr.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
  var myPlaylist = [
    {id:"lagu-0", title:"Bento", src:"UU-dTGy0ZGM", poster:"https://i.pinimg.com/736x/8b/ac/10/8bac107a3861d3cb96ecf38cdb87fff2.jpg"},
    {id:"lagu-1", title:"Yang Terlupakan", src:"cI5n5mP5h-Y", poster:"https://i.pinimg.com/736x/80/2c/cb/802ccb0d49cfe08080871a8322a6d97e.jpg"},
    {id:"lagu-2", title:"Ibu", src:"d_uQ70o-N1g", poster:"https://i.pinimg.com/736x/93/61/72/9361725970110e5e667a0931178869e3.jpg"},
    {id:"lagu-3", title:"Pesawat Tempur", src:"p5u-8vR-u8k", poster:"https://i.pinimg.com/736x/c0/41/35/c041351d43549eb49810514dd6f63319.jpg"},
    {id:"lagu-4", title:"Sarjana Muda", src:"example1", poster:"https://i.pinimg.com/736x/8b/ac/10/8bac107a3861d3cb96ecf38cdb87fff2.jpg"},
    {id:"lagu-5", title:"Ujung Aspal", src:"example2", poster:"https://i.pinimg.com/736x/80/2c/cb/802ccb0d49cfe08080871a8322a6d97e.jpg"},
    {id:"lagu-6", title:"Surat Buat Wakil Rakyat", src:"example3", poster:"https://i.pinimg.com/736x/93/61/72/9361725970110e5e667a0931178869e3.jpg"},
    {id:"lagu-7", title:"Kemesraan", src:"UU-dTGy0ZGM", poster:"https://i.pinimg.com/736x/c0/41/35/c041351d43549eb49810514dd6f63319.jpg"}
  ];

  var player = plyr.setup(".js-player", { controls: [] })[0];
  var hideTimer;

  // DISAMAKAN PERSIS DENGAN FUNGSI JEMBATAN KODE SUKSES ANDA (denganpopup.txt)
  window.tutupPopUpPoster = function(){
      window.closePlayer();
  };

  // Event Listener tombol Back Remote global menggunakan capturing (true)
  window.addEventListener("keydown", function(event) {
      if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009) {
          const overlay = document.getElementById("player-overlay");
          if (overlay && window.getComputedStyle(overlay).display !== "none") {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
              window.tutupPopUpPoster(); // Memanggil nama jembatan resmi Anda
              return false;
          }
      }
  }, true);

  function resetHideTimer() {
    $("#controls").css("opacity", "1");
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => { $("#controls").css("opacity", "0"); }, 5000);
  }

  function openPlayer(id, elementId) {
    localStorage.setItem("iwan_idPosterTerakhir", elementId);
    
    // Kunci tombol Back Android agar tidak mental keluar aplikasi
    if (typeof Android !== "undefined" && Android.setPopUpStatus) {
        Android.setPopUpStatus(true);
    }
    
    $("#player-overlay").show();
    player.source({ type: "video", sources: [{ src: id, type: "youtube" }] });
    setTimeout(() => { 
      player.play(); 
      player.muted = false; 
      player.setVolume(100); 
      $("#btnPlayPause").focus(); 
      resetHideTimer(); 
    }, 1000);
  }

  $(document).keydown(function() { if ($("#player-overlay").is(":visible")) resetHideTimer(); });
  function togglePlay() { player.togglePlay(); }
  function seek(s) { player.seek(player.getCurrentTime() + s); }
  
  function closePlayer() { 
    $("#player-overlay").hide(); 
    player.stop(); 
    clearTimeout(hideTimer); 
    
    // Buka gembok tombol Back di sisi Android secara instan saat player ditutup
    if (typeof Android !== "undefined" && Android.setPopUpStatus) {
        Android.setPopUpStatus(false);
    }
    
    // Kembalikan fokus berdasarkan ID dari localStorage agar kursor remot tidak hilang
    const lastId = localStorage.getItem("iwan_idPosterTerakhir");
    if (lastId) {
      setTimeout(() => {
        const target = document.getElementById(lastId);
        if (target) {
            target.focus();
            target.scrollIntoView({ behavior: "auto", block: "center" });
        }
      }, 150);
    } else {
      $("#playlist li:first").focus(); 
    }
  }
  
  $("#searchInput").on("input", function(){let val=$(this).val().toLowerCase();$("#clearSearch").toggle(val.length>0);renderPlaylist(myPlaylist.filter(p=>p.title.toLowerCase().includes(val)));});
  $("#clearSearch").on("click",function(){$("#searchInput").val("").focus();$(this).hide();renderPlaylist(myPlaylist);});

  function renderPlaylist(list) {
    let html = list.map(v => `
      <li tabindex="0" id="${v.id}" onclick="openPlayer('${v.src}', '${v.id}')">
        <div class="poster-container"><img class="plyr-miniposter" src="${v.poster}"></div>
        <span class="playlist-title">${v.title}</span>
      </li>
    `).join("");
    $("#playlist").html(html);
  }

  $(document).on('keydown', 'li', function(e) { if (e.keyCode === 13) $(this).trigger('click'); });
  
  $(document).ready(() => {
    renderPlaylist(myPlaylist);
    $("#playlist li:first").focus();
  });
</script>
</body>
</html>
