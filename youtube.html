<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <link rel="preconnect" href="https://posterfilm.pages.dev">
    <link rel="preconnect" href="https://iptv-posterku.pages.dev">

    <meta charset="UTF-8">
    <title>MRZYBtv Youtube</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/2.0.13/plyr.css">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        
        .navbar { padding: 20px; text-align: center; background: #111; position: sticky; top: 0; z-index: 10; }
        .search-container { position: relative; display: inline-block; width: 80%; max-width: 400px; }
        
        .search-bar-wrapper { 
            width: 100%; background: #fff; border-radius: 20px; border: 3px solid transparent; 
            box-sizing: border-box; display: flex; align-items: center; cursor: pointer;
        }
        .search-bar-wrapper:focus { border-color: #00c54f; outline: none; }
        
        #search { 
            width: 100%; padding: 12px 40px 12px 15px; border: none; outline: none; 
            background: transparent; font-size: 16px; color: #000; box-sizing: border-box; 
        }
        
        .clear-search { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); 
            background: #444; color: #fff; border: none; border-radius: 50%; 
            width: 22px; height: 22px; font-size: 12px; font-weight: bold; 
            cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 12;
        }
        .clear-search:focus { background: red; outline: none; }

        /* Grid & Poster */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .poster { cursor: pointer; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #111; }
        .poster:focus { transform: scale(1.05); border-color: #00c54f; outline: none; }
        .poster img { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; display: block; }
        .poster-title { padding: 8px; font-size: 14px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .poster:focus .poster-title { color: #00c54f; }
        
        /* Popup Kategori */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #00c54f; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 101; }
        .close-x:focus { outline: 3px solid #00c54f; transform: scale(1.1); }
        #eps-list { max-height: 300px; overflow-y: auto; margin-top: 15px; padding-right: 10px; }
        .eps-btn { display:block; width:100%; padding:10px; margin:5px 0; background:#333; border:none; color:white; text-align: left; font-size: 14px; font-weight: bold; cursor: pointer; }
        .eps-btn:focus { background:#00c54f; color:black; outline: none; }

        /* LAYER OVERLAY PEMUTAR VIDEO (KUNCI PAS) */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; }
        
        #player-overlay .plyr { 
            width: 100% !important; height: 100% !important; max-width: 100% !important; max-height: 100% !important;
            display: flex !important; align-items: center !important; justify-content: center !important; background: #000 !important;
        }
        #player-overlay .plyr__video-wrapper,
        #player-overlay .plyr__video-embed {
            width: 100% !important; height: 100% !important; padding-bottom: 0 !important;
            display: flex !important; align-items: center !important; justify-content: center !important; background: #000 !important;
        }
        #player-overlay iframe { 
            position: relative !important; width: 100% !important; height: auto !important; 
            aspect-ratio: 16 / 9 !important; max-width: 100% !important; max-height: 100% !important;
            transform: scale(1) !important; object-fit: contain !important;
        }

        /* Tata Letak Kontroler Persis di Gambar */
        .custom-controls { position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 100000; transition: opacity 0.5s ease; }
        .progress-container {
            display: flex; align-items: center; justify-content: center;
            width: 90%; max-width: 600px; margin: 0 auto 15px auto;
            background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 10px;
        }
        #seek-bar { flex: 1; margin: 0 15px; cursor: pointer; accent-color: #00c54f; height: 6px; }
        #seek-bar:focus { outline: 3px solid #00c54f; transform: scaleY(1.3); }
        #current-time, #total-time { font-size: 13px; font-weight: bold; font-family: monospace; color: #fff; }
        .buttons-container { display: block; }
        .btn-ctrl { background: #dc2626; color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; margin: 5px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-ctrl:focus { background: #fff; color: #dc2626; outline: 2px solid #00c54f; opacity: 1; }
        .player-logo { position: absolute; top: 20px; left: 20px; height: 50px; width: auto; z-index: 100001; pointer-events: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="search-container">
            <div class="search-bar-wrapper" id="search-box" tabindex="0">
                <input type="text" id="search" disabled placeholder="Cari (Tekan OK/Enter)...">
            </div>
            <button id="clear-btn" class="clear-search" tabindex="-1">X</button>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div id="popup">
        <div class="popup-content" onclick="event.stopPropagation()">
            <button class="close-x" onclick="closePopup()" tabindex="0">X</button>
            <h2 id="modal-title" style="margin-top:0; padding-right: 30px;"></h2>
            <div id="eps-list"></div>
        </div>
    </div>

    <div id="player-overlay">
        <img class="player-logo" src="https://iptv-posterku.pages.dev/poster/film_indonesia/Logo%20_mrzybtv_%20dengan%20ikon%20Wi-Fi.png" alt="Logo MRZYB TV">
        
        <div class="custom-controls" id="controls">
            <div class="progress-container">
                <span id="current-time">00:00</span>
                <input type="range" id="seek-bar" min="0" max="100" value="0" step="1" tabindex="0">
                <span id="total-time">00:00</span>
            </div>
            <div class="buttons-container">
                <button class="btn-ctrl" onclick="putarKontenSampingnya(-1); resetHideTimer()">⏮</button>
                <button class="btn-ctrl" id="btnPlayPause" onclick="togglePlay(); resetHideTimer()">||</button>
                <button class="btn-ctrl" onclick="putarKontenSampingnya(1); resetHideTimer()">⏭</button>
                <button class="btn-ctrl" id="btnCC" onclick="toggleSubtitle(); resetHideTimer()">CC</button>
                <button class="btn-ctrl" onclick="window.tutupPopUpPoster()">X</button>
            </div>
        </div>
        <div id="player-container" class="js-player" data-type="youtube" data-video-id=""></div>
    </div>

<script src="https://cdn.plyr.io/2.0.13/plyr.js"></script>
<script>
    const pageTitle = document.title.replace(/\s+/g, '_').toLowerCase();
    const jsonUrl = "data/youtube.json"; 
    var currentEpisodes = [];
    var hideTimer;
    var subtitleAktif = false;

    // Inisialisasi Inti Mesin Player Plyr
    var player = plyr.setup(".js-player", { 
        controls: [],
        youtube: { cc_load_policy: 0, cc_lang_pref: 'none', hl: 'id' }
    })[0];

    // Logika Gembok Android Bertingkat
    window.tutupPopUpPoster = function(){
        if ($("#player-overlay").is(":visible")) {
            closePlayer();
            return;
        }
        if ($("#popup").is(":visible") && $("#popup").css("display") !== "none") {
            window.closePopup();
            return;
        }
    };

    window.addEventListener('keydown', function(event) {
        if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009) {
            if ($("#player-overlay").is(":visible") || $("#popup").is(":visible")) {
                event.preventDefault();
                window.tutupPopUpPoster(); 
                return;
            }
        }
    }, true);

    function resetHideTimer() {
        $("#controls").css("opacity", "1");
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => { $("#controls").css("opacity", "0"); }, 5000);
    }
    $(document).keydown(function() { if ($("#player-overlay").is(":visible")) resetHideTimer(); });

    // Navigasi Remote D-Pad Utama
    $(document).on('keydown', function(e) {
        const activeEl = document.activeElement;

        if (e.keyCode == 38 && $(activeEl).hasClass('poster')) {
            const index = $('.grid .poster').index(activeEl);
            if (index < 5) {
                e.preventDefault();
                $("#search-box").focus();
                return false;
            }
        }
        if (e.keyCode == 39 && $(activeEl).hasClass('eps-btn')) {
            $('.close-x').focus();
        } else if (e.keyCode == 37 && $(activeEl).hasClass('close-x')) {
            const currentTitle = $("#modal-title").text();
            const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + currentTitle) || 0;
            $(`.eps-btn[data-index="${lastIdx}"]`).focus();
        }
    });

    $("#search-box").on('keydown', function(e) {
        if (e.keyCode == 13) { 
            e.preventDefault();
            $("#search").removeAttr("disabled").focus();
            return false;
        }
        else if (e.keyCode == 40) { 
            e.preventDefault();
            $(".poster").first().focus();
            return false;
        }
        else if (e.keyCode == 39 && $("#search").val().length > 0) { 
            $("#clear-btn").attr("tabindex", "0").focus();
        }
    });

    $("#search").on('keydown', function(e) {
        if (e.keyCode == 40 || e.keyCode == 13) {
            $(this).attr("disabled", "disabled");
            $("#search-box").focus();
        }
    });

    $("#clear-btn").on('keydown', function(e) {
        if (e.keyCode == 37) { $("#search-box").focus(); }
        else if (e.keyCode == 40) { $(this).attr("tabindex", "-1"); $(".poster").first().focus(); }
    });

    $("#clear-btn").on('click', function() {
        $("#search").val(""); $(".poster").show(); $(this).css("display", "none").attr("tabindex", "-1"); $("#search-box").focus();
    });

    $("#search").on("input", function() {
        const keyword = $(this).val().toLowerCase();
        if (keyword.length > 0) { $("#clear-btn").css("display", "flex"); } 
        else { $("#clear-btn").css("display", "none").attr("tabindex", "-1"); }
        $(".poster").each(function() { $(this).toggle($(this).data("title").toLowerCase().includes(keyword)); });
    });

    // Load JSON Utama [cite: 32]
    fetch(jsonUrl)
        .then(response => response.json())
        .then(data => {
            data.forEach(item => {
                const epEncoded = encodeURIComponent(JSON.stringify(item.episodes));
                $("#grid").append(`<div class="poster" tabindex="0" data-title="${item.title}" onclick='openModal("${item.title}", "${epEncoded}")'><img src="${item.poster}"><div class="poster-title">${item.title}</div></div>`);
            });
            setTimeout(() => { 
                const popupElement = document.getElementById("popup");
                if (popupElement && window.getComputedStyle(popupElement).display !== "none") {
                    $(".poster").first().focus(); 
                }
            }, 600);
            checkLastSession();
        });

    // Buka Modal Popup Kategori [cite: 48]
    function openModal(title, epsEncoded) {
        localStorage.setItem(pageTitle + "_status_popup", "open");
        localStorage.setItem(pageTitle + "_last_poster_title", title);
        localStorage.setItem(pageTitle + "_judul_film", title);
        localStorage.setItem(pageTitle + "_eps_data", epsEncoded);

        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(true);
        }

        currentEpisodes = JSON.parse(decodeURIComponent(epsEncoded));
        $("#modal-title").text(title);
        $("#eps-list").empty();
        
        currentEpisodes.forEach((e, index) => {
            $("#eps-list").append(`<button class="eps-btn" tabindex="0" data-index="${index}" onclick="playFullscreen('${e.url}', ${index}, '${title.replace(/'/g, "\\'")}')">${e.ep}</button>`);
        });
        
        $("#popup").css({ "display": "flex", "z-index": "100", "pointer-events": "auto" });
        
        const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + title) || 0;
        setTimeout(() => { $(`.eps-btn[data-index="${lastIdx}"]`).focus(); }, 150);
    }

    // FUNGSI UTAMA BARU: REBUT KONTROL MEMUTAR VIDEO SECARA INTERNAL
    function playFullscreen(url, index, title) {
        localStorage.setItem(pageTitle + "_last_eps_" + title, index);
        localStorage.setItem(pageTitle + "_index_sekarang", index);

        // RESET BERSIH PROGRESS BAR SEBELUM VIDEO BARU DIPUTAR (Menjawab kendala ke-3 bapak)
        $("#seek-bar").val(0);
        $("#current-time").text("00:00");
        $("#total-time").text("00:00");

        $("#popup").css({ "z-index": "1", "pointer-events": "none" }); 
        $("#player-overlay").show();

        // Suntik sumber tautan langsung ke Plyr Iframe Core Engine
        player.source({ 
            type: "video", 
            sources: [{ src: url, type: "youtube" }],
            youtube: { 
                cc_load_policy: 0, cc_lang_pref: 'none', hl: 'id',
                iv_load_policy: 3, enablejsapi: 1, origin: window.location.origin
            }
        });
        
        setTimeout(() => {
            try {
                player.play();
                player.muted = false;
                player.setVolume(100);
            } catch(e) {
                console.log("Autoplay ditahan sistem");
            }
            
            $("#btnPlayPause").focus(); 
            resetHideTimer();
            subtitleAktif = false;
            $("#btnCC").css("border", "none");
            
            setTimeout(() => {
                if (player && player.captions && typeof player.toggleCaptions === "function") {
                    if (player.captions.active) player.toggleCaptions();
                }
                const iframe = document.querySelector('#player-overlay iframe');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'unloadCaps' }), '*');
                    iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'hideVideoControls' }), '*');
                }
                $("#btnPlayPause").focus();
            }, 1200);
        }, 1500); 
    }

    function closePlayer() {
        player.stop();
        clearTimeout(hideTimer);
        $("#player-overlay").hide();
        $("#popup").css({ "z-index": "100", "pointer-events": "auto" });
        
        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(true);
        }

        const title = localStorage.getItem(pageTitle + "_judul_film");
        const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + title) || 0;
        setTimeout(() => { $(`.eps-btn[data-index="${lastIdx}"]`).focus(); }, 150);
    }

    window.closePopup = function() { 
        $("#popup").css("display", "none");
        const lastTitle = localStorage.getItem(pageTitle + "_last_poster_title");

        localStorage.removeItem(pageTitle + "_status_popup");
        localStorage.removeItem(pageTitle + "_judul_film");
        localStorage.removeItem(pageTitle + "_eps_data");
        localStorage.removeItem(pageTitle + "_index_sekarang");

        if (lastTitle) {
            setTimeout(() => {
                const targetPoster = $(`.poster[data-title="${lastTitle}"]`);
                if (targetPoster.length) {
                    targetPoster.focus();
                    targetPoster[0].scrollIntoView({ behavior: "auto", block: "center" });
                }
            }, 150);
        }
        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(false);
        }
    };

    function putarKontenSampingnya(arah) {
        let curIdx = parseInt(localStorage.getItem(pageTitle + "_index_sekarang") || 0);
        let nextIdx = curIdx + arah;
        if (nextIdx >= 0 && nextIdx < currentEpisodes.length) {
            const title = localStorage.getItem(pageTitle + "_judul_film");
            const nextVideo = currentEpisodes[nextIdx];
            player.stop();
            playFullscreen(nextVideo.url, nextIdx, title);
        }
    }

    function togglePlay() { player.togglePlay(); }
    
    function toggleSubtitle() {
        subtitleAktif = !subtitleAktif;
        const iframe = document.querySelector('#player-overlay iframe');
        const funcCommand = subtitleAktif ? 'loadCaps' : 'unloadCaps';
        if (player && typeof player.toggleCaptions === "function") { player.toggleCaptions(subtitleAktif); }
        if (iframe && iframe.contentWindow) { iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: funcCommand }), '*'); }
        $("#btnCC").css("border", subtitleAktif ? "2px solid #00c54f" : "none");
    }

    function checkLastSession() {
        if (localStorage.getItem(pageTitle + "_status_popup") === "open") {
            const title = localStorage.getItem(pageTitle + "_judul_film");
            const eps = localStorage.getItem(pageTitle + "_eps_data");
            if(title && eps) openModal(title, eps);
        }
    }

    // ==========================================================================
    // LOGIKA SINKRONISASI CORES TIMING (PEMBENAHAN UTAMA MENJAWAB PERTANYAAN USER)
    // ==========================================================================
    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === null || seconds < 0) return "00:00";
        let mins = Math.floor(seconds / 60);
        let secs = Math.floor(seconds % 60);
        if (mins < 10) mins = "0" + mins;
        if (secs < 10) secs = "0" + secs;
        return mins + ":" + secs;
    }

    // Eksekusi core direct property real-time Plyr
    player.on('timeupdate', () => {
        const currentTime = player.currentTime; 
        const duration = player.duration;
        
        if (duration && duration > 0) {
            $("#current-time").text(formatTime(currentTime));
            $("#total-time").text(formatTime(duration));
            
            if (!$("#seek-bar").is(":focus")) {
                let value = (currentTime / duration) * 100;
                $("#seek-bar").val(value);
            }
        } else {
            $("#current-time").text(formatTime(currentTime));
            $("#total-time").text("--:--");
        }
    });

    // Geser manual via Sentuh / Klik HP Langsung Berpengaruh ke film
    $("#seek-bar").on('input change', function() {
        resetHideTimer();
        const duration = player.duration;
        if (duration && duration > 0) {
            let seekTo = duration * ($(this).val() / 100);
            player.currentTime = seekTo; 
        }
    });

    // Navigasi Geser Maju Mundur Remote STB D-Pad
    $("#seek-bar").on('keydown', function(e) {
        resetHideTimer();
        const duration = player.duration;
        if (!duration || duration <= 0) return;

        let currentTime = player.currentTime;
        let lompatDetik = 15; 

        if (e.keyCode == 37) { 
            e.preventDefault();
            let targetMundur = Math.max(0, currentTime - lompatDetik);
            player.currentTime = targetMundur;
            $(this).val((targetMundur / duration) * 100);
            $("#current-time").text(formatTime(targetMundur)); 
        } 
        else if (e.keyCode == 39) { 
            e.preventDefault();
            let targetMaju = Math.min(duration, currentTime + lompatDetik);
            player.currentTime = targetMaju;
            $(this).val((targetMaju / duration) * 100);
            $("#current-time").text(formatTime(targetMaju)); 
        }
        else if (e.keyCode == 40) { 
            e.preventDefault();
            $("#btnPlayPause").focus();
        }
    });

    $("#btnPlayPause").on('keydown', function(e) {
        if (e.keyCode == 38) { 
            e.preventDefault();
            $("#seek-bar").focus();
        }
    });
</script>

<script>
    const soundClick = new Audio('https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav');
    function playSound() { soundClick.currentTime = 0; soundClick.play().catch(e => console.log("Membaca remote...")); }
    document.addEventListener('focus', function(e) {
        if ($(e.target).hasClass('poster') || $(e.target).hasClass('eps-btn') || $(e.target).hasClass('close-x') || $(e.target).hasClass('btn-ctrl') || e.target.id === 'clear-btn' || e.target.id === 'search-box' || e.target.id === 'seek-bar') {
            playSound();
        }
    }, true);
</script>
</body>
</html>
