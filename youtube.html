<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Iwan Fals Musik Player</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/2.0.13/plyr.css">
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
    .search-bar { position: static; background: #111; padding: 15px; text-align: center; }
    .search-bar input { width: 90%; padding: 12px; border-radius: 5px; border: none; font-size: 16px; }
    
    #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
    
    /* Tombol Kustom dengan transisi */
    .custom-controls { 
        position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 10000; 
        transition: opacity 0.5s ease; /* Efek transisi muncul/hilang */
    }
    .btn-ctrl { background: #dc2626; color: #fff; border: none; width: 50px; height: 50px; border-radius: 50%; margin: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
    .btn-ctrl:focus { background: #fff; color: #dc2626; outline: none; border: 2px solid #fff; opacity: 1; }
    
    .plyr-playlist { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; list-style: none; margin: 0; }
    .plyr-playlist li { background: #222; border-radius: 8px; text-align: center; cursor: pointer; outline: none; }
    .plyr-playlist li:focus { border: 2px solid #fff; }
    
    .poster-container { width: 100%; position: relative; padding-bottom: 133.33%; overflow: hidden; border-radius: 8px 8px 0 0; }
    .plyr-miniposter { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .playlist-title { display: block; padding: 8px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Cari lagu Iwan Fals...">
</div>

<ul class="plyr-playlist" id="playlist"></ul>

<div id="player-overlay">
  <div class="custom-controls" id="controls">
    <button class="btn-ctrl" onclick="seek(-10); resetHideTimer()">-10</button>
    <button class="btn-ctrl" id="btnPlayPause" onclick="togglePlay(); resetHideTimer()">||</button>
    <button class="btn-ctrl" onclick="seek(10); resetHideTimer()">+10</button>
    <button class="btn-ctrl" onclick="closePlayer()">X</button>
  </div>
  <div id="player-container" class="js-player" data-type="youtube" data-video-id=""></div>
</div>

<script src="https://cdn.plyr.io/2.0.13/plyr.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
  var myPlaylist = [
    {title:"Bento", src:"UU-dTGy0ZGM", poster:"https://i.pinimg.com/736x/8b/ac/10/8bac107a3861d3cb96ecf38cdb87fff2.jpg"},
    {title:"Yang Terlupakan", src:"cI5n5mP5h-Y", poster:"https://i.pinimg.com/736x/80/2c/cb/802ccb0d49cfe08080871a8322a6d97e.jpg"},
    {title:"Ibu", src:"d_uQ70o-N1g", poster:"https://i.pinimg.com/736x/93/61/72/9361725970110e5e667a0931178869e3.jpg"},
    {title:"Pesawat Tempur", src:"p5u-8vR-u8k", poster:"https://i.pinimg.com/736x/c0/41/35/c041351d43549eb49810514dd6f63319.jpg"}
  ];

  var player = plyr.setup(".js-player", { controls: [] })[0];
  var hideTimer;

  function resetHideTimer() {
    $("#controls").css("opacity", "1"); // Tampilkan tombol
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        $("#controls").css("opacity", "0"); // Hilangkan tombol setelah 5 detik
    }, 5000);
  }

  function openPlayer(id) {
    $("#player-overlay").show();
    player.source({ type: "video", sources: [{ src: id, type: "youtube" }] });
    setTimeout(() => {
        player.play();
        player.muted = false;
        player.setVolume(100);
        $("#btnPlayPause").focus();
        resetHideTimer(); // Mulai timer saat player dibuka
    }, 1000);
  }

  // Jika remote ditekan saat player terbuka, tombol muncul kembali
  $(document).keydown(function() {
      if ($("#player-overlay").is(":visible")) {
          resetHideTimer();
      }
  });

  function togglePlay() { player.togglePlay(); }
  function seek(s) { player.seek(player.getCurrentTime() + s); }
  function closePlayer() { 
      $("#player-overlay").hide(); 
      player.stop(); 
      clearTimeout(hideTimer); // Hapus timer agar tidak error
      $("#playlist li:first").focus(); 
  }

  $("#searchInput").on("input", function() {
    let val = $(this).val().toLowerCase();
    renderPlaylist(myPlaylist.filter(p => p.title.toLowerCase().includes(val)));
  });

  function renderPlaylist(list) {
    let html = list.map(v => `
      <li tabindex="0" onclick="openPlayer('${v.src}')">
        <div class="poster-container"><img class="plyr-miniposter" src="${v.poster}"></div>
        <span class="playlist-title">${v.title}</span>
      </li>
    `).join("");
    $("#playlist").html(html);
  }

  $(document).on('keydown', 'li', function(e) { if (e.keyCode === 13) $(this).trigger('click'); });
  $(document).ready(() => renderPlaylist(myPlaylist));
</script>
</body>
</html>
