<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <link rel="preconnect" href="https://posterfilm.pages.dev">
    <link rel="preconnect" href="https://iptv-posterku.pages.dev">
    <meta charset="UTF-8">
    <title>MRZYBtv Series Indo</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/2.0.13/plyr.css">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        
        .navbar { padding: 20px; text-align: center; background: #111; position: sticky; top: 0; z-index: 10; }
        .search-container { position: relative; display: inline-block; width: 80%; max-width: 400px; }
        
        .search-bar-wrapper { 
            width: 100%; background: #fff; border-radius: 20px; border: 3px solid transparent; 
            box-sizing: border-box; display: flex; align-items: center; cursor: pointer;
        }
        .search-bar-wrapper:focus { border-color: #00c54f; outline: none; }
        
        #search { 
            width: 100%; padding: 12px 40px 12px 15px; border: none; outline: none; 
            background: transparent; font-size: 16px; color: #000; box-sizing: border-box; 
        }
        
        .clear-search { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); 
            background: #444; color: #fff; border: none; border-radius: 50%; 
            width: 22px; height: 22px; font-size: 12px; font-weight: bold; 
            cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 12;
        }
        .clear-search:focus { background: red; outline: none; }

        /* Grid & Poster Halaman Utama */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .poster { cursor: pointer; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #111; }
        .poster:focus { transform: scale(1.05); border-color: #00c54f; outline: none; }
        .poster img { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; display: block; }
        .poster-title { padding: 8px; font-size: 14px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .poster:focus .poster-title { color: #00c54f; }
        
        /* LAYER 2: Popup Kategori (Asli Sesuai File Referensi Bapak) */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #00c54f; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 101; }
        .close-x:focus { outline: 3px solid #00c54f; transform: scale(1.1); }
        #eps-list { max-height: 300px; overflow-y: auto; margin-top: 15px; padding-right: 10px; }
        .eps-btn { display:block; width:100%; padding:10px; margin:5px 0; background:#333; border:none; color:white; text-align: left; font-size: 14px; font-weight: bold; cursor: pointer; }
        .eps-btn:focus { background:#00c54f; color:black; outline: none; }

        /* LAYER 3: Player Fullscreen Overlay Terpisah (Di luar Popup) */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .custom-controls { position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 10000; transition: opacity 0.5s ease; }
        .btn-ctrl { background: #dc2626; color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; margin: 5px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-ctrl:focus { background: #fff; color: #dc2626; outline: 2px solid #00c54f; opacity: 1; }
        .player-logo { position: absolute; top: 20px; left: 20px; height: 50px; width: auto; z-index: 10001; pointer-events: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="search-container">
            <div class="search-bar-wrapper" id="search-box" tabindex="0">
                <input type="text" id="search" disabled placeholder="Cari (Tekan OK/Enter)...">
            </div>
            <button id="clear-btn" class="clear-search" tabindex="-1">X</button>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div id="popup">
        <div class="popup-content" onclick="event.stopPropagation()">
            <button class="close-x" onclick="closePopup()" tabindex="0">X</button>
            <h2 id="modal-title" style="margin-top:0; padding-right: 30px;"></h2>
            <div id="eps-list"></div>
        </div>
    </div>

    <div id="player-overlay">
        <img class="player-logo" src="https://iptv-posterku.pages.dev/poster/film_indonesia/Logo%20_mrzybtv_%20dengan%20ikon%20Wi-Fi.png" alt="Logo MRZYB TV">
        <div class="custom-controls" id="controls">
            <button class="btn-ctrl" onclick="putarKontenSampingnya(-1); resetHideTimer()">⏮</button>
            <button class="btn-ctrl" onclick="seek(-10); resetHideTimer()">-10</button>
            <button class="btn-ctrl" id="btnPlayPause" onclick="togglePlay(); resetHideTimer()">||</button>
            <button class="btn-ctrl" onclick="seek(10); resetHideTimer()">+10</button>
            <button class="btn-ctrl" onclick="putarKontenSampingnya(1); resetHideTimer()">⏭</button>
            <button class="btn-ctrl" id="btnCC" onclick="toggleSubtitle(); resetHideTimer()">CC</button>
            <button class="btn-ctrl" onclick="window.tutupPopUpPoster()">X</button>
        </div>
        <div id="player-container" class="js-player" data-type="youtube" data-video-id=""></div>
    </div>

<script src="https://cdn.plyr.io/2.0.13/plyr.js"></script>
<script>
    const pageTitle = document.title.replace(/\s+/g, '_').toLowerCase(); 
    const jsonUrl = "data/youtube.json"; // Tetap mengarah ke jsonUrl bawaan asli bapak [cite: 32]
    var currentEpisodes = [];
    var hideTimer;
    var subtitleAktif = false;

    // Inisialisasi Player Utama
    var player = plyr.setup(".js-player", { 
        controls: [],
        youtube: { cc_load_policy: 0, cc_lang_pref: 'none', hl: 'id' }
    })[0];

    // ========================================================
    // REVISI LOGIKA STRUKTUR REMOTE BACK BERTINGKAT
    // ========================================================
    
    window.tutupPopUpPoster = function(){
        // JIKA Sedang nonton video player (Layer 3) -> Tutup player, kembalikan tampilan Popup Kategori
        if ($("#player-overlay").is(":visible")) {
            closePlayer();
            return;
        }
        // JIKA Hanya berada di Popup Kategori (Layer 2) -> Tutup popup total, kembali ke poster halaman utama [cite: 33]
        if ($("#popup").is(":visible")) {
            window.closePopup();
            return;
        }
    };

    // Sinkronisasi Deteksi Tombol Back Hardcase Remote Fisik (4, 27, 10009) [cite: 34]
    window.addEventListener('keydown', function(event) {
        if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009) {
            if ($("#player-overlay").is(":visible") || $("#popup").is(":visible")) {
                event.preventDefault(); [cite: 34]
                window.tutupPopUpPoster(); 
                return;
            }
        }
    }, true);

    function resetHideTimer() {
        $("#controls").css("opacity", "1");
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => { $("#controls").css("opacity", "0"); }, 5000);
    }
    $(document).keydown(function() { if ($("#player-overlay").is(":visible")) resetHideTimer(); });

    // Logika Pengaturan Navigasi Remote TV Arah [cite: 35]
    $(document).on('keydown', function(e) {
        const activeEl = document.activeElement;

        if (e.keyCode == 38 && $(activeEl).hasClass('poster')) { [cite: 35]
            const index = $('.grid .poster').index(activeEl); [cite: 35]
            if (index < 5) { [cite: 35]
                e.preventDefault(); [cite: 36]
                $("#search-box").focus(); [cite: 36]
                return false; [cite: 36]
            }
        }

        if (e.keyCode == 39 && $(activeEl).hasClass('eps-btn')) { [cite: 36]
            $('.close-x').focus(); [cite: 36]
        } else if (e.keyCode == 37 && $(activeEl).hasClass('close-x')) { [cite: 37]
            const currentTitle = $("#modal-title").text(); [cite: 37]
            const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + currentTitle) || 0; [cite: 37]
            $(`.eps-btn[data-index="${lastIdx}"]`).focus(); [cite: 37]
        }
    });

    // Logika Pengendali Bar Pencarian [cite: 38]
    $("#search-box").on('keydown', function(e) {
        if (e.keyCode == 13) { [cite: 38]
            e.preventDefault(); [cite: 38]
            $("#search").removeAttr("disabled").focus(); [cite: 38]
            return false; [cite: 38]
        }
        else if (e.keyCode == 40) { [cite: 38]
            e.preventDefault(); [cite: 38]
            $(".poster").first().focus(); [cite: 39]
            return false; [cite: 39]
        }
        else if (e.keyCode == 39 && $("#search").val().length > 0) { [cite: 39]
            $("#clear-btn").attr("tabindex", "0").focus(); [cite: 39]
        }
    });

    $("#search").on('keydown', function(e) { [cite: 40]
        if (e.keyCode == 40 || e.keyCode == 13) { [cite: 40]
            $(this).attr("disabled", "disabled"); [cite: 40]
            $("#search-box").focus(); [cite: 40]
        }
    });

    $("#clear-btn").on('keydown', function(e) { [cite: 41]
        if (e.keyCode == 37) { [cite: 41]
            $("#search-box").focus(); [cite: 41]
        }
        else if (e.keyCode == 40) { [cite: 41]
            $(this).attr("tabindex", "-1"); [cite: 41]
            $(".poster").first().focus(); [cite: 41]
        }
    });

    $("#clear-btn").on('click', function() { [cite: 42]
        $("#search").val(""); [cite: 42]
        $(".poster").show(); [cite: 42]
        $(this).css("display", "none").attr("tabindex", "-1"); [cite: 42]
        $("#search-box").focus(); [cite: 42]
    });

    $("#search").on("input", function() { [cite: 43]
        const keyword = $(this).val().toLowerCase(); [cite: 43]
        if (keyword.length > 0) { [cite: 43]
            $("#clear-btn").css("display", "flex"); [cite: 43]
        } else {
            $("#clear-btn").css("display", "none").attr("tabindex", "-1"); [cite: 43]
        }
        $(".poster").each(function() { [cite: 43]
            $(this).toggle($(this).data("title").toLowerCase().includes(keyword)); [cite: 44]
        });
    });

    // Melakukan Load Data JSON Asli Milik Bapak (Menjaga Variable .episodes) [cite: 45]
    fetch(jsonUrl) [cite: 45]
        .then(response => response.json()) [cite: 45]
        .then(data => {
            data.forEach(item => {
                // SINKRONISASI: Menggunakan 'item.episodes' persis kode referensi bapak [cite: 45]
                const epEncoded = encodeURIComponent(JSON.stringify(item.episodes || [{ep: "Mainkan Konten", url: item.src}])); [cite: 45]
                $("#grid").append(`<div class="poster" tabindex="0" data-title="${item.title}" onclick='openModal("${item.title}", "${epEncoded}")'><img src="${item.poster}"><div class="poster-title">${item.title}</div></div>`); [cite: 45]
            });
            setTimeout(() => { [cite: 46]
                const popupElement = document.getElementById("popup"); [cite: 46]
                if (popupElement && window.getComputedStyle(popupElement).display === "none") { [cite: 46]
                    $(".poster").first().focus(); [cite: 46]
                }
            }, 600); [cite: 47]
            checkLastSession(); [cite: 47]
        });

    // FUNGSI UTAMA: BUKA POPUP MODAL KATEGORI [cite: 48]
    function openModal(title, epsEncoded) {
        localStorage.setItem(pageTitle + "_status_popup", "open"); [cite: 48]
        localStorage.setItem(pageTitle + "_last_poster_title", title); // Kunci Judul Utama di sini [cite: 49]
        localStorage.setItem(pageTitle + "_judul_film", title); [cite: 49]
        localStorage.setItem(pageTitle + "_eps_data", epsEncoded); [cite: 49]

        if (typeof Android !== "undefined" && Android.setPopUpStatus) { [cite: 50]
            Android.setPopUpStatus(true); [cite: 50]
        }

        currentEpisodes = JSON.parse(decodeURIComponent(epsEncoded)); [cite: 51]
        $("#modal-title").text(title); [cite: 51]
        $("#eps-list").empty(); [cite: 51]
        
        currentEpisodes.forEach((e, index) => {
            // SINKRONISASI: Menggunakan pemicu fungsi player fullscreen baru 'playFullscreen'
            $("#eps-list").append(`<button class="eps-btn" tabindex="0" data-index="${index}" onclick="playFullscreen('${e.url}', ${index}, '${title.replace(/'/g, "\\'")}')">${e.ep}</button>`);
        });
        
        $("#popup").css("display", "flex"); [cite: 53]
        
        const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + title) || 0; [cite: 53]
        setTimeout(() => { $(`.eps-btn[data-index="${lastIdx}"]`).focus(); }, 150); [cite: 53]
    }

    // FUNGSI UTAMA JALANKAN VIDEO (PLAYER FULLSCREEN OVERLAY)
    function playFullscreen(url, index, title) {
        localStorage.setItem(pageTitle + "_last_eps_" + title, index);
        localStorage.setItem(pageTitle + "_index_sekarang", index);

        // Hanya menyembunyikan visibilitas popup tanpa merusak session storage-nya
        $("#popup").css("visibility", "hidden"); 
        $("#player-overlay").show();

        player.source({ type: "video", sources: [{ src: url, type: "youtube" }] });
        
        setTimeout(() => {
            player.play();
            player.muted = false;
            player.setVolume(100);
            $("#btnPlayPause").focus(); 
            resetHideTimer();

            subtitleAktif = false;
            $("#btnCC").css("border", "none");
            setTimeout(() => {
                if (player && player.captions && player.captions.active) player.toggleCaptions();
                const iframe = document.querySelector('#player-overlay iframe');
                if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'unloadCaps' }), '*');
            }, 1200);
        }, 800);
    }

    // TINGKAT BACK 1: DARI PLAYER FULLSCREEN -> KEMBALI KE POPUP KATEGORI
    function closePlayer() {
        player.stop();
        clearTimeout(hideTimer);
        $("#player-overlay").hide();
        
        // Memunculkan kembali Popup Kategori yang disembunyikan tadi
        $("#popup").css("visibility", "visible");
        
        const title = localStorage.getItem(pageTitle + "_judul_film");
        const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + title) || 0;
        
        // Kembalikan fokus remote ke kategori terakhir dengan aman
        setTimeout(() => { 
            $(`.eps-btn[data-index="${lastIdx}"]`).focus(); 
        }, 150);
    }

    // TINGKAT BACK 2: DARI POPUP KATEGORI -> KEMBALI KE POSTER HALAMAN UTAMA [cite: 57]
    window.closePopup = function() { 
        player.stop();
        $("#popup").css("display", "none").css("visibility", "visible"); [cite: 57]
        
        // AMBIL DULU data judul poster asli sebelum session dibersihkan total agar kursor tidak loss/loncat [cite: 59]
        const lastTitle = localStorage.getItem(pageTitle + "_last_poster_title"); [cite: 59]

        localStorage.removeItem(pageTitle + "_status_popup"); [cite: 58]
        localStorage.removeItem(pageTitle + "_judul_film"); [cite: 58]
        localStorage.removeItem(pageTitle + "_eps_data"); [cite: 59]
        localStorage.removeItem(pageTitle + "_index_sekarang");

        // PENYELARASAN: Mengembalikan fokus menggunakan pencarian data-title bawaan asli bapak [cite: 59]
        if (lastTitle) { [cite: 60]
            setTimeout(() => {
                const targetPoster = $(`.poster[data-title="${lastTitle}"]`); [cite: 60]
                if (targetPoster.length) {
                    targetPoster.focus();
                    targetPoster[0].scrollIntoView({ behavior: "auto", block: "center" });
                }
            }, 150); [cite: 61]
        }

        if (typeof Android !== "undefined" && Android.setPopUpStatus) { [cite: 61]
            Android.setPopUpStatus(false); [cite: 62]
        }
    };

    // Navigasi Next/Prev konten video player
    function putarKontenSampingnya(arah) {
        let curIdx = parseInt(localStorage.getItem(pageTitle + "_index_sekarang") || 0);
        let nextIdx = curIdx + arah;

        if (nextIdx >= 0 && nextIdx < currentEpisodes.length) {
            const title = localStorage.getItem(pageTitle + "_judul_film");
            const nextVideo = currentEpisodes[nextIdx];
            player.stop();
            playFullscreen(nextVideo.url, nextIdx, title);
        }
    }

    function togglePlay() { player.togglePlay(); }
    function seek(s) { player.seek(player.getCurrentTime() + s); }
    
    function toggleSubtitle() {
        subtitleAktif = !subtitleAktif;
        const iframe = document.querySelector('#player-overlay iframe');
        const func = subtitleAktif ? 'loadCaps' : 'unloadCaps';
        if (player && typeof player.toggleCaptions === "function") player.toggleCaptions();
        if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: func }), '*');
        $("#btnCC").css("border", subtitleAktif ? "2px solid #00c54f" : "none");
    }

    function checkLastSession() { [cite: 62]
        if (localStorage.getItem(pageTitle + "_status_popup") === "open") { [cite: 62]
            const title = localStorage.getItem(pageTitle + "_judul_film"); [cite: 62]
            const eps = localStorage.getItem(pageTitle + "_eps_data"); [cite: 63]
            if(title && eps) openModal(title, eps); [cite: 63]
        }
    }
</script>

<script>
    // Audio Klik Efek Navigasi Remote [cite: 64]
    const soundClick = new Audio('https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav'); [cite: 64]
    function playSound() { soundClick.currentTime = 0; soundClick.play().catch(e => console.log("Menunggu interaksi remote...")); } [cite: 65]
    document.addEventListener('focus', function(e) { [cite: 66]
        if ($(e.target).hasClass('poster') || $(e.target).hasClass('eps-btn') || $(e.target).hasClass('close-x') || $(e.target).hasClass('btn-ctrl') || e.target.id === 'clear-btn' || e.target.id === 'search-box') { [cite: 66]
            playSound(); [cite: 66]
        }
    }, true); [cite: 67]
</script>
</body>
</html>
