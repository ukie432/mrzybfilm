<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Online</title>


<style>

body{
    margin:0;
    background:#111;
    font-family:Arial,sans-serif;
    color:#fff;
}


h2{
    text-align:center;
    padding:15px;
}



#search{

    width:90%;
    margin:10px auto;
    display:block;
    padding:12px;
    border-radius:8px;
    border:none;
    font-size:16px;

}



#kategori{

    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:10px;

}



#kategori button{

    background:#333;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:20px;
    white-space:nowrap;

}



#kategori button:focus{

    background:#00bfff;

}




.grid{

    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(170px,1fr));

    gap:20px;
    padding:20px;

}



.item{

    cursor:pointer;
    outline:none;
    transition:.2s;

}



.item img{

    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    border-radius:10px;

}



.item p{

    text-align:center;
    margin:8px 0;

}



.item:focus{

    transform:scale(1.08);

}



.item:focus img{

    border:4px solid #00bfff;

}



</style>


</head>


<body>


<h2>TV ONLINE</h2>



<input 
id="search"
type="text"
placeholder="Cari channel..."
oninput="cariChannel()">



<div id="kategori">

</div>



<div class="grid" id="tvList">

Memuat TV...

</div>




<script>


const playlistURL =

"https://raw.githubusercontent.com/ukie432/mrzybfilm/refs/heads/main/Playlist.m3u";



let semuaTV=[];

let kategoriAktif="Semua";





fetch(playlistURL)


.then(response=>response.text())


.then(data=>{


let tvData=parseM3U(data);


semuaTV=tvData;


buatKategori();


tampilkanTV(tvData);



})


.catch(error=>{


document.getElementById("tvList").innerHTML=

"Gagal membaca Playlist.m3u";


});


function tampilkanTV(data){


let html="";


data.forEach(tv=>{


html += `


<div class="item"
tabindex="0"

onclick="playTv(
'${tv.url}',
'${tv.userAgent}',
'${tv.referer}',
'${tv.drm}',
'${tv.licenseKey}',
'${tv.licenseUrl}'
)">



<img loading="lazy" src="${tv.logo}">


<p>${tv.name}</p>



</div>


`;



});



document.getElementById("tvList").innerHTML=html;


}






function buatKategori(){


let grup=["Semua"];



semuaTV.forEach(tv=>{


if(tv.group && !grup.includes(tv.group)){


grup.push(tv.group);


}


});



let html="";



grup.forEach(g=>{


html += `


<button onclick="pilihKategori('${g}')">

${g}

</button>


`;



});



document.getElementById("kategori").innerHTML=html;



}







function pilihKategori(g){


kategoriAktif=g;



let data=semuaTV;



if(g!="Semua"){


data =
semuaTV.filter(
tv=>tv.group==g
);


}



tampilkanTV(data);



}







function cariChannel(){


let text =

document.getElementById("search")
.value
.toLowerCase();



let data =


semuaTV.filter(tv=>


tv.name
.toLowerCase()
.includes(text)


);



tampilkanTV(data);



}







function parseM3U(data){



let lines=data.split("\n");


let result=[];



let name="";
let logo="";
let group="";
let userAgent="";
let referer="";
let drm="";
let licenseKey="";
let licenseUrl="";





for(let i=0;i<lines.length;i++){


let line=lines[i].trim();





if(line.startsWith("#EXTVLCOPT:http-user-agent=")){


userAgent=line.replace(
"#EXTVLCOPT:http-user-agent=",
""
);


}





else if(line.startsWith("#EXTVLCOPT:http-referrer=")){


referer=line.replace(
"#EXTVLCOPT:http-referrer=",
""
);


}





else if(line.startsWith("#KODIPROP:inputstream.adaptive.license_type=")){


let type=line.replace(
"#KODIPROP:inputstream.adaptive.license_type=",
""
);


if(type.includes("clearkey")){

drm="clearkey";

}else{

drm=type;

}


}





else if(line.startsWith("#KODIPROP:inputstream.adaptive.license_key=")){


let key=line.replace(
"#KODIPROP:inputstream.adaptive.license_key=",
""
);



if(key.startsWith("http")){


licenseUrl=key;


}else{


licenseKey=key;


}


}





else if(line.startsWith("#EXTINF")){


let comma=line.lastIndexOf(",");


name=line.substring(comma+1);





let logoPos=line.indexOf('tvg-logo="');



if(logoPos!=-1){


logo=line.substring(

logoPos+10,

line.indexOf('"',logoPos+10)

);


}




let groupPos=line.indexOf('group-title="');



if(groupPos!=-1){


group=line.substring(

groupPos+13,

line.indexOf('"',groupPos+13)

);


}



}






else if(line.startsWith("http")){


let url=line;



// membaca format:
// url|user-agent=xxx&referrer=xxx


if(line.includes("|")){


let parts=line.split("|");


url=parts[0];


let params=parts[1];



if(params.includes("user-agent=")){


userAgent=

decodeURIComponent(

params.split("user-agent=")[1]
.split("&")[0]

);


}



if(params.includes("referrer=")){


referer=

decodeURIComponent(

params.split("referrer=")[1]

);


}



}




result.push({


name:name || "Tanpa Nama",

logo:logo,

group:group,

url:url,

userAgent:userAgent,

referer:referer,

drm:drm,

licenseKey:licenseKey,

licenseUrl:licenseUrl


});





// reset channel


name="";
logo="";
group="";
userAgent="";
referer="";
drm="";
licenseKey="";
licenseUrl="";



}



}



return result;


}








function playTv(

url,

userAgent,

referer,

drm,

licenseKey,

licenseUrl

){



if(window.Android){



Android.playTv(

url,

userAgent,

referer,

drm,

licenseKey,

licenseUrl

);



}else{


alert(url);


}


}


</script>


</body>

</html>
