<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Online</title>

<style>
body {
    margin: 0;
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
}

h2 {
    text-align: center;
    padding: 15px;
}

#search {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    outline: none;
}

#search:focus {
    border: 2px solid #00bfff;
}

#kategori {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 10px;
    scroll-behavior: smooth;
}

#kategori button {
    background: #333;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 20px;
    white-space: nowrap;
    cursor: pointer;
    outline: none;
    transition: .2s;
    flex-shrink: 0;
}

#kategori button:focus {
    background: #00bfff;
    color: #000;
    transform: scale(1.05);
    box-shadow: 0 0 10px #00bfff;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 20px;
    padding: 20px;
}

.item {
    cursor: pointer;
    outline: none;
    transition: .2s;
}

.item img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 10px;
}

.item p {
    text-align: center;
    margin: 8px 0;
}

.item:focus {
    transform: scale(1.08);
}

.item:focus img {
    border: 4px solid #00bfff;
}
</style>
</head>
<body>

<!-- TRIK GHOST VIDEO: Elemen video tersembunyi untuk menjaga background tetap aktif dan mencegah STB tidur -->
<video id="ghost-video" playsinline autoplay loop muted style="position:fixed; bottom:0; right:0; width:1px; height:1px; opacity:0.01; pointer-events:none;">
    <source src="https://raw.githubusercontent.com/intel-iot-devkit/sample-videos/master/dummy.mp4" type="video/mp4">
</video>

<h2>TV ONLINE</h2>

<input 
id="search"
type="text"
placeholder="Cari channel..."
oninput="cariChannel()"
onkeydown="handleSearchKey(event)">

<div id="kategori"></div>

<div class="grid" id="tvList">Memuat TV...</div>

<script>
const playlistURL = "https://raw.githubusercontent.com/ukie432/mrzybfilm/refs/heads/main/Playlist.m3u";

let semuaTV = [];
let kategoriAktif = "Semua";
const ghostVideo = document.getElementById('ghost-video');

fetch(playlistURL)
.then(response => response.text())
.then(data => {
    let tvData = parseM3U(data);
    semuaTV = tvData;
    buatKategori();
    tampilkanTV(tvData);
})
.catch(error => {
    document.getElementById("tvList").innerHTML = "Gagal membaca Playlist.m3u";
});

function tampilkanTV(data) {
    let html = "";
    data.forEach((tv, index) => {
        html += `
        <div class="item" tabindex="0" id="item-${index}" 
             onkeydown="handleItemKey(event, ${index})"
             onclick="pilihDanPlay(${index}, 
            '${tv.url}',
            '${tv.userAgent}',
            '${tv.referer}',
            '${tv.drm}',
            '${tv.licenseKey}',
            '${tv.licenseUrl}'
        )">
            <img loading="lazy" src="${tv.logo}">
            <p>${tv.name}</p>
        </div>
        `;
    });
    document.getElementById("tvList").innerHTML = html;

    pulihkanFokusSTB();
}

function pulihkanFokusSTB() {
    let lastIndex = localStorage.getItem("lastFocusedIndex") || sessionStorage.getItem("lastFocusedIndex");
    
    setTimeout(() => {
        let percobaan = 0;
        let intInterval = setInterval(() => {
            percobaan++;
            if (lastIndex !== null && lastIndex !== undefined) {
                let targetItem = document.getElementById(`item-${lastIndex}`);
                if (targetItem) {
                    targetItem.focus();
                    targetItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    localStorage.removeItem("lastFocusedIndex");
                    sessionStorage.removeItem("lastFocusedIndex");
                    clearInterval(intInterval);
                    return;
                }
            } else {
                let firstItem = document.getElementById("item-0");
                if (firstItem) {
                    firstItem.focus();
                    clearInterval(intInterval);
                    return;
                }
            }
            
            if (percobaan > 80) {
                clearInterval(intInterval);
                let fallbackItem = document.getElementById("item-0");
                if (fallbackItem) fallbackItem.focus();
            }
        }, 50);
    }, 400);
}

function buatKategori() {
    let grup = ["Semua"];

    semuaTV.forEach(tv => {
        if (tv.group && !grup.includes(tv.group)) {
            grup.push(tv.group);
        }
    });

    let html = "";
    grup.forEach((g, idx) => {
        html += `
        <button tabindex="0" id="kat-${idx}" 
                onkeydown="handleCategoryKey(event, ${idx}, ${grup.length})"
                onclick="pilihKategori('${g}')">
            ${g}
        </button>
        `;
    });

    let containerKategori = document.getElementById("kategori");
    containerKategori.innerHTML = html;

    containerKategori.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("focus", () => {
            btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        });
    });
}

function handleSearchKey(event) {
    if (event.key === 'Enter') {
        event.preventDefault();
        document.getElementById('search').blur();
        let firstKat = document.getElementById("kat-0");
        if (firstKat) firstKat.focus();
    } else if (event.key === 'ArrowDown') {
        event.preventDefault();
        let firstKat = document.getElementById("kat-0");
        if (firstKat) firstKat.focus();
    }
}

function handleCategoryKey(event, index, totalKat) {
    if (event.key === 'ArrowUp') {
        event.preventDefault();
        let searchInput = document.getElementById('search');
        if (searchInput) searchInput.focus();
    } else if (event.key === 'ArrowDown') {
        event.preventDefault();
        let firstItem = document.getElementById("item-0");
        if (firstItem) firstItem.focus();
    } else if (event.key === 'ArrowRight' && index < totalKat - 1) {
        event.preventDefault();
        let nextKat = document.getElementById(`kat-${index + 1}`);
        if (nextKat) nextKat.focus();
    } else if (event.key === 'ArrowLeft' && index > 0) {
        event.preventDefault();
        let prevKat = document.getElementById(`kat-${index - 1}`);
        if (prevKat) prevKat.focus();
    }
}

function handleItemKey(event, index) {
    // Estimasi jumlah kolom grid secara dinamis (minmax 170px)
    let gridContainer = document.getElementById("tvList");
    let containerWidth = gridContainer ? gridContainer.clientWidth : 800;
    let columns = Math.max(1, Math.floor(containerWidth / 190));

    if (event.key === 'ArrowUp') {
        // Jika berada di baris paling atas grid, arahkan ke kategori
        if (index < columns) {
            event.preventDefault();
            let firstKat = document.getElementById("kat-0");
            if (firstKat) firstKat.focus();
        }
    }
}

function pilihKategori(g) {
    kategoriAktif = g;
    let data = semuaTV;

    if (g != "Semua") {
        data = semuaTV.filter(tv => tv.group == g);
    }

    tampilkanTV(data);
}

function cariChannel() {
    let text = document.getElementById("search").value.toLowerCase();
    let data = semuaTV.filter(tv => tv.name.toLowerCase().includes(text));
    tampilkanTV(data);
}

function pilihDanPlay(index, url, userAgent, referer, drm, licenseKey, licenseUrl) {
    localStorage.setItem("lastFocusedIndex", index);
    sessionStorage.setItem("lastFocusedIndex", index);
    
    if(ghostVideo) ghostVideo.play().catch(e => {});

    playTv(url, userAgent, referer, drm, licenseKey, licenseUrl);
}

function parseM3U(data) {
    let lines = data.split("\n");
    let result = [];

    let name = "";
    let logo = "";
    let group = "";
    let userAgent = "";
    let referer = "";
    let drm = "";
    let licenseKey = "";
    let licenseUrl = "";

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();

        if (line.startsWith("#EXTVLCOPT:http-user-agent=")) {
            userAgent = line.replace("#EXTVLCOPT:http-user-agent=", "");
        } else if (line.startsWith("#EXTVLCOPT:http-referrer=")) {
            referer = line.replace("#EXTVLCOPT:http-referrer=", "");
        } else if (line.startsWith("#KODIPROP:inputstream.adaptive.license_type=")) {
            let type = line.replace("#KODIPROP:inputstream.adaptive.license_type=", "");
            drm = type.includes("clearkey") ? "clearkey" : type;
        } else if (line.startsWith("#KODIPROP:inputstream.adaptive.license_key=")) {
            let key = line.replace("#KODIPROP:inputstream.adaptive.license_key=", "");
            if (key.startsWith("http")) {
                licenseUrl = key;
            } else {
                licenseKey = key;
            }
        } else if (line.startsWith("#EXTINF")) {
            let comma = line.lastIndexOf(",");
            name = line.substring(comma + 1);

            let logoPos = line.indexOf('tvg-logo="');
            if (logoPos != -1) {
                logo = line.substring(logoPos + 10, line.indexOf('"', logoPos + 10));
            }

            let groupPos = line.indexOf('group-title="');
            if (groupPos != -1) {
                group = line.substring(groupPos + 13, line.indexOf('"', groupPos + 13));
            }
        } else if (line.startsWith("http")) {
            let url = line;

            if (line.includes("|")) {
                let parts = line.split("|");
                url = parts[0];
                let params = parts[1];

                if (params.includes("user-agent=")) {
                    userAgent = decodeURIComponent(params.split("user-agent=")[1].split("&")[0]);
                }
                if (params.includes("referrer=")) {
                    referer = decodeURIComponent(params.split("referrer=")[1]);
                }
            }

            result.push({
                name: name || "Tanpa Nama",
                logo: logo,
                group: group,
                url: url,
                userAgent: userAgent,
                referer: referer,
                drm: drm,
                licenseKey: licenseKey,
                licenseUrl: licenseUrl
            });

            name = "";
            logo = "";
            group = "";
            userAgent = "";
            referer = "";
            drm = "";
            licenseKey = "";
            licenseUrl = "";
        }
    }
    return result;
}

function playTv(url, userAgent, referer, drm, licenseKey, licenseUrl) {
    if (window.Android) {
        Android.playTv(url, userAgent, referer, drm, licenseKey, licenseUrl);
    } else {
        alert(url);
    }
}

// ANTI-SLEEP STB
setInterval(() => {
    window.scrollBy(0, 1);
    window.scrollBy(0, -1);

    const dummyClick = new MouseEvent('click', {
        view: window,
        bubbles: true,
        cancelable: true
    });
    document.body.dispatchEvent(dummyClick);
    
    if (ghostVideo && ghostVideo.paused) {
        ghostVideo.play().catch(e => {});
    }
}, 60000);

window.addEventListener('load', () => {
    if (ghostVideo) {
        ghostVideo.play().catch(e => {});
    }
});
</script>

</body>
</html>
