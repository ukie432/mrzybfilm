<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Online</title>

<style>

body{
    margin:0;
    background:#111;
    font-family:Arial,sans-serif;
    color:#fff;
}


h2{
    text-align:center;
    padding:20px;
}


.grid{

    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:20px;
    padding:20px;

}


.item{

    cursor:pointer;
    outline:none;
    transition:.2s;

}


.item img{

    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    border-radius:10px;

}


.item p{

    text-align:center;
    margin:8px 0;

}


.item:focus{

    transform:scale(1.08);

}


.item:focus img{

    border:4px solid #00bfff;

}

</style>

</head>


<body>


<h2>TV ONLINE</h2>


<div class="grid" id="tvList">

Memuat TV...

</div>



<script>


const playlistURL =

"https://raw.githubusercontent.com/ukie432/mrzybfilm/refs/heads/main/Playlist.m3u";




fetch(playlistURL)


.then(response => response.text())


.then(data => {


let tvData = parseM3U(data);


let html="";



tvData.forEach(tv=>{


html += `


<div class="item"
tabindex="0"


onclick="playTv(
'${tv.url}',
'${tv.userAgent}',
'${tv.referer}',
'${tv.drm}',
'${tv.licenseKey}',
'${tv.licenseUrl}'
)">



<img loading="lazy" src="${tv.logo}">


<p>${tv.name}</p>



</div>


`;



});



document.getElementById("tvList").innerHTML=html;



})


.catch(error=>{


document.getElementById("tvList").innerHTML=

"Gagal membaca Playlist.m3u";


});







function parseM3U(data){


let lines=data.split("\n");


let result=[];



let name="";
let logo="";
let userAgent="";
let referer="";
let drm="";
let licenseKey="";
let licenseUrl="";




for(let i=0;i<lines.length;i++){


let line=lines[i].trim();





if(line.startsWith("#EXTVLCOPT:http-user-agent=")){


userAgent=line.replace(
"#EXTVLCOPT:http-user-agent=",
""
);


}





else if(line.startsWith("#EXTVLCOPT:http-referrer=")){


referer=line.replace(
"#EXTVLCOPT:http-referrer=",
""
);


}





else if(line.startsWith("#KODIPROP:inputstream.adaptive.license_type=")){


let type=line.replace(
"#KODIPROP:inputstream.adaptive.license_type=",
""
);



if(type.includes("clearkey")){

drm="clearkey";

}else{

drm=type;

}



}





else if(line.startsWith("#KODIPROP:inputstream.adaptive.license_key=")){


let key=line.replace(
"#KODIPROP:inputstream.adaptive.license_key=",
""
);



if(key.startsWith("http")){


licenseUrl=key;


}else{


licenseKey=key;


}


}





else if(line.startsWith("#EXTINF")){


let comma=line.lastIndexOf(",");


name=line.substring(comma+1);




let logoPos=line.indexOf('tvg-logo="');



if(logoPos!=-1){


logo=line.substring(

logoPos+10,

line.indexOf('"',logoPos+10)

);


}


}





else if(line.startsWith("http")){


let streamUrl=line;




// membaca format:
// url|user-agent=xxx&referrer=xxx


if(line.includes("|")){


let parts=line.split("|");


streamUrl=parts[0];


let params=parts[1];



if(params.includes("user-agent=")){


userAgent=
decodeURIComponent(
params.split("user-agent=")[1]
.split("&")[0]
);


}



if(params.includes("referrer=")){


referer=
decodeURIComponent(
params.split("referrer=")[1]
);


}


}





result.push({


name:name || "Tanpa Nama",

logo:logo,

url:streamUrl,

userAgent:userAgent,

referer:referer,

drm:drm,

licenseKey:licenseKey,

licenseUrl:licenseUrl


});




// reset channel


name="";
logo="";
userAgent="";
referer="";
drm="";
licenseKey="";
licenseUrl="";


}




}



return result;


}







function playTv(

url,

userAgent,

referer,

drm,

licenseKey,

licenseUrl

){



if(window.Android){


Android.playTv(

url,

userAgent,

referer,

drm,

licenseKey,

licenseUrl

);



}else{


alert(url);


}


}



</script>



</body>
</html>
