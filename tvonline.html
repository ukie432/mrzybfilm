<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Online</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:Arial,sans-serif;
    color:#fff;
}

h2{
    text-align:center;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:20px;
    padding:20px;
}

.item{
    cursor:pointer;
    transition:.2s;
    outline:none;
}

.item img{
    width:100%;
    border-radius:10px;
}

.item p{
    text-align:center;
    margin-top:8px;
}

.item:focus{
    transform:scale(1.08);
}

.item:focus img{
    border:4px solid #00bfff;
}
</style>

</head>

<body>

<h2>TV ONLINE</h2>

<div class="grid" id="tvList"></div>


<script>

// Ambil daftar TV dari tv.json

fetch('data/tv.json')

.then(response => response.json())

.then(data => {

let html = "";


data.forEach(tv => {


html += `

<div class="item" tabindex="0"
onclick="playTv(
'${tv.url || ""}',
'${tv.userAgent || ""}',
'${tv.referer || ""}',
'${tv.drm || ""}',
'${tv.licenseKey || ""}',
'${tv.licenseUrl || ""}'
)">


<img src="${tv.logo || ""}">

<p>${tv.name || "Tanpa Nama"}</p>


</div>

`;

});


document.getElementById("tvList").innerHTML = html;


})


.catch(error => {

document.getElementById("tvList").innerHTML =
"<p>Gagal membaca tv.json</p>";

});





function playTv(
url,
userAgent,
referer,
drm,
licenseKey,
licenseUrl
){


if(window.Android){


Android.playTv(
url,
userAgent,
referer,
drm,
licenseKey,
licenseUrl
);


}else{


alert(url);


}


}


</script>


</body>
</html>
