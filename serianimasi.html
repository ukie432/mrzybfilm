<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
    <title>MRZYB TV - Koleksi Film Jadul</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .header-banner { text-align: center; padding: 20px 0; }
        .search-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        #searchBox { width: 80%; max-width: 400px; padding: 12px; border: 2px solid #333; border-radius: 8px; background: #141414; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 0 10px; }
        
        .card-film { background: #181818; border-radius: 6px; overflow: hidden; position: relative; }
        .poster-wrapper:focus { transform: scale(1.05); border: 3px solid #E50914; outline: none; }
        .poster-wrapper { width: 100%; aspect-ratio: 2/3; cursor: pointer; border: 3px solid transparent; }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #E50914; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; cursor: pointer; }
        .eps-btn { display:block; width:100%; padding:12px; margin:5px 0; background:#333; color:white; border:none; text-align: left; }
        .eps-btn:focus { background:#E50914; outline: none; }
    </style>
</head>
<body>

<div class="header-banner"><h1>MRZYB TV</h1></div>
<div class="search-wrapper">
    <input type="text" id="searchBox" placeholder="Cari film...">
</div>

<div class="grid" id="containerUtama"></div>

<div id="popup">
    <div class="popup-content" onclick="event.stopPropagation()">
        <button class="close-x" onclick="tutupPopUpPoster()">X</button>
        <h2 id="modal-title" style="margin-top:0; color:white;"></h2>
        <div id="eps-list"></div>
    </div>
</div>
<script>
    const pageTitle = document.title.replace(/\s+/g, '_').toLowerCase(); 
    const jsonUrl = "data/seriindo.json"; 

    // ========================================================
    // LOGIKA PENYELARASAN NATIVE (MENCONTEK KODE YANG BERHASIL)
    // ========================================================
    
    // Fungsi jembatan yang dipanggil oleh tombol Back dari aplikasi Android kamu
    window.tutupPopUpPoster = function(){
        window.closePopup();
    };

    // Event Keydown Global untuk mendeteksi tombol Back Remote (4, 27, 10009)
    window.addEventListener('keydown', function(event) {
        if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009) {
            const popupElement = document.getElementById("popup");
            // Jika popup sedang aktif terbuka di layar
            if (popupElement && window.getComputedStyle(popupElement).display !== "none") {
                event.preventDefault();
                window.tutupPopUpPoster(); // Jalankan fungsi penutupan resmi
                return;
            }
        }
    }, true); 

    // Logika Navigasi Arah Atas/Bawah/Kiri/Kanan Remote
    $(document).on('keydown', function(e) {
        const activeEl = document.activeElement;

        // Jika menekan ATAS di baris poster pertama, naik ke pencarian
        if (e.keyCode == 38 && $(activeEl).hasClass('poster')) {
            const index = $('.grid .poster').index(activeEl);
            if (index < 5) {
                e.preventDefault();
                $("#search-box").focus();
                return false;
            }
        }

        // Navigasi internal di dalam Popup
        if (e.keyCode == 39 && $(activeEl).hasClass('eps-btn')) {
            $('.close-x').focus();
        } else if (e.keyCode == 37 && $(activeEl).hasClass('close-x')) {
            const currentTitle = $("#modal-title").text();
            const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + currentTitle) || 0;
            $(`.eps-btn[data-index="${lastIdx}"]`).focus();
        }
    });

    // 2. Logika Khusus di Bar Pencarian Utama
    $("#search-box").on('keydown', function(e) {
        if (e.keyCode == 13) { 
            e.preventDefault();
            $("#search").removeAttr("disabled").focus();
            return false;
        }
        else if (e.keyCode == 40) { 
            e.preventDefault();
            $(".poster").first().focus();
            return false;
        }
        else if (e.keyCode == 39 && $("#search").val().length > 0) { 
            $("#clear-btn").attr("tabindex", "0").focus();
        }
    });

    // 3. Logika Saat Mengetik di Dalam Input Asli
    $("#search").on('keydown', function(e) {
        if (e.keyCode == 40 || e.keyCode == 13) {
            $(this).attr("disabled", "disabled");
            $("#search-box").focus();
        }
    });

    // Navigasi di tombol X hapus pencarian
    $("#clear-btn").on('keydown', function(e) {
        if (e.keyCode == 37) {
            $("#search-box").focus();
        }
        else if (e.keyCode == 40) {
            $(this).attr("tabindex", "-1");
            $(".poster").first().focus();
        }
    });

    // Fungsi klik/OK pada tombol X hapus pencarian
    $("#clear-btn").on('click', function() {
        $("#search").val(""); 
        $(".poster").show(); 
        $(this).css("display", "none").attr("tabindex", "-1"); 
        $("#search-box").focus();
    });

    // Logika filter ketikan pencarian
    $("#search").on("input", function() {
        const keyword = $(this).val().toLowerCase();
        
        if (keyword.length > 0) {
            $("#clear-btn").css("display", "flex"); 
        } else {
            $("#clear-btn").css("display", "none").attr("tabindex", "-1"); 
        }

        $(".poster").each(function() {
            $(this).toggle($(this).data("title").toLowerCase().includes(keyword));
        });
    });

    // Load Data JSON Utama
    fetch(jsonUrl)
        .then(response => response.json())
        .then(data => {
            data.forEach(item => {
                const epEncoded = encodeURIComponent(JSON.stringify(item.episodes));
                $("#grid").append(`<div class="poster" tabindex="0" data-title="${item.title}" onclick='openModal("${item.title}", "${epEncoded}")'><img src="${item.poster}"><div class="poster-title">${item.title}</div></div>`);
            });
            setTimeout(() => { 
                const popupElement = document.getElementById("popup");
                if (popupElement && window.getComputedStyle(popupElement).display === "none") {
                    $(".poster").first().focus(); 
                }
            }, 600);
            checkLastSession();
        });

    // FUNGSI BUKA POPUP (MODAL)
    function openModal(title, epsEncoded) {
        localStorage.setItem(pageTitle + "_status_popup", "open");
        localStorage.setItem(pageTitle + "_last_poster_title", title);
        localStorage.setItem(pageTitle + "_judul_film", title);
        localStorage.setItem(pageTitle + "_eps_data", epsEncoded);

        // Beritahu aplikasi Android bahwa ada popup aktif (Kunci Back agar dihandle web)
        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(true);
        }

        const eps = JSON.parse(decodeURIComponent(epsEncoded));
        $("#modal-title").text(title);
        $("#eps-list").empty();
        eps.forEach((e, index) => {
            $("#eps-list").append(`<button class="eps-btn" tabindex="0" data-index="${index}" onclick="playAndSave('${e.url}', ${index}, '${title.replace(/'/g, "\\'")}')">${e.ep}</button>`);
        });
        
        $("#popup").css("display", "flex");
        
        const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + title) || 0;
        setTimeout(() => { $(`.eps-btn[data-index="${lastIdx}"]`).focus(); }, 150);
    }

    // FUNGSI PLAY VIDEO
    function playAndSave(url, index, title) {
        localStorage.setItem(pageTitle + "_last_eps_" + title, index);
        if (typeof Android !== "undefined" && Android.playVideo) {
            Android.playVideo(url);
        } else {
            window.open(url, "_blank");
        }
    }

    // FUNGSI TUTUP POPUP (MODAL) - SEKARANG SEJAJAR DENGAN KODE SUKSES KAMU
    window.closePopup = function() { 
        // 1. Sembunyikan popup secara instan
        $("#popup").css("display", "none"); 
        
        // 2. Bersihkan penyimpanan lokal
        localStorage.removeItem(pageTitle + "_status_popup");
        localStorage.removeItem(pageTitle + "_judul_film");
        localStorage.removeItem(pageTitle + "_eps_data");

        // 3. Kembalikan fokus ke poster terakhir agar kursor remote tidak hilang/loncat
        const lastTitle = localStorage.getItem(pageTitle + "_last_poster_title");
        if (lastTitle) {
            setTimeout(() => {
                $(`.poster[data-title="${lastTitle}"]`).focus();
            }, 150);
        }

        // 4. Langsung matikan status gembok popup di sisi Android (Tanpa setTimeout delay)
        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(false);
        }
    };

    // Memeriksa Sesi Terakhir (Jika aplikasi tidak sengaja ter-reload)
    function checkLastSession() {
        if (localStorage.getItem(pageTitle + "_status_popup") === "open") {
            const title = localStorage.getItem(pageTitle + "_judul_film");
            const eps = localStorage.getItem(pageTitle + "_eps_data");
            if(title && eps) openModal(title, eps);
        }
    }
</script>

<script>
    // Efek Suara Navigasi Remote
    const soundClick = new Audio('https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav'); 

    function playSound() {
        soundClick.currentTime = 0;
        soundClick.play().catch(e => console.log("Menunggu interaksi remote..."));
    }

    document.addEventListener('focus', function(e) {
        if ($(e.target).hasClass('poster') || $(e.target).hasClass('eps-btn') || $(e.target).hasClass('close-x') || e.target.id === 'clear-btn' || e.target.id === 'search-box') {
            playSound();
        }
    }, true);
</script>
</body>
</html>
