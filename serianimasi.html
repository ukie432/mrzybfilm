<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>MRZYB TV - Koleksi Film animasi</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* CSS Gabungan dari kedua file Anda */
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .grid { display: flex; flex-wrap: wrap; padding: 20px; }
        .card-film { width: 160px; margin: 10px; background: #181818; border-radius: 8px; overflow: hidden; cursor: pointer; }
        .card-film:focus { transform: scale(1.05); border: 2px solid #E50914; outline: none; }
        .poster-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #E50914; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; cursor: pointer; }
        .eps-btn { display:block; width:100%; padding:10px; margin:5px 0; background:#333; color:white; border:none; text-align: left; }
        .eps-btn:focus { background:#E50914; outline: none; }
    </style>
</head>
<body>

<div class="grid" id="containerUtama"></div>

<div id="popup">
    <div class="popup-content">
        <button class="close-x" onclick="closePopup()">X</button>
        <h2 id="modal-title"></h2>
        <div id="eps-list"></div>
    </div>
</div>

<script>
    // 1. Logika Tombol Back (Menangani Popup)
    window.addEventListener('keydown', function(event) {
        if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009) {
            const popup = document.getElementById("popup");
            if (popup.style.display === "flex") {
                event.preventDefault();
                closePopup();
            } else if (typeof Android !== "undefined" && Android.exitApp) {
                Android.exitApp();
            }
        }
    });

    // 2. Fungsi Popup
    function openModal(title, episodes, id) {
        localStorage.setItem("last_id", id); // Simpan ID untuk fokus kembali
        $("#modal-title").text(title);
        $("#eps-list").empty();
        
        JSON.parse(episodes).forEach((e, index) => {
            $("#eps-list").append(`<button class="eps-btn" onclick="playVideo('${e.url}')">${e.ep}</button>`);
        });
        
        $("#popup").css("display", "flex");
        $(".close-x").focus();
    }

    function closePopup() {
        $("#popup").css("display", "none");
        const lastId = localStorage.getItem("last_id");
        if (lastId) {
            setTimeout(() => { document.getElementById(lastId).focus(); }, 100);
        }
    }

    function playVideo(url) {
        if (typeof Android !== "undefined" && Android.playVideo) {
            Android.playVideo(url);
        } else {
            window.open(url, "_blank");
        }
    }

    // 3. Load Data
    fetch('data/serianimasi.json')
        .then(response => response.json())
        .then(data => {
            data.forEach(film => {
                const epData = JSON.stringify(film.episodes || [{ep:"Play", url:film.url}]);
                $("#containerUtama").append(`
                    <div class="card-film" id="${film.id}" tabindex="0" onclick='openModal("${film.title}", \`${epData}\`, "${film.id}")'>
                        <img class="poster-img" src="${film.img}">
                        <div style="padding:10px">${film.title}</div>
                    </div>
                `);
            });
        });
</script>
</body>
</html>
