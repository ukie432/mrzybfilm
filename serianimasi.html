<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
    <title>MRZYB TV - Koleksi Film Jadul</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Gaya Asli Anda */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #000; color: #fff; padding-bottom: 50px; }
        .header-banner { text-align: center; padding: 20px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 0 10px; }
        .card-film { background: #181818; border-radius: 6px; overflow: hidden; }
        .poster-wrapper { width: 100%; aspect-ratio: 2/3; cursor: pointer; border: 2px solid transparent; }
        .poster-wrapper:focus { border: 2px solid #E50914; outline: none; }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .btn-fav { width: 100%; padding: 6px; background: #222; color: #bbb; border: none; cursor: pointer; }
        .btn-fav.active { color: #ffcc00; }

        /* Gaya Popup Baru */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #E50914; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; cursor: pointer; z-index: 101; }
        .eps-btn { display:block; width:100%; padding:10px; margin:5px 0; background:#333; color:white; border:none; text-align: left; }
        .eps-btn:focus { background:#E50914; outline: none; }
    </style>
</head>
<body>

<div class="header-banner"><h1>MRZYB TV</h1></div>
<div class="grid" id="containerUtama"></div>

<div id="popup">
    <div class="popup-content" onclick="event.stopPropagation()">
        <button class="close-x" onclick="tutupPopUpPoster()">X</button>
        <h2 id="modal-title" style="margin-top:0; color:white;"></h2>
        <div id="eps-list"></div>
    </div>
</div>

<script>
    // FUNGSI POPUP GLOBAL
    window.tutupPopUpPoster = function() {
        $("#popup").css("display", "none");
        if (typeof Android !== "undefined" && Android.setPopUpStatus) Android.setPopUpStatus(false);
        const lastId = localStorage.getItem("last_card_id");
        if (lastId) {
            setTimeout(() => { document.getElementById(lastId).focus(); }, 150);
        }
    };

    window.addEventListener('keydown', function(e) {
        if ([4, 27, 10009].includes(e.keyCode)) {
            if ($("#popup").is(":visible")) {
                e.preventDefault();
                tutupPopUpPoster();
            }
        }
    }, true);

    function openModal(title, epsEncoded, cardId) {
        localStorage.setItem("last_card_id", cardId);
        if (typeof Android !== "undefined" && Android.setPopUpStatus) Android.setPopUpStatus(true);
        
        const episodes = JSON.parse(decodeURIComponent(epsEncoded));
        $("#modal-title").text(title);
        $("#eps-list").empty();
        episodes.forEach(e => {
            $("#eps-list").append(`<button class="eps-btn" onclick="playVideo('${e.url}')">${e.ep}</button>`);
        });
        $("#popup").css("display", "flex");
        $(".close-x").focus();
    }

    function playVideo(url) {
        if (typeof Android !== "undefined" && Android.playVideo) Android.playVideo(url);
        else window.open(url, "_blank");
    }

    // LOAD DATA
    fetch('data/jadul.json')
    .then(r => r.json())
    .then(data => {
        data.forEach(film => {
            const epsEncoded = encodeURIComponent(JSON.stringify(film.episodes));
            const cardId = "card-" + film.id;
            $("#containerUtama").append(`
                <div class="card-film" id="${cardId}">
                    <div class="poster-wrapper" tabindex="0" onclick="openModal('${film.title.replace(/'/g, "\\'")}', '${epsEncoded}', '${cardId}')">
                        <img src="${film.img}">
                    </div>
                    <button class="btn-fav">Favorit</button>
                    <div style="padding:5px; font-size:12px; text-align:center">${film.title}</div>
                </div>
            `);
        });
    });
</script>
</body>
</html>
