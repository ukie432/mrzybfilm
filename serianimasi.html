<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MRZYBtv Series</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        
        .navbar { padding: 20px; text-align: center; background: #111; position: sticky; top: 0; z-index: 10; }
        .search-container { position: relative; display: inline-block; width: 80%; max-width: 400px; }
        
        /* Elemen pembungkus luar yang menerima fokus navigasi remote */
        .search-bar-wrapper { 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            border: 3px solid transparent; 
            box-sizing: border-box; 
            display: flex; 
            align-items: center; 
            cursor: pointer;
        }
        /* Efek saat bar pencarian disorot/dipilih (selection) */
        .search-bar-wrapper:focus { border-color: #00c54f; outline: none; }
        
        /* Input asli dibuat tanpa border dan diatur agar tidak merespon fokus otomatis */
        #search { 
            width: 100%; 
            padding: 12px 40px 12px 15px; 
            border: none; 
            outline: none; 
            background: transparent; 
            font-size: 16px; 
            color: #000; 
            box-sizing: border-box; 
        }
        
        .clear-search { 
            position: absolute; 
            right: 12px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: #444; 
            color: #fff; 
            border: none; 
            border-radius: 50%; 
            width: 22px; 
            height: 22px; 
            font-size: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            line-height: 1;
            z-index: 12;
        }
        .clear-search:focus { background: red; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 20px; }
        .poster { cursor: pointer; border: 3px solid #333; border-radius: 8px; overflow: hidden; transition: 0.2s; background: #111; }
        .poster:focus { transform: scale(1.1); border-color: #00c54f; outline: none; }
        .poster img { width: 100%; height: 200px; object-fit: cover; }
        
        .poster-title { padding: 8px; font-size: 14px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .poster:focus .poster-title { color: #00c54f; }
        
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #00c54f; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 101; }
        .close-x:focus { outline: 3px solid #00c54f; transform: scale(1.1); }
        #eps-list { max-height: 300px; overflow-y: auto; margin-top: 15px; padding-right: 10px; }
        .eps-btn { display:block; width:100%; padding:10px; margin:5px 0; background:#333; border:none; color:white; text-align: left; }
        .eps-btn:focus { background:#00c54f; color:black; outline: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="search-container">
            <div class="search-bar-wrapper" id="search-box" tabindex="0">
                <input type="text" id="search" disabled placeholder="Cari (Tekan OK/Enter di remote untuk mulai)...">
            </div>
            <button id="clear-btn" class="clear-search" tabindex="-1">X</button>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div id="popup" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <button class="close-x" onclick="closePopup()" tabindex="0">X</button>
            <h2 id="modal-title" style="margin-top:0; padding-right: 30px;"></h2>
            <div id="eps-list"></div>
        </div>
    </div>

<script>
    const jsonUrl = "data/serianimasi.json";

    // 1. Logika Navigasi Umum Remote
    $(document).on('keydown', function(e) {
        const activeEl = document.activeElement;

        // Jika menekan ATAS di baris pertama, biarkan naik normal ke bar pencarian
        if (e.keyCode == 38 && activeEl.classList.contains('poster')) {
            const index = $('.grid .poster').index(activeEl);
            if (index < 5) {
                e.preventDefault();
                $("#search-box").focus();
                return false;
            }
        }

        // Navigasi Popup
        if (e.keyCode == 39 && activeEl.classList.contains('eps-btn')) {
            $('.close-x').focus();
        } else if (e.keyCode == 37 && activeEl.classList.contains('close-x')) {
            const currentTitle = $("#modal-title").text();
            const lastIdx = localStorage.getItem("last_eps_" + currentTitle) || 0;
            $(`.eps-btn[data-index="${lastIdx}"]`).focus();
        }
    });

    // 2. Logika Khusus di Bar Pencarian Utama
    $("#search-box").on('keydown', function(e) {
        // Jika tekan OK/Enter (13) baru aktifkan input asli dan munculkan keyboard
        if (e.keyCode == 13) {
            e.preventDefault();
            $("#search").removeAttr("disabled").focus();
            return false;
        }
        // Jika tekan BAWAH (40), kembali ke poster pertama tanpa membuka apa-apa
        else if (e.keyCode == 40) {
            e.preventDefault();
            $(".poster").first().focus();
            return false;
        }
        // Jika ada tulisan dan tekan KANAN (39), arahkan ke tombol X hapus
        else if (e.keyCode == 39 && $("#search").val().length > 0) {
            $("#clear-btn").attr("tabindex", "0").focus();
        }
    });

    // 3. Logika Saat Mengetik di Dalam Input Asli
    $("#search").on('keydown', function(e) {
        // Jika sedang mengetik lalu tekan Bawah (40) atau OK/Enter (13), kunci keyboard kembali
        if (e.keyCode == 40 || e.keyCode == 13) {
            $(this).attr("disabled", "disabled"); // Matikan input agar keyboard menutup
            $("#search-box").focus(); // Kembalikan fokus ke pembungkus luar luar
        }
    });

    // Navigasi di tombol X hapus
    $("#clear-btn").on('keydown', function(e) {
        if (e.keyCode == 37) { // Kiri kembali ke kotak pencarian
            $("#search-box").focus();
        }
        else if (e.keyCode == 40) { // Bawah langsung ke poster teratas
            $(this).attr("tabindex", "-1");
            $(".poster").first().focus();
        }
    });

    // Fungsi klik/OK pada tombol X untuk menghapus teks pencarian instan
    $("#clear-btn").on('click', function() {
        $("#search").val(""); 
        $(".poster").show(); 
        $(this).css("display", "none").attr("tabindex", "-1"); 
        $("#search-box").focus();
    });

    // Logika menampilkan/menyembunyikan tombol X serta filter poster
    $("#search").on("input", function() {
        const keyword = $(this).val().toLowerCase();
        
        if (keyword.length > 0) {
            $("#clear-btn").css("display", "flex"); 
        } else {
            $("#clear-btn").css("display", "none").attr("tabindex", "-1"); 
        }

        $(".poster").each(function() {
            $(this).toggle($(this).data("title").toLowerCase().includes(keyword));
        });
    });

    // Load Data JSON
    fetch(jsonUrl)
        .then(response => response.json())
        .then(data => {
            data.forEach(item => {
                const epEncoded = encodeURIComponent(JSON.stringify(item.episodes));
                $("#grid").append(`<div class="poster" tabindex="0" data-title="${item.title}" onclick='openModal("${item.title}", "${epEncoded}")'><img src="${item.poster}"><div class="poster-title">${item.title}</div></div>`);
            });
            setTimeout(() => { if (localStorage.getItem("status_popup") !== "open") $(".poster").first().focus(); }, 600);
            checkLastSession();
        });

    function openModal(title, epsEncoded) {
        localStorage.setItem("status_popup", "open");
        localStorage.setItem("last_poster_title", title);
        localStorage.setItem("judul_film", title);
        localStorage.setItem("eps_data", epsEncoded);
        const eps = JSON.parse(decodeURIComponent(epsEncoded));
        $("#modal-title").text(title);
        $("#eps-list").empty();
        eps.forEach((e, index) => {
            $("#eps-list").append(`<button class="eps-btn" tabindex="0" data-index="${index}" onclick="playAndSave('${e.url}', ${index}, '${title.replace(/'/g, "\\'")}')">${e.ep}</button>`);
        });
        $("#popup").css("display", "flex");
        const lastIdx = localStorage.getItem("last_eps_" + title) || 0;
        setTimeout(() => { $(`.eps-btn[data-index="${lastIdx}"]`).focus(); }, 200);
    }

    function playAndSave(url, index, title) {
        localStorage.setItem("last_eps_" + title, index);
        Android.playVideo(url);
    }

    function closePopup() { 
        $("#popup").hide(); 
        localStorage.setItem("status_popup", "closed");
        const lastTitle = localStorage.getItem("last_poster_title");
        if (lastTitle) setTimeout(() => { $(`.poster[data-title="${lastTitle}"]`).focus(); }, 100);
    }

    function checkLastSession() {
        if (localStorage.getItem("status_popup") === "open") {
            const title = localStorage.getItem("judul_film");
            const eps = localStorage.getItem("eps_data");
            if(title && eps) openModal(title, eps);
        }
    }
</script>

<script>
    const soundClick = new Audio('https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav'); 

    function playSound() {
        soundClick.currentTime = 0;
        soundClick.play().catch(e => console.log("Menunggu interaksi remote..."));
    }

    document.addEventListener('focus', function(e) {
        if (e.target.classList.contains('poster') || e.target.classList.contains('eps-btn') || e.target.classList.contains('close-x') || e.target.id === 'clear-btn' || e.target.id === 'search-box') {
            playSound();
        }
    }, true);
</script>
</body>
</html>
