<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
 <link rel="preconnect" href="https://posterfilm.pages.dev">
<link rel="preconnect" href="https://iptv-posterku.pages.dev">

    <meta charset="UTF-8">
    <title>MRZYBtv Series Animasi</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        
        .navbar { padding: 20px; text-align: center; background: #111; position: relative; z-index: 10; }
        .search-container { position: relative; display: inline-block; width: 80%; max-width: 400px; }
        
        .search-bar-wrapper { 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            border: 3px solid transparent; 
            box-sizing: border-box; 
            display: flex; 
            align-items: center; 
            cursor: pointer;
        }
        .search-bar-wrapper:focus { border-color: #00c54f; outline: none; }
        
        #search { 
            width: 100%; 
            padding: 12px 40px 12px 15px; 
            border: none; 
            outline: none; 
            background: transparent; 
            font-size: 16px; 
            color: #000; 
            box-sizing: border-box; 
        }
        
        .clear-search { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); 
            background: #444; color: #fff; border: none; border-radius: 50%; 
            width: 22px; height: 22px; font-size: 12px; font-weight: bold; 
            cursor: pointer; display: none; align-items: center; justify-content: center; 
            z-index: 12;
        }
        .clear-search:focus { background: red; outline: none; }

        /* Grid & Poster */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
        }
        .poster { cursor: pointer; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #111; }
        .poster:focus { transform: scale(1.05); border-color: #00c54f; outline: none; }
        
        .poster img { 
            width: 100%; 
            aspect-ratio: 3 / 4; 
            object-fit: cover; 
            display: block; 
        }
        
        .poster-title { padding: 8px; font-size: 14px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .poster:focus .poster-title { color: #00c54f; }
        
        /* Popup */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #00c54f; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 101; }
        .close-x:focus { outline: 3px solid #00c54f; transform: scale(1.1); }
        #eps-list { max-height: 300px; overflow-y: auto; margin-top: 15px; padding-right: 10px; }
        .eps-btn { display:block; width:100%; padding:10px; margin:5px 0; background:#333; border:none; color:white; text-align: left; }
        .eps-btn:focus { background:#00c54f; color:black; outline: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="search-container">
            <div class="search-bar-wrapper" id="search-box" tabindex="0">
              <input type="text" id="search" placeholder="Cari...">
            </div>
            <button id="clear-btn" class="clear-search" tabindex="-1">X</button>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div id="popup">
        <div class="popup-content" onclick="event.stopPropagation()">
            <button class="close-x" onclick="closePopup()" tabindex="0">X</button>
            <h2 id="modal-title" style="margin-top:0; padding-right: 30px;"></h2>
            <div id="eps-list"></div>
        </div>
    </div>

<script>
    const pageTitle = document.title.replace(/\s+/g, '_').toLowerCase(); 
    const jsonUrl = "data/serianimasi.json"; 

    // ========================================================
    // LOGIKA PENYELARASAN NATIVE (MENCONTEK KODE YANG BERHASIL)
    // ========================================================
    
    // Fungsi jembatan yang dipanggil oleh tombol Back dari aplikasi Android kamu
    window.tutupPopUpPoster = function(){
        window.closePopup();
    };

    // Event Keydown Global untuk mendeteksi tombol Back Remote (4, 27, 10009)
    window.addEventListener('keydown', function(event) {
        if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009) {
            const popupElement = document.getElementById("popup");
            // Jika popup sedang aktif terbuka di layar
            if (popupElement && window.getComputedStyle(popupElement).display !== "none") {
                event.preventDefault();
                window.tutupPopUpPoster(); // Jalankan fungsi penutupan resmi
                return;
            }
        }
    }, true); 

    // Logika Navigasi Arah Atas/Bawah/Kiri/Kanan Remote
    $(document).on('keydown', function(e) {
        const activeEl = document.activeElement;
        
if (e.keyCode == 13 && $(document.activeElement).hasClass("poster")) {

    e.preventDefault();

    openModal(Number(document.activeElement.dataset.index));

    return false;

}

        // Jika menekan ATAS di baris poster pertama, naik ke pencarian
        if (e.keyCode == 38 && $(activeEl).hasClass('poster')) {
            const index = $('.grid .poster').index(activeEl);
            if (index < 5) {
                e.preventDefault();
                document.getElementById("search-box").focus();
                return false;
            }
        }

        // Navigasi internal di dalam Popup
        if (e.keyCode == 39 && $(activeEl).hasClass('eps-btn')) {
            document.querySelector(".close-x")?.focus();
        } else if (e.keyCode == 37 && $(activeEl).hasClass('close-x')) {
            const currentTitle = $("#modal-title").text();
            const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + currentTitle) || 0;
            $(`.eps-btn[data-index="${lastIdx}"]`).focus();
        }
        
        
        setTimeout(() => {

    const index = Number(document.activeElement.dataset.pos);

    if (!isNaN(index) && index >= loaded - 10 && loaded < allData.length) {
        loadMore();
    }

}, 50);
        
        
    });

    // 2. Logika Khusus di Bar Pencarian Utama
    $("#search-box").on("keydown click touchstart", function(e) {

    if (e.type === "click" || e.type === "touchstart") {
        $("#search").focus();
        return;
    }

    if (e.keyCode == 13) {
        e.preventDefault();
        $("#search").focus();
        return false;
    }

    if (e.keyCode == 40) {
        e.preventDefault();
        document.querySelector(".poster")?.focus();
        return false;
    }

    if (e.keyCode == 39 && $("#search").val().length > 0) {
        $("#clear-btn").attr("tabindex", "0").focus();
    }

});

    // 3. Logika Saat Mengetik di Dalam Input Asli
    $("#search").on("keydown", function(e) {

    if (e.keyCode == 40) {
        e.preventDefault();
        document.getElementById("search-box").focus();
        document.querySelector(".poster")?.focus();
    }

    if (e.keyCode == 13) {
        e.preventDefault();
    }

});
    // Navigasi di tombol X hapus pencarian
    $("#clear-btn").on('keydown', function(e) {
        if (e.keyCode == 37) {
            document.getElementById("search-box").focus();
        }
        else if (e.keyCode == 40) {
            $(this).attr("tabindex", "-1");
            document.querySelector(".poster")?.focus();
        }
    });

    // Fungsi klik/OK pada tombol X hapus pencarian
    $("#clear-btn").on('click', function() {

    $("#search").val("");

    document.getElementById("grid").replaceChildren();

    loaded = 0;

    loadMore();

    $(this).hide().attr("tabindex","-1");

    document.getElementById("search-box").focus();

});

    // Logika filter ketikan pencarian
    

let searchTimer;

$("#search").on("input", function () {

    clearTimeout(searchTimer);

    searchTimer = setTimeout(() => {

        const keyword = $("#search").val().trim().toLowerCase();

        if (keyword.length > 0) {
            $("#clear-btn").css("display", "flex");
        } else {
            $("#clear-btn").css("display", "none").attr("tabindex", "-1");

            loaded = 0;
            document.getElementById("grid").replaceChildren();
            loadMore();
            return;
        }

        document.getElementById("grid").replaceChildren();

        const fragment = document.createDocumentFragment();

        allData
            .filter(item => item.title.toLowerCase().includes(keyword))
            .forEach((item, index) => {

                const div = document.createElement("div");

                div.className = "poster";
                div.tabIndex = 0;
                div.dataset.index = allData.indexOf(item);
                div.dataset.title = item.title;

                div.innerHTML = `
                    <img src="${item.poster}" loading="lazy" decoding="async">
                    <div class="poster-title">${item.title}</div>
                `;

                fragment.appendChild(div);

            });

        document.getElementById("grid").appendChild(fragment);

    }, 200);

});

    // Load Data JSON Utama
    let allData = [];
let loaded = 0;
const LOAD_SIZE = 40;

fetch(jsonUrl)
.then(response => response.json())
.then(data => {

    allData = data;

    loadMore();
    
    
    
document.getElementById("grid").addEventListener("click", function(e){

    const poster = e.target.closest(".poster");

    if(!poster) return;

    openModal(Number(poster.dataset.index));

});
    
    
    
    
    function checkLoadMore() {

    const posters = document.querySelectorAll(".poster");

    if (!posters.length) return;

    const index = [...posters].indexOf(document.activeElement);

    if (index >= loaded - 10 && loaded < allData.length) {
        loadMore();
    }

}
    
    
    

    setTimeout(() => {
        const popupElement = document.getElementById("popup");
        if (popupElement && window.getComputedStyle(popupElement).display === "none") {
            document.querySelector(".poster")?.focus();
        }
    },600);

    checkLastSession();

});

function loadMore(){

    const fragment=document.createDocumentFragment();

    const end=Math.min(loaded+LOAD_SIZE,allData.length);

    for(let i=loaded;i<end;i++){

        const item = allData[i];

const div = document.createElement("div");
div.className = "poster";
div.tabIndex = 0;
div.dataset.title = item.title;

div.dataset.index = i;
div.dataset.pos = i;

div.innerHTML = `
    <img src="${item.poster}" loading="lazy" decoding="async">
    <div class="poster-title">${item.title}</div>
`;

fragment.appendChild(div);

        

    }

    grid.appendChild(fragment);

    loaded=end;

}    



        
       
window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
        if (loaded < allData.length) {
            loadMore();
        }
    }
});

document.addEventListener("focusin", () => {
    const posters = document.querySelectorAll(".poster");
    const index = Array.from(posters).indexOf(document.activeElement);

    if (index >= loaded - 10 && loaded < allData.length) {
        loadMore();
    }
}); 
        



            
        
        
    

    // FUNGSI BUKA POPUP (MODAL)
    function openModal(index) {

    const item = allData[index];

localStorage.setItem(pageTitle + "_judul_film", item.title);
    const title = item.title;
    const eps = item.episodes;
        localStorage.setItem(pageTitle + "_status_popup", "open");
        localStorage.setItem(pageTitle + "_last_poster_title", title);
        localStorage.setItem(pageTitle + "_judul_film", title);
        

        // Beritahu aplikasi Android bahwa ada popup aktif (Kunci Back agar dihandle web)
        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(true);
        }

        
        $("#modal-title").text(title);
        $("#eps-list").empty();
        eps.forEach((e, index) => {
            $("#eps-list").append(`<button class="eps-btn" tabindex="0" data-index="${index}" onclick="playAndSave('${e.url}', ${index}, '${title.replace(/'/g, "\\'")}')">${e.ep}</button>`);
        });
        
        $("#popup").css("display", "flex");
        
        const lastIdx = localStorage.getItem(pageTitle + "_last_eps_" + title) || 0;
        setTimeout(() => { $(`.eps-btn[data-index="${lastIdx}"]`).focus(); }, 150);
    }

    // FUNGSI PLAY VIDEO
    function playAndSave(url, index, title) {
        localStorage.setItem(pageTitle + "_last_eps_" + title, index);
        if (typeof Android !== "undefined" && Android.playVideo) {
            Android.playVideo(url);
        } else {
            window.open(url, "_blank");
        }
    }

    // FUNGSI TUTUP POPUP (MODAL) - SEKARANG SEJAJAR DENGAN KODE SUKSES KAMU
    window.closePopup = function() { 
        // 1. Sembunyikan popup secara instan
        $("#popup").css("display", "none"); 
        
        // 2. Bersihkan penyimpanan lokal
        localStorage.removeItem(pageTitle + "_status_popup");
        localStorage.removeItem(pageTitle + "_judul_film");
        localStorage.removeItem(pageTitle + "_eps_data");

        // 3. Kembalikan fokus ke poster terakhir agar kursor remote tidak hilang/loncat
        const lastTitle = localStorage.getItem(pageTitle + "_last_poster_title");
        if (lastTitle) {
            setTimeout(() => {
                $(`.poster[data-title="${lastTitle}"]`).focus();
            }, 150);
        }

        // 4. Langsung matikan status gembok popup di sisi Android (Tanpa setTimeout delay)
        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(false);
        }
    };

    // Memeriksa Sesi Terakhir (Jika aplikasi tidak sengaja ter-reload)
    function checkLastSession() {

    if (localStorage.getItem(pageTitle + "_status_popup") !== "open") return;

    const title = localStorage.getItem(pageTitle + "_judul_film");

    if (!title) return;

    const index = allData.findIndex(item => item.title === title);

    if (index !== -1) {
        openModal(index);
    }

}
</script>

<script>
    // Efek Suara Navigasi Remote
    const soundClick = new Audio('https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav'); 

    function playSound() {
        soundClick.currentTime = 0;
        soundClick.play().catch(e => console.log("Menunggu interaksi remote..."));
    }

    document.addEventListener('focus', function(e) {
        if ($(e.target).hasClass('poster') || $(e.target).hasClass('eps-btn') || $(e.target).hasClass('close-x') || e.target.id === 'clear-btn' || e.target.id === 'search-box') {
            playSound();
        }
    }, true);
</script>
</body>
</html>
