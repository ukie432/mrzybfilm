<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>MRZYB TV - Koleksi Film animasi</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Gaya Dasar */
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .header { text-align: center; padding: 20px; }
        .search-wrapper { text-align: center; margin-bottom: 20px; }
        .search-box { padding: 10px; width: 80%; max-width: 400px; border-radius: 20px; border: none; }
        
        /* Grid Poster */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .card-film { width: 150px; background: #181818; border-radius: 8px; overflow: hidden; }
        .card-film:focus { transform: scale(1.05); border: 2px solid #E50914; outline: none; }
        .poster-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; cursor: pointer; }
        
        /* Popup */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #E50914; position: relative; }
        .close-x { position: absolute; top: -10px; right: -10px; width: 40px; height: 40px; background: red; color: white; border-radius: 50%; border: none; cursor: pointer; }
        .eps-btn { display:block; width:100%; padding:10px; margin:5px 0; background:#333; color:white; border:none; text-align: left; }
        .eps-btn:focus { background:#E50914; outline: none; }
    </style>
</head>
<body>

<div class="header"><h1>MRZYB TV</h1></div>
<div class="search-wrapper">
    <input type="text" id="searchBox" class="search-box" placeholder="Cari film...">
</div>

<div class="grid" id="containerUtama"></div>

<!-- Popup -->
<div id="popup">
    <div class="popup-content">
        <button class="close-x" onclick="closePopup()">X</button>
        <h2 id="modal-title"></h2>
        <div id="eps-list"></div>
    </div>
</div>

<script>
    // 1. Logika Tombol Back (Menangani Popup)
    window.addEventListener('keydown', function(e) {
        if (e.keyCode === 4 || e.keyCode === 27 || e.keyCode === 10009) {
            if ($("#popup").is(":visible")) {
                e.preventDefault();
                closePopup();
            } else if (typeof Android !== "undefined" && Android.exitApp) {
                Android.exitApp();
            }
        }
    });

    // 2. Fungsi Popup
    function openModal(title, episodes, id) {
        localStorage.setItem("last_focus_id", id);
        $("#modal-title").text(title);
        $("#eps-list").empty();
        JSON.parse(episodes).forEach(e => {
            $("#eps-list").append(`<button class="eps-btn" onclick="playVideo('${e.url}')">${e.ep}</button>`);
        });
        $("#popup").css("display", "flex");
        $(".close-x").focus();
    }

    function closePopup() {
        $("#popup").css("display", "none");
        const lastId = localStorage.getItem("last_focus_id");
        if (lastId) {
            setTimeout(() => { document.getElementById(lastId).focus(); }, 100);
        }
    }

    function playVideo(url) {
        if (typeof Android !== "undefined" && Android.playVideo) {
            Android.playVideo(url);
        } else {
            window.open(url, "_blank");
        }
    }

    // 3. Load Data & Fitur
    fetch('data/serianimasi.json')
        .then(response => response.json())
        .then(data => {
            data.forEach(film => {
                const epData = JSON.stringify(film.episodes || [{ep:"Play", url:film.url}]);
                $("#containerUtama").append(`
                    <div class="card-film" id="${film.id}" tabindex="0">
                        <img class="poster-img" src="${film.img}" onclick='openModal("${film.title}", \`${epData}\`, "${film.id}")'>
                        <div style="padding:5px; font-size:12px; text-align:center">${film.title}</div>
                        <button class="btn-fav" onclick="toggleFav('${film.id}')">★</button>
                    </div>
                `);
            });
        });

    // 4. Fitur Pencarian
    $("#searchBox").on("input", function() {
        const val = $(this).val().toLowerCase();
        $(".card-film").each(function() {
            $(this).toggle($(this).text().toLowerCase().includes(val));
        });
    });

    // 5. Fitur Favorit (Simpel)
    function toggleFav(id) {
        let favs = JSON.parse(localStorage.getItem('favs') || '[]');
        if (favs.includes(id)) favs = favs.filter(i => i !== id);
        else favs.push(id);
        localStorage.setItem('favs', JSON.stringify(favs));
        alert("Favorit diperbarui!");
    }
</script>
</body>
</html>
