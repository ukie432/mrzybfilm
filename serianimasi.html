<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MRZYB TV</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; padding: 20px; }
        .poster { cursor: pointer; border: 3px solid #333; border-radius: 8px; overflow: hidden; background: #111; }
        .poster:focus { transform: scale(1.05); border-color: #00c54f; outline: none; }
        .poster img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #00c54f; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; cursor: pointer; z-index: 101; }
        .eps-btn { display:block; width:100%; padding:10px; margin:5px 0; background:#333; color:white; border:none; text-align: left; }
        .eps-btn:focus { background:#00c54f; outline: none; }
    </style>
</head>
<body>

<div class="grid" id="grid"></div>

<div id="popup">
    <div class="popup-content" onclick="event.stopPropagation()">
        <button class="close-x" onclick="tutupPopUpPoster()">X</button>
        <h2 id="modal-title"></h2>
        <div id="eps-list"></div>
    </div>
</div>

<script>
    const pageTitle = "mrzybtv";

    // 1. FUNGSI WAJIB UNTUK ANDROID
    window.tutupPopUpPoster = function() {
        window.closePopup();
    };

    // 2. DETEKSI TOMBOL BACK (MENCEGAH MENTAL)
    window.addEventListener('keydown', function(event) {
        if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009) {
            const popupElement = document.getElementById("popup");
            if (popupElement && window.getComputedStyle(popupElement).display !== "none") {
                event.preventDefault();
                event.stopPropagation();
                window.tutupPopUpPoster();
                return false;
            }
        }
    }, true);

    // 3. FUNGSI TUTUP POPUP (Sama persis dengan yang berhasil)
    window.closePopup = function() {
        $("#popup").css("display", "none");
        
        // PENTING: Mencari poster berdasarkan data-title
        const lastTitle = localStorage.getItem(pageTitle + "_last_poster_title");
        if (lastTitle) {
            setTimeout(() => {
                $(`.poster[data-title="${lastTitle}"]`).focus();
            }, 150);
        }

        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(false);
        }
    };

    // 4. LOAD DATA & FUNGSI LAIN
    function openModal(title, epsEncoded) {
        localStorage.setItem(pageTitle + "_last_poster_title", title);
        
        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(true);
        }

        const eps = JSON.parse(decodeURIComponent(epsEncoded));
        $("#modal-title").text(title);
        $("#eps-list").empty();
        eps.forEach((e) => {
            $("#eps-list").append(`<button class="eps-btn" onclick="playVideo('${e.url}')">${e.ep}</button>`);
        });
        $("#popup").css("display", "flex");
        $(".close-x").focus();
    }

    function playVideo(url) {
        if (typeof Android !== "undefined" && Android.playVideo) Android.playVideo(url);
        else window.open(url, "_blank");
    }

    // Ganti 'data/seriindo.json' dengan file Anda
    fetch('data/seriindo.json')
        .then(res => res.json())
        .then(data => {
            data.forEach(item => {
                const epEncoded = encodeURIComponent(JSON.stringify(item.episodes));
                $("#grid").append(`
                    <div class="poster" tabindex="0" data-title="${item.title}" onclick='openModal("${item.title}", "${epEncoded}")'>
                        <img src="${item.poster}">
                        <div class="poster-title">${item.title}</div>
                    </div>
                `);
            });
            $(".poster").first().focus();
        });
</script>
</body>
</html>
