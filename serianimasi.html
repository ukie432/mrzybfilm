<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
    <title>MRZYB TV - Koleksi Film Jadul</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Gaya CSS Anda */
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .header-banner { text-align: center; padding: 20px 0; }
        .search-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        #searchBox { width: 80%; max-width: 400px; padding: 12px; border: 2px solid #333; border-radius: 8px; background: #141414; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 0 10px; }
        .card-film { background: #181818; border-radius: 6px; overflow: hidden; position: relative; }
        .card-film:focus-within { transform: scale(1.05); border: 2px solid #E50914; outline: none; }
        .poster-wrapper { width: 100%; aspect-ratio: 2/3; cursor: pointer; }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Popup Baru */
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:25px; border-radius:15px; width:80%; max-width:500px; border:2px solid #E50914; position: relative; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; cursor: pointer; }
        .eps-btn { display:block; width:100%; padding:12px; margin:5px 0; background:#333; color:white; border:none; text-align: left; }
        .eps-btn:focus { background:#E50914; outline: none; }
    </style>
</head>
<body>

<div class="header-banner"><h1>MRZYB TV</h1></div>
<div class="search-wrapper">
    <input type="text" id="searchBox" placeholder="Cari film...">
</div>

<div class="grid" id="containerUtama"></div>

<div id="popup">
    <div class="popup-content" onclick="event.stopPropagation()">
        <button class="close-x" onclick="tutupPopUpPoster()">X</button>
        <h2 id="modal-title" style="margin-top:0; color:white;"></h2>
        <div id="eps-list"></div>
    </div>
</div>

<script>
    // FUNGSI POPUP (Global)
    window.tutupPopUpPoster = function() {
        $("#popup").css("display", "none");
        if (typeof Android !== "undefined" && Android.setPopUpStatus) Android.setPopUpStatus(false);
        
        // PENTING: Kembalikan fokus ke poster yang tersimpan
        const lastId = localStorage.getItem("last_card_id");
        if (lastId) {
            setTimeout(() => {
                const el = document.getElementById(lastId);
                if(el) el.focus();
            }, 200);
        }
    };

    // Deteksi tombol Back Remote
    window.addEventListener('keydown', function(e) {
        if ([4, 27, 10009].includes(e.keyCode)) {
            if ($("#popup").is(":visible")) {
                e.preventDefault();
                tutupPopUpPoster();
            }
        }
    }, true);

    function openModal(title, epsEncoded, cardId) {
        localStorage.setItem("last_card_id", cardId);
        if (typeof Android !== "undefined" && Android.setPopUpStatus) Android.setPopUpStatus(true);
        
        const eps = JSON.parse(decodeURIComponent(epsEncoded));
        $("#modal-title").text(title);
        $("#eps-list").empty();
        eps.forEach(e => {
            $("#eps-list").append(`<button class="eps-btn" onclick="playVideo('${e.url}')">${e.ep}</button>`);
        });
        $("#popup").css("display", "flex");
        $(".close-x").focus();
    }

    function playVideo(url) {
        if (typeof Android !== "undefined" && Android.playVideo) Android.playVideo(url);
        else window.open(url, "_blank");
    }

    // LOAD DATA
    fetch('data/serianimasi.json')
    .then(r => r.json())
    .then(data => {
        data.forEach(film => {
            const epsEncoded = encodeURIComponent(JSON.stringify(film.episodes));
            const cardId = "card-" + film.id;
            $("#containerUtama").append(`
                <div class="card-film" id="${cardId}">
                    <div class="poster-wrapper" tabindex="0" onclick="openModal('${film.title.replace(/'/g, "\\'")}', '${epsEncoded}', '${cardId}')">
                        <img src="${film.img}">
                    </div>
                    <div style="padding:5px; font-size:12px; text-align:center">${film.title}</div>
                </div>
            `);
        });
    });

    // FITUR PENCARIAN
    $("#searchBox").on("input", function() {
        const val = $(this).val().toLowerCase();
        $(".card-film").each(function() {
            $(this).toggle($(this).text().toLowerCase().includes(val));
        });
    });
</script>
</body>
</html>
