<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
    <title>MRZYB TV - Koleksi Seri Animasi</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #000; color: #fff; padding-bottom: 50px; }
        .header-banner { text-align: center; padding: 20px 0; }
        .search-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        .search-box { width: 80%; max-width: 400px; padding: 12px; border-radius: 8px; border: 2px solid #333; background: #141414; color: #fff; }
        .container-film { display: flex; flex-wrap: wrap; padding: 0 10px; justify-content: flex-start; }
        .card-film { width: 140px; margin: 7px; background: #181818; border-radius: 6px; overflow: hidden; position: relative; }
        .card-film:focus-within { transform: scale(1.05); border: 2px solid #00c54f; outline: none; }
        .poster-wrapper { width: 100%; aspect-ratio: 2/3; cursor: pointer; }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .btn-fav { width: 100%; padding: 6px; background: #222; color: #bbb; border: none; cursor: pointer; }
        .btn-fav.active { color: #ffcc00; }
        
        #popup { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; }
        .popup-content { background:#1a1a1a; padding:20px; border-radius:15px; width:90%; max-width:450px; max-height:85vh; border:2px solid #00c54f; position: relative; display: flex; flex-direction: column; }
        .close-x { position: absolute; top: -15px; right: -15px; width: 45px; height: 45px; background: red; color: white; border-radius: 50%; border: 3px solid white; font-weight: bold; cursor: pointer; z-index: 101; }
        #eps-list { overflow-y: auto; margin-top: 15px; flex-grow: 1; padding-right: 5px; }
        .eps-btn { display:block; width:100%; padding:12px; margin:6px 0; background:#333; border:none; color:white; text-align: left; }
        .eps-btn:focus { background:#00c54f; outline: none; }
    </style>
</head>
<body>

<div class="header-banner"><h1>MRZYB TV</h1></div>
<div class="search-wrapper">
    <input type="text" id="searchBox" class="search-box" placeholder="Cari film seri animasi...">
</div>

<div class="section-title" id="favSectionTitle" style="display:none; padding:10px;">FAVORIT SAYA</div>
<div class="container-film" id="containerFav"></div>

<div class="section-title" style="padding:10px;">SEMUA FILM</div>
<div class="container-film" id="containerUtama"></div>

<div id="popup" onclick="tutupPopUpPoster()">
    <div class="popup-content" onclick="event.stopPropagation()">
        <button class="close-x" onclick="tutupPopUpPoster()">X</button>
        <h2 id="modal-title" style="margin-top:0;"></h2>
        <div id="eps-list"></div>
    </div>
</div>

<script>
    let listFavorit = JSON.parse(localStorage.getItem('serianimasi_favorit')) || [];
    const pageTitle = "serianimasi";

    // Logika Back Remote yang memanggil fungsi wajib tutupPopUpPoster[cite: 4, 5]
    window.tutupPopUpPoster = function(){
        window.closePopup();
    };

    window.addEventListener('keydown', function(event) {
        if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009) {
            const popupElement = document.getElementById("popup");
            if (popupElement && window.getComputedStyle(popupElement).display !== "none") {
                event.preventDefault();
                event.stopPropagation();
                window.tutupPopUpPoster(); 
                return false;
            }
        }
    }, true);

    function openModal(title, episodesEncoded, id) {
        localStorage.setItem(pageTitle + "_last_poster_id", id); // Simpan posisi[cite: 5]
        const eps = JSON.parse(decodeURIComponent(episodesEncoded));
        $("#modal-title").text(title);
        $("#eps-list").empty();
        eps.forEach((e) => {
            $("#eps-list").append(`<button class="eps-btn" onclick="playVideo('${e.url}')">${e.ep}</button>`);
        });
        $("#popup").css("display", "flex");
        $(".close-x").focus();
    }

    window.closePopup = function() {
        $("#popup").css("display", "none");
        const lastId = localStorage.getItem(pageTitle + "_last_poster_id");
        if (lastId) {
            setTimeout(() => { 
                const el = document.getElementById(lastId);
                if(el) el.focus(); 
            }, 150); // Kembalikan fokus ke poster[cite: 5]
        }
        if (typeof Android !== "undefined" && Android.setPopUpStatus) {
            Android.setPopUpStatus(false);
        }
    };

    function playVideo(url) {
        if (typeof Android !== "undefined" && Android.playVideo) {
            Android.playVideo(url);
        } else {
            window.open(url, "_blank");
        }
    }

    fetch('data/serianimasi.json')
        .then(response => response.json())
        .then(data => {
            data.forEach(film => {
                const epData = encodeURIComponent(JSON.stringify(film.episodes || [{ep:"Play", url:film.url}]));
                $("#containerUtama").append(`
                    <div class="card-film" data-id="${film.id}" id="${film.id}" tabindex="0">
                        <div class="poster-wrapper" onclick='openModal("${film.title}", "${epData}", "${film.id}")'>
                            <img src="${film.img}">
                        </div>
                        <button class="btn-fav" data-target="${film.id}">☆ Favorit</button>
                        <div style="padding:5px; font-size:12px; text-align:center">${film.title}</div>
                    </div>
                `);
            });
            updateTampilanFavorit();
        });

    function updateTampilanFavorit() {
        $("#containerFav").empty();
        if (listFavorit.length === 0) {
            $("#favSectionTitle").hide();
        } else {
            $("#favSectionTitle").show();
            listFavorit.forEach(id => {
                const item = $(`#${id}`).clone();
                item.attr('id', 'fav-' + id);
                $("#containerFav").append(item);
            });
        }
        $(".btn-fav").each(function() {
            const id = $(this).data('target');
            $(this).toggleClass('active', listFavorit.includes(id));
            $(this).html(listFavorit.includes(id) ? "★ Favorit" : "☆ Favorit");
        });
    }

    $(document).on('click', '.btn-fav', function(e) {
        e.stopPropagation();
        const id = $(this).data('target');
        if (listFavorit.includes(id)) listFavorit = listFavorit.filter(i => i !== id);
        else listFavorit.push(id);
        localStorage.setItem('serianimasi_favorit', JSON.stringify(listFavorit));
        updateTampilanFavorit();
    });

    $("#searchBox").on("input", function() {
        const val = $(this).val().toLowerCase();
        $(".card-film").each(function() {
            $(this).toggle($(this).text().toLowerCase().includes(val));
        });
    });
</script>
</body>
</html>
