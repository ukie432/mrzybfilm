<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYB TV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;700;900&display=swap');
        
        body { margin: 0; background-color: #000; color: #eee; font-family: 'Poppins', sans-serif; font-size: 12px; }
        a { text-decoration: none; color: #eee; }

        /* Branding MRZYB TV */
        .brand-logo {
            position: absolute;
            top: 20px;
            left: 40px;
            z-index: 200;
            pointer-events: none;
        }
        .brand-logo img {
            height: 100px;
            width: auto;
            object-fit: contain;
            display: block;
        }
        
        .carousel { height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        .carousel .list .item { position: absolute; inset: 0; }
        .carousel .list .item img { width: 100%; height: 100%; object-fit: cover; }
        
        .thumbnail { position: absolute; bottom: 50px; left: 50%; z-index: 100; display: flex; gap: 20px; }
        
        /* Thumbnail Poster 150x225 (Rasio 2:3) */
        .thumbnail .item { 
            width: 150px; height: 225px; flex-shrink: 0; position: relative; border: none; background: none; padding: 0; cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        .thumbnail .item img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; display: block; }
        
        /* Efek Fokus: Merah, Menyala, dan Membesar */
        .thumbnail .item:focus {
            outline: 4px solid #ff0000;
            box-shadow: 0 0 20px 5px rgba(255, 0, 0, 0.8), 0 0 40px 10px rgba(255, 0, 0, 0.4);
            transform: scale(1.15);
            z-index: 10;
        }

        .arrows { position: absolute; top: 80%; left: 50%; z-index: 100; display: flex; gap: 10px; }
        .arrows button { width: 40px; height: 40px; border-radius: 50%; background: #eee4; border: none; color: #fff; font-weight: bold; cursor: pointer; }
        .arrows button:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div class="brand-logo">
        <img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/Logo _mrzybtv_ dengan ikon Wi-Fi.png" alt="MRZYB TV Logo" alt="MRZYB TV Logo">
    </div>

    <div class="carousel">
        <div class="list">
            <div class="item"><img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Indo2.webp"></div>
                        <div class="item"><img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Anime2.webp"></div>
            <div class="item"><img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Dubbing2.webp"></div>
        </div>

        <div class="thumbnail">
            <a href="seridubing_new.html" class="item" data-id="poster1" tabindex="0"><img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Dubbing1.webp"></a>
                        <a href="seriindo.html" class="item" data-id="poster2" tabindex="0"><img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Indo 1.webp"></a>
            <a href="serianimasi.html" class="item" data-id="poster3" tabindex="0"><img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Anime1.webp"></a>
        </div>

        <div class="arrows">
            <button id="prev"><</button>
            <button id="next">></button>
        </div>
    </div>

    <script>
        // --- LOGIKA SLIDER ---
        let nextDom = document.getElementById('next');
        let prevDom = document.getElementById('prev');
        let carouselDom = document.querySelector('.carousel');
        let SliderDom = carouselDom.querySelector('.list');
        let thumbnailBorderDom = document.querySelector('.thumbnail');
        
        let isManual = false; 
        function stopAutoRun() { isManual = true; clearTimeout(runNextAuto); }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') { stopAutoRun(); nextDom.click(); }
            else if (e.key === 'ArrowLeft') { stopAutoRun(); prevDom.click(); }
        });

        nextDom.onclick = function(){ stopAutoRun(); showSlider('next'); }
        prevDom.onclick = function(){ stopAutoRun(); showSlider('prev'); }

        let runNextAuto = setTimeout(() => { nextDom.click(); }, 7000);

        function showSlider(type){
            let SliderItemsDom = SliderDom.querySelectorAll('.item');
            let thumbnailItemsDom = thumbnailBorderDom.querySelectorAll('.item');
            if(type === 'next'){
                SliderDom.appendChild(SliderItemsDom[0]);
                thumbnailBorderDom.appendChild(thumbnailItemsDom[0]);
                carouselDom.classList.add('next');
            }else{
                SliderDom.prepend(SliderItemsDom[SliderItemsDom.length - 1]);
                thumbnailBorderDom.prepend(thumbnailItemsDom[thumbnailItemsDom.length - 1]);
                carouselDom.classList.add('prev');
            }
            setTimeout(() => { carouselDom.classList.remove('next', 'prev'); }, 3000);
            if (!isManual) { clearTimeout(runNextAuto); runNextAuto = setTimeout(() => { nextDom.click(); }, 7000); }
        }

        // --- LOGIKA PEMULIHAN FOKUS (BACK BUTTON) ---
        // 1. Simpan saat poster diklik
        document.querySelectorAll('.thumbnail .item').forEach(item => {
            item.addEventListener('click', () => {
                localStorage.setItem('lastFocusId', item.getAttribute('data-id'));
            });
        });

        // 2. Kembalikan fokus saat halaman dimuat
        window.addEventListener('load', () => {
            setTimeout(() => {
                const savedId = localStorage.getItem('lastFocusId');
                if (savedId) {
                    const el = document.querySelector(`.thumbnail .item[data-id="${savedId}"]`);
                    if (el) {
                        el.focus();
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    localStorage.removeItem('lastFocusId');
                }
            }, 300); // Tunggu sebentar agar elemen siap
        });
    </script>
</body>
</html>
