    <style>
        /* Tambahkan CSS ini agar tombol berfungsi dengan remote */
        .thumbnail .item {
            background: transparent;
            border: 2px solid transparent;
            padding: 0;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.3s, border 0.3s;
            outline: none;
            display: block;
        }

        .thumbnail .item:focus {
            border: 3px solid #ffcc00;
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
