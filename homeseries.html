<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYB TV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        body { margin: 0; background-color: #000; color: #eee; font-family: 'Poppins', sans-serif; overflow: hidden; }
        
        /* Background Utama yang Sinkron */
        .bg-container { position: absolute; inset: 0; z-index: 1; }
        .bg-container img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: opacity 0.5s ease; opacity: 0.8;
        }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, #000 10%, transparent); z-index: 2; }

        .brand-logo { position: absolute; top: 20px; left: 40px; z-index: 200; }
        .brand-logo img { height: 80px; }
        
        #digital-clock { 
            position: absolute; top: 20px; right: 40px; z-index: 200; 
            font-size: 20px; font-weight: 900; text-shadow: 2px 2px 5px #000;
        }

        .thumbnail { 
            position: absolute; bottom: 80px; width: 100%; z-index: 100; 
            display: flex; justify-content: center; gap: 30px; 
        }
        
        .item { 
            width: 160px; height: 240px; position: relative; cursor: pointer;
            border: 4px solid #fff; border-radius: 20px; background: #000;
            transition: transform 0.3s ease, border 0.3s;
        }
        
        .item img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
        
        /* Efek Fokus pada Poster */
        .item:focus {
            outline: none;
            border: 6px solid #FF0000 !important;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
            transform: scale(1.2);
            z-index: 10;
        }

        /* Label Nama Film */
        .label {
            position: absolute; bottom: -40px; width: 100%; text-align: center;
            font-weight: bold; opacity: 0; transition: 0.3s;
            /* Warna default saat tidak fokus */
            color: #eee; 
        }

        /* Warna Putih Saja saat Poster Difokuskan */
        .item:focus .label { 
            opacity: 1; 
            color: #ffffff !important; /* Putih solid */
            text-shadow: none !important; /* Menghapus bayangan agar bersih */
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img id="main-bg" src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Dubbing1.webp">
    </div>
    <div class="overlay"></div>

    <div class="brand-logo">
        <img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_indonesia/Logo%20_mrzybtv_%20dengan%20ikon%20Wi-Fi.png">
    </div>
    <div id="digital-clock">00:00</div>

    <div class="thumbnail">
        <a href="seridubing_new.html" class="item" data-id="p1" data-bg="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Dubbing1.webp" tabindex="0">
            <img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Dubbing1.webp">
            <div class="label">Series Dubbing</div>
        </a>   
        <a href="seriindo.html" class="item" data-id="p2" data-bg="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Indo%201.webp" tabindex="0">
            <img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Indo%201.webp">
            <div class="label">Series Indo</div>
        </a>   
        <a href="serianimasi.html" class="item" data-id="p3" data-bg="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Anime1.webp" tabindex="0">
            <img src="https://raw.githubusercontent.com/Ukie4321/iptv-posterku/main/poster/film_dubbing/Anime1.webp">
            <div class="label">Series Animasi</div>
        </a>   
    </div>

    <script>
        // --- LOGIKA UTAMA ---
        const bgImage = document.getElementById('main-bg');
        const soundClick = new Audio('https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav');

        // 1. Sinkronisasi Background & Suara
        document.querySelector('.thumbnail').addEventListener('focusin', (e) => {
            const item = e.target.closest('.item');
            if (item) {
                // Ganti Background
                const newBg = item.getAttribute('data-bg');
                bgImage.style.opacity = 0;
                setTimeout(() => {
                    bgImage.src = newBg;
                    bgImage.style.opacity = 0.8;
                }, 200);

                // Mainkan Suara
                soundClick.currentTime = 0;
                soundClick.play().catch(e => console.log("Menunggu interaksi remote..."));
                
                // Simpan posisi fokus agar ingat saat balik dari halaman lain
                localStorage.setItem('lastFocusId', item.getAttribute('data-id'));
            }
        });

        // 2. Pulihkan Fokus saat kembali (tombol back)
        window.addEventListener('load', () => {
            const savedId = localStorage.getItem('lastFocusId');
            if (savedId) {
                setTimeout(() => {
                    const el = document.querySelector(`.item[data-id="${savedId}"]`);
                    if (el) el.focus();
                }, 300);
            }
        });

        // 3. Jam Digital
        setInterval(() => {
            const now = new Date();
            document.getElementById('digital-clock').innerText = 
                String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
