<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYB TV - High Quality Background</title>

    <!-- Preconnect ke Domain Gambar -->
    <link rel="preconnect" href="https://iptv-posterku.pages.dev" crossorigin>
    <link rel="dns-prefetch" href="https://iptv-posterku.pages.dev">

    <!-- PRELOAD GAMBAR UTAMA AGAR DILUAT SERENTAK SAAT PERTAMA KALI DIBUKA -->
    <link rel="preload" as="image" href="https://iptv-posterku.pages.dev/poster/film_dubbing/Dubbing1.webp">
    <link rel="preload" as="image" href="https://iptv-posterku.pages.dev/poster/film_dubbing/Indo%201.webp">
    <link rel="preload" as="image" href="https://iptv-posterku.pages.dev/poster/film_dubbing/Anime1.webp">

    <style>
        body {
            margin: 0;
            background: #000;
            color: #eee;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* === CONTAINER BACKGROUND === */
        .bg-container { 
            position: absolute; 
            inset: 0; 
            z-index: 1; 
            background-color: #000;
        }
        
        .bg-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: .7;
        }
        
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,1) 5%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%); 
            z-index: 2; 
        }

        /* === BRANDING & CLOCK === */
        .brand-logo { position: absolute; top: 30px; left: 50px; z-index: 200; }
        .brand-logo img { height: 70px; width: auto; }
        
        #digital-clock { 
            position: absolute; top: 35px; right: 50px; z-index: 200; 
            font-size: 15px; font-weight: 900; color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* === CONTAINER THUMBNAIL === */
        .thumbnail { 
            position: absolute; 
            bottom: 100px; 
            width: 100%; 
            z-index: 100; 
            display: flex; 
            justify-content: center; 
            gap: 35px; 
            padding: 0 50px;
            box-sizing: border-box;
        }
        
        .item { 
            width: 160px; 
            height: 240px; 
            position: relative; 
            cursor: pointer;
            border: 4px solid rgba(255,255,255,0.5); 
            border-radius: 20px; 
            background: #111;
            box-sizing: border-box;
        }
        
        .item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 16px; 
        }
        
        .item:focus {
            outline: none;
            border: 4px solid #FF0000 !important; 
        }
        
        .thumbnail a {
            text-decoration: none;
            color: inherit;
        }

        .label {
            position: absolute;
            bottom: -45px;
            width: 100%;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            text-shadow: 2px 2px 5px #000;
        }

        .thumbnail a:visited,
        .thumbnail a:link,
        .thumbnail a:active {
            color: #fff;
        }

        .item:focus .label { 
            opacity: 1; 
            color: #ffffff !important; 
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img id="main-bg" src="https://iptv-posterku.pages.dev/poster/film_dubbing/ChatGPTImage23Jun2026,19.45.53_copy_800x308.png" width="800" height="308" fetchpriority="high" decoding="async">
    </div>
    <div class="overlay"></div>

    <div class="brand-logo">
        <img src="https://iptv-posterku.pages.dev/poster/film_indonesia/Logo%20_mrzybtv_%20dengan%20ikon%20Wi-Fi.png" decoding="async" width="150" height="70">
    </div>
    <div id="digital-clock">00:00:00</div>

    <div class="thumbnail">
        <a href="https://mrzybtv-api.ukielaki88.workers.dev/app/seri_dubbing" class="item" data-id="p1" 
           data-bg="https://iptv-posterku.pages.dev/poster/film_dubbing/Dubbing2.webp" tabindex="0">
            <img src="https://iptv-posterku.pages.dev/poster/film_dubbing/Dubbing1.webp" width="160" height="240" fetchpriority="high" decoding="async"> 
            <div class="label">Series Dubbing</div>
        </a>    

        <a href="https://mrzybtv-api.ukielaki88.workers.dev/app/seri_indo" class="item" data-id="p2" 
           data-bg="https://iptv-posterku.pages.dev/poster/film_dubbing/Indo2.webp" tabindex="0">
            <img src="https://iptv-posterku.pages.dev/poster/film_dubbing/Indo%201.webp" width="160" height="240" fetchpriority="high" decoding="async"> 
            <div class="label">Series Indo</div>
        </a>    

        <a href="https://mrzybtv-api.ukielaki88.workers.dev/app/seri_animasi" class="item" data-id="p3" 
           data-bg="https://iptv-posterku.pages.dev/poster/film_dubbing/Anime2.webp" tabindex="0">
            <img src="https://iptv-posterku.pages.dev/poster/film_dubbing/Anime1.webp" width="160" height="240" fetchpriority="high" decoding="async">
            <div class="label">Series Animasi</div>
        </a>    
    </div>

    <script>
        const bgImage = document.getElementById('main-bg');
        
        // Suara klik navigasi
        const soundClick = new Audio();
        soundClick.preload = "none";
        soundClick.src = "https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav";

        // Preload otomatis seluruh background agar perpindahan fokus cepat tanpa delay
        document.querySelectorAll('.item').forEach(item => {
            const bgUrl = item.dataset.bg;
            if (bgUrl) {
                const img = new Image();
                img.src = bgUrl;
            }
        });

        // Event Delegation pada .thumbnail
        const thumb = document.querySelector('.thumbnail');

        thumb.addEventListener('focusin', (e) => {
            const item = e.target.closest('.item');
            if (!item) return;

            const newBgUrl = item.dataset.bg;

            if (newBgUrl && bgImage.src !== newBgUrl) {
                bgImage.src = newBgUrl;
            }

            soundClick.currentTime = 0;
            soundClick.play().catch(() => {});

            localStorage.setItem('lastFocusId', item.dataset.id);
        });

        // Pulihkan fokus terakhir
        window.addEventListener('load', () => {
            const savedId = localStorage.getItem('lastFocusId');
            if (savedId) {
                setTimeout(() => {
                    const el = document.querySelector(`.item[data-id="${savedId}"]`);
                    if (el) {
                        el.focus();
                        const savedBg = el.dataset.bg;
                        if(savedBg) {
                            bgImage.src = savedBg;
                            bgImage.style.opacity = 0.7;
                        }
                    }
                }, 200); // Dikurangi menjadi 200ms agar pemulihan fokus lebih responsif
            } else {
                const firstItem = document.querySelector('.item');
                if(firstItem) firstItem.focus();
            }
        });

        // Jam Digital
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const clock = document.getElementById("digital-clock");
            if (clock) clock.textContent = `${hours}:${minutes}:${seconds}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
