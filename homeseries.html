<!DOCTYPE html>
<html lang="id">
<head>
    

    <meta http-equiv="Cache-Control" content="max-age=31536000, public">
    <link rel="preconnect" href="https://posterfilm.pages.dev">
    <link rel="preconnect" href="https://iptv-posterku.pages.dev">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYB TV - High Quality Background</title>
    <style>
        body{
    margin:0;
    background:#000;
    color:#eee;
    font-family:Arial,sans-serif;
    overflow:hidden;

        
        /* === CONTAINER BACKGROUND (FIX LANSKAP 16:9) === */
        .bg-container { 
            position: absolute; 
            inset: 0; 
            z-index: 1; 
            background-color: #000; /* Warna dasar saat loading */
        }
        
        .bg-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Memastikan gambar Lanskap memenuhi layar tanpa distorsi */
            opacity:.7;
        }
        
        /* Overlay gradasi agar teks atas tetap terbaca dan fokus ke poster bawah */
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,1) 5%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%); 
            z-index: 2; 
        }

        /* === BRANDING & CLOCK === */
        .brand-logo { position: absolute; top: 30px; left: 50px; z-index: 200; }
        .brand-logo img { height: 70px; width: auto; }
        
        #digital-clock { 
            position: absolute; top: 35px; right: 50px; z-index: 200; 
            font-size: 15px; font-weight: 900; color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* === CONTAINER THUMBNAIL (POSTER VERTIKAL) === */
        .thumbnail { 
            position: absolute; 
            bottom: 100px; /* Jarak dari bawah layar */
            width: 100%; 
            z-index: 100; 
            display: flex; 
            justify-content: center; 
            gap: 35px; /* Jarak antar poster */
            padding: 0 50px;
            box-sizing: border-box;
        }
        
        .item { 
            width: 160px; /* Lebar poster vertikal */
            height: 240px; /* Tinggi poster vertikal (Rasio 2:3) */
            position: relative; 
            cursor: pointer;
            border: 4px solid rgba(255,255,255,0.5); /* Border default agak transparan */
            border-radius: 20px; 
            background: #111;
            box-sizing: border-box;
        }
        
        .item img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
        
        /* === EFEK FOKUS (SELECTION) === */
        .item:focus {
            outline: none;
            border: 4px solid #FF0000 !important; /* Border Merah Menyala */
        
        }
        
        
        .thumbnail a{
    text-decoration:none;
    color:inherit;
}

.label{
    position:absolute;
    bottom:-45px;
    width:100%;
    text-align:center;
    font-weight:700;
    font-size:16px;
    color:#fff;
    text-shadow:2px 2px 5px #000;
}

.thumbnail a:visited,
.thumbnail a:link,
.thumbnail a:active{
    color:#fff;
}


        /* Warna Putih & Muncul saat Poster Difokuskan */
        .item:focus .label { 
            opacity: 1; 
            color: #ffffff !important; 
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img id="main-bg" src="https://iptv-posterku.pages.dev/poster/film_dubbing/ChatGPTImage23Jun2026,19.45.53_copy_800x308.png"width="800"height="308" fetchpriority="high"
decoding="async">
    </div>
    <div class="overlay"></div>

    <div class="brand-logo">
        <img src="https://iptv-posterku.pages.dev/poster/film_indonesia/Logo%20_mrzybtv_%20dengan%20ikon%20Wi-Fi.png"loading="lazy"
decoding="async">
    </div>
    <div id="digital-clock">00:00</div>

    <div class="thumbnail">
        <a href="https://mrzybtv-api.ukielaki88.workers.dev/app/seri_dubbing" class="item" data-id="p1" 
           data-bg="https://iptv-posterku.pages.dev/poster/film_dubbing/Dubbing2.webp" tabindex="0">
            <img src="https://iptv-posterku.pages.dev/poster/film_dubbing/Dubbing1.webp"loading="lazy"width="160"height="240"
decoding="async"> <div class="label">Series Dubbing</div>
        </a>   

        <a href="https://mrzybtv-api.ukielaki88.workers.dev/app/seri_indo" class="item" data-id="p2" 
           data-bg="https://iptv-posterku.pages.dev/poster/film_dubbing/Indo2.webp" tabindex="0">
            <img src="https://iptv-posterku.pages.dev/poster/film_dubbing/Indo%201.webp"loading="lazy"width="160"height="240"
decoding="async"> <div class="label">Series Indo</div>
        </a>   

        <a href="https://mrzybtv-api.ukielaki88.workers.dev/app/seri_animasi" class="item" data-id="p3" 
           data-bg="https://iptv-posterku.pages.dev/poster/film_dubbing/Anime2.webp" tabindex="0">
            <img src="https://iptv-posterku.pages.dev/poster/film_dubbing/Anime1.webp"loading="lazy"width="160"height="240"
decoding="async"><div class="label">Series Animasi</div>
        </a>   
    </div>

    <script>
        // --- LOGIKA UTAMA (SINKRONISASI BEDA GAMBAR) ---
        const bgImage = document.getElementById('main-bg');
        // Suara klik navigasi
        const soundClick=new Audio();
soundClick.preload="none";
soundClick.src="https://github.com/ukie432/mrzybfilm/raw/refs/heads/main/click.wav";

        // Gunakan Event Delegation pada container .thumbnail
        const thumb = document.querySelector('.thumbnail');

thumb.addEventListener('focusin', (e) => {
    const item = e.target.closest('.item');
    if (!item) return;

    const newBgUrl = item.dataset.bg;

    if (newBgUrl && bgImage.src !== newBgUrl) {
        bgImage.src = newBgUrl;
    }

    soundClick.currentTime = 0;
    soundClick.play().catch(() => {});

    localStorage.setItem('lastFocusId', item.dataset.id);
});

        // --- PULIHKAN FOKUS TERAKHIR (BACK BUTTON) ---
        window.addEventListener('load', () => {
            const savedId = localStorage.getItem('lastFocusId');
            if (savedId) {
                // Beri jeda sedikit agar halaman selesai dimuat sempurna di TV
                setTimeout(() => {
                    const el = document.querySelector(`.item[data-id="${savedId}"]`);
                    if (el) {
                        el.focus();
                        // Pastikan background juga langsung berubah sesuai item yang dipulihkan
                        const savedBg = el.dataset.bg;
                        if(savedBg) {
                            bgImage.src = savedBg;
                            bgImage.style.opacity = 0.7;
                        }
                    }
                }, 400);
            } else {
                // Jika tidak ada memori, fokus ke item pertama secara default
                requestAnimationFrame(()=>{
                    const firstItem = document.querySelector('.item');
                    if(firstItem) firstItem.focus();
                }, 400);
            }
        });

// --- JAM DIGITAL DENGAN DETIK ---
function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0'); // Tambahkan baris ini
    
    // Gabungkan dengan format jam:menit:detik
    const clock = document.getElementById("digital-clock");  clock.textContent =  `${hours}:${minutes}:${seconds}`;
}

// Jalankan setiap 1000 milidetik (1 detik)
setInterval(updateClock, 1000);
updateClock();
    </script>
</body>
</html>
