<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYB Premium TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Smooch+Sans:wght@100;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000000;
            --secondary-color: #141414;
            --accent-color: #222222;
            --highlight-color: #E50914;
            --text-color: #f1f1f1;
            --text-secondary: #b8b8b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Smooch Sans', sans-serif;
        }

        body {
            background-color: var(--primary-color);
            color: var(--text-color);
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0));
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--highlight-color);
            letter-spacing: 2px;
        }

        .user-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .user-actions i {
            font-size: 1.5rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-actions i:hover {
            color: var(--highlight-color);
        }

        .search-container {
            position: relative;
            display: none;
            width: 250px;
        }

        .search-container.active {
            display: block;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .movies-section {
            padding: 0 2rem;
            margin-top: 10px;
        }

        .category-row {
            margin-bottom: 2rem;
            display: none;
        }

        .row-header {
            margin-bottom: 0.8rem;
            border-left: 4px solid var(--highlight-color);
            padding-left: 10px;
        }

        .row-title {
            font-size: 2rem;
            color: var(--text-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .movies-slider-horizontal {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: none;
        }

        .movies-slider-horizontal::-webkit-scrollbar {
            display: none;
        }

        .movie-card-horizontal {
            background-color: var(--secondary-color);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.2s ease;
            cursor: pointer;
            flex: 0 0 260px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 2px solid transparent;
        }

        .movie-card-horizontal:focus,
        .action-button:focus,
        .episode-btn:focus,
        .close-modal:focus,
        .user-actions i:focus {
            outline: none;
            transform: scale(1.08);
            box-shadow: 0 0 20px var(--highlight-color);
            border-color: var(--highlight-color);
            background-color: var(--accent-color);
            z-index: 99;
        }

        .movie-poster-horizontal {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background-color: #2a2a2a;
            display: block;
        }

        .movie-info {
            padding: 8px 10px;
            background-color: var(--secondary-color);
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 3px;
        }

        .movie-rating {
            color: gold;
        }

        #search-results-section {
            display: none;
            margin-bottom: 2rem;
        }
        .search-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background-color: var(--secondary-color);
            margin: 2rem auto;
            width: 90%;
            max-width: 1000px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--accent-color);
            border-bottom: 1px solid #333;
        }

        .modal-title {
            font-size: 2rem;
            color: var(--text-color);
        }

        .close-modal {
            font-size: 2.5rem;
            color: var(--text-color);
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            padding: 0 10px;
            display: inline-block;
            transition: all 0.2s;
        }

        .modal-body {
            padding: 2rem;
        }

        .movie-details {
            display: flex;
            gap: 2rem;
        }

        .movie-poster-large {
            width: 250px;
            height: 375px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .movie-info-large {
            flex: 1;
        }

        .movie-title-large {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .movie-meta-large {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .movie-description {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            color: #ccc;
        }

        .movie-actions {
            display: flex;
            gap: 1rem;
        }

        .action-button {
            padding: 0.8rem 2rem;
            border: 2px solid transparent;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .play-button {
            background-color: var(--highlight-color);
            color: white;
        }

        .episode-section {
            margin-top: 2rem;
            border-top: 1px solid #333;
            padding-top: 1.5rem;
        }

        .episode-headline {
            color: var(--highlight-color);
            font-size: 1.6rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .episode-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .episode-btn {
            background-color: var(--accent-color);
            color: white;
            border: 2px solid #333;
            padding: 0.8rem 1.5rem;
            width: 100%;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .episode-btn i {
            margin-right: 15px;
            font-size: 1.3rem;
        }

        @media (max-width: 900px) { 
            .movie-details { flex-direction: column; } 
            .movie-poster-large { width: 100%; height: auto; max-height: 350px; } 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MRZYB TV</div>
        <div class="user-actions">
            <i class="fas fa-search" id="search-icon" tabindex="0"></i>
            <div class="search-container" id="search-container">
                <input type="text" class="search-input" placeholder="Cari judul..." id="search-input" tabindex="0">
            </div>
            <i class="fas fa-user" tabindex="0"></i>
        </div>
    </header>

    <main class="movies-section" id="main-content-wrapper">
        <div class="category-row" id="search-results-section">
            <div class="row-header"><h2 class="row-title" id="search-title-text">Hasil Pencarian</h2></div>
            <div class="search-grid" id="search-grid-container"></div>
        </div>

        <div class="category-row" id="row-dubbing">
            <div class="row-header"><h2 class="row-title">Film Dubbing</h2></div>
            <div class="movies-slider-horizontal" id="slider-dubbing"></div>
        </div>

        <div class="category-row" id="row-indo">
            <div class="row-header"><h2 class="row-title">Film Indonesia</h2></div>
            <div class="movies-slider-horizontal" id="slider-indo"></div>
        </div>

        <div class="category-row" id="row-animasi">
            <div class="row-header"><h2 class="row-title">Film Animasi</h2></div>
            <div class="movies-slider-horizontal" id="slider-animasi"></div>
        </div>

        <div class="category-row" id="row-lawas">
            <div class="row-header"><h2 class="row-title">Film Indo Lawas</h2></div>
            <div class="movies-slider-horizontal" id="slider-lawas"></div>
        </div>

        <div class="category-row" id="row-series">
            <div class="row-header"><h2 class="row-title">Film Series Pilihan</h2></div>
            <div class="movies-slider-horizontal" id="slider-series"></div>
        </div>
    </main>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTypeBadge">Detail Konten</h2>
                <span class="close-modal" tabindex="0" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="movie-details">
                    <img src="" alt="Poster" class="movie-poster-large" id="modalPoster">
                    <div class="movie-info-large">
                        <h3 class="movie-title-large" id="modalMovieTitle">Judul</h3>
                        <div class="movie-meta-large">
                            <span id="modalYear">Tahun</span>
                            <span id="modalDuration">Durasi</span>
                            <span id="modalRating">Rating</span>
                            <span id="modalGenre">Genre</span>
                        </div>
                        <p class="movie-description" id="modalDescription">Deskripsi...</p>
                        
                        <div class="movie-actions">
                            <button class="action-button play-button" id="main-play-btn" tabindex="0" onclick="putarFilmTunggal()">
                                <i class="fas fa-play"></i> Putar Film
                            </button>
                        </div>

                        <div class="episode-section" id="episode-list-wrapper" style="display: none;">
                            <h4 class="episode-headline">Daftar Episode</h4>
                            <div class="episode-grid" id="episode-grid"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const JSON_URL = 'data/Tester.json'; 
        let databaseFilm = [];
        let dataFilmAktif = null;

        async function loadDataKonten() {
            try {
                const response = await fetch(JSON_URL);
                databaseFilm = await response.json();
                kelolaBarisKategori();
            } catch (error) {
                console.error("Gagal mengambil database JSON:", error);
            }
        }

        function kelolaBarisKategori() {
            const dubbingData = databaseFilm.filter(m => m.categoria === "film_dubbing" && m.halaman_depan === true);
            renderSlider(dubbingData, 'slider-dubbing', 'row-dubbing');

            const indoData = databaseFilm.filter(m => m.categoria === "film_indo" && m.halaman_depan === true);
            renderSlider(indoData, 'slider-indo', 'row-indo');

            const animasiData = databaseFilm.filter(m => m.categoria === "film_animasi" && m.halaman_depan === true);
            renderSlider(animasiData, 'slider-animasi', 'row-animasi');

            const lawasData = databaseFilm.filter(m => m.categoria === "indo_lawas" && m.halaman_depan === true);
            renderSlider(lawasData, 'slider-lawas', 'row-lawas');

            const seriesData = databaseFilm.filter(m => m.is_series === true && m.halaman_depan === true);
            renderSlider(seriesData, 'slider-series', 'row-series');

            // PEMULIHAN FOKUS OTOMATIS BERBASIS LOCALSTORAGE UNTUK STB/TV
            setTimeout(() => {
                const savedMovieTitle = localStorage.getItem('activeMovieTitle');
                
                if (savedMovieTitle) {
                    // Jika STB me-refresh halaman setelah keluar player, paksa buka modal kembali
                    bukaModalDetail(savedMovieTitle);
                } else {
                    const savedCardIdx = localStorage.getItem('lastFocusedCardIndex');
                    const cards = document.querySelectorAll('.movie-card-horizontal');
                    if (savedCardIdx !== null && cards[savedCardIdx]) {
                        cards[savedCardIdx].focus();
                        cards[savedCardIdx].scrollIntoView({ behavior: 'auto', block: 'center' });
                    } else if (cards.length > 0) {
                        cards[0].focus();
                    }
                }
            }, 500);
        }

        function renderSlider(dataList, sliderId, rowId) {
            const slider = document.getElementById(sliderId);
            const row = document.getElementById(rowId);

            if (dataList.length === 0) {
                row.style.display = 'none';
                return;
            }

            row.style.display = 'block';
            slider.innerHTML = dataList.map(item => `
                <div class="movie-card-horizontal" tabindex="0" onclick="bukaModalDetail('${item.titulo}')">
                    <img src="${item.poster}" alt="${item.titulo}" class="movie-poster-horizontal" loading="lazy">
                    <div class="movie-info">
                        <h3 class="movie-title">${item.titulo}</h3>
                        <div class="movie-meta">
                            <span>${item.year}</span>
                            <span class="movie-rating"><i class="fas fa-star"></i> ${item.rating}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function bukaModalDetail(judulKonten) {
            const item = databaseFilm.find(m => m.titulo === judulKonten);
            if (!item) return;

            // Catat nomor urutan index kartu beranda ke Storage sebelum masuk modal
            const cards = Array.from(document.querySelectorAll('.movie-card-horizontal'));
            const cardIndex = cards.indexOf(document.activeElement);
            if (cardIndex !== -1) {
                localStorage.setItem('lastFocusedCardIndex', cardIndex);
            }
            
            // Tandai judul film aktif ke Storage agar diingat STB
            localStorage.setItem('activeMovieTitle', judulKonten);
            dataFilmAktif = item; 

            document.getElementById('modalMovieTitle').textContent = item.titulo;
            document.getElementById('modalPoster').src = item.poster;
            document.getElementById('modalYear').textContent = item.year;
            document.getElementById('modalDuration').textContent = item.duration;
            document.getElementById('modalRating').innerHTML = `<i class="fas fa-star"></i> ${item.rating}`;
            document.getElementById('modalGenre').textContent = item.genre;
            document.getElementById('modalDescription').textContent = item.description;

            const btnPlayUtama = document.getElementById('main-play-btn');
            const areaSeri = document.getElementById('episode-list-wrapper');
            const gridEpisode = document.getElementById('episode-grid');

            if (item.is_series === true && item.episodes) {
                document.getElementById('modalTypeBadge').textContent = "Detail Seri";
                btnPlayUtama.style.display = 'none'; 
                areaSeri.style.display = 'block';    
                
                gridEpisode.innerHTML = item.episodes.map((eps, idx) => `
                    <button class="episode-btn" tabindex="0" data-index="${idx}" onclick="putarEpisodeDariRemote(${idx}, '${eps.video}')">
                        <i class="fas fa-play-circle"></i>
                        <span><strong>${eps.eps_num}</strong> - ${eps.eps_title}</span>
                    </button>
                `).join('');
            } else {
                document.getElementById('modalTypeBadge').textContent = "Detail Film";
                btnPlayUtama.style.display = 'flex'; 
                areaSeri.style.display = 'none';     
                gridEpisode.innerHTML = '';
            }

            document.getElementById('movieModal').style.display = 'block';

            setTimeout(() => {
                const savedEpsIdx = localStorage.getItem('lastFocusedEpisodeIndex');
                if (item.is_series === true) {
                    if (savedEpsIdx !== null) {
                        const targetEps = document.querySelector(`.episode-btn[data-index="${savedEpsIdx}"]`);
                        if (targetEps) { targetEps.focus(); return; }
                    }
                    const firstEps = document.querySelector('.episode-btn');
                    if (firstEps) firstEps.focus();
                } else {
                    btnPlayUtama.focus();
                }
            }, 200);
        }

        function putarEpisodeDariRemote(index, urlVideo) {
            localStorage.setItem('lastFocusedEpisodeIndex', index);
            kirimKeAndroidStudio(urlVideo);
        }

        function putarFilmTunggal() {
            if (dataFilmAktif && dataFilmAktif.video) {
                kirimKeAndroidStudio(dataFilmAktif.video);
            } else {
                alert("Link video film tidak tersedia!");
            }
        }

        function closeModal() {
            document.getElementById('movieModal').style.display = 'none';
            localStorage.removeItem('activeMovieTitle');
            localStorage.removeItem('lastFocusedEpisodeIndex');

            const savedCardIdx = localStorage.getItem('lastFocusedCardIndex');
            if (savedCardIdx !== null) {
                const cards = document.querySelectorAll('.movie-card-horizontal');
                if (cards[savedCardIdx]) {
                    cards[savedCardIdx].focus();
                    cards[savedCardIdx].scrollIntoView({ behavior: 'auto', block: 'center' });
                }
            }
        }

        function kirimKeAndroidStudio(urlMedia) {
            if (urlMedia) {
                if (typeof Android !== "undefined" && Android.playVideo) {
                    Android.playVideo(urlMedia); 
                } else {
                    window.open(urlMedia, '_blank'); 
                }
            }
        }

        // PENCARIAN GLOBAL MENYELURUH
        const searchInput = document.getElementById('search-input');
        const searchSection = document.getElementById('search-results-section');
        const searchGridContainer = document.getElementById('search-grid-container');
        const searchTitleText = document.getElementById('search-title-text');

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            const barisReguler = ['row-dubbing', 'row-indo', 'row-animasi', 'row-lawas', 'row-series'];

            if (keyword === "") {
                searchSection.style.display = 'none';
                kelolaBarisKategori(); 
            } else {
                barisReguler.forEach(id => document.getElementById(id).style.display = 'none');
                
                const hasilFilter = databaseFilm.filter(item => 
                    item.titulo.toLowerCase().includes(keyword) || 
                    item.genre.toLowerCase().includes(keyword)
                );

                searchSection.style.display = 'block';
                searchTitleText.textContent = `Hasil Pencarian untuk: "${e.target.value}"`;

                if(hasilFilter.length === 0) {
                    searchGridContainer.innerHTML = `<p style="padding: 2rem; color: var(--text-secondary)">Konten tidak ditemukan...</p>`;
                } else {
                    searchGridContainer.innerHTML = hasilFilter.map(item => `
                        <div class="movie-card-horizontal" tabindex="0" onclick="bukaModalDetail('${item.titulo}')">
                            <img src="${item.poster}" alt="${item.titulo}" class="movie-poster-horizontal">
                            <div class="movie-info">
                                <h3 class="movie-title">${item.titulo}</h3>
                                <div class="movie-meta">
                                    <span>${item.year}</span>
                                    <span class="movie-rating"><i class="fas fa-star"></i> ${item.rating}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            }
        });

        const searchIcon = document.getElementById('search-icon');
        const searchContainer = document.getElementById('search-container');
        searchIcon.addEventListener('click', () => {
            searchContainer.classList.toggle('active');
            if (searchContainer.classList.contains('active')) searchInput.focus();
        });


        // ==================== ENGINE NAVIGASI REMOTE CONTROL + PEMULIHAN D-PAD PERMANEN ====================
        
        setInterval(() => {
            const modal = document.getElementById('movieModal');
            const isModalOpen = (modal.style.display === 'block');
            const activeEl = document.activeElement;

            if (!activeEl || activeEl === document.body || activeEl === window) {
                if (isModalOpen) {
                    const savedEpsIdx = localStorage.getItem('lastFocusedEpisodeIndex');
                    if (savedEpsIdx !== null) {
                        const targetEps = document.querySelector(`.episode-btn[data-index="${savedEpsIdx}"]`);
                        if (targetEps) targetEps.focus();
                    } else {
                        const btnPlay = document.getElementById('main-play-btn');
                        if (btnPlay && btnPlay.style.display !== 'none') btnPlay.focus();
                    }
                } else {
                    const savedCardIdx = localStorage.getItem('lastFocusedCardIndex');
                    const cards = document.querySelectorAll('.movie-card-horizontal');
                    if (savedCardIdx !== null && cards[savedCardIdx]) {
                        cards[savedCardIdx].focus();
                    }
                }
            }
        }, 500);

        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('movieModal');
            const isModalOpen = (modal.style.display === 'block');
            
            let selector = '[tabindex="0"], #search-icon, #search-input, .movie-card-horizontal';
            if (isModalOpen) {
                selector = '#movieModal .close-modal, #movieModal .action-button, #movieModal .episode-btn';
            }
            
            const focusableElements = Array.from(document.querySelectorAll(selector)).filter(el => {
                return el.offsetWidth > 0 || el.offsetHeight > 0;
            });
            
            let activeEl = document.activeElement;

            if (!focusableElements.includes(activeEl)) {
                if (focusableElements.length > 0) {
                    focusableElements[0].focus();
                }
                return;
            }

            const currentIndex = focusableElements.indexOf(activeEl);
            let nextIndex = -1;

            if (e.key === 'Escape' || e.key === 'Backspace') {
                if (isModalOpen) {
                    closeModal();
                    e.preventDefault();
                }
                return;
            }

            if (e.key === 'Enter') {
                activeEl.click();
                e.preventDefault();
                return;
            }

            if (isModalOpen && activeEl.classList.contains('episode-btn')) {
                if (e.key === 'ArrowDown') {
                    if (currentIndex < focusableElements.length - 1) {
                        focusableElements[currentIndex + 1].focus();
                        focusableElements[currentIndex + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                    e.preventDefault();
                    return;
                } else if (e.key === 'ArrowUp') {
                    if (currentIndex > 0) {
                        focusableElements[currentIndex - 1].focus();
                        focusableElements[currentIndex - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                    e.preventDefault();
                    return;
                }
            }

            switch(e.key) {
                case 'ArrowLeft':
                    nextIndex = cariElemenTerdekat(activeEl, focusableElements, 'kiri');
                    break;
                case 'ArrowRight':
                    nextIndex = cariElemenTerdekat(activeEl, focusableElements, 'kanan');
                    break;
                case 'ArrowUp':
                    nextIndex = cariElemenTerdekat(activeEl, focusableElements, 'atas');
                    break;
                case 'ArrowDown':
                    nextIndex = cariElemenTerdekat(activeEl, focusableElements, 'bawah');
                    break;
                default:
                    return;
            }

            if (nextIndex !== -1) {
                focusableElements[nextIndex].focus();
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    focusableElements[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    focusableElements[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                e.preventDefault();
            }
        });

        function cariElemenTerdekat(activeEl, elements, arah) {
            const rA = activeEl.getBoundingClientRect();
            const cA = { x: rA.left + rA.width / 2, y: rA.top + rA.height / 2 };
            
            let terdekatIndex = -1;
            let jarakTerkecil = Infinity;

            elements.forEach((el, index) => {
                if (el === activeEl) return;

                const rB = el.getBoundingClientRect();
                const cB = { x: rB.left + rB.width / 2, y: rB.top + rB.height / 2 };

                const dx = cB.x - cA.x;
                const dy = cB.y - cA.y;
                const jarak = Math.sqrt(dx * dx + dy * dy);

                if (arah === 'kanan' && dx > 5 && Math.abs(dy) < rA.height * 1.5) {
                    if (jarak < jarakTerkecil) { jarakTerkecil = jarak; terdekatIndex = index; }
                } else if (arah === 'kiri' && dx < -5 && Math.abs(dy) < rA.height * 1.5) {
                    if (jarak < jarakTerkecil) { jarakTerkecil = jarak; terdekatIndex = index; }
                } else if (arah === 'bawah' && dy > 5 && Math.abs(dx) < window.innerWidth * 0.8) {
                    if (jarak < jarakTerkecil) { jarakTerkecil = jarak; terdekatIndex = index; }
                } else if (arah === 'atas' && dy < -5 && Math.abs(dx) < window.innerWidth * 0.8) {
                    if (jarak < jarakTerkecil) { jarakTerkecil = jarak; terdekatIndex = index; }
                }
            });

            return terdekatIndex;
        }

        window.addEventListener('load', loadDataKonten);
    </script>
