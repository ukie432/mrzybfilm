<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYB Premium TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Smooch+Sans:wght@100;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000000;
            --secondary-color: #141414;
            --accent-color: #222222;
            --highlight-color: #E50914;
            --text-color: #f1f1f1;
            --text-secondary: #b8b8b8;
            --sidebar-width-collapsed: 70px;
            --sidebar-width-expanded: 220px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Smooch Sans', sans-serif;
        }

        body {
            background-color: var(--primary-color);
            color: var(--text-color);
            overflow-x: hidden;
            padding-bottom: 50px;
            display: flex;
        }

        /* --- STYLING SIDEBAR BARU --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: var(--sidebar-width-collapsed);
            background: linear-gradient(to right, rgba(0,0,0,0.95), rgba(15,15,15,0.9));
            z-index: 999;
            display: flex;
            flex-direction: column;
            padding: 2rem 0;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        /* Terbuka ketika ada class .expanded atau ketika salah satu elemen di dalamnya mendapat fokus remote */
        .sidebar:hover,
        .sidebar.expanded,
        .sidebar:focus-within {
            width: var(--sidebar-width-expanded);
            background: rgba(10, 10, 10, 0.98);
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
        }

        .sidebar-menu-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 2rem;
            flex: 1;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 0.8rem 1.3rem;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
            background: transparent;
            border-top: none; border-right: none; border-bottom: none;
            width: 100%;
            text-align: left;
        }

        .sidebar-item i {
            font-size: 1.4rem;
            min-width: 35px;
            text-align: center;
        }

        .sidebar-item span {
            font-size: 1.4rem;
            font-weight: 400;
            margin-left: 10px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .sidebar:hover .sidebar-item span,
        .sidebar.expanded .sidebar-item span,
        .sidebar:focus-within .sidebar-item span {
            opacity: 1;
        }

        .sidebar-item:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-left-color: var(--highlight-color);
            transform: scale(1.03);
        }

        .sidebar-item.active {
            color: var(--highlight-color);
            font-weight: 700;
        }

        .sidebar-footer {
            margin-top: auto;
        }

        /* --- KONTEN UTAMA DIGESER KE KANAN AGAR TIDAK TERTUTUP SIDEBAR --- */
        .main-wrapper {
            margin-left: var(--sidebar-width-collapsed);
            flex: 1;
            width: calc(100% - var(--sidebar-width-collapsed));
            transition: blur 0.3s;
        }

        /* --- DYNAMIC HERO BACKGROUND --- */
        .hero-container {
            position: relative;
            width: 100%;
            height: 70vh;
            overflow: hidden;
            background-color: #000;
        }

        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center 20%;
            transition: background-image 0.5s ease-in-out;
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.7) 75%, rgba(0,0,0,1) 100%),
                        linear-gradient(to right, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 50%);
            z-index: 2;
        }

        .hero-content-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 0 2rem 2rem 2rem;
            z-index: 3;
        }

        .hero-title-display {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            text-transform: uppercase;
            max-width: 60%;
            line-height: 0.95;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- LAYOUT UTAMA BARIS FILM --- */
        .movies-section {
            padding: 0 2rem;
            margin-top: 10px;
            position: relative;
            z-index: 4;
        }

        .category-row {
            margin-bottom: 1.8rem;
            display: none;
        }

        .row-header {
            margin-bottom: 0.4rem;
            border-left: 3px solid var(--highlight-color);
            padding-left: 8px;
        }

        .row-title {
            font-size: 1.5rem; 
            color: var(--text-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .movies-slider-horizontal {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 4px;
            scrollbar-width: none;
        }

        .movies-slider-horizontal::-webkit-scrollbar {
            display: none;
        }

        .movie-card-horizontal {
            background-color: var(--secondary-color);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.2s ease;
            cursor: pointer;
            flex: 0 0 190px; 
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.7);
            border: 2px solid transparent;
        }

        .movie-card-horizontal:focus,
        .action-button:focus,
        .episode-btn:focus,
        .close-modal:focus,
        .search-input-box:focus {
            outline: none;
            transform: scale(1.08);
            box-shadow: 0 0 18px var(--highlight-color);
            border-color: var(--highlight-color);
            background-color: var(--accent-color);
            z-index: 99;
        }

        .movie-poster-horizontal {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background-color: #2a2a2a;
            display: block;
        }

        .movie-info {
            padding: 6px 8px;
            background-color: var(--secondary-color);
        }

        .movie-title {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .movie-rating {
            color: gold;
        }

        /* --- HALAMAN PENCARIAN BARU (GAMBAR 4) --- */
        .search-page-view {
            display: none;
            padding: 2rem;
            width: 100%;
            min-height: 100vh;
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #1a1a1a;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            max-width: 700px;
            margin-bottom: 3rem;
            border: 2px solid transparent;
        }

        .search-input-wrapper:focus-within {
            border-color: var(--highlight-color);
        }

        .search-input-wrapper i {
            font-size: 1.5rem;
            color: var(--text-secondary);
        }

        .search-input-box {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.6rem;
            width: 100%;
        }

        .search-popular-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }

        /* GRID URUTAN POPULER ANGKA (GAMBAR 4) */
        .popular-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .popular-card {
            flex: 0 0 180px;
            position: relative;
            cursor: pointer;
        }

        .popular-badge {
            position: absolute;
            top: -10px;
            left: -10px;
            background-color: var(--highlight-color);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* MODAL STYLING */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background-color: var(--secondary-color);
            margin: 2rem auto;
            width: 90%;
            max-width: 1000px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--accent-color);
            border-bottom: 1px solid #333;
        }

        .modal-title {
            font-size: 2rem;
            color: var(--text-color);
        }

        .close-modal {
            font-size: 2.5rem;
            color: var(--text-color);
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            padding: 0 10px;
            display: inline-block;
            transition: all 0.2s;
        }

        .modal-body {
            padding: 2rem;
        }

        .movie-details {
            display: flex;
            gap: 2rem;
        }

        .movie-poster-large {
            width: 250px;
            height: 375px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .movie-info-large {
            flex: 1;
        }

        .movie-title-large {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .movie-meta-large {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .movie-description {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            color: #ccc;
        }

        .movie-actions {
            display: flex;
            gap: 1rem;
        }

        .action-button {
            padding: 0.8rem 2rem;
            border: 2px solid transparent;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .play-button {
            background-color: var(--highlight-color);
            color: white;
        }

        .episode-section {
            margin-top: 2rem;
            border-top: 1px solid #333;
            padding-top: 1.5rem;
        }

        .episode-headline {
            color: var(--highlight-color);
            font-size: 1.6rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .episode-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .episode-btn {
            background-color: var(--accent-color);
            color: white;
            border: 2px solid #333;
            padding: 0.8rem 1.5rem;
            width: 100%;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .episode-btn i {
            margin-right: 15px;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="main-sidebar">
        <div class="sidebar-menu-wrapper">
            <button class="sidebar-item" id="menu-cari" tabindex="0" onclick="switchView('search')">
                <i class="fas fa-search"></i> <span>Cari</span>
            </button>
            <button class="sidebar-item active" id="menu-home" tabindex="0" onclick="switchView('home')">
                <i class="fas fa-home"></i> <span>Home</span>
            </button>
            <button class="sidebar-item" tabindex="0" onclick="switchView('home')">
                <i class="fas fa-film"></i> <span>Film</span>
            </button>
            <button class="sidebar-item" tabindex="0" onclick="switchView('home')">
                <i class="fas fa-cat"></i> <span>Anime</span>
            </button>
            <button class="sidebar-item" tabindex="0" onclick="switchView('home')">
                <i class="fas fa-star"></i> <span>Koleksi Saya</span>
            </button>
            <button class="sidebar-item" tabindex="0" onclick="switchView('home')">
                <i class="fas fa-gem"></i> <span>Pusat VIP</span>
            </button>
        </div>
        <div class="sidebar-footer">
            <button class="sidebar-item" tabindex="0">
                <i class="fas fa-cog"></i> <span>Pengaturan</span>
            </button>
        </div>
    </nav>

    <div class="main-wrapper">
        
        <div id="page-home-view">
            <div class="hero-container" id="hero-display-area">
                <div class="hero-background" id="hero-bg-image"></div>
                <div class="hero-overlay"></div>
                <div class="hero-content-wrapper">
                    <h1 class="hero-title-display" id="hero-title-text">-</h1>
                </div>
            </div>

            <main class="movies-section" id="main-content-wrapper">
                <div class="category-row" id="row-pilihan" style="margin-top: -180px;">
                    <div class="movies-slider-horizontal" id="slider-pilihan"></div>
                </div>

                <div class="category-row" id="row-dubbing">
                    <div class="row-header"><h2 class="row-title">Film Dubbing</h2></div>
                    <div class="movies-slider-horizontal" id="slider-dubbing"></div>
                </div>

                <div class="category-row" id="row-indo">
                    <div class="row-header"><h2 class="row-title">Film Indonesia</h2></div>
                    <div class="movies-slider-horizontal" id="slider-indo"></div>
                </div>

                <div class="category-row" id="row-animasi">
                    <div class="row-header"><h2 class="row-title">Film Animasi</h2></div>
                    <div class="movies-slider-horizontal" id="slider-animasi"></div>
                </div>

                <div class="category-row" id="row-lawas">
                    <div class="row-header"><h2 class="row-title">Film Indo Lawas</h2></div>
                    <div class="movies-slider-horizontal" id="slider-lawas"></div>
                </div>

                <div class="category-row" id="row-series">
                    <div class="row-header"><h2 class="row-title">Film Series Pilihan</h2></div>
                    <div class="movies-slider-horizontal" id="slider-series"></div>
                </div>
            </main>
        </div>

        <div id="page-search-view" class="search-page-view">
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input-box" placeholder="Cari judul film atau genre..." id="search-main-input" tabindex="0">
            </div>

            <h2 class="search-popular-title" id="search-dynamic-title">Pencarian Populer</h2>
            <div class="popular-grid" id="search-results-grid">
                </div>
        </div>

    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTypeBadge">Detail Konten</h2>
                <span class="close-modal" tabindex="0" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="movie-details">
                    <img src="" alt="Poster" class="movie-poster-large" id="modalPoster">
                    <div class="movie-info-large">
                        <h3 class="movie-title-large" id="modalMovieTitle">Judul</h3>
                        <div class="movie-meta-large">
                            <span id="modalYear">Tahun</span>
                            <span id="modalDuration">Durasi</span>
                            <span id="modalRating">Rating</span>
                            <span id="modalGenre">Genre</span>
                        </div>
                        <p class="movie-description" id="modalDescription">Deskripsi...</p>
                        <div class="movie-actions">
                            <button class="action-button play-button" id="main-play-btn" tabindex="0" onclick="putarFilmTunggal()">
                                <i class="fas fa-play"></i> Putar Film
                            </button>
                        </div>
                        <div class="episode-section" id="episode-list-wrapper" style="display: none;">
                            <h4 class="episode-headline">Daftar Episode</h4>
                            <div class="episode-grid" id="episode-grid"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const JSON_URL = 'data/Tester.json'; 
        let databaseFilm = [];
        let dataFilmAktif = null;
        let activeView = 'home';

        // Ganti Tampilan View Antara Home dan Pencarian
        function switchView(viewName) {
            activeView = viewName;
            const homeView = document.getElementById('page-home-view');
            const searchView = document.getElementById('page-search-view');
            
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));

            if (viewName === 'search') {
                homeView.style.display = 'none';
                searchView.style.display = 'block';
                document.getElementById('menu-cari').classList.add('active');
                renderPencarianPopuler();
                setTimeout(() => document.getElementById('search-main-input').focus(), 100);
            } else {
                homeView.style.display = 'block';
                searchView.style.display = 'none';
                document.getElementById('menu-home').classList.add('active');
                document.getElementById('search-main-input').value = "";
                kelolaBarisKategori();
            }
        }

        async function loadDataKonten() {
            try {
                const response = await fetch(JSON_URL);
                databaseFilm = await response.json();
                kelolaBarisKategori();
            } catch (error) {
                console.error("Gagal mengambil database JSON:", error);
            }
        }

        function kelolaBarisKategori() {
            const pilihanData = databaseFilm.filter(m => m.categoria === "pilihan_atas" && m.halaman_depan === true).slice(0, 6);
            renderSlider(pilihanData, 'slider-pilihan', 'row-pilihan');

            const dubbingData = databaseFilm.filter(m => m.categoria === "film_dubbing" && m.halaman_depan === true);
            renderSlider(dubbingData, 'slider-dubbing', 'row-dubbing');

            const indoData = databaseFilm.filter(m => m.categoria === "film_indo" && m.halaman_depan === true);
            renderSlider(indoData, 'slider-indo', 'row-indo');

            const animasiData = databaseFilm.filter(m => m.categoria === "film_animasi" && m.halaman_depan === true);
            renderSlider(animasiData, 'slider-animasi', 'row-animasi');

            const lawasData = databaseFilm.filter(m => m.categoria === "indo_lawas" && m.halaman_depan === true);
            renderSlider(lawasData, 'slider-lawas', 'row-lawas');

            const seriesData = databaseFilm.filter(m => m.is_series === true && m.halaman_depan === true);
            renderSlider(seriesData, 'slider-series', 'row-series');

            setTimeout(() => {
                const cards = document.querySelectorAll('#page-home-view .movie-card-horizontal');
                if (cards.length > 0) cards[0].focus();
            }, 300);
        }

        function renderSlider(dataList, sliderId, rowId) {
            const slider = document.getElementById(sliderId);
            const row = document.getElementById(rowId);
            if (dataList.length === 0) { row.style.display = 'none'; return; }
            row.style.display = 'block';
            
            slider.innerHTML = dataList.map(item => `
                <div class="movie-card-horizontal" tabindex="0" data-title="${item.titulo}" data-bg="${item.poster}" onclick="bukaModalDetail('${item.titulo}')">
                    <img src="${item.poster}" alt="${item.titulo}" class="movie-poster-horizontal" loading="lazy">
                    <div class="movie-info">
                        <h3 class="movie-title">${item.titulo}</h3>
                        <div class="movie-meta">
                            <span>${item.year}</span>
                            <span class="movie-rating"><i class="fas fa-star"></i> ${item.rating}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            if (sliderId === 'slider-pilihan') {
                setTimeout(() => {
                    slider.querySelectorAll('.movie-card-horizontal').forEach(card => {
                        card.addEventListener('focus', function() {
                            const bgUrl = this.getAttribute('data-bg');
                            const titleText = this.getAttribute('data-title');
                            if(bgUrl) document.getElementById('hero-bg-image').style.backgroundImage = `url('${bgUrl}')`;
                            if(titleText) document.getElementById('hero-title-text').textContent = titleText;
                        });
                    });
                }, 100);
            }
        }

        // TAMPILAN PENCARIAN POPULER MENGGUNAKAN INDEKS NOMOR (GAMBAR 4)
        function renderPencarianPopuler() {
            const grid = document.getElementById('search-results-grid');
            const dataPopuler = databaseFilm.slice(0, 7); // Ambil 7 film pertama untuk list populer
            
            grid.innerHTML = dataPopuler.map((item, idx) => `
                <div class="movie-card-horizontal popular-card" tabindex="0" onclick="bukaModalDetail('${item.titulo}')">
                    <div class="popular-badge">${idx + 1}</div>
                    <img src="${item.poster}" alt="${item.titulo}" class="movie-poster-horizontal">
                    <div class="movie-info">
                        <h3 class="movie-title">${item.titulo}</h3>
                    </div>
                </div>
            `).join('');
        }

        // FUNGSI INPUT STRING DI PENCARIAN
        document.getElementById('search-main-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            const grid = document.getElementById('search-results-grid');
            const title = document.getElementById('search-dynamic-title');

            if (keyword === "") {
                title.textContent = "Pencarian Populer";
                renderPencarianPopuler();
            } else {
                title.textContent = `Hasil Pencarian untuk: "${e.target.value}"`;
                const filtered = databaseFilm.filter(item => 
                    item.titulo.toLowerCase().includes(keyword) || 
                    item.genre.toLowerCase().includes(keyword)
                );

                if(filtered.length === 0) {
                    grid.innerHTML = `<p style="padding: 2rem; color: var(--text-secondary)">Konten tidak ditemukan...</p>`;
                } else {
                    grid.innerHTML = filtered.map(item => `
                        <div class="movie-card-horizontal" tabindex="0" onclick="bukaModalDetail('${item.titulo}')">
                            <img src="${item.poster}" alt="${item.titulo}" class="movie-poster-horizontal">
                            <div class="movie-info">
                                <h3 class="movie-title">${item.titulo}</h3>
                            </div>
                        </div>
                    `).join('');
                }
            }
        });

        // SYSTEM DETAIL MODAL & VIDEO PLAYER
        function bukaModalDetail(judulKonten) {
            const item = databaseFilm.find(m => m.titulo === judulKonten);
            if (!item) return;
            dataFilmAktif = item; 

            document.getElementById('modalMovieTitle').textContent = item.titulo;
            document.getElementById('modalPoster').src = item.poster;
            document.getElementById('modalYear').textContent = item.year;
            document.getElementById('modalDuration').textContent = item.duration;
            document.getElementById('modalRating').innerHTML = `<i class="fas fa-star"></i> ${item.rating}`;
            document.getElementById('modalGenre').textContent = item.genre;
            document.getElementById('modalDescription').textContent = item.description;

            const btnPlayUtama = document.getElementById('main-play-btn');
            const areaSeri = document.getElementById('episode-list-wrapper');
            const gridEpisode = document.getElementById('episode-grid');

            if (item.is_series === true && item.episodes) {
                document.getElementById('modalTypeBadge').textContent = "Detail Seri";
                btnPlayUtama.style.display = 'none'; areaSeri.style.display = 'block';    
                gridEpisode.innerHTML = item.episodes.map((eps, idx) => `
                    <button class="episode-btn" tabindex="0" data-index="${idx}" onclick="putarVideo('${eps.video}')">
                        <i class="fas fa-play-circle"></i> <span><strong>${eps.eps_num}</strong> - ${eps.eps_title}</span>
                    </button>
                `).join('');
            } else {
                document.getElementById('modalTypeBadge').textContent = "Detail Film";
                btnPlayUtama.style.display = 'flex'; areaSeri.style.display = 'none';     
            }
            document.getElementById('movieModal').style.display = 'block';
            setTimeout(() => {
                if (item.is_series) document.querySelector('.episode-btn').focus();
                else btnPlayUtama.focus();
            }, 200);
        }

        function closeModal() { document.getElementById('movieModal').style.display = 'none'; }
        function putarFilmTunggal() { if (dataFilmAktif) putarVideo(dataFilmAktif.video); }
        
        function putarVideo(url) {
            if (!url) return alert("Link video rusak!");
            if (typeof Android !== "undefined" && Android.playVideo) Android.playVideo(url);
            else window.open(url, '_blank');
        }

        // ================= ENGINE NAVIGASI D-PAD TV & AUTOMATIC EXPAND SIDEBAR =================
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('movieModal');
            if (modal.style.display === 'block') {
                if (e.key === 'Escape' || e.key === 'Backspace') { closeModal(); e.preventDefault(); }
                return; 
            }

            const focusable = Array.from(document.querySelectorAll('[tabindex="0"], .movie-card-horizontal, .sidebar-item')).filter(el => el.offsetWidth > 0);
            const active = document.activeElement;
            const currIdx = focusable.indexOf(active);

            if (e.key === 'Escape' || e.key === 'Backspace') {
                if (activeView === 'search') { switchView('home'); e.preventDefault(); }
                return;
            }

            let nextIdx = -1;
            switch(e.key) {
                case 'ArrowLeft':
                    nextIdx = cariElemenTerdekat(active, focusable, 'kiri');
                    // JIKA MENTOK PALING KIRI: Otomatis lempar fokus ke Sidebar terdekat
                    if (nextIdx === -1 && !active.classList.contains('sidebar-item')) {
                        const sideItems = document.querySelectorAll('.sidebar-item');
                        if(sideItems.length > 0) sideItems[1].focus(); // Fokus ke menu Home
                        e.preventDefault();
                        return;
                    }
                    break;
                case 'ArrowRight':
                    nextIdx = cariElemenTerdekat(active, focusable, 'kanan');
                    break;
                case 'ArrowUp':
                    nextIdx = cariElemenTerdekat(active, focusable, 'atas');
                    break;
                case 'ArrowDown':
                    nextIdx = cariElemenTerdekat(active, focusable, 'bawah');
                    break;
                case 'Enter':
                    active.click();
                    e.preventDefault();
                    return;
            }

            if (nextIdx !== -1) {
                focusable[nextIdx].focus();
                focusable[nextIdx].scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                e.preventDefault();
            }
        });

        function cariElemenTerdekat(activeEl, elements, arah) {
    const rA = activeEl.getBoundingClientRect();
    const cA = { x: rA.left + rA.width / 2, y: rA.top + rA.height / 2 };
    let terdekatIdx = -1; let jarakTerkecil = Infinity;

    // Cek apakah elemen aktif saat ini berada di dalam Sidebar
    const isCurrentlyInSidebar = activeEl.classList.contains('sidebar-item');

    elements.forEach((el, index) => {
        if (el === activeEl) return;
        
        // Proteksi: Jika menekan Atas/Bawah di area poster, JANGAN biarkan fokus melompat ke Sidebar
        if ((arah === 'bawah' || arah === 'atas') && !isCurrentlyInSidebar) {
            if (el.classList.contains('sidebar-item')) {
                return; // Lewati elemen ini, jangan dihitung
            }
        }

        const rB = el.getBoundingClientRect();
        const cB = { x: rB.left + rB.width / 2, y: rB.top + rB.height / 2 };
        const dx = cB.x - cA.x; const dy = cB.y - cA.y;
        const jarak = Math.sqrt(dx * dx + dy * dy);

        if (arah === 'kanan' && dx > 5 && Math.abs(dy) < rA.height * 1.8) {
            if (jarak < jarakTerkecil) { jarakTerkecil = jarak; terdekatIdx = index; }
        } else if (arah === 'kiri' && dx < -5 && Math.abs(dy) < rA.height * 1.8) {
            if (jarak < jarakTerkecil) { jarakTerkecil = jarak; terdekatIdx = index; }
        } else if (arah === 'bawah' && dy > 5 && Math.abs(dx) < window.innerWidth * 0.6) {
            if (jarak < jarakTerkecil) { jarakTerkecil = jarak; terdekatIdx = index; }
        } else if (arah === 'atas' && dy < -5 && Math.abs(dx) < window.innerWidth * 0.6) {
            if (jarak < jarakTerkecil) { jarakTerkecil = jarak; terdekatIdx = index; }
        }
    });
    return terdekatIdx;
}

        window.addEventListener('load', loadDataKonten);
    </script>
