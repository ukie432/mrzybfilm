<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Film Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">

    <!-- Container Utama -->
    <div class="max-w-6xl mx-auto">
        
        <!-- Header & Kolom Pencarian -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <h1 class="text-3xl font-bold text-red-500 tracking-wider">MOVIETIME</h1>
            <input type="text" id="search-bar" placeholder="Cari ribuan film di sini..." 
                   class="w-full md:w-80 px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-red-500 transition">
        </header>

        <!-- Area Hasil Pencarian (Disembunyikan saat kosong) -->
        <section id="search-results-section" class="hidden mb-12">
            <h2 class="text-xl font-semibold mb-4 text-yellow-400">Hasil Pencarian :</h2>
            <div id="search-results-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            <hr class="border-gray-800 my-8">
        </section>

        <!-- Area Home (Hanya Kategori Tertentu) -->
        <main id="home-section">
            <!-- Kategori 1 -->
            <div class="mb-8">
                <h2 class="text-xl font-semibold mb-4">🔥 Sedang Tren</h2>
                <div id="kategori-trending" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            </div>

            <!-- Kategori 2 -->
            <div class="mb-8">
                <h2 class="text-xl font-semibold mb-4">🎬 Film Aksi Pilihan</h2>
                <div id="kategori-action" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            </div>
        </main>

    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        // GANTI DENGAN URL RAW JSON GITHUB KAMU
        const JSON_URL = 'data/Tester'; 
        
        let semuaFilm = [];

        // 1. Ambil data dari GitHub JSON saat web dibuka
        async function loadMovies() {
            try {
                const response = await fetch(JSON_URL);
                semuaFilm = await response.json();
                
                // Tampilkan konten halaman utama berdasarkan kategori
                tampilkanHome();
            } catch (error) {
                console.error("Gagal memuat data film:", error);
            }
        }

        // 2. Fungsi Menampilkan Film di Home (Hanya beberapa kategori)
        function tampilkanHome() {
            const gridTrending = document.getElementById('kategori-trending');
            const gridAction = document.getElementById('kategori-action');

            // Contoh Filter: Hanya ambil film yang punya tag/kategori spesifik di JSON
            const filmTrending = semuaFilm.filter(f => f.kategori === "trending").slice(0, 5); // Batasi 5 film
            const filmAction = semuaFilm.filter(f => f.genre.toLowerCase().includes("action")).slice(0, 5);

            gridTrending.innerHTML = filmTrending.map(f => buatCardFilm(f)).join('');
            gridAction.innerHTML = filmAction.map(f => buatCardFilm(f)).join('');
        }

        // 3. Fungsi Membuat Tampilan Card Film
        function buatCardFilm(film) {
            return `
                <a href="${film.url_film}" target="_blank" class="group bg-gray-800 rounded-lg overflow-hidden block transform hover:scale-105 transition duration-200 shadow-lg">
                    <img src="${film.poster}" alt="${film.judul}" class="w-full h-64 object-cover group-hover:opacity-80 transition">
                    <div class="p-3">
                        <h3 class="font-medium text-sm truncate">${film.judul}</h3>
                        <p class="text-xs text-gray-400 mt-1">${film.tahun || ''}</p>
                    </div>
                </a>
            `;
        }

        // 4. Fungsi Pencarian Global (Mencari di RIBUAN film sekaligus)
        const searchBar = document.getElementById('search-bar');
        const searchResultsSection = document.getElementById('search-results-section');
        const searchResultsGrid = document.getElementById('search-results-grid');
        const homeSection = document.getElementById('home-section');

        searchBar.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();

            if (keyword === "") {
                // Jika kolom pencarian kosong, sembunyikan hasil cari, tampilkan Home lagi
                searchResultsSection.classList.add('hidden');
                homeSection.classList.remove('hidden');
            } else {
                // Cari ke seluruh database JSON tanpa batas kategori
                const hasilFilter = semuaFilm.filter(film => 
                    film.judul.toLowerCase().includes(keyword) || 
                    film.genre.toLowerCase().includes(keyword)
                );

                // Sembunyikan Home, tampilkan panel pencarian
                homeSection.classList.add('hidden');
                searchResultsSection.classList.remove('hidden');

                if (hasilFilter.length > 0) {
                    searchResultsGrid.innerHTML = hasilFilter.map(f => buatCardFilm(f)).join('');
                } else {
                    searchResultsGrid.innerHTML = `<p class="text-gray-500 col-span-full py-4 text-center">Film tidak ditemukan.</p>`;
                }
            }
        });

        // Jalankan fungsi saat web dibuka
        loadMovies();
    </script>
</body>
</html>
