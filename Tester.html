<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZYB Premium TV - Movies & Series</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Smooch+Sans:wght@100;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000000;
            --secondary-color: #141414;
            --accent-color: #222222;
            --highlight-color: #E50914;
            --text-color: #f1f1f1;
            --text-secondary: #b8b8b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Smooch Sans', sans-serif;
        }

        body {
            background-color: var(--primary-color);
            color: var(--text-color);
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0));
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--highlight-color);
            letter-spacing: 2px;
        }

        .user-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .user-actions i {
            font-size: 1.5rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-actions i:hover {
            color: var(--highlight-color);
        }

        .search-container {
            position: relative;
            display: none;
            width: 250px;
        }

        .search-container.active {
            display: block;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        /* Movies Section */
        .movies-section {
            padding: 0 2rem;
            margin-top: 20px;
        }

        .section-header {
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--highlight-color);
            padding-left: 10px;
        }

        .section-title {
            font-size: 2.2rem;
            color: var(--text-color);
            font-weight: 700;
        }

        .movies-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }

        .movie-card {
            background-color: var(--secondary-color);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            width: calc(16.66% - 13px);
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 0 15px var(--highlight-color);
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background-color: #2a2a2a;
        }

        .movie-info {
            padding: 10px;
            background-color: var(--secondary-color);
        }

        .movie-title {
            font-size: 1.2rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 5px;
        }

        .movie-rating {
            color: gold;
        }

        /* Modal Overlay */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background-color: var(--secondary-color);
            margin: 2rem auto;
            width: 90%;
            max-width: 1000px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--accent-color);
            border-bottom: 1px solid #333;
        }

        .modal-title {
            font-size: 2rem;
            color: var(--text-color);
        }

        .close-modal {
            font-size: 2.5rem;
            color: var(--text-color);
            cursor: pointer;
        }

        .modal-body {
            padding: 2rem;
        }

        .movie-details {
            display: flex;
            gap: 2rem;
        }

        .movie-poster-large {
            width: 250px;
            height: 375px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .movie-info-large {
            flex: 1;
        }

        .movie-title-large {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .movie-meta-large {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .movie-description {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            color: #ccc;
        }

        .movie-actions {
            display: flex;
            gap: 1rem;
        }

        .action-button {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .play-button {
            background-color: var(--highlight-color);
            color: white;
        }

        .play-button:hover {
            background-color: #ff2d4f;
        }

        /* Episode List Styles */
        .episode-section {
            margin-top: 2rem;
            border-top: 1px solid #333;
            padding-top: 1.5rem;
        }

        .episode-headline {
            color: var(--highlight-color);
            font-size: 1.6rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .episode-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .episode-btn {
            background-color: var(--accent-color);
            color: white;
            border: 1px solid #333;
            padding: 0.8rem 1.5rem;
            width: 100%;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .episode-btn:hover {
            background-color: var(--highlight-color);
            border-color: var(--highlight-color);
        }

        .episode-btn i {
            margin-right: 15px;
            font-size: 1.3rem;
        }

        /* Responsive Breakpoints */
        @media (max-width: 1200px) { .movie-card { width: calc(20% - 12px); } }
        @media (max-width: 900px) { .movie-card { width: calc(25% - 12px); } .movie-details { flex-direction: column; } .movie-poster-large { width: 100%; height: auto; max-height: 400px; } }
        @media (max-width: 600px) { .movie-card { width: calc(33.33% - 10px); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">MRZYB TV</div>
        <div class="user-actions">
            <i class="fas fa-search" id="search-icon"></i>
            <div class="search-container" id="search-container">
                <input type="text" class="search-input" placeholder="Cari film atau seri..." id="search-input">
            </div>
            <i class="fas fa-user"></i>
        </div>
    </header>

    <main class="movies-section">
        <div class="section-header">
            <h2 class="section-title" id="section-main-title">Koleksi Terpopuler</h2>
        </div>
        <div class="movies-container" id="movies-grid"></div>
    </main>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTypeBadge">Detail Konten</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="movie-details">
                    <img src="" alt="Poster" class="movie-poster-large" id="modalPoster">
                    <div class="movie-info-large">
                        <h3 class="movie-title-large" id="modalMovieTitle">Judul</h3>
                        <div class="movie-meta-large">
                            <span id="modalYear">Tahun</span>
                            <span id="modalDuration">Durasi</span>
                            <span id="modalRating">Rating</span>
                            <span id="modalGenre">Genre</span>
                        </div>
                        <p class="movie-description" id="modalDescription">Deskripsi...</p>
                        
                        <div class="movie-actions">
                            <button class="action-button play-button" id="main-play-btn" onclick="putarFilmTunggal()">
                                <i class="fas fa-play"></i> Putar Film
                            </button>
                        </div>

                        <div class="episode-section" id="episode-list-wrapper" style="display: none;">
                            <h4 class="episode-headline">Daftar Episode</h4>
                            <div class="episode-grid" id="episode-grid"></div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const JSON_URL = 'data/Tester.json'; 
        let databaseFilm = [];
        let dataFilmAktif = null;

        // Ambil Data dari JSON saat halaman dimuat
        async function loadDataKonten() {
            try {
                const response = await fetch(JSON_URL);
                databaseFilm = await response.json();
                renderKonten(databaseFilm.filter(m => m.halaman_depan === true));
            } catch (error) {
                console.error("Gagal mengambil database JSON:", error);
            }
        }

        // Tampilkan Poster ke Layar
        function renderKonten(daftarKonten) {
            const grid = document.getElementById('movies-grid');
            if (daftarKonten.length === 0) {
                grid.innerHTML = `<p style="padding: 2rem; color: var(--text-secondary)">Konten tidak ditemukan...</p>`;
                return;
            }

            grid.innerHTML = daftarKonten.map(item => `
                <div class="movie-card" onclick="bukaModalDetail('${item.titulo}')">
                    <img src="${item.poster}" alt="${item.titulo}" class="movie-poster" loading="lazy">
                    <div class="movie-info">
                        <h3 class="movie-title">${item.titulo}</h3>
                        <div class="movie-meta">
                            <span>${item.year}</span>
                            <span class="movie-rating"><i class="fas fa-star"></i> ${item.rating}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Buka Panel Modal Deskripsi Konten
        function bukaModalDetail(judulKonten) {
            const item = databaseFilm.find(m => m.titulo === judulKonten);
            if (!item) return;

            dataFilmAktif = item; // Simpan data item yang sedang aktif di-klik

            // Pasang metadata dasar
            document.getElementById('modalMovieTitle').textContent = item.titulo;
            document.getElementById('modalPoster').src = item.poster;
            document.getElementById('modalYear').textContent = item.year;
            document.getElementById('modalDuration').textContent = item.duration;
            document.getElementById('modalRating').innerHTML = `<i class="fas fa-star"></i> ${item.rating}`;
            document.getElementById('modalGenre').textContent = item.genre;
            document.getElementById('modalDescription').textContent = item.description;

            const btnPlayUtama = document.getElementById('main-play-btn');
            const areaSeri = document.getElementById('episode-list-wrapper');
            const gridEpisode = document.getElementById('episode-grid');

            // LOGIKA PEMBEDA: Apakah film seri atau film tunggal biasa?
            if (item.is_series === true && item.episodes) {
                document.getElementById('modalTypeBadge').textContent = "Detail Seri";
                btnPlayUtama.style.display = 'none'; // Sembunyikan tombol play utama langsung
                areaSeri.style.display = 'block';    // Munculkan kontainer daftar episode
                
                // Render kumpulan tombol episode beserta link-nya masing-masing
                gridEpisode.innerHTML = item.episodes.map(eps => `
                    <button class="episode-btn" onclick="kirimKeAndroidStudio('${eps.video}')">
                        <i class="fas fa-play-circle"></i>
                        <span><strong>${eps.eps_num}</strong> - ${eps.eps_title}</span>
                    </button>
                `).join('');
            } else {
                document.getElementById('modalTypeBadge').textContent = "Detail Film";
                btnPlayUtama.style.display = 'flex'; // Munculkan tombol play utama
                areaSeri.style.display = 'none';     // Sembunyikan kontainer list episode
                gridEpisode.innerHTML = '';
            }

            document.getElementById('movieModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('movieModal').style.display = 'none';
        }

        // Fungsi Aksi Pemutaran Film Tunggal
        function putarFilmTunggal() {
            if (dataFilmAktif && dataFilmAktif.video) {
                kirimKeAndroidStudio(dataFilmAktif.video);
            } else {
                alert("Link video film tidak tersedia!");
            }
        }

        // Jembatan Komunikasi Utama Ke ExoPlayer Android Studio Anda
        function kirimKeAndroidStudio(urlMedia) {
            if (urlMedia) {
                if (typeof Android !== "undefined" && Android.playVideo) {
                    Android.playVideo(urlMedia); // Panggil fungsi Java Android Studio Anda
                } else {
                    window.open(urlMedia, '_blank'); // Backup jika dibuka via browser biasa
                }
            }
        }

        // Fitur Filter Pencarian
        const searchInput = document.getElementById('search-input');
        const mainTitle = document.getElementById('section-main-title');

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            if (keyword === "") {
                mainTitle.textContent = "Koleksi Terpopuler";
                renderKonten(databaseFilm.filter(m => m.halaman_depan === true));
            } else {
                mainTitle.textContent = `Hasil Pencarian: "${e.target.value}"`;
                const filterResult = databaseFilm.filter(item => 
                    item.titulo.toLowerCase().includes(keyword) || 
                    item.genre.toLowerCase().includes(keyword) ||
                    item.categoria.toLowerCase().includes(keyword)
                );
                renderKonten(filterResult);
            }
        });

        const searchIcon = document.getElementById('search-icon');
        const searchContainer = document.getElementById('search-container');
        searchIcon.addEventListener('click', () => {
            searchContainer.classList.toggle('active');
            if (searchContainer.classList.contains('active')) searchInput.focus();
        });

        window.addEventListener('load', loadDataKonten);
    </script>
</body>
</html>
