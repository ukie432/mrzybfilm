<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mrzyb_premium</title>
    <style>
        /* Gaya dasar untuk layout TV / STB */
        body { background-color: #141414; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #main-sidebar { width: 80px; position: fixed; left: 0; top: 0; bottom: 0; background: #000; transition: width 0.3s; z-index: 10; }
        #main-sidebar.expanded { width: 240px; }
        .sidebar-item { padding: 20px; color: #aaa; cursor: pointer; display: block; text-decoration: none; }
        .sidebar-item.active, .sidebar-item:focus { color: #fff; background: #222; outline: none; }
        #content-area { margin-left: 90px; padding: 20px; height: 100vh; overflow-y: auto; }
        .movie-row { margin-bottom: 30px; }
        .movie-slider { display: flex; overflow-x: auto; padding: 10px 0; scroll-behavior: smooth; }
        .movie-slider.grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; overflow-x: visible; }
        .movie-card { width: 150px; flex-shrink: 0; margin-right: 15px; background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .movie-card:focus { transform: scale(1.08); outline: 4px solid #fff; }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; }
        .movie-card h4 { padding: 8px; margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #181818; margin: 10% auto; padding: 20px; width: 60%; border-radius: 10px; display: flex; gap: 20px; }
        .modal-content img { width: 200px; height: 300px; object-fit: cover; }
        .btn-focus { padding: 10px 20px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; }
        .btn-focus:focus { background: red; color: #fff; outline: none; }
    </style>
</head>
<body>

    <!-- SIDEBAR NAVIGATION -->
    <div id="main-sidebar">
        <a href="#" class="sidebar-item active" id="menu-home" onclick="switchView('home')" tabindex="1">Home</a>
        <a href="#" class="sidebar-item" id="menu-cari" onclick="switchView('search')" tabindex="2">Cari</a>
        <a href="#" class="sidebar-item" id="menu-film" onclick="switchView('film')" tabindex="3">Dubbing</a>
        <a href="#" class="sidebar-item" id="menu-anime" onclick="switchView('anime')" tabindex="4">Animasi</a>
        <a href="#" class="sidebar-item" id="menu-indo" onclick="switchView('indo')" tabindex="5">Indonesia</a>
        <a href="#" class="sidebar-item" id="menu-seri" onclick="switchView('seri')" tabindex="6">Series</a>
        <a href="#" class="sidebar-item" id="menu-vip" onclick="switchView('lawas')" tabindex="7">Lawas</a>
        <a href="#" class="sidebar-item" id="menu-koleksi" onclick="switchView('favorites')" tabindex="8">Koleksi</a>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div id="content-area">
        
        <!-- PAGE HOME VIEW -->
        <div id="page-home-view">
            <div class="movie-row" id="row-pilihan">
                <h3 class="row-header">Film Pilihan</h3>
                <div class="movie-slider" id="slider-pilihan"></div>
            </div>
            <div class="movie-row" id="row-dubbing">
                <h3>Film Dubbing Indo</h3>
                <div class="movie-slider" id="slider-dubbing"></div>
            </div>
            <div class="movie-row" id="row-indo">
                <h3>Film Indonesia</h3>
                <div class="movie-slider" id="slider-indo"></div>
            </div>
            <div class="movie-row" id="row-animasi">
                <h3>Film Animasi</h3>
                <div class="movie-slider" id="slider-animasi"></div>
            </div>
            <div class="movie-row" id="row-lawas">
                <h3>Film Lawas</h3>
                <div class="movie-slider" id="slider-lawas"></div>
            </div>
            <div class="movie-row" id="row-series">
                <h3>Film Series</h3>
                <div class="movie-slider" id="slider-series"></div>
            </div>
        </div>

        <!-- PAGE SEARCH VIEW -->
        <div id="page-search-view" style="display: none;">
            <div style="margin-bottom: 20px;">
                <input type="text" id="search-main-input" placeholder="Ketik judul film..." style="width: 80%; padding: 12px; font-size: 18px; background: #333; color: #fff; border: none; border-radius: 4px;" oninput="prosesPencarian()" tabindex="9">
            </div>
            <div class="movie-row">
                <h3 id="search-result-title">Pencarian Populer</h3>
                <div class="movie-slider grid-layout" id="slider-pencarian"></div>
            </div>
        </div>

    </div>

    <!-- DETAIL MOVIE MODAL POPUP -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <img id="modal-poster" src="" alt="Poster">
            <div>
                <h2 id="modal-judul">Judul Film</h2>
                <p id="modal-deskripsi">Deskripsi sinopsis film akan muncul di sini secara detail dan jelas.</p>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="btn-focus" id="btn-putar" onclick="putarFilm()" tabindex="10">PUTAR</button>
                    <button class="btn-focus" id="btn-favorit" onclick="toggleFavorit()" tabindex="11">TAMBAH KOLEKSI</button>
                    <button class="btn-focus" id="btn-tutup-modal" onclick="tutupPopUpPoster()" tabindex="12">KEMBALI</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT LOGIC WITH DATA LAZY LOADING -->
    <script>
        // MAPPING FILE JSON TERPISAH PER KATEGORI[cite: 1]
        const KATEGORI_URLS = {
            dubbing: 'data/Tester.json'
            
        };

        const pageTitle = "mrzyb_premium"; 
        let databaseFilm = []; // Diisi dinamis via lazy load saat masuk menu pencarian[cite: 1]
        let dataKategori = { dubbing: null, indo: null, animasi: null, lawas: null, series: null }; // Tampungan RAM sementara[cite: 1]
        let dataFilmAktif = null;
        let activeView = 'home';
        let listFavorit = JSON.parse(localStorage.getItem('mrzyb_favorites')) || [];

        window.tutupPopUpPoster = function() {
            window.closeModal();
        };

        window.closeModal = function() {
            document.getElementById('movieModal').style.display = 'none';
        };

        // HANDLING BACK BUTTON D-PAD UNTUK REMOTE STB / ANDROID TV
        window.addEventListener('keydown', function(event) {
            if (event.keyCode === 4 || event.keyCode === 27 || event.keyCode === 10009 || event.key === "Back" || event.key === "Escape") {
                const modalElement = document.getElementById("movieModal");
                if (modalElement && window.getComputedStyle(modalElement).display !== "none") {
                    event.preventDefault();
                    window.tutupPopUpPoster();
                    return;
                }
                if (activeView !== 'home') {
                    event.preventDefault();
                    switchView('home');
                    return;
                }
                if (typeof Android !== "undefined" && Android.exitApp) {
                    event.preventDefault();
                    Android.exitApp();
                }
            }
        }, true);

        // FUNGSI UTAMA LAZY LOADING DATA ON-DEMAND
        async function ambilDataKategori(kategoriKey) {
            // Jika memori data kategori sudah ter-load di RAM, langsung return tanpa fetch ulang[cite: 1]
            if (dataKategori[kategoriKey] !== null) {
                return dataKategori[kategoriKey];
            }
            try {
                // Fetch data dari file JSON lokal secara pasif[cite: 1]
                const response = await fetch(KATEGORI_URLS[kategoriKey]);
                const data = await response.json();
                dataKategori[kategoriKey] = data; // Simpan ke cache agar pemanggilan kedua instan[cite: 1]
                return data;
            } catch (e) {
                console.error(`Gagal memuat file kategori JSON: ${kategoriKey}`, e);
                return [];
            }
        }

        // PERPINDAHAN HALAMAN / MENU SIDEBAR
        async function switchView(viewName) {
            activeView = viewName;
            const homeView = document.getElementById('page-home-view');
            const searchView = document.getElementById('page-search-view');
            
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            
            const rowPilihan = document.getElementById('row-pilihan');
            const existingHeader = rowPilihan.querySelector('.row-header');
            if (existingHeader) existingHeader.remove();

            if (viewName === 'search') {
                homeView.style.display = 'none';
                searchView.style.display = 'block';
                document.getElementById('menu-cari').classList.add('active');
                
                // LAZY LOAD GLOBAL SEARCH: Gabungkan data seluruh JSON hanya saat menu Cari diakses[cite: 1]
                await pastikanSemuaDataTerload();
                renderPencarianPopuler();
                setTimeout(() => document.getElementById('search-main-input').focus(), 100);
            } else {
                homeView.style.display = 'block';
                searchView.style.display = 'none';

                if (viewName === 'favorites') {
                    document.getElementById('menu-koleksi').classList.add('active');
                    tampilkanKoleksiSaya();
                } else if (viewName === 'film') {
                    document.getElementById('menu-film').classList.add('active');
                    const data = await ambilDataKategori('dubbing'); // Lazy load kategori spesifik[cite: 1]
                    tampilkanKategoriKhusus(data, "Film Dubbing");[cite: 1]
                } else if (viewName === 'anime') {
                    document.getElementById('menu-anime').classList.add('active');
                    const data = await ambilDataKategori('animasi'); // Lazy load kategori spesifik[cite: 1]
                    tampilkanKategoriKhusus(data, "Film Animasi");[cite: 1]
                } else if (viewName === 'indo') {
                    document.getElementById('menu-indo').classList.add('active');
                    const data = await ambilDataKategori('indo'); // Lazy load kategori spesifik[cite: 1]
                    tampilkanKategoriKhusus(data, "Film Indonesia");[cite: 1]
                } else if (viewName === 'seri') {
                    document.getElementById('menu-seri').classList.add('active');
                    const data = await ambilDataKategori('series'); // Lazy load kategori spesifik[cite: 1]
                    tampilkanKategoriKhusus(data, "Film Seri");[cite: 1]
                } else if (viewName === 'lawas') {
                    document.getElementById('menu-vip').classList.add('active');
                    const data = await ambilDataKategori('lawas'); // Lazy load kategori spesifik[cite: 1]
                    tampilkanKategoriKhusus(data, "Film Lawas");[cite: 1]
                } else {
                    document.getElementById('menu-home').classList.add('active');
                    document.getElementById('search-main-input').value = "";
                    kelolaBarisKategori();
                }
            }
        }

        // FUNGSI UNTUK MERAPIKAN DAN MENYATUKAN DATA APABILA USER INGIN SEARCHING GLOBAL
        async function pastikanSemuaDataTerload() {
            const keys = Object.keys(KATEGORI_URLS);
            for (const key of keys) {
                await ambilDataKategori(key);
            }
            databaseFilm = [
                ...(dataKategori.dubbing || []), 
                ...(dataKategori.indo || []), 
                ...(dataKategori.animasi || []), 
                ...(dataKategori.lawas || []), 
                ...(dataKategori.series || [])
            ];[cite: 1]
        }

        // PROSES STRATEGI LOAD AWAL APLIKASI (BOOSTER KECEPATAN START-UP)
        async function loadDataKonten() {
            // Cukup unduh data esensial yang muncul di atas layar beranda[cite: 1]
            await ambilDataKategori('dubbing');
            await ambilDataKategori('indo');
            
            kelolaBarisKategori();
            buatEventSidebarFocus();

            // Sisa JSON diunduh secara dicicil dengan delay agar CPU STB tidak tersedak (Lag)[cite: 1]
            setTimeout(async () => {
                await ambilDataKategori('animasi');
                await ambilDataKategori('lawas');
                await ambilDataKategori('series');
                kelolaBarisKategori(); // Refresh tampilan beranda secara halus[cite: 1]
            }, 1200);
        }

        function buatEventSidebarFocus() {
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.addEventListener('focus', () => {
                    document.getElementById('main-sidebar').classList.add('expanded');
                });
                item.addEventListener('blur', () => {
                    setTimeout(() => {
                        const active = document.activeElement;
                        if (!active || !active.classList.contains('sidebar-item')) {
                            document.getElementById('main-sidebar').classList.remove('expanded');
                        }
                    }, 50);
                });
            });
        }

        // MANAJEMEN BARIS BERANDA Halaman Depan
        function kelolaBarisKategori() {
            const sliderPilihan = document.getElementById('slider-pilihan');
            sliderPilihan.classList.remove('grid-layout'); 

            const semuaYangAda = [
                ...(dataKategori.dubbing || []),
                ...(dataKategori.indo || []),
                ...(dataKategori.animasi || []),
                ...(dataKategori.lawas || []),
                ...(dataKategori.series || [])
            ];
            const pilihanData = semuaYangAda.filter(m => m.halaman_depan === true).slice(0, 6);
            renderSlider(pilihanData, 'slider-pilihan', 'row-pilihan', true);

            // Tampilkan data baris beranda secara aman jika datanya sudah selesai di-load[cite: 1]
            if (dataKategori.dubbing) {
                renderSlider(dataKategori.dubbing.filter(m => m.halaman_depan === true), 'slider-dubbing', 'row-dubbing', false);[cite: 1]
            }
            if (dataKategori.indo) {
                renderSlider(dataKategori.indo.filter(m => m.halaman_depan === true), 'slider-indo', 'row-indo', false);[cite: 1]
            }
            if (dataKategori.animasi) {
                renderSlider(dataKategori.animasi.filter(m => m.halaman_depan === true), 'slider-animasi', 'row-animasi', false);[cite: 1]
            }
            if (dataKategori.lawas) {
                renderSlider(dataKategori.lawas.filter(m => m.halaman_depan === true), 'slider-lawas', 'row-lawas', false);[cite: 1]
            }
            if (dataKategori.series) {
                renderSlider(dataKategori.series.filter(m => m.halaman_depan === true), 'slider-series', 'row-series', false);[cite: 1]
            }

            checkLastSessionPremium();
        }

        // RENDER ELEMEN KARTU FILM KE DALAM DOM SLIDER
        function renderSlider(dataArray, sliderId, rowId, isPremiumRow = false) {
            const sliderElement = document.getElementById(sliderId);
            const rowElement = document.getElementById(rowId);
            
            if (!dataArray || dataArray.length === 0) {
                rowElement.style.display = 'none';
                return;
            }
            rowElement.style.display = 'block';
            sliderElement.innerHTML = '';

            dataArray.forEach((film, index) => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('tabindex', '20');
                card.innerHTML = `
                    <img src="${film.poster || 'placeholder.jpg'}" alt="${film.title}">
                    <h4>${film.title}</h4>
                `;
                card.addEventListener('click', () => bukaModalFilm(film));
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') bukaModalFilm(film);
                });
                sliderElement.appendChild(card);
            });
        }

        // TAMPILKAN GRID KHUSUS SAAT KLIK KATEGORI DI SIDEBAR
        function tampilkanKategoriKhusus(dataArray, namaKategori) {
            document.getElementById('row-dubbing').style.display = 'none';
            document.getElementById('row-indo').style.display = 'none';
            document.getElementById('row-animasi').style.display = 'none';
            document.getElementById('row-lawas').style.display = 'none';
            document.getElementById('row-series').style.display = 'none';

            const rowPilihan = document.getElementById('row-pilihan');
            rowPilihan.style.display = 'block';
            
            const existingHeader = rowPilihan.querySelector('.row-header');
            if (existingHeader) existingHeader.remove();

            const newHeader = document.createElement('h3');
            newHeader.className = 'row-header';
            newHeader.innerText = namaKategori;
            rowPilihan.insertBefore(newHeader, document.getElementById('slider-pilihan'));

            const sliderPilihan = document.getElementById('slider-pilihan');
            sliderPilihan.classList.add('grid-layout');

            renderSlider(dataArray, 'slider-pilihan', 'row-pilihan', false);
        }

        // MANAJEMEN MENU KOLEKSI / FAVORIT
        function tampilkanKoleksiSaya() {
            tampilkanKategoriKhusus(listFavorit, "Koleksi Saya (Favorit)");
        }

        // LOGIK PENCARIAN FILM
        function renderPencarianPopuler() {
            const populer = databaseFilm.slice(0, 12);
            renderSlider(populer, 'slider-pencarian', 'page-search-view', false);
        }

        function prosesPencarian() {
            const query = document.getElementById('search-main-input').value.toLowerCase().trim();
            const titleElement = document.getElementById('search-result-title');
            
            if (query === "") {
                titleElement.innerText = "Pencarian Populer";
                renderPencarianPopuler();
                return;
            }

            const hasilFilter = databaseFilm.filter(film => 
                (film.title && film.title.toLowerCase().includes(query)) || 
                (film.deskripsi && film.deskripsi.toLowerCase().includes(query))
            );

            titleElement.innerText = `Hasil Pencarian: (${hasilFilter.length})`;
            renderSlider(hasilFilter, 'slider-pencarian', 'page-search-view', false);
        }

        // MODAL DETAIL POPUP
        function bukaModalFilm(film) {
            dataFilmAktif = film;
            document.getElementById('modal-judul').innerText = film.title;
            document.getElementById('modal-deskripsi').innerText = film.deskripsi || 'Tidak ada deskripsi.';
            document.getElementById('modal-poster').src = film.poster || 'placeholder.jpg';

            const btnFav = document.getElementById('btn-favorit');
            const sudahAda = listFavorit.some(f => f.title === film.title);
            btnFav.innerText = sudahAda ? "HAPUS KOLEKSI" : "TAMBAH KOLEKSI";

            document.getElementById('movieModal').style.display = 'block';
            document.getElementById('btn-putar').focus();
        }

        function putarFilm() {
            if (dataFilmAktif && dataFilmAktif.url) {
                if (typeof Android !== "undefined" && Android.playVideo) {
                    Android.playVideo(dataFilmAktif.url, dataFilmAktif.title);
                } else {
                    alert(`Memutar film via Browser: ${dataFilmAktif.title}\nURL: ${dataFilmAktif.url}`);
                    window.open(dataFilmAktif.url, '_blank');
                }
            } else {
                alert('Tautan streaming video tidak ditemukan!');
            }
        }

        function toggleFavorit() {
            if (!dataFilmAktif) return;
            const index = listFavorit.findIndex(f => f.title === dataFilmAktif.title);
            if (index > -1) {
                listFavorit.splice(index, 1);
                document.getElementById('btn-favorit').innerText = "TAMBAH KOLEKSI";
            } else {
                listFavorit.push(dataFilmAktif);
                document.getElementById('btn-favorit').innerText = "HAPUS KOLEKSI";
            }
            localStorage.setItem('mrzyb_favorites', JSON.stringify(listFavorit));
        }

        function checkLastSessionPremium() {
            // Tempat verifikasi premium jika diperlukan
        }

        // INISIALISASI STRUKTUR APLIKASI SAAT PERTAMA LOAD
        document.addEventListener("DOMContentLoaded", () => {
            loadDataKonten();
            document.getElementById('menu-home').focus();
        });
    </script>
</body>
</html>
