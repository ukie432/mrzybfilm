<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePremium - Películas Exclusivas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Smooch+Sans:wght@100;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a1a2e;
            --secondary-color: #16213e;
            --accent-color: #0f3460;
            --highlight-color: #e94560;
            --text-color: #f1f1f1;
            --text-secondary: #b8b8b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Smooch Sans', sans-serif;
        }

        body {
            background-color: var(--primary-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Cabecera */
        header {
            background: linear-gradient(to right, var(--secondary-color), var(--accent-color));
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--highlight-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
        }

        .nav-menu a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 300;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover {
            color: var(--highlight-color);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--highlight-color);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .user-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .user-actions i {
            font-size: 1.5rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-actions i:hover {
            color: var(--highlight-color);
            transform: scale(1.1);
        }

        /* Search bar */
        .search-container {
            position: relative;
            display: none;
            width: 300px;
        }

        .search-container.active {
            display: block;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            border: none;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Slider principal */
        .slider-container {
            width: 100%;
            height: 70vh;
            position: relative;
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .slider {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            width: 33.33%;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.3));
        }

        .slide-content {
            position: absolute;
            bottom: 20%;
            left: 5%;
            max-width: 50%;
            z-index: 10;
        }

        .slide-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--highlight-color);
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
        }

        .slide-description {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            line-height: 1.5;
        }

        .slide-button {
            padding: 0.8rem 2rem;
            background-color: var(--highlight-color);
            color: var(--text-color);
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .slide-button:hover {
            background-color: #ff2d4f;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        /* Sección de películas */
        .movies-section {
            padding: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 2.5rem;
            color: var(--highlight-color);
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 50%;
            height: 3px;
            background-color: var(--highlight-color);
        }

        .movies-container {
            display: flex;
            overflow-x: auto;
            gap: 1.5rem;
            padding-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--highlight-color) var(--secondary-color);
        }

        .movie-card {
            background-color: var(--secondary-color);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            cursor: pointer;
            flex: 0 0 180px;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
        }

        .movie-poster {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .movie-info {
            padding: 1rem;
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .movie-rating {
            color: gold;
        }

        .movie-card:hover .movie-overlay {
            opacity: 1;
        }

        .movie-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 1rem;
        }

        .overlay-icons {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .overlay-icons i {
            font-size: 1.5rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .overlay-icons i:hover {
            color: var(--highlight-color);
            transform: scale(1.2);
        }

        .overlay-description {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-color);
            line-height: 1.5;
            max-height: 100px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Ventana modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background-color: var(--secondary-color);
            margin: 2rem auto;
            width: 80%;
            max-width: 1200px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--accent-color);
        }

        .modal-title {
            font-size: 2rem;
            color: var(--highlight-color);
        }

        .close-modal {
            font-size: 2rem;
            color: var(--text-color);
            cursor: pointer;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .movie-details {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .movie-poster-large {
            width: 300px;
            height: 450px;
            object-fit: cover;
            border-radius: 10px;
        }

        .movie-info-large {
            flex: 1;
        }

        .movie-title-large {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--highlight-color);
        }

        .movie-meta-large {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .movie-description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .movie-actions {
            display: flex;
            gap: 1rem;
        }

        .action-button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .play-button {
            background-color: var(--highlight-color);
            color: var(--text-color);
        }

        .play-button:hover {
            background-color: #ff2d4f;
            transform: translateY(-3px);
        }

        /* Submenú */
        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: var(--secondary-color);
            border-radius: 0 0 10px 10px;
            width: 250px;
            z-index: 100;
        }

        .submenu.active {
            display: block;
        }

        .submenu-item {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-color);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">CinePremium</div>
        <nav class="nav-menu">
            <a href="#">Inicio</a>
            <a href="#">Películas</a>
            <a href="#">Series</a>
        </nav>
        <div class="user-actions">
            <i class="fas fa-search" id="search-icon"></i>
            <div class="search-container" id="search-container">
                <input type="text" class="search-input" placeholder="Buscar películas..." id="search-input">
            </div>
            <i class="fas fa-user" id="user-icon"></i>
        </div>
    </header>

    <div class="slider-container">
        <div class="slider" id="slider">
            <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original/8Y43POKjjKDGI9MH89NW0NAzzp8.jpg');">
                <div class="slide-content">
                    <h2 class="slide-title">Dune: Parte Dos</h2>
                    <p class="slide-description">Paul Atreides se une a Chani y los Fremen mientras busca venganza contra los conspiradores.</p>
                    <button class="slide-button" onclick="openModal('Dune: Parte Dos')">
                        <i class="fas fa-play"></i> Ver ahora
                    </button>
                </div>
            </div>
        </div>
    </div>

    <section class="movies-section">
        <div class="section-header">
            <h2 class="section-title" id="section-main-title">Películas populares</h2>
        </div>
        <div class="movies-container" id="movies-display-grid" style="flex-wrap: wrap; overflow-x: hidden;"></div>
    </section>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Detalles de la Película</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="movie-details">
                    <img src="" alt="Poster" class="movie-poster-large" id="modalPoster">
                    <div class="movie-info-large">
                        <h3 class="movie-title-large" id="modalMovieTitle">Título</h3>
                        <div class="movie-meta-large">
                            <span id="modalYear">Año</span>
                            <span id="modalDuration">Duración</span>
                            <span id="modalRating" style="color: gold;">Rating</span>
                            <span id="modalGenre">Género</span>
                        </div>
                        <p class="movie-description" id="modalDescription">Descripción...</p>
                        <div class="movie-actions">
                            <button class="action-button play-button" onclick="kirimKeExoPlayer()">
                                <i class="fas fa-play"></i> Reproducir (ExoPlayer)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Menggunakan path lokal data/Tester.json sesuai permintaan Anda
        const GITHUB_JSON_URL = 'data/Tester.json'; 
        let databaseFilm = [];
        let filmTerpilih = null;

        // Ambil data otomatis saat web dibuka
        async function fetchMoviesData() {
            try {
                const response = await fetch(GITHUB_JSON_URL);
                databaseFilm = await response.json();
                
                // Filter film yang dipajang di halaman depan (halaman_depan === true)
                renderMovies(databaseFilm.filter(m => m.halaman_depan === true));
            } catch (error) {
                console.error("Gagal memuat JSON:", error);
            }
        }

        function renderMovies(moviesList) {
            const grid = document.getElementById('movies-display-grid');
            if (moviesList.length === 0) {
                grid.innerHTML = `<p style="padding: 2rem; color: var(--text-secondary)">No se encontraron películas.</p>`;
                return;
            }

            grid.innerHTML = moviesList.map(movie => `
                <div class="movie-card" onclick="openModal('${movie.titulo}')">
                    <img src="${movie.poster}" alt="${movie.titulo}" class="movie-poster">
                    <div class="movie-info">
                        <h3 class="movie-title">${movie.titulo}</h3>
                        <div class="movie-meta">
                            <span>${movie.year}</span>
                            <span class="movie-rating"><i class="fas fa-star"></i> ${movie.rating}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Fungsi Pencarian Global
        const searchInput = document.getElementById('search-input');
        const sectionTitle = document.getElementById('section-main-title');

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            if (keyword === "") {
                sectionTitle.textContent = "Películas populares";
                renderMovies(databaseFilm.filter(m => m.halaman_depan === true));
            } else {
                sectionTitle.textContent = `Resultados para: "${e.target.value}"`;
                const searchResults = databaseFilm.filter(movie => 
                    movie.titulo.toLowerCase().includes(keyword) || 
                    (movie.genre && movie.genre.toLowerCase().includes(keyword))
                );
                renderMovies(searchResults);
            }
        });

        // Buka deskripsi film
        function openModal(movieTitle) {
            const movieData = databaseFilm.find(m => m.titulo === movieTitle);
            if (!movieData) return;

            filmTerpilih = movieData; // Simpan data film yang sedang dibuka

            document.getElementById('modalTitle').textContent = movieTitle;
            document.getElementById('modalMovieTitle').textContent = movieTitle;
            document.getElementById('modalPoster').src = movieData.poster;
            document.getElementById('modalYear').textContent = movieData.year;
            document.getElementById('modalDuration').textContent = movieData.duration;
            document.getElementById('modalRating').innerHTML = `<i class="fas fa-star"></i> ${movieData.rating}`;
            document.getElementById('modalGenre').textContent = movieData.genre;
            document.getElementById('modalDescription').textContent = movieData.description;

            document.getElementById('movieModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('movieModal').style.display = 'none';
        }

        // FUNGSI JEMBATAN KE ANDROID EXOPLAYER
        function kirimKeExoPlayer() {
            if (filmTerpilih && filmTerpilih.video) {
                // Memeriksa apakah aplikasi berjalan di dalam Android WebView yang memiliki interface "AndroidApp"
                if (window.AndroidApp && window.AndroidApp.putarVideo) {
                    window.AndroidApp.putarVideo(filmTerpilih.video, filmTerpilih.titulo);
                } else {
                    // Jika dibuka di browser laptop biasa, buka link videonya langsung di tab baru
                    window.open(filmTerpilih.video, '_blank');
                }
            } else {
                alert("URL Video tidak ditemukan!");
            }
        }

        const searchIcon = document.getElementById('search-icon');
        const searchContainer = document.getElementById('search-container');
        searchIcon.addEventListener('click', () => {
            searchContainer.classList.toggle('active');
            if (searchContainer.classList.contains('active')) searchInput.focus();
        });

        window.addEventListener('load', fetchMoviesData);
    </script>
</body>
</html>
