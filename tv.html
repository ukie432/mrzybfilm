<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern TV Online Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0c0c0d; color: #ffffff; font-family: 'Segoe UI', sans-serif; overflow: hidden; padding: 30px 50px; display: flex; flex-direction: column; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-size: 2rem; font-weight: 800; color: #e50914; }
        .search-input { background-color: #1a1a1c; color: #fff; padding: 12px 20px; border-radius: 30px; width: 350px; border: 2px solid transparent; }
        .poster-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 25px; padding-bottom: 50px; }
        .focusable { background-color: #161618; border-radius: 12px; overflow: hidden; border: 3px solid transparent; cursor: pointer; transition: 0.2s; }
        .poster-wrapper { position: relative; width: 100%; padding-top: 140%; }
        .focusable img { position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; object-fit: contain; }
        .channel-info { padding: 12px; text-align: center; }
        .focusable:focus { border-color: #e50914; transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <div class="logo">LIVE TV</div>
        <input type="text" class="search-input" id="searchBox" placeholder="Cari saluran...">
    </header>

    <div class="main-content" id="scrollContainer">
        <div class="poster-grid" id="posterGrid"></div>
    </div>

    <script>
        const JSON_URL = "data/tv.json"; // Pastikan path ini benar
        let allChannels = [];

        async function loadData() {
            try {
                const response = await fetch(JSON_URL);
                allChannels = await response.json();
                renderGrid(allChannels);
            } catch (error) { console.error(error); }
        }

        function renderGrid(channels) {
            const grid = document.getElementById('posterGrid');
            grid.innerHTML = "";

            channels.forEach((channel) => {
                const card = document.createElement('div');
                card.className = 'focusable';
                card.tabIndex = 0;
                
                // SIMPAN DATA KE ATTRIBUTE
                card.setAttribute('data-url', channel.url || '');
                card.setAttribute('data-name', channel.name || '');
                card.setAttribute('data-drm-scheme', (channel.drm && channel.drm.scheme) ? channel.drm.scheme : "");
                card.setAttribute('data-drm-keys', (channel.drm && channel.drm.keys) ? channel.drm.keys : "");

                card.innerHTML = `
                    <div class="poster-wrapper">
                        <img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/300x450/161618/ffffff?text=TV'">
                    </div>
                    <div class="channel-info">
                        <div class="channel-name">${channel.name}</div>
                    </div>
                `;

                card.addEventListener('click', () => playChannel(card));
                grid.appendChild(card);
            });
        }

        // FUNGSI INI MENGIRIM 4 PARAMETER KE ANDROID STUDIO
        function playChannel(element) {
            const url = element.getAttribute('data-url');
            const name = element.getAttribute('data-name');
            const drmScheme = element.getAttribute('data-drm-scheme');
            const drmKeys = element.getAttribute('data-drm-keys');

            if (window.Android && typeof window.Android.playVideo === "function") {
                window.Android.playVideo(url, name, drmScheme, drmKeys);
            } else {
                console.log("Android bridge tidak ditemukan");
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
