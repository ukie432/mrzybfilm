<script>
document.addEventListener("DOMContentLoaded", function() {
    const searchBox = document.getElementById('searchBox');
    const btnClear = document.getElementById('btnClear');
    const noResultsText = document.getElementById('noResultsText');
    const containerUtama = document.getElementById('containerUtama');
    const containerFav = document.getElementById('containerFav');
    const favSectionTitle = document.getElementById('favSectionTitle');

    let listFavorit = JSON.parse(localStorage.getItem('jadul_favorit')) || [];
    let databaseFilmGlobal = []; // Tempat menyimpan data film dari JSON agar bisa diakses kapan saja

    // Kunci navigasi tombol back agar tidak keluar/refresh paksa
    window.history.pushState(null, "", window.location.href);
    window.onpopstate = function () {
        window.history.pushState(null, "", window.location.href);
    };

    // Fungsi untuk merender/menampilkan film di rak favorit (Langsung membaca dari memori JSON)
    function updateTampilanFavorit() {
        containerFav.innerHTML = "";
        
        if (listFavorit.length === 0) {
            favSectionTitle.style.display = "none";
            containerFav.style.display = "none";
        } else {
            favSectionTitle.style.display = "block";
            containerFav.style.display = "flex"; // Memaksa menu favorit tetap terbuka sejak awal

            listFavorit.forEach(idFilm => {
                // Cari data film langsung dari database JSON, bukan dari element HTML lagi
                const dataFilm = databaseFilmGlobal.find(f => f.id === idFilm);
                if (dataFilm) {
                    const cardHtml = `
                        <div class="card-film" data-id="${dataFilm.id}" id="fav-card-${dataFilm.id}">
                            <a tabindex="0" class="play-link" href="${dataFilm.url}" data-title="${dataFilm.title.toLowerCase()}">
                                <div class="poster-wrapper">
                                    <img src="${dataFilm.img}" loading="lazy">
                                </div>
                            </a>
                            <button class="btn-fav" tabindex="0" data-target="${dataFilm.id}"><span>★</span> Favorit</button>
                            <div class="film-title">${dataFilm.title}</div>
                        </div>
                    `;
                    containerFav.insertAdjacentHTML('beforeend', cardHtml);
                }
            });
        }
        
        pasangEventAksi();
        perbaruiStatusTombolBintang();
    }

    function perbaruiStatusTombolBintang() {
        document.querySelectorAll('.btn-fav').forEach(btn => {
            const idTarget = btn.getAttribute('data-target');
            if (listFavorit.includes(idTarget)) {
                btn.classList.add('active');
                btn.innerHTML = "<span>★</span> Favorit";
            } else {
                btn.classList.remove('active');
                btn.innerHTML = "<span>☆</span> Favorit";
            }
        });
    }

    function pasangEventAksi() {
        // Ikat event tombol play/nonton film (Berlaku untuk daftar utama dan rak favorit)
        document.querySelectorAll('.card-film').forEach(card => {
            const link = card.querySelector('.play-link');
            const btnFav = card.querySelector('.btn-fav');
            
            if (link) {
                link.replaceWith(link.cloneNode(true));
                const newLink = card.querySelector('.play-link');
                
                const handleWatch = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    localStorage.setItem("idPosterTerakhir", card.getAttribute("id"));
                    localStorage.setItem("sedangNontonVideoSTB", "ya");
                    
                    if (typeof Android !== "undefined" && Android.playVideo) {
                        Android.playVideo(newLink.getAttribute("href"));
                    }
                    return false;
                };
                
                newLink.addEventListener("click", handleWatch);
                newLink.addEventListener("keydown", function(e) { 
                    if (e.key === "Enter") handleWatch(e); 
                });
            }

            if (btnFav) {
                btnFav.replaceWith(btnFav.cloneNode(true));
                const newBtnFav = card.querySelector('.btn-fav');
                
                const handleFavClick = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const idTarget = newBtnFav.getAttribute('data-target');
                    
                    if (listFavorit.includes(idTarget)) {
                        listFavorit = listFavorit.filter(id => id !== idTarget);
                    } else {
                        listFavorit.push(idTarget);
                    }
                    
                    localStorage.setItem('jadul_favorit', JSON.stringify(listFavorit));
                    updateTampilanFavorit();
                };
                
                newBtnFav.addEventListener('click', handleFavClick);
                newBtnFav.addEventListener('keydown', function(e) { 
                    if (e.key === "Enter") handleFavClick(e); 
                });
            }
        });
    }

    function saringFilm(keyword) {
        let adaFilmCocok = false;
        const semuaKartu = containerUtama.querySelectorAll('.card-film');
        semuaKartu.forEach(card => {
            const link = card.querySelector('.play-link');
            if (!link) return;
            const namaFilm = link.getAttribute('data-title') || "";
            const btnFav = card.querySelector('.btn-fav');
            
            if (namaFilm.includes(keyword)) {
                card.style.display = "block";
                link.setAttribute("tabindex", "0");
                if (btnFav) btnFav.setAttribute("tabindex", "0");
                adaFilmCocok = true;
            } else {
                card.style.display = "none";
                link.setAttribute("tabindex", "-1");
                if (btnFav) btnFav.setAttribute("tabindex", "-1");
            }
        });
        noResultsText.style.display = adaFilmCocok ? "none" : "block";
    }

    searchBox.addEventListener('input', function() {
        const filterText = searchBox.value.toLowerCase().trim();
        btnClear.style.display = searchBox.value.length > 0 ? "flex" : "none";
        saringFilm(filterText);
    });

    btnClear.addEventListener('click', function() {
        searchBox.value = "";
        btnClear.style.display = "none";
        saringFilm("");
        searchBox.focus();
    });

    // MEMUAT DATA FILM DARI JSON
    fetch('film.json')
    .then(response => response.json())
    .then(data => {
        databaseFilmGlobal = data; // Simpan ke memory global agar aman

        // Render daftar film utama
        containerUtama.innerHTML = data.map(film => `
            <div class="card-film" data-id="${film.id}" id="utama-${film.id}">
                <a tabindex="0" class="play-link" href="${film.url}" data-title="${film.title.toLowerCase()}">
                    <div class="poster-wrapper">
                        <img src="${film.img}" loading="lazy" decoding="async">
                    </div>
                </a>
                <button class="btn-fav" tabindex="0" data-target="${film.id}"><span>☆</span> Favorit</button>
                <div class="film-title">${film.title}</div>
            </div>
        `).join('');

        // Tampilkan rak favorit secara instan tanpa menunggu elemen HTML lain
        updateTampilanFavorit();

        // Mengembalikan fokus remot STB ke posisi semula setelah keluar dari player film
        setTimeout(() => {
            const statusNontonSTB = localStorage.getItem("sedangNontonVideoSTB");
            const idPosterTerakhir = localStorage.getItem("idPosterTerakhir");
            if (statusNontonSTB === "ya" && idPosterTerakhir) {
                const targetPoster = document.getElementById(idPosterTerakhir);
                if (targetPoster) {
                    const tombolPlay = targetPoster.querySelector('.play-link');
                    if (tombolPlay) {
                        tombolPlay.focus();
                        targetPoster.scrollIntoView({ behavior: "auto", block: "center" });
                        localStorage.removeItem("sedangNontonVideoSTB");
                        localStorage.removeItem("idPosterTerakhir");
                        return;
                    }
                }
            }
            if (searchBox) searchBox.focus();
        }, 180);
    })
    .catch(err => {
        console.error("Gagal load file film.json:", err);
        if (searchBox) searchBox.focus();
    });
});
</script>
